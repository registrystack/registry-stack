title = "registry-notary gitleaks config"

[[allowlists]]
description = "Generated and local build output are not source review surfaces."
paths = [
  '''^target/''',
  '''^demo/var/''',
]

# Path-scoped allowlist for synthetic SD-JWT VC test fixtures.
# All JWTs, JWKs, and private key material under this directory are
# throwaway test-only material generated by `cargo run -p xtask --
# gen-sd-jwt-vc-fixtures`. They carry no trust outside the test suite.
# Reviewed and waived: registry-notary#10.
[[allowlists]]
description = "Synthetic SD-JWT VC fixtures for verifier compatibility harness."
paths = [
  '''^tests/fixtures/sd_jwt_vc/''',
  '''^xtask/src/main\.rs''',
]
