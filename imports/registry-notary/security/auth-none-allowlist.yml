allowed:
  - listener: public
    method: GET
    path: /healthz
    reason: Health probe.
  - listener: public
    method: GET
    path: /ready
    reason: Readiness probe.
  - listener: public
    method: GET
    path: /.well-known/openid-credential-issuer
    reason: Public OID4VCI issuer metadata.
  - listener: public
    method: GET
    path: /oid4vci/credential-offer
    reason: Public OID4VCI credential offer endpoint.
  - listener: public
    method: GET
    path: /oid4vci/offer/start
    reason: Public OID4VCI pre-authorized-code browser start endpoint.
  - listener: public
    method: GET
    path: /oid4vci/offer/callback
    reason: Public OID4VCI pre-authorized-code IdP callback endpoint with route-local state validation.
  - listener: public
    method: POST
    path: /oid4vci/token
    reason: Public OID4VCI pre-authorized-code token endpoint with code, PIN, and route-local replay controls.
  - listener: public
    method: POST
    path: /oid4vci/nonce
    reason: Public OID4VCI nonce endpoint.
  - listener: public
    method: GET
    path: /credentials/{*vct_path}
    reason: Public OID4VCI credential type metadata.
  - listener: public
    method: GET
    path: /.well-known/vct/{*vct_path}
    reason: Public SD-JWT VC Type Metadata well-known route.
  - listener: public
    method: GET
    path: /v1/credentials/{credential_id}/status
    reason: Public credential status lookup with opaque credential id.
  - listener: sidecar
    method: GET
    path: /healthz
    reason: OpenFn sidecar health probe.
  - listener: sidecar
    method: GET
    path: /ready
    reason: OpenFn sidecar readiness probe.
  - listener: sidecar
    method: GET
    path: /metrics
    reason: OpenFn sidecar metrics expose bounded operational counters.
