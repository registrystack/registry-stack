server:
  bind: "127.0.0.1:9191"
auth:
  bearer_tokens:
    - id: witness
      hash_env: DEV_SIDECAR_TOKEN_HASH
limits:
  max_workers: 2
  worker_timeout_ms: 10000
  max_worker_memory_mb: 512
  max_output_bytes: 1048576
  max_request_bytes: 16384
  max_query_parameter_bytes: 1024
  liveness_window_ms: 30000
  retry_after_seconds: 1
openfn:
  cli_build_tool: "1.2.5"
  runtime: "1.9.3"
worker:
  command: "node"
  args:
    - "--experimental-vm-modules"
    - "./crates/registry-witness-openfn-sidecar/workers/openfn_worker.mjs"
  version_args:
    - "--experimental-vm-modules"
    - "./crates/registry-witness-openfn-sidecar/workers/openfn_worker.mjs"
    - "--version"
    - "--require-adaptor"
    - "@openfn/language-common@3.2.3"
sources:
  example_people:
    dataset: civil_registry
    entity: civil_person
    workflow:
      start: prepare_lookup
      steps:
        - id: prepare_lookup
          expression: ./crates/registry-witness-openfn-sidecar/examples/jobs/common-prepare-lookup.js
          adaptors:
            - "@openfn/language-common@3.2.3"
          next:
            filter_records: true
        - id: filter_records
          expression: ./crates/registry-witness-openfn-sidecar/examples/jobs/common-filter-records.js
          adaptors:
            - "@openfn/language-common@3.2.3"
          next:
            return_rda: true
        - id: return_rda
          expression: ./crates/registry-witness-openfn-sidecar/examples/jobs/common-return-rda.js
          adaptors:
            - "@openfn/language-common@3.2.3"
    credential_env: EXAMPLE_PERSON_LOOKUP_CREDENTIAL_JSON
    smoke_lookup:
      field: national_id
      value: person-123
      fields: ["national_id", "birth_date"]
      purpose: startup-readiness-smoke
