[package]
name = "registry-notary-openfn-sidecar"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Registry Notary OpenFn sidecar worker process protocol and execution pool."
readme = "README.md"
repository.workspace = true
publish = false

[dependencies]
axum.workspace = true
chrono = { version = "0.4" }
clap.workspace = true
hyper.workspace = true
hyper-util.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_norway.workspace = true
registry-notary-worker-harness.workspace = true
registry-platform-authcommon.workspace = true
registry-platform-config.workspace = true
registry-platform-ops.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["io-util", "process"] }
tough = { version = "0.22.0" }
tower.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[target.'cfg(unix)'.dependencies]
libc = { version = "0.2" }

[dev-dependencies]
axum-test = { version = "20" }
tempfile = { version = "3" }

[[bin]]
name = "openfn-sidecar-worker-fixture"
path = "src/bin/openfn_sidecar_worker_fixture.rs"
test = false

[[bin]]
name = "registry-notary-openfn-sidecar-test-worker"
path = "src/bin/test_worker.rs"
test = false
