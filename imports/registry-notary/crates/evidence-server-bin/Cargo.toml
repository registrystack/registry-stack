[package]
name = "evidence-server-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Standalone Evidence Server process entrypoint."
readme.workspace = true
repository.workspace = true
publish = false

[[bin]]
name = "evidence-server"
path = "src/main.rs"

[features]
default = ["evidence-server-cel"]
evidence-server-cel = ["evidence-server/evidence-server-cel"]

[dependencies]
axum.workspace = true
clap.workspace = true
evidence-core.workspace = true
evidence-server = { workspace = true, default-features = false }
serde_yml.workspace = true
tokio.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
