[package]
name = "registry-witness-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Standalone Registry Witness process entrypoint."
readme.workspace = true
repository.workspace = true
publish = false

[[bin]]
name = "registry-witness"
path = "src/main.rs"

[features]
default = ["registry-witness-cel"]
registry-witness-cel = ["registry-witness-server/registry-witness-cel"]

[dependencies]
axum.workspace = true
clap.workspace = true
registry-witness-core.workspace = true
registry-witness-server = { workspace = true, default-features = false }
serde_yml.workspace = true
tokio.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
