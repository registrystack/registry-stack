[package]
name = "registry-witness-server"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Standalone Registry Witness routes, runtime, auth, audit, and HTTP source connectors."
readme = "README.md"
repository.workspace = true
publish = false

[features]
default = ["registry-witness-cel"]
registry-witness-cel = ["dep:cel-mapper-core"]

[dependencies]
registry-witness-core.workspace = true
registry-platform-audit.workspace = true
registry-platform-authcommon.workspace = true
registry-platform-crypto.workspace = true
registry-platform-httpsec.workspace = true
registry-platform-httputil.workspace = true
registry-platform-oid4vci.workspace = true
registry-platform-oidc.workspace = true
registry-platform-sdjwt.workspace = true
axum.workspace = true
base64.workspace = true
cel-mapper-core = { workspace = true, optional = true }
getrandom.workspace = true
jsonwebtoken.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
subtle.workspace = true
thiserror.workspace = true
time.workspace = true
tokio.workspace = true
tracing.workspace = true
ulid.workspace = true
utoipa.workspace = true

[dev-dependencies]
axum-test = { version = "20" }
registry-platform-testing.workspace = true
registry-witness-openfn-sidecar = { version = "0.2.1", path = "../registry-witness-openfn-sidecar" }
serde_norway.workspace = true
tempfile = { version = "3" }
# Criterion drives the microbenchmarks under `benches/`. The benches are
# manually invoked via `cargo bench`; CI smoke-checks `cargo bench --no-run`.
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "auth_bench"
harness = false

[[bench]]
name = "sd_jwt_bench"
harness = false

[[bench]]
name = "json_bench"
harness = false
