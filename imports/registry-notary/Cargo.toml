[workspace]
members = [
    "crates/evidence-core",
    "crates/evidence-server",
    "crates/evidence-server-bin",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/jeremi/evidence-server"

[workspace.dependencies]
axum = { version = "0.8" }
base64 = { version = "0.22" }
clap = { version = "4", features = ["derive", "env"] }
evidence-core = { version = "0.1.0", path = "crates/evidence-core" }
evidence-server = { version = "0.1.0", path = "crates/evidence-server", default-features = false }
cel-mapper-core = { version = "0.1.0", git = "https://github.com/PublicSchema/cel-mapping", tag = "cel-mapper-core-v0.1.0" }
getrandom = { version = "0.4" }
jsonwebtoken = { version = "10", default-features = false, features = ["rust_crypto"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "native-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
serde_yml = { version = "0.0.12" }
sha2 = { version = "0.10" }
subtle = { version = "2" }
thiserror = { version = "2" }
time = { version = "0.3", features = ["serde", "formatting", "parsing", "macros"] }
tokio = { version = "1", features = ["rt-multi-thread", "signal", "macros", "net", "fs"] }
tower = { version = "0.5" }
tower-http = { version = "0.6", features = ["trace", "request-id", "cors"] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["fmt", "json", "env-filter"] }
ulid = { version = "1" }
utoipa = { version = "5" }
zeroize = { version = "1" }
