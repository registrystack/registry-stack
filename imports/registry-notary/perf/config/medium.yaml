# SPDX-License-Identifier: Apache-2.0
# Perf config for registry-witness, medium profile (100k stub subjects).
#
# Witness sees exactly one record per request, so the "profile" really
# controls how the harness fans out subject ids across the stub's record
# pool; witness itself is invariant. Both small.yaml and medium.yaml differ
# only in service_id label and audit log path so concurrent runs do not
# collide.

server:
  bind: 127.0.0.1:14255

auth:
  api_keys:
    - id: perf_verification_service
      token_env: REGISTRY_WITNESS_API_KEY
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification
    - id: perf_no_scope
      token_env: REGISTRY_WITNESS_NO_SCOPE_TOKEN
      scopes: []
  bearer_tokens:
    - id: perf_verification_service
      token_env: REGISTRY_WITNESS_BEARER_TOKEN
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification

audit:
  sink: file
  path: target/perf/registry-witness-audit-medium.jsonl

evidence:
  enabled: true
  service_id: perf.registry-witness.medium
  api_base_url: http://127.0.0.1:14255
  inline_batch_limit: 100
  source_connections:
    crvs:
      base_url: http://127.0.0.1:14256
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          birth_date: /birth_date
    farmer_registry:
      base_url: http://127.0.0.1:14256
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
      dci:
        search_path: /dci/fr/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          farmed_land_size_hectares: /farmed_land_size_hectares
  credential_profiles:
    smallholder_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:perf.registry-witness.example
      issuer_key_env: REGISTRY_WITNESS_ISSUER_JWK
      issuer_kid: did:web:perf.registry-witness.example#perf-key-1
      vct: https://perf.registry-witness.example/credentials/smallholder-farmer/v1
      validity_seconds: 86400
      allowed_claims:
        - farmer-under-4ha
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        crvs:
          connector: dci
          connection: crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: crvs
        field: birth_date
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 100
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
    - id: farmed-land-size
      title: Farmed land size
      version: 2026-05
      subject_type: person
      value:
        type: number
        unit: hectare
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        farmer:
          connector: dci
          connection: farmer_registry
          required_scope: farmer_registry:evidence_verification
          dataset: farmer_registry
          entity: farmer
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            farmed_land_size_hectares:
              field: farmed_land_size_hectares
              type: number
              unit: hectare
              required: true
      rule:
        type: extract
        source: farmer
        field: farmed_land_size_hectares
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 100
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
    - id: farmer-under-4ha
      title: Farmer under four hectares
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      depends_on:
        - farmed-land-size
      rule:
        type: cel
        expression: "claims.farmed_land_size.value < 4.0"
        bindings:
          claims:
            farmed_land_size:
              claim: farmed-land-size
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 100
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - smallholder_sd_jwt
