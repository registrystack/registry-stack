name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: c4df74a825d468334c975aabc35947996a86ad15

defaults:
  run:
    working-directory: registry-witness

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout registry-witness
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-witness
      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-witness -> target
      - run: cargo install cargo-deny --version 0.19.7 --locked
      - run: ~/.cargo/bin/cargo-deny --all-features check --hide-inclusion-graph

  openfn-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry-witness
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-witness
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: registry-witness/crates/registry-witness-openfn-sidecar/workers/package-lock.json
      - name: Install worker dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --prefix crates/registry-witness-openfn-sidecar/workers
      - name: Syntax-check OpenFn worker
        run: node --check crates/registry-witness-openfn-sidecar/workers/openfn_worker.mjs
      - name: Smoke-test OpenFn worker
        run: crates/registry-witness-openfn-sidecar/scripts/smoke-openfn-worker.sh

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout registry-witness
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-witness
      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-witness -> target
      - run: ../registry-platform/scripts/check-hygiene-alignment.sh . ../registry-platform
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test -p registry-witness-server --no-default-features
      - run: cargo test --workspace --all-features
      - run: cargo build --workspace --all-features
      - run: cargo run -p registry-witness-bin -- openapi > target/registry-witness.openapi.json
      - name: Build Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --file registry-witness/Dockerfile --tag registry-witness:ci registry-witness
