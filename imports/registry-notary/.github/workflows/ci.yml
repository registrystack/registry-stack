name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: 05a03973c3048b4d98d22cb29a55837f62594c12
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c

defaults:
  run:
    working-directory: registry-notary

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-notary
      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
      - name: Checkout crosswalk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: cel-mapping
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-notary -> target
      - run: cargo install cargo-deny --version 0.19.8 --locked
      - run: ~/.cargo/bin/cargo-deny --all-features check --hide-inclusion-graph

  openfn-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-notary
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: registry-notary/crates/registry-notary-openfn-sidecar/workers/package-lock.json
      - name: Install worker dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --prefix crates/registry-notary-openfn-sidecar/workers
      - name: Syntax-check OpenFn worker
        run: node --check crates/registry-notary-openfn-sidecar/workers/openfn_worker.mjs
      - name: Syntax-check sidecar container healthcheck
        run: node --check crates/registry-notary-openfn-sidecar/scripts/container-healthcheck.mjs
      - name: Smoke-test OpenFn worker
        run: crates/registry-notary-openfn-sidecar/scripts/smoke-openfn-worker.sh

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-notary
      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
      - name: Checkout crosswalk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: cel-mapping
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Install SoftHSM for live PKCS#11 test
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends softhsm2 openssl
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-notary -> target
      - name: Install cargo-nextest
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: nextest@0.9.136
          fallback: none
      - run: ../registry-platform/scripts/check-hygiene-alignment.sh . ../registry-platform
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo build -p registry-notary-bin --features pkcs11
      - run: cargo nextest run -p registry-notary-server --no-default-features
      - name: Require live PKCS#11 SoftHSM signing test
        env:
          REGISTRY_NOTARY_REQUIRE_SOFTHSM: "1"
        run: cargo test -p registry-notary-server --no-default-features --features pkcs11 pkcs11_signing_key_signs_with_softhsm_when_available -- --nocapture
      - run: cargo nextest run --workspace --all-features
      - run: cargo build --workspace --all-features
      - run: cargo run -p registry-notary-bin -- openapi > target/registry-notary.openapi.json
      - name: Free Rust build artifacts before Docker smoke tests
        run: cargo clean
      - name: Build release Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --build-context cel-mapping=cel-mapping --build-arg REGISTRY_NOTARY_FEATURES=registry-notary-cel,pkcs11 --file registry-notary/Dockerfile --tag registry-notary:ci registry-notary
      - name: Build no-CEL regression Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --build-context cel-mapping=cel-mapping --build-arg REGISTRY_NOTARY_FEATURES=pkcs11 --file registry-notary/Dockerfile --tag registry-notary:ci-no-cel registry-notary
      - name: Smoke no-CEL regression Docker image excludes CEL worker
        working-directory: ${{ github.workspace }}
        run: |
          if docker run --rm --entrypoint /usr/local/bin/registry-notary registry-notary:ci-no-cel cel-worker; then
            echo "no-CEL regression image unexpectedly accepted the CEL worker command"
            exit 1
          fi
      - name: Smoke release Docker image worker protocol
        working-directory: ${{ github.workspace }}
        run: |
          output="$(
            printf '%s\n' '{"protocol":"registry-notary-cel-worker/v1","expression":"source.age >= 18","root_bindings":{"source":{"age":21},"claims":{},"ctx":{},"vars":{},"meta":{}}}' \
              | docker run --rm -i --entrypoint /usr/local/bin/registry-notary-cel-worker registry-notary:ci
          )"
          python3 - "$output" <<'PY'
          import json
          import sys

          response = json.loads(sys.argv[1])
          assert response["protocol"] == "registry-notary-cel-worker/v1"
          assert response["value"] is True
          assert response["policy_hash"].startswith("sha256:")
          PY
      - name: Build OpenFn sidecar Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --build-context cel-mapping=cel-mapping --file registry-notary/Dockerfile.openfn-sidecar --tag registry-notary-openfn-sidecar:ci registry-notary
