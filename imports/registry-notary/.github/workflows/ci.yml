name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: e5b646f5979a41a65155b674f4769ff063910dba
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c

defaults:
  run:
    working-directory: registry-notary

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-notary -> target
      - run: cargo install cargo-deny --version 0.19.8 --locked
      - run: ~/.cargo/bin/cargo-deny --all-features check --hide-inclusion-graph

  rust:
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy
      - name: Install SoftHSM for live PKCS#11 test
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends softhsm2 openssl
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-notary -> target
      - name: Install cargo-nextest
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: nextest@0.9.136
          fallback: none
      - name: Install oasdiff
        run: |
          go install github.com/oasdiff/oasdiff@v1.11.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: ../registry-platform/scripts/check-hygiene-alignment.sh . ../registry-platform
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo build -p registry-notary-bin --features pkcs11
      - run: cargo nextest run -p registry-notary-server --no-default-features
      - name: Require live PKCS#11 SoftHSM signing test
        env:
          REGISTRY_NOTARY_REQUIRE_SOFTHSM: "1"
        run: cargo test -p registry-notary-server --no-default-features --features pkcs11 pkcs11_signing_key_signs_with_softhsm_when_available -- --nocapture
      - run: cargo nextest run --workspace --all-features
      - run: cargo build --workspace --all-features
      - name: Check OpenAPI contract
        run: |
          base_ref=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            base_ref="FETCH_HEAD"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.before }}"
            base_ref="${{ github.event.before }}"
          fi

          if [ -n "$base_ref" ]; then
            OPENAPI_CONTRACT_BASE_REF="$base_ref" ./scripts/check-openapi-contract.sh
          else
            ./scripts/check-openapi-contract.sh
          fi
      - name: Free Rust build artifacts before Docker smoke tests
        run: cargo clean
      - name: Enforce container runtime policy
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          require_literal() {
            file="$1"
            literal="$2"
            if ! grep -Fq "$literal" "$file"; then
              echo "$file must contain: $literal" >&2
              exit 1
            fi
          }

          require_any_literal() {
            file="$1"
            shift
            for literal in "$@"; do
              if grep -Fq "$literal" "$file"; then
                return 0
              fi
            done
            echo "$file must contain one of:" >&2
            printf '  %s\n' "$@" >&2
            exit 1
          }

          require_literal registry-notary/Dockerfile "FROM gcr.io/distroless/cc-debian12:nonroot@sha256:"
          require_literal registry-notary/Dockerfile 'HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 CMD ["/usr/local/bin/registry-notary", "healthcheck"]'
          require_literal registry-notary/Dockerfile 'ENTRYPOINT ["/usr/local/bin/registry-notary"]'
          if awk '/^FROM .* AS runtime$/ {runtime=1; next} runtime && /^RUN / {found=1} END {exit found ? 0 : 1}' registry-notary/Dockerfile; then
            echo "registry-notary/Dockerfile runtime stage must stay distroless and must not add RUN/package-manager steps." >&2
            exit 1
          fi

          # The sidecar image is pure Rust now that the OpenFn engine is
          # retired: distroless runtime, no Node, readiness served over HTTP.
          require_literal registry-notary/Dockerfile.openfn-sidecar "FROM gcr.io/distroless/cc-debian12:nonroot@sha256:"
          require_literal registry-notary/Dockerfile.openfn-sidecar 'ENTRYPOINT ["/usr/local/bin/registry-notary-source-adapter-sidecar"]'
          if awk '/^FROM .* AS runtime$/ {runtime=1; next} runtime && /^RUN / {found=1} END {exit found ? 0 : 1}' registry-notary/Dockerfile.openfn-sidecar; then
            echo "registry-notary/Dockerfile.openfn-sidecar runtime stage must stay distroless and must not add RUN/package-manager steps." >&2
            exit 1
          fi
      - name: Build release Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --build-context crosswalk=crosswalk --build-arg REGISTRY_NOTARY_FEATURES=registry-notary-cel,pkcs11 --file registry-notary/Dockerfile --tag registry-notary:ci registry-notary
      - name: Build no-CEL regression Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --build-context crosswalk=crosswalk --build-arg REGISTRY_NOTARY_FEATURES=pkcs11 --file registry-notary/Dockerfile --tag registry-notary:ci-no-cel registry-notary
      - name: Smoke no-CEL regression Docker image excludes CEL worker
        working-directory: ${{ github.workspace }}
        run: |
          if docker run --rm --entrypoint /usr/local/bin/registry-notary registry-notary:ci-no-cel cel-worker; then
            echo "no-CEL regression image unexpectedly accepted the CEL worker command"
            exit 1
          fi
      - name: Smoke release Docker image worker protocol
        working-directory: ${{ github.workspace }}
        run: |
          output="$(
            printf '%s\n' '{"protocol":"registry-notary-cel-worker/v1","expression":"source.age >= 18","root_bindings":{"source":{"age":21},"claims":{},"ctx":{},"vars":{},"meta":{}}}' \
              | docker run --rm -i --entrypoint /usr/local/bin/registry-notary-cel-worker registry-notary:ci
          )"
          python3 - "$output" <<'PY'
          import json
          import sys

          response = json.loads(sys.argv[1])
          assert response["protocol"] == "registry-notary-cel-worker/v1"
          assert response["value"] is True
          assert response["policy_hash"].startswith("sha256:")
          PY
      - name: Build OpenFn sidecar Docker image
        working-directory: ${{ github.workspace }}
        run: docker build --build-context registry-platform=registry-platform --build-context crosswalk=crosswalk --file registry-notary/Dockerfile.openfn-sidecar --tag registry-notary-source-adapter-sidecar:ci registry-notary
