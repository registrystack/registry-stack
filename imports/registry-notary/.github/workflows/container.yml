name: Container Images

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: ${{ (github.head_ref || github.ref_name) == 'commons-release-cleanup' && 'commons-release-cleanup' || 'main' }}
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c
  NOTARY_IMAGE: ghcr.io/jeremi/registry-notary
  OPENFN_SIDECAR_IMAGE: ghcr.io/jeremi/registry-notary-openfn-sidecar

jobs:
  images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-notary
          persist-credentials: false
      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          persist-credentials: false
      - name: Checkout crosswalk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: cel-mapping
          persist-credentials: false
      - name: Build registry-notary image
        run: |
          docker build \
            --build-context registry-platform=registry-platform \
            --build-context cel-mapping=cel-mapping \
            --build-arg REGISTRY_NOTARY_FEATURES=registry-notary-cel,pkcs11 \
            --file registry-notary/Dockerfile \
            --tag "$NOTARY_IMAGE:sha-${GITHUB_SHA}" \
            --tag "$NOTARY_IMAGE:main" \
            registry-notary
      - name: Smoke registry-notary image worker protocol
        run: |
          output="$(
            printf '%s\n' '{"protocol":"registry-notary-cel-worker/v1","expression":"source.age >= 18","root_bindings":{"source":{"age":21},"claims":{},"ctx":{},"vars":{},"meta":{}}}' \
              | docker run --rm -i --entrypoint /usr/local/bin/registry-notary-cel-worker "$NOTARY_IMAGE:sha-${GITHUB_SHA}"
          )"
          python3 - "$output" <<'PY'
          import json
          import sys

          response = json.loads(sys.argv[1])
          assert response["protocol"] == "registry-notary-cel-worker/v1"
          assert response["value"] is True
          assert response["policy_hash"].startswith("sha256:")
          PY
      - name: Build OpenFn sidecar image
        run: |
          docker build \
            --build-context registry-platform=registry-platform \
            --build-context cel-mapping=cel-mapping \
            --file registry-notary/Dockerfile.openfn-sidecar \
            --tag "$OPENFN_SIDECAR_IMAGE:sha-${GITHUB_SHA}" \
            --tag "$OPENFN_SIDECAR_IMAGE:main" \
            registry-notary
      - name: Generate image SBOMs and advisory vulnerability reports
        run: |
          set -o pipefail
          mkdir -p registry-notary/target/security
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$NOTARY_IMAGE:sha-${GITHUB_SHA}" \
            -o spdx-json=/out/registry-notary-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$OPENFN_SIDECAR_IMAGE:sha-${GITHUB_SHA}" \
            -o spdx-json=/out/registry-notary-openfn-sidecar-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$NOTARY_IMAGE:sha-${GITHUB_SHA}" \
            -o json > registry-notary/target/security/registry-notary-image-vulnerabilities.json
          python3 registry-notary/scripts/check_advisory_baselines.py grype \
            registry-notary/target/security/registry-notary-image-vulnerabilities.json \
            --subject registry-notary-image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$OPENFN_SIDECAR_IMAGE:sha-${GITHUB_SHA}" \
            -o json > registry-notary/target/security/registry-notary-openfn-sidecar-image-vulnerabilities.json
          python3 registry-notary/scripts/check_advisory_baselines.py grype \
            registry-notary/target/security/registry-notary-openfn-sidecar-image-vulnerabilities.json \
            --subject registry-notary-openfn-sidecar-image
      - name: Upload image security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: registry-notary-image-security-evidence
          path: registry-notary/target/security/
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "$NOTARY_IMAGE:sha-${GITHUB_SHA}"
          docker push "$NOTARY_IMAGE:main"
          docker push "$OPENFN_SIDECAR_IMAGE:sha-${GITHUB_SHA}"
          docker push "$OPENFN_SIDECAR_IMAGE:main"
