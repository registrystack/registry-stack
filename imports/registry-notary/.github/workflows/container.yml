name: Container Images

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*", "registry-stack-technical-preview-*"]
  schedule:
    - cron: "43 3 * * *"
  workflow_dispatch:
    inputs:
      publish_snapshot:
        description: "Publish development snapshots from main if they differ from :snapshot"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: e5b646f5979a41a65155b674f4769ff063910dba
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 1d44ec735fdc8a7c719264b339574371e8330337
  NOTARY_IMAGE: ghcr.io/jeremi/registry-notary
  OPENFN_SIDECAR_IMAGE: ghcr.io/jeremi/registry-notary-source-adapter-sidecar

jobs:
  pull-request-images:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
          persist-credentials: false
      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          persist-credentials: false
      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false
      - name: Build registry-notary image
        run: |
          docker build \
            --build-context registry-platform=registry-platform \
            --build-context crosswalk=crosswalk \
            --build-arg REGISTRY_NOTARY_FEATURES=registry-notary-cel,pkcs11 \
            --file registry-notary/Dockerfile \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            --tag "$NOTARY_IMAGE:ci-${GITHUB_SHA}" \
            registry-notary
      - name: Smoke registry-notary image worker protocol
        run: |
          output="$(
            printf '%s\n' '{"protocol":"registry-notary-cel-worker/v1","expression":"source.age >= 18","root_bindings":{"source":{"age":21},"claims":{},"ctx":{},"vars":{},"meta":{}}}' \
              | docker run --rm -i --entrypoint /usr/local/bin/registry-notary-cel-worker "$NOTARY_IMAGE:ci-${GITHUB_SHA}"
          )"
          python3 - "$output" <<'PY'
          import json
          import sys

          response = json.loads(sys.argv[1])
          assert response["protocol"] == "registry-notary-cel-worker/v1"
          assert response["value"] is True
          assert response["policy_hash"].startswith("sha256:")
          PY
      - name: Build OpenFn sidecar image
        run: |
          docker build \
            --build-context registry-platform=registry-platform \
            --build-context crosswalk=crosswalk \
            --file registry-notary/Dockerfile.openfn-sidecar \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            --tag "$OPENFN_SIDECAR_IMAGE:ci-${GITHUB_SHA}" \
            registry-notary
      - name: Generate image SBOMs and advisory vulnerability reports
        run: |
          set -o pipefail
          mkdir -p registry-notary/target/security
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$NOTARY_IMAGE:ci-${GITHUB_SHA}" \
            -o spdx-json=/out/registry-notary-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$OPENFN_SIDECAR_IMAGE:ci-${GITHUB_SHA}" \
            -o spdx-json=/out/registry-notary-source-adapter-sidecar-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$NOTARY_IMAGE:ci-${GITHUB_SHA}" \
            -o json > registry-notary/target/security/registry-notary-image-vulnerabilities.json
          python3 registry-notary/scripts/check_advisory_baselines.py grype \
            registry-notary/target/security/registry-notary-image-vulnerabilities.json \
            --subject registry-notary-image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$OPENFN_SIDECAR_IMAGE:ci-${GITHUB_SHA}" \
            -o json > registry-notary/target/security/registry-notary-source-adapter-sidecar-image-vulnerabilities.json
          python3 registry-notary/scripts/check_advisory_baselines.py grype \
            registry-notary/target/security/registry-notary-source-adapter-sidecar-image-vulnerabilities.json \
            --subject registry-notary-source-adapter-sidecar-image
      - name: Upload image security evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-notary-image-security-evidence
          path: registry-notary/target/security/

  images:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Decide image channel
        id: channel
        env:
          PUBLISH_SNAPSHOT_INPUT: ${{ inputs.publish_snapshot || false }}
        run: |
          set -euo pipefail

          build=true
          publish=false
          channel=validation
          notary_tags=("$NOTARY_IMAGE:ci-${GITHUB_SHA}")
          sidecar_tags=("$OPENFN_SIDECAR_IMAGE:ci-${GITHUB_SHA}")

          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF_TYPE" == "tag" ]]; then
            channel=release
            publish=true
            if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              version="${GITHUB_REF_NAME#v}"
              IFS=. read -r major minor patch <<< "$version"
              notary_tags=(
                "$NOTARY_IMAGE:sha-${GITHUB_SHA}"
                "$NOTARY_IMAGE:v${major}.${minor}.${patch}"
                "$NOTARY_IMAGE:v${major}.${minor}"
                "$NOTARY_IMAGE:v${major}"
                "$NOTARY_IMAGE:latest"
              )
              sidecar_tags=(
                "$OPENFN_SIDECAR_IMAGE:sha-${GITHUB_SHA}"
                "$OPENFN_SIDECAR_IMAGE:v${major}.${minor}.${patch}"
                "$OPENFN_SIDECAR_IMAGE:v${major}.${minor}"
                "$OPENFN_SIDECAR_IMAGE:v${major}"
                "$OPENFN_SIDECAR_IMAGE:latest"
              )
            elif [[ "$GITHUB_REF_NAME" =~ ^registry-stack-technical-preview-[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
              notary_tags=(
                "$NOTARY_IMAGE:sha-${GITHUB_SHA}"
                "$NOTARY_IMAGE:${GITHUB_REF_NAME}"
              )
              sidecar_tags=(
                "$OPENFN_SIDECAR_IMAGE:sha-${GITHUB_SHA}"
                "$OPENFN_SIDECAR_IMAGE:${GITHUB_REF_NAME}"
              )
            else
              echo "Release image tags must be stable semver tags like v0.1.2 or registry-stack-technical-preview-<date-or-version>." >&2
              exit 1
            fi
          elif [[ "$GITHUB_EVENT_NAME" == "schedule" || "$PUBLISH_SNAPSHOT_INPUT" == "true" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
              echo "Snapshot publishing is only allowed from refs/heads/main; got $GITHUB_REF."
              build=false
            else
              existing_notary_revision="$(
                docker buildx imagetools inspect "$NOTARY_IMAGE:snapshot" \
                  --format '{{if .Image.Config.Labels}}{{index .Image.Config.Labels "org.opencontainers.image.revision"}}{{end}}' \
                  2>/dev/null || true
              )"
              existing_sidecar_revision="$(
                docker buildx imagetools inspect "$OPENFN_SIDECAR_IMAGE:snapshot" \
                  --format '{{if .Image.Config.Labels}}{{index .Image.Config.Labels "org.opencontainers.image.revision"}}{{end}}' \
                  2>/dev/null || true
              )"
              if [[ "$existing_notary_revision" == "$GITHUB_SHA" && "$existing_sidecar_revision" == "$GITHUB_SHA" ]]; then
                echo "Snapshots already point at $GITHUB_SHA; skipping rebuild."
                build=false
              else
                short_sha="${GITHUB_SHA::12}"
                snapshot_date="$(date -u +%Y%m%d)"
                channel=snapshot
                publish=true
                notary_tags=(
                  "$NOTARY_IMAGE:snapshot"
                  "$NOTARY_IMAGE:snapshot-${snapshot_date}"
                  "$NOTARY_IMAGE:snapshot-${short_sha}"
                )
                sidecar_tags=(
                  "$OPENFN_SIDECAR_IMAGE:snapshot"
                  "$OPENFN_SIDECAR_IMAGE:snapshot-${snapshot_date}"
                  "$OPENFN_SIDECAR_IMAGE:snapshot-${short_sha}"
                )
              fi
            fi
          fi

          {
            echo "build=$build"
            echo "publish=$publish"
            echo "channel=$channel"
            echo "notary_tags<<EOF"
            printf '%s\n' "${notary_tags[@]}"
            echo "EOF"
            echo "sidecar_tags<<EOF"
            printf '%s\n' "${sidecar_tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout registry-notary
        if: steps.channel.outputs.build == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
          persist-credentials: false
      - name: Verify release tag is protected-main reachable
        if: steps.channel.outputs.publish == 'true' && steps.channel.outputs.channel == 'release'
        working-directory: registry-notary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          IFS=$'\t' read -r protected protected_main_sha < <(
            gh api "repos/${GITHUB_REPOSITORY}/branches/main" \
              --jq '[.protected, .commit.sha] | @tsv'
          )
          if [[ "$protected" != "true" ]]; then
            echo "Official release image aliases require the repository's main branch to be protected." >&2
            exit 1
          fi
          if [[ ! "$protected_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve the protected main branch SHA." >&2
            exit 1
          fi

          # Ancestry via the compare API: the checkout has no persisted
          # credentials (persist-credentials: false), so a git fetch here
          # cannot authenticate, while the job token works against the
          # REST API. "ahead" or "identical" means the tag commit is
          # reachable from the protected main branch SHA returned above.
          status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${GITHUB_SHA}...${protected_main_sha}" --jq '.status')"
          if [[ "$status" != "ahead" && "$status" != "identical" ]]; then
            echo "Official release image aliases require tag commit $GITHUB_SHA to be reachable from protected main (compare status: ${status})." >&2
            exit 1
          fi
      - name: Checkout registry-platform
        if: steps.channel.outputs.build == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          persist-credentials: false
      - name: Checkout crosswalk
        if: steps.channel.outputs.build == 'true'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false
      - name: Build registry-notary image
        if: steps.channel.outputs.build == 'true'
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(--tag "$tag")
          done <<'EOF'
          ${{ steps.channel.outputs.notary_tags }}
          EOF

          docker build \
            --build-context registry-platform=registry-platform \
            --build-context crosswalk=crosswalk \
            --build-arg REGISTRY_NOTARY_FEATURES=registry-notary-cel,pkcs11 \
            --file registry-notary/Dockerfile \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            "${tag_args[@]}" \
            registry-notary
      - name: Smoke registry-notary image worker protocol
        if: steps.channel.outputs.build == 'true'
        run: |
          notary_image_ref="$(cat <<'EOF' | head -n 1
          ${{ steps.channel.outputs.notary_tags }}
          EOF
          )"
          output="$(
            printf '%s\n' '{"protocol":"registry-notary-cel-worker/v1","expression":"source.age >= 18","root_bindings":{"source":{"age":21},"claims":{},"ctx":{},"vars":{},"meta":{}}}' \
              | docker run --rm -i --entrypoint /usr/local/bin/registry-notary-cel-worker "$notary_image_ref"
          )"
          python3 - "$output" <<'PY'
          import json
          import sys

          response = json.loads(sys.argv[1])
          assert response["protocol"] == "registry-notary-cel-worker/v1"
          assert response["value"] is True
          assert response["policy_hash"].startswith("sha256:")
          PY
      - name: Build OpenFn sidecar image
        if: steps.channel.outputs.build == 'true'
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args+=(--tag "$tag")
          done <<'EOF'
          ${{ steps.channel.outputs.sidecar_tags }}
          EOF

          docker build \
            --build-context registry-platform=registry-platform \
            --build-context crosswalk=crosswalk \
            --file registry-notary/Dockerfile.openfn-sidecar \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            "${tag_args[@]}" \
            registry-notary
      - name: Generate image SBOMs and advisory vulnerability reports
        if: steps.channel.outputs.build == 'true'
        run: |
          set -o pipefail
          notary_image_ref="$(cat <<'EOF' | head -n 1
          ${{ steps.channel.outputs.notary_tags }}
          EOF
          )"
          sidecar_image_ref="$(cat <<'EOF' | head -n 1
          ${{ steps.channel.outputs.sidecar_tags }}
          EOF
          )"
          mkdir -p registry-notary/target/security
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$notary_image_ref" \
            -o spdx-json=/out/registry-notary-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$sidecar_image_ref" \
            -o spdx-json=/out/registry-notary-source-adapter-sidecar-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$notary_image_ref" \
            -o json > registry-notary/target/security/registry-notary-image-vulnerabilities.json
          python3 registry-notary/scripts/check_advisory_baselines.py grype \
            registry-notary/target/security/registry-notary-image-vulnerabilities.json \
            --subject registry-notary-image
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-notary/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$sidecar_image_ref" \
            -o json > registry-notary/target/security/registry-notary-source-adapter-sidecar-image-vulnerabilities.json
          python3 registry-notary/scripts/check_advisory_baselines.py grype \
            registry-notary/target/security/registry-notary-source-adapter-sidecar-image-vulnerabilities.json \
            --subject registry-notary-source-adapter-sidecar-image
      - name: Upload image security evidence
        if: always() && steps.channel.outputs.build == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-notary-image-security-evidence
          path: registry-notary/target/security/
      - name: Login to GHCR
        if: steps.channel.outputs.publish == 'true'
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
      - name: Install cosign
        if: steps.channel.outputs.publish == 'true'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Push images
        if: steps.channel.outputs.publish == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done <<'EOF'
          ${{ steps.channel.outputs.notary_tags }}
          EOF
          while IFS= read -r tag; do
            [ -n "$tag" ] && docker push "$tag"
          done <<'EOF'
          ${{ steps.channel.outputs.sidecar_tags }}
          EOF
      - name: Sign image tags
        if: steps.channel.outputs.publish == 'true'
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -n "$tag" ] && cosign sign --yes "$tag"
          done <<'EOF'
          ${{ steps.channel.outputs.notary_tags }}
          EOF
          while IFS= read -r tag; do
            [ -n "$tag" ] && cosign sign --yes "$tag"
          done <<'EOF'
          ${{ steps.channel.outputs.sidecar_tags }}
          EOF
      - name: Verify published image aliases and signatures
        if: steps.channel.outputs.publish == 'true'
        run: |
          set -euo pipefail
          verify_tag_set() {
            expected_digest=""
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              digest="$(
                docker buildx imagetools inspect "$tag" \
                  | awk '/^Digest:/ {print $2; exit}'
              )"
              if [ -z "$digest" ]; then
                echo "Could not resolve digest for $tag" >&2
                exit 1
              fi
              if [ -z "$expected_digest" ]; then
                expected_digest="$digest"
              elif [ "$digest" != "$expected_digest" ]; then
                echo "$tag resolves to $digest, expected $expected_digest" >&2
                exit 1
              fi
              cosign verify \
                --certificate-oidc-issuer https://token.actions.githubusercontent.com \
                --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/container.yml@${GITHUB_REF}" \
                "$tag" >/dev/null
            done
          }
          verify_tag_set <<'EOF'
          ${{ steps.channel.outputs.notary_tags }}
          EOF
          verify_tag_set <<'EOF'
          ${{ steps.channel.outputs.sidecar_tags }}
          EOF
