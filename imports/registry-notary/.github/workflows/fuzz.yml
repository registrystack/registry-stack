name: Fuzz

on:
  pull_request:
    branches: ["**"]
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/registry-notary-core/**"
      - "crates/registry-notary-server/**"
      - "crates/registry-notary-source-adapter-sidecar/**"
      - "fuzz/**"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: 3c53be10d755a428851ad6469e64f50016523b2a
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 1d44ec735fdc8a7c719264b339574371e8330337

defaults:
  run:
    working-directory: registry-notary

jobs:
  core-request-bodies:
    name: core request body parsers
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
          persist-credentials: false

      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          persist-credentials: false

      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: registry-notary -> target

      - name: Restore nightly fuzz corpus
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: registry-notary/fuzz/corpus
          key: registry-notary-fuzz-corpus-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            registry-notary-fuzz-corpus-${{ github.ref_name }}-
            registry-notary-fuzz-corpus-

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

      - name: Run PR fuzz smoke
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          mkdir -p fuzz/artifacts/core_request_bodies
          cargo +nightly fuzz run core_request_bodies -- \
            -max_total_time=60 \
            -rss_limit_mb=1024 \
            -print_final_stats=1

      - name: Run scheduled fuzz
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          mkdir -p fuzz/artifacts/core_request_bodies
          cargo +nightly fuzz run core_request_bodies -- \
            -max_total_time=600 \
            -rss_limit_mb=2048 \
            -print_final_stats=1

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-notary-fuzz-artifacts
          path: registry-notary/fuzz/artifacts
          if-no-files-found: ignore
