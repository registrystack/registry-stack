name: perf-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

# Cancel superseded runs on branches; keep main runs.
concurrency:
  group: perf-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  K6_DOCKER_IMAGE: grafana/k6:0.57.0
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: 0abc4fde81764f6c81143b622624415232197129
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 1d44ec735fdc8a7c719264b339574371e8330337

defaults:
  run:
    working-directory: registry-notary

# Smoke-checks the perf scaffolding and enforces CI-sized k6 latency thresholds.
# It verifies:
#   1. The Criterion benches compile (`cargo bench --no-run`).
#   2. Every k6 scenario and shared lib passes `node --check`.
#   3. Perf Python scripts, source stub, and tests pass.
#   4. A short small-profile k6 run gates latency thresholds against the release server and stub.
# Use perf/README.md for the longer baseline capture workflow.

jobs:
  perf-smoke:
    name: perf-smoke
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary

      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}

      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: perf-smoke
          workspaces: registry-notary -> target

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Node (for node --check)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Compile Criterion benches
        run: cargo bench --no-run --workspace --all-features

      - name: Build release binary for k6 smoke
        run: cargo build --release -p registry-notary-bin

      - name: Generate perf credentials
        run: uv run perf/scripts/generate_perf_keys.py --env-file target/perf/perf.env --force

      - name: Syntax-check every k6 scenario
        run: |
          set -euo pipefail
          fail=0
          for f in perf/k6/*.js perf/k6/lib/*.js; do
            if ! node --check "$f"; then
              echo "node --check failed: $f"
              fail=1
            fi
          done
          exit "$fail"

      - name: Syntax-check perf Python scripts and stub
        run: |
          set -euo pipefail
          for f in perf/scripts/*.py perf/stub/*.py; do
            python -c "import ast; ast.parse(open('$f').read())"
          done

      - name: Run perf Python tests
        run: uv run --project perf python -m pytest

      - name: Pull k6 image
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if docker pull "$K6_DOCKER_IMAGE"; then
              exit 0
            fi
            sleep "$((attempt * 15))"
          done
          docker pull "$K6_DOCKER_IMAGE"

      - name: Run small k6 threshold gate
        run: |
          set -euo pipefail
          mkdir -p target/perf/reports target/perf/results
          set -a
          . target/perf/perf.env
          set +a
          uv run perf/stub/source_stub.py --profile small --bind 127.0.0.1:14256 >target/perf/source-stub-smoke.log 2>&1 &
          stub_pid="$!"
          trap 'kill "${notary_pid:-}" "$stub_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 150); do
            if curl -fsS http://127.0.0.1:14256/health >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl -fsS http://127.0.0.1:14256/health >/dev/null
          target/release/registry-notary --config perf/config/small.yaml >target/perf/notary-smoke.log 2>&1 &
          notary_pid="$!"
          for _ in $(seq 1 150); do
            if curl -fsS -H "Authorization: Bearer ${REGISTRY_NOTARY_BEARER_TOKEN}" http://127.0.0.1:14255/v1/claims >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl -fsS -H "Authorization: Bearer ${REGISTRY_NOTARY_BEARER_TOKEN}" http://127.0.0.1:14255/v1/claims >/dev/null
          for scenario in list_claims evaluate_extract; do
            docker run --rm --network host \
              --user "$(id -u):$(id -g)" \
              --env-file target/perf/perf.env \
              -e REGISTRY_NOTARY_DURATION=5s \
              -e REGISTRY_NOTARY_VUS=2 \
              -e REGISTRY_NOTARY_PROFILE=small \
              -e REGISTRY_NOTARY_SUBJECT_COUNT=1000 \
              -e K6_SUMMARY_TREND_STATS=min,med,avg,max,p\(90\),p\(95\),p\(99\) \
              -v "$PWD:/workspace" \
              -w /workspace \
              "$K6_DOCKER_IMAGE" run "perf/k6/${scenario}.js"
          done
