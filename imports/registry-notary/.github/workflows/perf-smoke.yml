name: perf-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

# Cancel superseded runs on branches; keep main runs.
concurrency:
  group: perf-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: ${{ (github.head_ref || github.ref_name) == 'commons-release-cleanup' && 'commons-release-cleanup' || 'main' }}
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c

defaults:
  run:
    working-directory: registry-notary

# Smoke-checks the perf scaffolding without running any actual load.
# It verifies:
#   1. The Criterion benches compile (`cargo bench --no-run`).
#   2. Every k6 scenario and shared lib passes `node --check`.
#   3. Perf Python scripts, source stub, and tests pass.
# It does NOT install k6 or execute load scenarios; use perf/README.md for
# the baseline capture workflow.

jobs:
  perf-smoke:
    name: perf-smoke
    runs-on: ubuntu-latest
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: registry-notary

      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}

      - name: Checkout crosswalk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: cel-mapping

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: perf-smoke
          workspaces: registry-notary -> target

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Set up Node (for node --check)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"

      - name: Compile Criterion benches
        run: cargo bench --no-run --workspace --all-features

      - name: Syntax-check every k6 scenario
        run: |
          set -euo pipefail
          fail=0
          for f in perf/k6/*.js perf/k6/lib/*.js; do
            if ! node --check "$f"; then
              echo "node --check failed: $f"
              fail=1
            fi
          done
          exit "$fail"

      - name: Syntax-check perf Python scripts and stub
        run: |
          set -euo pipefail
          for f in perf/scripts/*.py perf/stub/*.py; do
            python -c "import ast; ast.parse(open('$f').read())"
          done

      - name: Run perf Python tests
        run: uv run --project perf python -m pytest
