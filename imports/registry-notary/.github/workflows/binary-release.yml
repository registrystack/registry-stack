name: Binary Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: binary-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: e5b646f5979a41a65155b674f4769ff063910dba
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c
  REGISTRY_NOTARY_FEATURES: registry-notary-cel,pkcs11

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive_ext: tar.xz
            bin_ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_ext: tar.xz
            bin_ext: ""
          - target: aarch64-apple-darwin
            runner: macos-15
            archive_ext: tar.xz
            bin_ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive_ext: zip
            bin_ext: ".exe"
    defaults:
      run:
        shell: bash
        working-directory: registry-notary
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
          persist-credentials: false

      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          persist-credentials: false

      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build release binaries
        # .cargo/config.toml routes the aarch64-apple-darwin linker through
        # Homebrew's ld64.lld for fast local dev links; hosted macOS runners
        # do not ship it. A set-but-empty RUSTFLAGS suppresses all config
        # rustflags (cargo's extra-flags sources are mutually exclusive and
        # env wins); an empty CARGO_TARGET_*_RUSTFLAGS does NOT work because
        # env values for list-type config keys merge with config.toml.
        env:
          RUSTFLAGS: ""
        run: |
          cargo build --release --locked -p registry-notary-bin --features "$REGISTRY_NOTARY_FEATURES"
          cargo build --release --locked -p registry-notary-server --bin registry-notary-cel-worker --features "$REGISTRY_NOTARY_FEATURES"

      - name: Smoke build capabilities
        run: |
          "target/release/registry-notary${{ matrix.bin_ext }}" build-info | tee target/build-info.json
          grep '"registry-notary-cel"' target/build-info.json
          grep '"pkcs11"' target/build-info.json

      - name: Smoke CEL worker protocol
        run: |
          output="$(
            printf '%s\n' '{"protocol":"registry-notary-cel-worker/v1","expression":"source.age >= 18","root_bindings":{"source":{"age":21},"claims":{},"ctx":{},"vars":{},"meta":{}}}' \
              | "target/release/registry-notary-cel-worker${{ matrix.bin_ext }}"
          )"
          printf '%s\n' "$output" | grep '"value":true'
          printf '%s\n' "$output" | grep '"policy_hash":"sha256:'

      - name: Package archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            if [[ ! "${GITHUB_REF_NAME:-}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release tags must be stable semver tags like v0.1.2." >&2
              exit 1
            fi
            version="${GITHUB_REF_NAME#v}"
          else
            if [[ ! "${GITHUB_RUN_NUMBER:-}" =~ ^[0-9]+$ ]]; then
              echo "Manual release run number must be numeric." >&2
              exit 1
            fi
            version="manual-${GITHUB_RUN_NUMBER}"
          fi
          package="registry-notary-${version}-${TARGET}"
          package_dir="target/dist/${package}"
          mkdir -p "$package_dir"
          cp "target/release/registry-notary${BIN_EXT}" "$package_dir/"
          cp "target/release/registry-notary-cel-worker${BIN_EXT}" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            PACKAGE_DIR="$package_dir" PACKAGE_ARCHIVE="target/dist/${package}.zip" \
              pwsh -NoProfile -Command "Compress-Archive -Path (Join-Path \$env:PACKAGE_DIR '*') -DestinationPath \$env:PACKAGE_ARCHIVE -Force"
          else
            tar -C target/dist -cJf "target/dist/${package}.tar.xz" "$package"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-notary-${{ matrix.target }}
          path: registry-notary/target/dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.xz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum ./* > SHA256SUMS
          ls -la

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* --verify-tag --title "$TAG" --notes "Binary release for $TAG."
          fi
