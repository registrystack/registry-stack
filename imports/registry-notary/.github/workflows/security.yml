name: Security Assurance

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: a5a7bc47611fcbe470ac90be3573e2c6ed811161
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 1d44ec735fdc8a7c719264b339574371e8330337

defaults:
  run:
    working-directory: registry-notary

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry-notary
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          path: registry-notary
          persist-credentials: false

      - name: Checkout registry-platform
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          path: registry-platform
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          persist-credentials: false

      - name: Checkout crosswalk
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Go security tools
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.24.3
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run contract checks
        run: python3 scripts/check_security_assurance.py

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --no-git --config .gitleaks.toml

      - name: Run actionlint
        working-directory: ${{ github.workspace }}/registry-notary
        run: actionlint

      - name: Run zizmor
        run: |
          mkdir -p target/security
          uvx zizmor --format json --no-exit-codes . > target/security/zizmor.json
          python3 scripts/check_advisory_baselines.py zizmor target/security/zizmor.json

      - name: Run hadolint
        run: |
          docker run --rm -i hadolint/hadolint:v2.12.0 /bin/hadolint --ignore DL3022 - < Dockerfile
          docker run --rm -i hadolint/hadolint:v2.12.0 /bin/hadolint --ignore DL3022 - < Dockerfile.openfn-sidecar

      - name: Run Semgrep
        run: uvx semgrep --config .semgrep.yml --error .

      - name: Generate security assurance report
        run: ./scripts/check-security.sh

      - name: Upload security assurance report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: registry-notary-security-assurance-report
          path: registry-notary/target/security/security-assurance-report.md
