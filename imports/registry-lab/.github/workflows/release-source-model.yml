name: release-source-model

on:
  pull_request:
    paths:
      - ".github/workflows/release-source-model.yml"
      - ".gitmodules"
      - "compose.lab2.yaml"
      - "config/notary/opencrvs-dci-notary.yaml"
      - "justfile"
      - "scripts/check-release-source-model.sh"
      - "scripts/check-service-first-deps.sh"
      - "scripts/lab2-generate-governed-config.sh"
      - "scripts/lab2-demo-story.sh"
      - "scripts/lab2-doctor-profile.sh"
      - "scripts/lab2_doctor_summary.py"
      - "scripts/release-check.sh"
      - "scripts/smoke-opencrvs-dci.sh"
      - "scripts/test_check_release_source_model.py"
      - "scripts/test_lab2_main_features.py"
      - "vendor/**"
  push:
    branches:
      - main
      - staging
      - "release/**"
    paths:
      - ".github/workflows/release-source-model.yml"
      - ".gitmodules"
      - "compose.lab2.yaml"
      - "config/notary/opencrvs-dci-notary.yaml"
      - "justfile"
      - "scripts/check-release-source-model.sh"
      - "scripts/check-service-first-deps.sh"
      - "scripts/lab2-generate-governed-config.sh"
      - "scripts/lab2-demo-story.sh"
      - "scripts/lab2-doctor-profile.sh"
      - "scripts/lab2_doctor_summary.py"
      - "scripts/release-check.sh"
      - "scripts/smoke-opencrvs-dci.sh"
      - "scripts/test_check_release_source_model.py"
      - "scripts/test_lab2_main_features.py"
      - "vendor/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.8.24"

jobs:
  source-model:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b # v6.6.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Show pinned toolchain
        run: |
          set -euo pipefail
          python --version
          uv --version
          git submodule status --recursive

      - name: Run source-model validator tests
        run: |
          python scripts/test_check_release_source_model.py
          python scripts/test_lab2_main_features.py

      - name: Prove vendor release source model
        run: scripts/check-release-source-model.sh vendor

      - name: Prove service-first manifest dependency
        run: scripts/check-service-first-deps.sh manifest

  full-release-proof:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/heads/release/')
    env:
      OPENCRVS_DCI_CLIENT_ID: ${{ secrets.OPENCRVS_DCI_CLIENT_ID }}
      OPENCRVS_DCI_CLIENT_SECRET: ${{ secrets.OPENCRVS_DCI_CLIENT_SECRET }}
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b # v6.6.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run full release proof
        run: |
          set -euo pipefail
          mkdir -p output/release-check
          scripts/release-check.sh 2>&1 | tee output/release-check/release-check.log

      - name: Upload release proof logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-check-${{ github.run_id }}
          path: output/release-check/
          if-no-files-found: warn
          retention-days: 14
