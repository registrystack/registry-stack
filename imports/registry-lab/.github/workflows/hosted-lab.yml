name: hosted-lab

on:
  pull_request:
    paths:
      - ".github/workflows/hosted-lab.yml"
      - "Dockerfile.static-metadata"
      - "compose.coolify.yaml"
      - "compose.esignet-hosted.yaml"
      - "compose.walt-hosted.yaml"
      - "config/coolify/**"
      - "config/static-metadata/**"
      - "config/lab-homepage/**"
      - "config/esignet/nginx-hosted.conf"
      - "config/walt/**"
      - "docs/README.md"
      - "docs/public-api-workspace.md"
      - "requests/registry-lab/**"
      - "scripts/check-service-first-deps.sh"
      - "scripts/generate-demo-secrets.py"
      - "scripts/publish-static-metadata.sh"
      - "scripts/static-metadata-server.py"
      - "scripts/lab-homepage-server.py"
      - "scripts/lab_homepage_scenarios/**"
      - "scripts/test_lab_homepage_server.py"
      - "scripts/validate-hosted-deploy.py"
      - "scripts/test_validate_hosted_deploy.py"
      - "scripts/validate-public-api-workspace.py"
      - "scripts/test_validate_public_api_workspace.py"
      - "justfile"
  push:
    branches:
      - main
      - staging
    paths:
      - ".github/workflows/hosted-lab.yml"
      - "Dockerfile.static-metadata"
      - "compose.coolify.yaml"
      - "compose.esignet-hosted.yaml"
      - "compose.walt-hosted.yaml"
      - "config/coolify/**"
      - "config/static-metadata/**"
      - "config/lab-homepage/**"
      - "config/esignet/nginx-hosted.conf"
      - "config/walt/**"
      - "docs/README.md"
      - "docs/public-api-workspace.md"
      - "requests/registry-lab/**"
      - "scripts/check-service-first-deps.sh"
      - "scripts/generate-demo-secrets.py"
      - "scripts/publish-static-metadata.sh"
      - "scripts/static-metadata-server.py"
      - "scripts/lab-homepage-server.py"
      - "scripts/lab_homepage_scenarios/**"
      - "scripts/test_lab_homepage_server.py"
      - "scripts/validate-hosted-deploy.py"
      - "scripts/test_validate_hosted_deploy.py"
      - "scripts/validate-public-api-workspace.py"
      - "scripts/test_validate_public_api_workspace.py"
      - "justfile"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-hosted-artifacts:
    runs-on: ubuntu-latest
    env:
      REGISTRY_LAB_ESIGNET_POSTGRES_PASSWORD: hosted-validation-placeholder
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Docker Compose version
        run: docker compose version

      - name: Check whitespace
        run: |
          # shellcheck disable=SC2016
          git ls-files -z \
            .github/workflows/hosted-lab.yml \
            Dockerfile.static-metadata \
            compose.coolify.yaml \
            compose.esignet-hosted.yaml \
            compose.walt-hosted.yaml \
            config/coolify \
            config/static-metadata \
            config/lab-homepage \
            config/esignet/nginx-hosted.conf \
            config/walt \
            docs/README.md \
            docs/public-api-workspace.md \
            requests/registry-lab \
            scripts/check-service-first-deps.sh \
            scripts/generate-demo-secrets.py \
            scripts/publish-static-metadata.sh \
            scripts/static-metadata-server.py \
            scripts/lab-homepage-server.py \
            scripts/lab_homepage_scenarios \
            scripts/test_lab_homepage_server.py \
            scripts/validate-hosted-deploy.py \
            scripts/test_validate_hosted_deploy.py \
            scripts/validate-public-api-workspace.py \
            scripts/test_validate_public_api_workspace.py \
            justfile \
            | xargs -0 perl -ne 'if (/[ \t]$/) { print "$ARGV:$.: trailing whitespace\n"; $bad = 1 } END { exit($bad || 0) }'

      - name: Require hosted compose artifacts
        run: |
          test -f compose.coolify.yaml
          test -f compose.esignet-hosted.yaml
          test -f compose.walt-hosted.yaml

      - name: Render Registry Lab hosted compose
        run: docker compose -f compose.coolify.yaml config >/tmp/compose.coolify.config.yaml

      - name: Render hosted eSignet compose
        run: docker compose -f compose.esignet-hosted.yaml config >/tmp/compose.esignet-hosted.config.yaml

      - name: Render hosted walt compose
        env:
          WALT_AUTH_ENCRYPTION_KEY: hosted-validation-placeholder
          WALT_AUTH_SIGN_KEY: hosted-validation-placeholder
          WALT_AUTH_TOKEN_KEY: hosted-validation-placeholder
          WALT_DB_PASSWORD: hosted-validation-placeholder
          WALT_KTOR_SIGNING_KEY: hosted-validation-placeholder
          WALT_KTOR_VERIFICATION_KEY: hosted-validation-placeholder
        run: docker compose -f compose.walt-hosted.yaml config >/tmp/compose.walt-hosted.config.yaml

      - name: Run hosted deploy validator tests
        run: python3 scripts/test_validate_hosted_deploy.py

      - name: Run lab homepage server tests
        run: python3 scripts/test_lab_homepage_server.py

      - name: Validate hosted deploy artifacts
        run: python3 scripts/validate-hosted-deploy.py

      - name: Run public API workspace validator tests
        run: python3 scripts/test_validate_public_api_workspace.py

      - name: Validate public API workspace
        run: python3 scripts/validate-public-api-workspace.py

  deploy-coolify:
    needs: validate-hosted-artifacts
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions: {}
    concurrency:
      group: hosted-lab-coolify-deploy
      cancel-in-progress: false
    steps:
      - name: Trigger Coolify deploys
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_BASE_URL: https://cool.pitgenius.com/api/v1
          REGISTRY_LAB_APP_UUID: klhnsuoye8lwuamp0bko387t
        run: |
          if [ -z "$COOLIFY_API_TOKEN" ]; then
            echo "::notice::COOLIFY_API_TOKEN is not configured; hosted deploy trigger skipped."
            exit 0
          fi
          for app in \
            "${REGISTRY_LAB_APP_UUID}" \
            cewwn93kknzsfzicen9nul6v \
            uvqfk8gwqdbdse4v871xfv56
          do
            curl -fsS \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              "${COOLIFY_API_BASE_URL}/deploy?uuid=${app}&force=false"
            echo
          done
