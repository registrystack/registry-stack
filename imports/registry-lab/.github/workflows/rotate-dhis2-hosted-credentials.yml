name: rotate-dhis2-hosted-credentials

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Sync DHIS2 credentials from Bruno and update hosted config
        env:
          CONFIG_PATH: config/coolify/notary/dhis2-health-notary.yaml
        run: |
          set -euo pipefail

          python3 <<'PY' > /tmp/dhis2-hosted-credential-env
          import hashlib
          import json
          import re
          from pathlib import Path

          config_path = Path("config/coolify/notary/dhis2-health-notary.yaml")
          bruno_env_path = Path("requests/registry-lab/environments/Hosted Lab.bru")

          bruno_values = {}
          for line in bruno_env_path.read_text(encoding="utf-8").splitlines():
              match = re.match(r"\s*([A-Z0-9_]+):\s*(\S.*)?$", line)
              if match:
                  bruno_values[match.group(1)] = (match.group(2) or "").strip()

          token = bruno_values.get("DHIS2_EVIDENCE_CLIENT_TOKEN", "")
          bearer = bruno_values.get("DHIS2_EVIDENCE_CLIENT_BEARER", "")
          if not token or not bearer:
              raise SystemExit("Hosted Lab Bruno DHIS2 credentials are missing")

          def fingerprint(raw: str) -> str:
              return "sha256:" + hashlib.sha256(raw.encode("ascii")).hexdigest()

          def commitment(credential_type: str, credential_id: str, fp: str) -> str:
              payload = {
                  "product": "registry-notary",
                  "credential_type": credential_type,
                  "credential_id": credential_id,
                  "fingerprint": fp,
              }
              encoded = json.dumps(payload, separators=(",", ":")).encode("utf-8")
              return "sha256:" + hashlib.sha256(encoded).hexdigest()

          token_hash = fingerprint(token)
          bearer_hash = fingerprint(bearer)
          replacements = {
              "DHIS2_EVIDENCE_CLIENT_TOKEN_HASH": commitment(
                  "api_key", "dhis2_evidence_client", token_hash
              ),
              "DHIS2_EVIDENCE_CLIENT_BEARER_HASH": commitment(
                  "bearer_token", "dhis2_evidence_client", bearer_hash
              ),
          }

          body = config_path.read_text(encoding="utf-8")
          for env_name, value in replacements.items():
              pattern = re.compile(
                  rf"(name:\s*{re.escape(env_name)}\n\s+commitment:\s*)sha256:[0-9a-f]{{64}}"
              )
              body, count = pattern.subn(rf"\g<1>{value}", body)
              if count != 1:
                  raise SystemExit(f"expected one commitment for {env_name}, found {count}")
          config_path.write_text(body, encoding="utf-8")

          for key, value in {
              "DHIS2_EVIDENCE_CLIENT_TOKEN": token,
              "DHIS2_EVIDENCE_CLIENT_BEARER": bearer,
              "DHIS2_EVIDENCE_CLIENT_TOKEN_HASH": token_hash,
              "DHIS2_EVIDENCE_CLIENT_BEARER_HASH": bearer_hash,
          }.items():
              print(f"{key}={value}")
          PY

          set -a
          . /tmp/dhis2-hosted-credential-env
          set +a
          python3 scripts/test_dhis2_programme_vc_config.py

      - name: Commit hosted config commitments
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- config/coolify/notary/dhis2-health-notary.yaml; then
            echo "No hosted DHIS2 credential commitment changes."
            exit 0
          fi

          git add config/coolify/notary/dhis2-health-notary.yaml
          git commit -m "Rotate hosted DHIS2 client credentials"
          git push origin HEAD:main

      - name: Patch Coolify DHIS2 credential env vars
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_BASE_URL: https://cool.pitgenius.com/api/v1
          REGISTRY_LAB_APP_UUID: klhnsuoye8lwuamp0bko387t
        run: |
          set -euo pipefail

          if [ -z "${COOLIFY_API_TOKEN}" ]; then
            echo "::error::COOLIFY_API_TOKEN is not configured."
            exit 1
          fi

          set -a
          . /tmp/dhis2-hosted-credential-env
          set +a

          patch_env() {
            key="$1"
            value="$2"
            response="$(mktemp)"
            curl -fsS \
              -X PATCH \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${COOLIFY_API_BASE_URL}/applications/${REGISTRY_LAB_APP_UUID}/envs" \
              -d "$(jq -nc --arg key "$key" --arg value "$value" '{key: $key, value: $value, is_preview: false}')" \
              > "${response}"
            jq -r '.key + " updated"' "${response}"
            rm -f "${response}"
          }

          patch_env DHIS2_EVIDENCE_CLIENT_TOKEN "${DHIS2_EVIDENCE_CLIENT_TOKEN}"
          patch_env DHIS2_EVIDENCE_CLIENT_BEARER "${DHIS2_EVIDENCE_CLIENT_BEARER}"
          patch_env DHIS2_EVIDENCE_CLIENT_TOKEN_HASH "${DHIS2_EVIDENCE_CLIENT_TOKEN_HASH}"
          patch_env DHIS2_EVIDENCE_CLIENT_BEARER_HASH "${DHIS2_EVIDENCE_CLIENT_BEARER_HASH}"

      - name: Trigger Registry Lab deploy
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_BASE_URL: https://cool.pitgenius.com/api/v1
          REGISTRY_LAB_APP_UUID: klhnsuoye8lwuamp0bko387t
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            "${COOLIFY_API_BASE_URL}/deploy?uuid=${REGISTRY_LAB_APP_UUID}&force=false" \
            | jq -r '.deployments[] | .message + " " + .deployment_uuid'
