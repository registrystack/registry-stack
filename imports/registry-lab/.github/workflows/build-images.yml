name: build-hosted-images

# Builds the feature-complete Registry Lab images for the hosted Coolify deploy
# and pushes digest-pinned tags to GHCR. Runs natively on amd64 (matches the
# server), so no cross-arch emulation. Requires the SUBMODULES_PAT secret: a
# classic PAT with `repo` + `write:packages` scope whose owner can read every
# private vendor submodule (including the cross-org PublicSchema/crosswalk =
# vendor/crosswalk) and push to the ghcr.io/jeremi/* packages. The repo's
# GITHUB_TOKEN cannot push to those pre-existing user-owned packages, so the
# GHCR login below uses the PAT.
#
# After a run, copy the digests from the job summary into the Coolify app env
# and redeploy. Citizen portal images are lab-demo scoped under
# ghcr.io/jeremi/registry-lab-citizen-portal.

on:
  workflow_dispatch:
    inputs:
      image_target:
        description: "Image target to build"
        default: "all"
        type: choice
        options:
          - all
          - citizen-portal
      relay_features:
        description: "Cargo features for registry-relay"
        default: "spdci-api-standards,standards-cel-mapping,ogcapi-edr"
      notary_features:
        description: "Cargo features for registry-notary"
        default: "registry-notary-cel"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with private submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.SUBMODULES_PAT }}

      - name: Build & push registry-relay
        if: ${{ inputs.image_target == 'all' }}
        id: relay
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.registry-relay
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          build-args: |
            REGISTRY_RELAY_FEATURES=${{ inputs.relay_features }}
          build-contexts: |
            registry_relay_src=vendor/registry-relay
            registry_platform_src=vendor/registry-platform
            registry_manifest_src=vendor/registry-manifest
            crosswalk_src=vendor/crosswalk
          tags: |
            ghcr.io/${{ github.repository_owner }}/registry-relay:cel
            ghcr.io/${{ github.repository_owner }}/registry-relay:sha-${{ github.sha }}
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay

      - name: Build & push registry-notary
        if: ${{ inputs.image_target == 'all' }}
        id: notary
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.registry-notary
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          build-args: |
            REGISTRY_NOTARY_FEATURES=${{ inputs.notary_features }}
          build-contexts: |
            notary_src=vendor/registry-notary
            registry_platform_src=vendor/registry-platform
            crosswalk_src=vendor/crosswalk
          tags: |
            ghcr.io/${{ github.repository_owner }}/registry-notary:cel
            ghcr.io/${{ github.repository_owner }}/registry-notary:sha-${{ github.sha }}
          cache-from: type=gha,scope=notary
          cache-to: type=gha,mode=max,scope=notary

      - name: Build & push registry-notary-openfn-sidecar
        if: ${{ inputs.image_target == 'all' }}
        id: sidecar
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.registry-notary-openfn-sidecar
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          build-contexts: |
            notary_src=vendor/registry-notary
            registry_platform_src=vendor/registry-platform
            crosswalk_src=vendor/crosswalk
          tags: |
            ghcr.io/${{ github.repository_owner }}/registry-notary-openfn-sidecar:cel
            ghcr.io/${{ github.repository_owner }}/registry-notary-openfn-sidecar:sha-${{ github.sha }}
          cache-from: type=gha,scope=sidecar
          cache-to: type=gha,mode=max,scope=sidecar

      - name: Build & push citizen portal
        if: ${{ inputs.image_target == 'all' || inputs.image_target == 'citizen-portal' }}
        id: citizen_portal
        uses: docker/build-push-action@v6
        with:
          context: portal
          file: Dockerfile.citizen-portal
          platforms: linux/amd64
          provenance: false
          sbom: false
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/registry-lab-citizen-portal:hosted
            ghcr.io/${{ github.repository_owner }}/registry-lab-citizen-portal:sha-${{ github.sha }}
          cache-from: type=gha,scope=registry-lab-citizen-portal
          cache-to: type=gha,mode=max,scope=registry-lab-citizen-portal

      - name: Image digests
        run: |
          owner='${{ github.repository_owner }}'
          {
            echo "## Hosted image digests"
            echo ""
            echo "Paste these into the Coolify app env, then redeploy:"
            echo '```'
            if [ '${{ inputs.image_target }}' = 'all' ]; then
              echo "REGISTRY_RELAY_IMAGE=ghcr.io/${owner}/registry-relay@${{ steps.relay.outputs.digest }}"
              echo "REGISTRY_NOTARY_IMAGE=ghcr.io/${owner}/registry-notary@${{ steps.notary.outputs.digest }}"
              echo "REGISTRY_NOTARY_OPENFN_SIDECAR_IMAGE=ghcr.io/${owner}/registry-notary-openfn-sidecar@${{ steps.sidecar.outputs.digest }}"
            fi
            echo "REGISTRY_LAB_CITIZEN_PORTAL_IMAGE=ghcr.io/${owner}/registry-lab-citizen-portal@${{ steps.citizen_portal.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
