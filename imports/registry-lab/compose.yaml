name: registry-lab

x-relay-common: &relay-common
  image: registry-relay:demo
  build:
    context: .
    dockerfile: Dockerfile.registry-relay
    additional_contexts:
      registry_relay_src: ${REGISTRY_RELAY_SOURCE_DIR:-./vendor/registry-relay}
      registry_platform_src: ${REGISTRY_RELAY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
      cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    args:
      REGISTRY_RELAY_FEATURES: ${REGISTRY_RELAY_FEATURES:-spdci-api-standards,standards-cel-mapping}
  env_file:
    - .env
  environment:
    RUST_LOG: info
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
    interval: 30s
    timeout: 10s
    retries: 3

x-notary-common: &notary-common
  image: registry-notary:demo
  build:
    context: .
    dockerfile: Dockerfile.registry-notary
    additional_contexts:
      notary_src: ${REGISTRY_NOTARY_SOURCE_DIR:-./vendor/registry-notary}
      registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
      cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
  env_file:
    - .env
  environment:
    RUST_LOG: info
    REGISTRY_NOTARY_REDIS_URL: redis://redis:6379/
    REGISTRY_PLATFORM_REDIS_TEST_URL: redis://redis:6379/
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: registry_lab
    ports:
      - "${REGISTRY_LAB_POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d registry_lab"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REGISTRY_LAB_REDIS_PORT:-63799}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  zitadel-seed-init:
    image: alpine:3.20
    restart: "no"
    command: ["chown", "-R", "1000:1000", "/seed"]
    volumes:
      - zitadel-seed:/seed

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.66.4
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: ${REGISTRY_LAB_ZITADEL_PORT:-4380}
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-bootstrap-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bootstrap Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-12-31T23:59:59Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /seed/zitadel-pat
    ports:
      - "${REGISTRY_LAB_ZITADEL_PORT:-4380}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-seed-init:
        condition: service_completed_successfully
    volumes:
      - zitadel-seed:/seed
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  zitadel-init:
    image: alpine:3.20
    restart: "no"
    depends_on:
      zitadel:
        condition: service_healthy
    environment:
      ZITADEL_BASE_URL: http://zitadel:8080
      ZITADEL_PUBLIC_URL: http://localhost:${REGISTRY_LAB_ZITADEL_PORT:-4380}
      PAT_FILE: /seed/zitadel-pat
      OUTPUT_FILE: /seed/zitadel.env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache bash curl jq > /dev/null 2>&1
        /seed/zitadel-init.sh
    volumes:
      - ./config/zitadel/zitadel-init.sh:/seed/zitadel-init.sh:ro
      - zitadel-seed:/seed

  civil-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/civil-registry-relay.yaml"]
    ports:
      - "4311:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/civil:/demo/data/civil:ro
      - civil-registry-cache:/var/lib/registry-relay/cache

  social-protection-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/social-protection-registry-relay.yaml"]
    ports:
      - "4312:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/social-protection:/demo/data/social-protection:ro
      - social-protection-registry-cache:/var/lib/registry-relay/cache

  health-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/health-registry-relay.yaml"]
    ports:
      - "4313:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/health:/demo/data/health:ro
      - health-registry-cache:/var/lib/registry-relay/cache

  civil-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/civil-notary.yaml"]
    ports:
      - "4321:8080"
    volumes:
      - ./config/notary/civil-notary.yaml:/etc/registry-notary/civil-notary.yaml:ro
    depends_on:
      - civil-registry-relay
      - static-metadata-publisher

  social-protection-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/social-protection-notary.yaml"]
    ports:
      - "4322:8080"
    volumes:
      - ./config/notary/social-protection-notary.yaml:/etc/registry-notary/social-protection-notary.yaml:ro
    depends_on:
      - social-protection-registry-relay
      - static-metadata-publisher

  shared-eligibility-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/shared-eligibility-notary.yaml"]
    ports:
      - "4323:8080"
    volumes:
      - ./config/notary/shared-eligibility-notary.yaml:/etc/registry-notary/shared-eligibility-notary.yaml:ro

  openfn-mock-registry:
    image: registry-notary-openfn-sidecar:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-notary-openfn-sidecar
      additional_contexts:
        notary_src: ${REGISTRY_OPENFN_NOTARY_SOURCE_DIR:-${REGISTRY_NOTARY_SOURCE_DIR:-../registry-notary}}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
        cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        : "$${MOCK_REGISTRY_TOKEN:?missing OPENFN_MOCK_REGISTRY_TOKEN_RAW; run scripts/generate-demo-secrets.py}"
        exec node /opt/openfn/mock-registry-server.mjs
    env_file:
      - .env
    environment:
      MOCK_REGISTRY_HOST: 0.0.0.0
      MOCK_REGISTRY_PORT: "8080"
      MOCK_REGISTRY_TOKEN: ${OPENFN_MOCK_REGISTRY_TOKEN_RAW:-}
    networks:
      - openfn-internal
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:8080/people/person-123\", { headers: { Authorization: \"Bearer \" + process.env.MOCK_REGISTRY_TOKEN } }).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));'"
      interval: 2s
      timeout: 2s
      retries: 20

  openfn-civil-sidecar:
    image: registry-notary-openfn-sidecar:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-notary-openfn-sidecar
      additional_contexts:
        notary_src: ${REGISTRY_OPENFN_NOTARY_SOURCE_DIR:-${REGISTRY_NOTARY_SOURCE_DIR:-../registry-notary}}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
        cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    env_file:
      - .env
    environment:
      RUST_LOG: info
      OPENFN_SIDECAR_TOKEN_HASH: ${OPENFN_SIDECAR_TOKEN_HASH:-}
      OPENFN_MOCK_REGISTRY_TOKEN_RAW: ${OPENFN_MOCK_REGISTRY_TOKEN_RAW:-}
      OPENFN_HTTP_DEMO_CREDENTIAL_JSON: '{"baseUrl":"http://openfn-mock-registry:8080","apiToken":"${OPENFN_MOCK_REGISTRY_TOKEN_RAW:-}"}'
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        : "$${OPENFN_SIDECAR_TOKEN_HASH:?missing OPENFN_SIDECAR_TOKEN_HASH; run scripts/generate-demo-secrets.py}"
        : "$${OPENFN_MOCK_REGISTRY_TOKEN_RAW:?missing OPENFN_MOCK_REGISTRY_TOKEN_RAW; run scripts/generate-demo-secrets.py}"
        exec registry-notary-openfn-sidecar --config /etc/registry-notary-openfn/openfn-civil-sidecar.yaml.template
    volumes:
      - ./config/openfn/openfn-civil-sidecar.yaml.template:/etc/registry-notary-openfn/openfn-civil-sidecar.yaml.template:ro
    networks:
      - openfn-internal
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:8080/ready\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));'"
      interval: 2s
      timeout: 2s
      retries: 30
    depends_on:
      openfn-mock-registry:
        condition: service_healthy

  openfn-civil-notary:
    <<: *notary-common
    build:
      context: .
      dockerfile: Dockerfile.registry-notary
      additional_contexts:
        notary_src: ${REGISTRY_OPENFN_NOTARY_SOURCE_DIR:-${REGISTRY_NOTARY_SOURCE_DIR:-../registry-notary}}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
        cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    command: ["--config", "/etc/registry-notary/openfn-civil-notary.yaml"]
    environment:
      RUST_LOG: info
      OPENFN_SIDECAR_TOKEN_RAW: ${OPENFN_SIDECAR_TOKEN_RAW:-}
    ports:
      - "4324:8080"
    volumes:
      - ./config/notary/openfn-civil-notary.yaml:/etc/registry-notary/openfn-civil-notary.yaml:ro
    networks:
      - default
      - openfn-internal
    depends_on:
      openfn-civil-sidecar:
        condition: service_healthy

  openfn-dhis2-sidecar:
    image: registry-notary-openfn-sidecar:demo
    profiles: ["dhis2"]
    build:
      context: .
      dockerfile: Dockerfile.registry-notary-openfn-sidecar
      additional_contexts:
        notary_src: ${REGISTRY_OPENFN_NOTARY_SOURCE_DIR:-${REGISTRY_NOTARY_SOURCE_DIR:-../registry-notary}}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
        cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    env_file:
      - .env
    environment:
      RUST_LOG: info
      OPENFN_SIDECAR_TOKEN_HASH: ${OPENFN_SIDECAR_TOKEN_HASH:-}
      OPENFN_DHIS2_HOST_URL: ${OPENFN_DHIS2_HOST_URL:-https://play.im.dhis2.org/stable-2-43-0}
      OPENFN_DHIS2_USERNAME: ${OPENFN_DHIS2_USERNAME:-admin}
      OPENFN_DHIS2_PASSWORD: ${OPENFN_DHIS2_PASSWORD:-district}
      OPENFN_DHIS2_DEMO_CREDENTIAL_JSON: '{"hostUrl":"${OPENFN_DHIS2_HOST_URL:-https://play.im.dhis2.org/stable-2-43-0}","baseUrl":"${OPENFN_DHIS2_HOST_URL:-https://play.im.dhis2.org/stable-2-43-0}","username":"${OPENFN_DHIS2_USERNAME:-admin}","password":"${OPENFN_DHIS2_PASSWORD:-district}"}'
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        : "$${OPENFN_SIDECAR_TOKEN_HASH:?missing OPENFN_SIDECAR_TOKEN_HASH; run scripts/generate-demo-secrets.py}"
        exec registry-notary-openfn-sidecar --config /etc/registry-notary-openfn/openfn-dhis2-sidecar.yaml.template
    volumes:
      - ./config/openfn/openfn-dhis2-sidecar.yaml.template:/etc/registry-notary-openfn/openfn-dhis2-sidecar.yaml.template:ro
    networks:
      - default
      - openfn-internal
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:8080/ready\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));'"
      interval: 2s
      timeout: 2s
      retries: 30

  dhis2-health-notary:
    <<: *notary-common
    profiles: ["dhis2"]
    build:
      context: .
      dockerfile: Dockerfile.registry-notary
      additional_contexts:
        notary_src: ${REGISTRY_OPENFN_NOTARY_SOURCE_DIR:-${REGISTRY_NOTARY_SOURCE_DIR:-../registry-notary}}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
        cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    command: ["--config", "/etc/registry-notary/dhis2-health-notary.yaml"]
    environment:
      RUST_LOG: info
      OPENFN_SIDECAR_TOKEN_RAW: ${OPENFN_SIDECAR_TOKEN_RAW:-}
    ports:
      - "4326:8080"
    volumes:
      - ./config/notary/dhis2-health-notary.yaml:/etc/registry-notary/dhis2-health-notary.yaml:ro
    networks:
      - default
      - openfn-internal
    depends_on:
      openfn-dhis2-sidecar:
        condition: service_healthy

  opencrvs-dci-notary:
    image: registry-notary:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-notary
      additional_contexts:
        notary_src: ${REGISTRY_NOTARY_SOURCE_DIR:-./vendor/registry-notary}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
        cel_mapping_src: ${CEL_MAPPING_SOURCE_DIR:-../cel-mapping}
    profiles: ["opencrvs"]
    command: ["--config", "/etc/registry-notary/opencrvs-dci-notary.yaml"]
    env_file:
      - .env
      - path: .env.local
        required: false
    environment:
      RUST_LOG: info
      REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:?missing REGISTRY_NOTARY_AUDIT_HASH_SECRET; run scripts/generate-demo-secrets.py}
      REGISTRY_NOTARY_ISSUER_JWK: ${REGISTRY_NOTARY_ISSUER_JWK:?missing REGISTRY_NOTARY_ISSUER_JWK; run scripts/generate-demo-secrets.py}
    restart: unless-stopped
    ports:
      - "${OPENCRVS_DCI_NOTARY_PORT:-4352}:8080"
    volumes:
      - ./config/notary/opencrvs-dci-notary.yaml:/etc/registry-notary/opencrvs-dci-notary.yaml:ro

  static-metadata-publisher:
    image: python:3.12.3-slim-bookworm
    command: ["python", "/usr/local/bin/static-metadata-server.py", "--port", "8080", "--host", "0.0.0.0", "--directory", "/srv/static"]
    ports:
      - "4331:8080"
    volumes:
      - ./static-metadata:/srv/static:ro
      - ./scripts/static-metadata-server.py:/usr/local/bin/static-metadata-server.py:ro
    restart: unless-stopped

  agri-registry-relay:
    <<: *relay-common
    profiles: ["agri"]
    command: ["--config", "/etc/registry-relay/agri-registry-relay.yaml"]
    ports:
      - "4341:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/agriculture:/demo/data/agriculture:ro
      - agri-registry-cache:/var/lib/registry-relay/cache

  nagdi-agriculture-notary:
    <<: *notary-common
    profiles: ["agri"]
    command: ["--config", "/etc/registry-notary/nagdi-agriculture-notary.yaml"]
    ports:
      - "4342:8080"
    volumes:
      - ./config/notary/nagdi-agriculture-notary.yaml:/etc/registry-notary/nagdi-agriculture-notary.yaml:ro
    depends_on:
      - agri-registry-relay
      - agri-static-metadata-publisher

  agri-static-metadata-publisher:
    image: python:3.12.3-slim-bookworm
    profiles: ["agri"]
    command: ["python", "/usr/local/bin/static-metadata-server.py", "--port", "8080", "--host", "0.0.0.0", "--directory", "/srv/static"]
    ports:
      - "4343:8080"
    volumes:
      - ./static-metadata:/srv/static:ro
      - ./scripts/static-metadata-server.py:/usr/local/bin/static-metadata-server.py:ro
    restart: unless-stopped

  demo-client:
    image: python:3.12.3-slim-bookworm
    profiles: ["client"]
    env_file:
      - .env
    environment:
      CIVIL_RELAY_URL: http://civil-registry-relay:8080
      SOCIAL_RELAY_URL: http://social-protection-registry-relay:8080
      HEALTH_RELAY_URL: http://health-registry-relay:8080
      CIVIL_EVIDENCE_URL: http://civil-notary:8080
      SOCIAL_EVIDENCE_URL: http://social-protection-notary:8080
      SHARED_EVIDENCE_URL: http://shared-eligibility-notary:8080
      STATIC_METADATA_URL: http://static-metadata-publisher:8080
      DEMO_OUTPUT_DIR: /demo/output
    working_dir: /workspace
    command: ["python", "/workspace/scripts/demo-flow.py"]
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./output:/demo/output
    depends_on:
      - civil-registry-relay
      - social-protection-registry-relay
      - health-registry-relay
      - civil-notary
      - social-protection-notary
      - shared-eligibility-notary
      - static-metadata-publisher

  agri-demo-client:
    image: python:3.12.3-slim-bookworm
    profiles: ["agri-client"]
    env_file:
      - .env
    environment:
      AGRI_RELAY_URL: http://agri-registry-relay:8080
      AGRI_WITNESS_URL: http://nagdi-agriculture-notary:8080
      AGRI_EVIDENCE_URL: http://nagdi-agriculture-notary:8080
      AGRI_STATIC_METADATA_URL: http://agri-static-metadata-publisher:8080
      DEMO_OUTPUT_DIR: /demo/output/agri-client
    working_dir: /workspace
    command: ["python", "/workspace/scripts/demo-agri-flow.py"]
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./output:/demo/output
    depends_on:
      - agri-registry-relay
      - nagdi-agriculture-notary
      - agri-static-metadata-publisher

volumes:
  postgres-data:
  redis-data:
  zitadel-seed:
  civil-registry-cache:
  social-protection-registry-cache:
  health-registry-cache:
  agri-registry-cache:

networks:
  openfn-internal:
    internal: true
