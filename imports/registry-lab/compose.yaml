name: registry-lab

x-relay-common: &relay-common
  image: registry-relay:demo
  build:
    context: .
    dockerfile: Dockerfile.registry-relay
    additional_contexts:
      registry_relay_src: ${REGISTRY_RELAY_SOURCE_DIR:-./vendor/registry-relay}
      registry_platform_src: ${REGISTRY_RELAY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
  env_file:
    - .env
  environment:
    RUST_LOG: info
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "--help"]
    interval: 30s
    timeout: 10s
    retries: 3

x-witness-common: &witness-common
  image: registry-witness:demo
  build:
    context: .
    dockerfile: Dockerfile.registry-witness
    additional_contexts:
      witness_src: ${REGISTRY_WITNESS_SOURCE_DIR:-./vendor/registry-witness}
      registry_platform_src: ${REGISTRY_WITNESS_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
  env_file:
    - .env
  environment:
    RUST_LOG: info
  restart: unless-stopped

services:
  civil-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/civil-registry-relay.yaml"]
    ports:
      - "4311:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/civil:/demo/data/civil:ro
      - civil-registry-cache:/var/lib/registry-relay/cache

  social-protection-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/social-protection-registry-relay.yaml"]
    ports:
      - "4312:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/social-protection:/demo/data/social-protection:ro
      - social-protection-registry-cache:/var/lib/registry-relay/cache

  health-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/health-registry-relay.yaml"]
    ports:
      - "4313:8080"
    volumes:
      - ./config/relay:/etc/registry-relay:ro
      - ./data/health:/demo/data/health:ro
      - health-registry-cache:/var/lib/registry-relay/cache

  civil-witness:
    <<: *witness-common
    command: ["--config", "/etc/registry-witness/civil-witness.yaml"]
    ports:
      - "4321:8080"
    volumes:
      - ./config/witness/civil-witness.yaml:/etc/registry-witness/civil-witness.yaml:ro

  social-protection-witness:
    <<: *witness-common
    command: ["--config", "/etc/registry-witness/social-protection-witness.yaml"]
    ports:
      - "4322:8080"
    volumes:
      - ./config/witness/social-protection-witness.yaml:/etc/registry-witness/social-protection-witness.yaml:ro

  shared-eligibility-witness:
    <<: *witness-common
    command: ["--config", "/etc/registry-witness/shared-eligibility-witness.yaml"]
    ports:
      - "4323:8080"
    volumes:
      - ./config/witness/shared-eligibility-witness.yaml:/etc/registry-witness/shared-eligibility-witness.yaml:ro

  openfn-mock-registry:
    profiles: ["openfn"]
    image: registry-witness-openfn-sidecar:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-witness-openfn-sidecar
      additional_contexts:
        witness_src: ${REGISTRY_WITNESS_SOURCE_DIR:-./vendor/registry-witness}
        registry_platform_src: ${REGISTRY_WITNESS_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
    entrypoint: ["node", "/opt/openfn/mock-registry-server.mjs"]
    environment:
      MOCK_REGISTRY_HOST: 0.0.0.0
      MOCK_REGISTRY_PORT: "8080"
      MOCK_REGISTRY_TOKEN: demo-target-token
    ports:
      - "4340:8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch("http://127.0.0.1:8080/people/person-123", { headers: { Authorization: "Bearer demo-target-token" } }).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));
      interval: 2s
      timeout: 2s
      retries: 20

  openfn-civil-sidecar:
    profiles: ["openfn"]
    image: registry-witness-openfn-sidecar:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-witness-openfn-sidecar
      additional_contexts:
        witness_src: ${REGISTRY_WITNESS_SOURCE_DIR:-./vendor/registry-witness}
        registry_platform_src: ${REGISTRY_WITNESS_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-./vendor/registry-platform}}
    env_file:
      - .env
    environment:
      RUST_LOG: info
      OPENFN_SIDECAR_TOKEN_RAW: ${OPENFN_SIDECAR_TOKEN_RAW:-}
      OPENFN_HTTP_DEMO_CREDENTIAL_JSON: '{"baseUrl":"http://openfn-mock-registry:8080","apiToken":"demo-target-token"}'
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s/__OPENFN_SIDECAR_TOKEN_RAW__/$${OPENFN_SIDECAR_TOKEN_RAW}/g" /etc/registry-witness-openfn/openfn-civil-sidecar.yaml.template > /tmp/openfn-civil-sidecar.yaml
        exec registry-witness-openfn-sidecar --config /tmp/openfn-civil-sidecar.yaml
    ports:
      - "4341:8080"
    volumes:
      - ./config/openfn/openfn-civil-sidecar.yaml.template:/etc/registry-witness-openfn/openfn-civil-sidecar.yaml.template:ro
    depends_on:
      openfn-mock-registry:
        condition: service_healthy

  openfn-civil-witness:
    <<: *witness-common
    profiles: ["openfn"]
    command: ["--config", "/etc/registry-witness/openfn-civil-witness.yaml"]
    environment:
      RUST_LOG: info
      OPENFN_SIDECAR_TOKEN_RAW: ${OPENFN_SIDECAR_TOKEN_RAW:-}
    ports:
      - "4324:8080"
    volumes:
      - ./config/witness/openfn-civil-witness.yaml:/etc/registry-witness/openfn-civil-witness.yaml:ro
    depends_on:
      - openfn-civil-sidecar

  static-metadata-publisher:
    image: python:3.12.3-slim-bookworm
    command: ["python", "-m", "http.server", "8080", "--bind", "0.0.0.0", "--directory", "/srv/static"]
    ports:
      - "4331:8080"
    volumes:
      - ./static-metadata:/srv/static:ro
    restart: unless-stopped

  demo-client:
    image: python:3.12.3-slim-bookworm
    profiles: ["client"]
    env_file:
      - .env
    environment:
      CIVIL_RELAY_URL: http://civil-registry-relay:8080
      SOCIAL_RELAY_URL: http://social-protection-registry-relay:8080
      HEALTH_RELAY_URL: http://health-registry-relay:8080
      CIVIL_EVIDENCE_URL: http://civil-witness:8080
      SOCIAL_EVIDENCE_URL: http://social-protection-witness:8080
      SHARED_EVIDENCE_URL: http://shared-eligibility-witness:8080
      STATIC_METADATA_URL: http://static-metadata-publisher:8080
      DEMO_OUTPUT_DIR: /demo/output
    working_dir: /workspace
    command: ["python", "/workspace/scripts/demo-flow.py"]
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./output:/demo/output
    depends_on:
      - civil-registry-relay
      - social-protection-registry-relay
      - health-registry-relay
      - civil-witness
      - social-protection-witness
      - shared-eligibility-witness
      - static-metadata-publisher

volumes:
  civil-registry-cache:
  social-protection-registry-cache:
  health-registry-cache:
