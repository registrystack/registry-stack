# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

auth:
  mode: api_key
  bearer_tokens:
    - id: hosted_civil_evidence_client
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_CLIENT_BEARER_HASH
        commitment: sha256:8f736e49fb826ac66cb41293507dd43a0f6125c6f3f96193eec75d8ff051ebe7
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

config_trust:
  antirollback_state_path: /var/lib/registry-notary/config-state/civil-notary-config-antirollback.json
  local_approval_state_path: /var/lib/registry-notary/config-state/civil-notary-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

evidence:
  enabled: true
  service_id: civil-notary
  api_base_url: http://civil-notary:8080
  inline_batch_limit: 20
  source_connections:
    civil:
      base_url: http://civil-registry-relay:8080
      allow_insecure_private_network: true
      token_env: CIVIL_EVIDENCE_SOURCE_RAW
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          national_id: /person/national_id
          deceased: /person/deceased
    civil_demographic:
      base_url: http://civil-registry-relay:8080
      allow_insecure_private_network: true
      token_env: CIVIL_EVIDENCE_SOURCE_RAW
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: predicate
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          given_name: /person/given_name
          surname: /person/surname
          birth_date: /person/birth_date
          deceased: /person/deceased
  ecosystem_bindings:
    oots-birth-evidence/v1:
      profile: registry-notary/source-policy/v1
      policy_id: lab.oots-birth-evidence.governed-evidence.v1
      policy_hash: sha256:a4804f81f3287b7922e8c3d5bad49377584b7ab8727fe62cbae23c1f5bc85e1c
      output_profile: minimized_json
    oots-marriage-evidence/v1:
      profile: registry-notary/source-policy/v1
      policy_id: lab.oots-marriage-evidence.governed-evidence.v1
      policy_hash: sha256:e5193284535dfa9689dd081942ec847f51eacd50ebc71d93b482247207b63dcf
      output_profile: minimized_json
  claims:
    - id: person-is-alive
      title: Vital Status Attestation
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
    - id: civil-person-is-alive-by-demographics
      title: Vital Status Attestation by demographics
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        civil:
          connector: dci
          connection: civil_demographic
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.attributes.given_name
            field: given_name
            op: eq
            cardinality: one
          query_fields:
            - input: target.attributes.given_name
              field: given_name
              op: eq
            - input: target.attributes.surname
              field: surname
              op: eq
            - input: target.attributes.birth_date
              field: birth_date
              op: eq
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            target_type: Person
            method: configured_demographic_lookup
            sufficient_target_inputs:
              - - target.attributes.given_name
                - target.attributes.surname
                - target.attributes.birth_date
            allowed_target_inputs:
              - target.attributes.given_name
              - target.attributes.surname
              - target.attributes.birth_date
          fields:
            given_name:
              field: given_name
              type: string
              required: true
            surname:
              field: surname
              type: string
              required: true
            birth_date:
              field: birth_date
              type: date
              required: true
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
