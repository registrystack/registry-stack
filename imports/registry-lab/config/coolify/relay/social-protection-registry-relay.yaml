# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/social-protection-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/social-protection-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: social-protection-registry-relay.metadata.yaml
    digest: sha256:241321a442e7ad7605480ea569e86ccb9f5acdefc2d6df3eaeb6b4a52b19f5a9

catalog:
  title: Social Protection Registry Relay (Decentralized Demo)
  base_url: http://social-protection-registry-relay:8080
  publisher: Social Protection Authority (Demo)
  participant_id: did:web:social-relay.lab.registrystack.org

vocabularies:
  demo: https://metadata.lab.registrystack.org/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: SOCIAL_METADATA_CLIENT_HASH
        commitment: sha256:ac29becef186908ea47a569e596d2378481edf6ab20cdc1b439e75d8fa4550ba
      scopes:
        - social_protection_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: SOCIAL_EVIDENCE_SOURCE_HASH
        commitment: sha256:03c33654c0abfb9c4a1a20f38b21c8e3fad252e8f70e7c526abfc0df8e632f95
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:rows
        - social_protection_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: SOCIAL_EVIDENCE_ONLY_HASH
        commitment: sha256:a9feb6a22ac441a6388de35ae4e4acbb2297602e3a287d5e1a3ad1a8fa0fe951
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: SOCIAL_ROW_READER_HASH
        commitment: sha256:57a165a57ba2a0b5955abde980401ba5fc173689da1d41949720b791771bb8c1
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:rows
    - id: aggregate_reader
      fingerprint:
        provider: env
        name: SOCIAL_AGGREGATE_READER_HASH
        commitment: sha256:22ddd83a4bbba1df9c4097202d392c1ef7de9ecb1e95b69a798227941f4fc590
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:aggregate
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_SOCIAL_EVIDENCE_SOURCE_HASH
        commitment: sha256:5a17c8e7897edbcf064a53b5f2b66cc66f00e8eded93638d486757bf6a71d8e1
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:rows
        - social_protection_registry:evidence_verification

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: social_protection_registry
    title: Social Protection Registry
    description: Synthetic households, persons, and enrollments for decentralized evidence demo flows.
    owner: Social Protection Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    conforms_to:
      - demo:SocialProtectionRegistry
    defaults:
      refresh:
        mode: manual
    tables:
      - id: households_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/social-protection/social-protection.xlsx
          format:
            xlsx:
              sheet: Households
              header_row: 1
        primary_key: household_id
        schema:
          strict: true
          fields:
            - name: household_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: district
              type: string
              nullable: false
            - name: poverty_score
              type: number
              nullable: false
            - name: eligibility_band
              type: string
              nullable: false
            - name: household_size
              type: integer
              nullable: false
            - name: active_members
              type: integer
              nullable: false
            - name: deceased_member_count
              type: integer
              nullable: false
      - id: persons_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/social-protection/social-protection.xlsx
          format:
            xlsx:
              sheet: Persons
              header_row: 1
        primary_key: person_id
        schema:
          strict: true
          fields:
            - name: person_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: relationship
              type: string
              nullable: false
            - name: age
              type: integer
              nullable: false
            - name: alive
              type: boolean
              nullable: false
            - name: disability_status
              type: string
              nullable: false
      - id: enrollments_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/social-protection/social-protection.xlsx
          format:
            xlsx:
              sheet: Enrollments
              header_row: 1
        primary_key: enrollment_id
        schema:
          strict: true
          fields:
            - name: enrollment_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: person_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: program_code
              type: string
              nullable: false
            - name: status
              type: string
              nullable: false
            - name: benefit_amount
              type: number
              nullable: false
            - name: enrolled_on
              type: date
              nullable: false
      - id: district_geometries_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/social-protection/social-protection.xlsx
          format:
            xlsx:
              sheet: DistrictGeometries
              header_row: 1
        primary_key: district
        schema:
          strict: true
          fields:
            - name: district
              type: string
              nullable: false
            - name: geometry
              type: string
              nullable: false
    aggregates:
      - id: households_by_eligibility_band
        title: Households by eligibility band
        description: Household count by eligibility band and district.
        source_entity: household
        default_group_by:
          - eligibility_band
        dimensions:
          - id: eligibility_band
            label: Eligibility band
            field: eligibility_band
          - id: district
            label: District
            field: district
        indicators:
          - id: household_count
            label: Households
            function: count
            column: id
            unit_measure: households
          - id: average_poverty_score
            label: Average poverty score
            function: avg
            column: poverty_score
            unit_measure: score
            decimals: 1
        allowed_filters:
          - field: eligibility_band
            ops: [eq, in]
          - field: district
            ops: [eq, in]
          - field: poverty_score
            ops: [gte, lte, between]
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          aggregate_only_execution: true
        disclosure_control:
          min_cell_size: 2
          suppression: null
          report_suppressed_rows: true
        spatial:
          mode: admin_area
          collection_id: social_protection_households_by_district
          dimension: district
          geometry_entity: district_geometry
          geometry_id_field: id
          geometry_field: geometry
          max_geometry_vertices: 100
    entities:
      - name: household
        title: Household
        description: Household enrolled or assessed for support.
        table: households_table
        concept_uri: demo:Household
        fields:
          - name: id
            from: household_id
          - name: national_id
          - name: district
          - name: poverty_score
          - name: eligibility_band
          - name: household_size
          - name: active_members
          - name: deceased_member_count
        relationships:
          - name: members
            kind: has_many
            target: person
            foreign_key: household_id
          - name: enrollments
            kind: has_many
            target: program_enrollment
            foreign_key: household_id
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          read_scope: social_protection_registry:rows
          evidence_verification_scope: social_protection_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: eligibility_band
              ops: [eq, in]
            - field: poverty_score
              ops: [eq, gte, lte]
      - name: district_geometry
        title: District Geometry
        description: Administrative district geometries for spatial aggregate demonstrations.
        table: district_geometries_table
        concept_uri: demo:DistrictGeometry
        fields:
          - name: id
            from: district
          - name: geometry
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          read_scope: social_protection_registry:rows
          evidence_verification_scope: social_protection_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 10000
          require_purpose_header: false
          allowed_filters:
            - field: id
              ops: [eq, in]
      - name: person
        title: Person
        description: Household member projection.
        table: persons_table
        concept_uri: demo:Person
        fields:
          - name: id
            from: person_id
          - name: household_id
          - name: national_id
          - name: relationship
          - name: age
          - name: alive
          - name: disability_status
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          read_scope: social_protection_registry:rows
          evidence_verification_scope: social_protection_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: alive
              ops: [eq]
      - name: program_enrollment
        title: Program Enrollment
        description: Program participation record for a household member.
        table: enrollments_table
        concept_uri: demo:ProgramEnrollment
        fields:
          - name: id
            from: enrollment_id
          - name: household_id
          - name: person_id
          - name: national_id
          - name: program_code
          - name: enrollment_status
            from: status
          - name: benefit_amount
          - name: enrolled_on
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
          - name: person
            kind: belongs_to
            target: person
            foreign_key: person_id
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          read_scope: social_protection_registry:rows
          evidence_verification_scope: social_protection_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: person_id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: program_code
              ops: [eq, in]
            - field: enrollment_status
              ops: [eq, in]
