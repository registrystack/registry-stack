# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: health-registry-relay.metadata.yaml
    digest: sha256:86299d9d50673688ee3d7977d5e4299127e33abed93247d9996656922e504843

catalog:
  title: Health Registry Relay (Decentralized Demo)
  base_url: http://health-registry-relay:8080
  publisher: Health Services Authority (Demo)
  participant_id: did:web:health-relay.lab.registrystack.org

vocabularies:
  demo: https://metadata.lab.registrystack.org/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: HEALTH_METADATA_CLIENT_HASH
        commitment: sha256:8f3a2adfb284ee95f900423eeaa5c3289a2892005259a3645161d20104624240
      scopes:
        - health_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:8400ff4accb8ba035fbdc65f90ee17d656bf2adecf96462714ab836de8e7de99
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_ONLY_HASH
        commitment: sha256:dec62675be7c3b69dc4b57c9288280ef58d8b6cfebcee7bc81266e19d97c2269
      scopes:
        - health_registry:metadata
        - health_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: HEALTH_ROW_READER_HASH
        commitment: sha256:51aecc569d8c252be814df392b38a4df55c87dc221942416038199a584af2f39
      scopes:
        - health_registry:metadata
        - health_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:b050f3c13021368ef1426c9f19c2c9f08cac5554d73238d07c53a4a4e6b5b3bc
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: health_registry
    title: Applicant Service Availability Projection
    description: Synthetic applicant service-availability records derived from facility licensing data for decentralized evidence demo flows.
    owner: Health Services Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    conforms_to:
      - demo:HealthFacilityRegistry
    defaults:
      refresh:
        mode: manual
    tables:
      - id: facilities_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/health/health-facilities.parquet
          format:
            parquet: {}
        primary_key: facility_id
        schema:
          strict: true
          fields:
            - name: facility_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: facility_name
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: license_status
              type: string
              nullable: false
            - name: maternal_service_available
              type: boolean
              nullable: false
            - name: pediatric_service_available
              type: boolean
              nullable: false
            - name: practitioner_credential_active
              type: boolean
              nullable: false
            - name: updated_on
              type: date
              nullable: false
    entities:
      - name: health_facility
        title: Applicant Service Availability
        description: Applicant-district service availability projection for eligibility evidence.
        table: facilities_table
        concept_uri: demo:HealthFacility
        fields:
          - name: id
            from: facility_id
          - name: national_id
          - name: facility_name
          - name: district
          - name: license_status
          - name: maternal_service_available
          - name: pediatric_service_available
          - name: practitioner_credential_active
          - name: updated_on
        access:
          metadata_scope: health_registry:metadata
          aggregate_scope: health_registry:aggregate
          read_scope: health_registry:rows
          evidence_verification_scope: health_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: license_status
              ops: [eq, in]
            - field: maternal_service_available
              ops: [eq]
            - field: pediatric_service_available
              ops: [eq]
            - field: practitioner_credential_active
              ops: [eq]
