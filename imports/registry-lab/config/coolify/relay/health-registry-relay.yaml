# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: health-registry-relay.metadata.yaml
    digest: sha256:86299d9d50673688ee3d7977d5e4299127e33abed93247d9996656922e504843

catalog:
  title: Health Registry Relay (Decentralized Demo)
  base_url: http://health-registry-relay:8080
  publisher: Health Services Authority (Demo)
  participant_id: did:web:health-relay.lab.registrystack.org

vocabularies:
  demo: https://metadata.lab.registrystack.org/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: HEALTH_METADATA_CLIENT_HASH
        commitment: sha256:01c348240085780f1478c5ffdc3ee274932862204ff34911388afef15c00e4c3
      scopes:
        - health_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:e5f0ccae7a577fe41a6ecc814001d89c3b2f83bf9f7908b2a9ffe2717a9c66b6
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_ONLY_HASH
        commitment: sha256:328a52475bfc456a3d017ad0e9b2ea5754a7e221a11d8899479d08fb8359fa71
      scopes:
        - health_registry:metadata
        - health_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: HEALTH_ROW_READER_HASH
        commitment: sha256:18325cdfe158fc1008495cfdf04f60422927ac289a0091f9c3ce3e81e174545e
      scopes:
        - health_registry:metadata
        - health_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:9f8d7161f9eb839738efad770cfe4ff20b14d9b8687e6ef468106dd67c0e6335
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: health_registry
    title: Health Facility Registry
    description: Synthetic facility licensing and service availability records for decentralized evidence demo flows.
    owner: Health Services Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    conforms_to:
      - demo:HealthFacilityRegistry
    defaults:
      refresh:
        mode: manual
    tables:
      - id: facilities_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/health/health-facilities.parquet
          format:
            parquet: {}
        primary_key: facility_id
        schema:
          strict: true
          fields:
            - name: facility_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: facility_name
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: license_status
              type: string
              nullable: false
            - name: maternal_service_available
              type: boolean
              nullable: false
            - name: pediatric_service_available
              type: boolean
              nullable: false
            - name: practitioner_credential_active
              type: boolean
              nullable: false
            - name: updated_on
              type: date
              nullable: false
    entities:
      - name: health_facility
        title: Health Facility
        description: Facility service and license projection for eligibility evidence.
        table: facilities_table
        concept_uri: demo:HealthFacility
        fields:
          - name: id
            from: facility_id
          - name: national_id
          - name: facility_name
          - name: district
          - name: license_status
          - name: maternal_service_available
          - name: pediatric_service_available
          - name: practitioner_credential_active
          - name: updated_on
        access:
          metadata_scope: health_registry:metadata
          aggregate_scope: health_registry:aggregate
          read_scope: health_registry:rows
          evidence_verification_scope: health_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: license_status
              ops: [eq, in]
            - field: maternal_service_available
              ops: [eq]
            - field: pediatric_service_available
              ops: [eq]
            - field: practitioner_credential_active
              ops: [eq]
