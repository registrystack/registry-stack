# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/civil-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/civil-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: civil-registry-relay.metadata.yaml
    digest: sha256:715fa7e3ab817123b43b84f9941271fc0b92b8c3fa88133603d25eaeda35cda9

catalog:
  title: Civil Registry Relay (Decentralized Demo)
  base_url: http://civil-registry-relay:8080
  publisher: Civil Registration Authority (Demo)
  participant_id: did:web:civil-relay.lab.registrystack.org

vocabularies:
  demo: https://metadata.lab.registrystack.org/vocab/
  spdci: https://schema.spdci.org/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: CIVIL_METADATA_CLIENT_HASH
        commitment: sha256:b5603e6936a446dd888ee38f74cd0a9a1b5eea219d44ae79788987dbd00ebc37
      scopes:
        - civil_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_SOURCE_HASH
        commitment: sha256:1708e3626a915a927fab7a3fe08459441b2de7bf12799bdacf3e234d42280041
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_ONLY_HASH
        commitment: sha256:72307c6f9bc7b30521de8e3637a3845aff0ae699384d65be50fe937fd868dd49
      scopes:
        - civil_registry:metadata
        - civil_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: CIVIL_ROW_READER_HASH
        commitment: sha256:8f946b9102eee82fe109e2aae7b5b92087568067794353639fa26aef9d17b7f8
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_CIVIL_EVIDENCE_SOURCE_HASH
        commitment: sha256:3ede72a1d1901b7f6bb543fada2f86f777c3450249898043b7a42bcd13df78cd
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:evidence_verification

standards:
  spdci:
    registries:
      crvs:
        dataset: civil_registry
        entity: civil_person
        registry_type: ns:org:RegistryType:CRVS
        record_type: spdci-extensions-crvs:Person
        identifiers:
          NATIONAL_ID: national_id
          UIN: national_id
          NIN: national_id
        expression_fields:
          birth_date: birth_date
          life_stage: life_stage
          deceased: deceased
          district: district
        response_fields:
          person.national_id: national_id
          person.birth_date: birth_date
          person.life_stage: life_stage
          person.deceased: deceased
          person.district: district

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: civil_registry
    title: Civil Registry
    description: Synthetic life stage records for decentralized evidence demo flows.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    conforms_to:
      - spdci:extensions/crvs/v1/Person
    defaults:
      refresh:
        mode: manual
    tables:
      - id: civil_persons_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/civil-persons.csv
          format:
            csv:
              header_row: 1
        primary_key: national_id
        schema:
          strict: true
          fields:
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: given_name
              type: string
              nullable: false
              sensitive: true
            - name: surname
              type: string
              nullable: false
              sensitive: true
            - name: birth_date
              type: date
              nullable: false
            - name: life_stage
              type: string
              nullable: false
            - name: deceased
              type: boolean
              nullable: false
            - name: district
              type: string
              nullable: false
    entities:
      - name: civil_person
        title: Civil Person
        description: Person-level life stage projection for evidence computation.
        table: civil_persons_table
        concept_uri: spdci:extensions/crvs/v1/Person
        fields:
          - name: national_id
          - name: given_name
          - name: surname
          - name: birth_date
          - name: life_stage
          - name: deceased
          - name: district
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: national_id
              ops: [eq, in]
            - field: given_name
              ops: [eq]
            - field: surname
              ops: [eq]
            - field: birth_date
              ops: [eq, gte, lte]
            - field: life_stage
              ops: [eq, in]
            - field: deceased
              ops: [eq]
            - field: district
              ops: [eq, in]
