requirements:
  - id: child_identity_requirement
    iri: https://demo.example.gov/requirements/child-identity
    title: Child support identity and alive-status requirement
    description: Requirement to confirm the child has a civil registry record and is alive.
  - id: household_support_requirement
    iri: https://demo.example.gov/requirements/household-support
    title: Household support review requirement
    description: Requirement to confirm the household has an active support record.
  - id: health_linked_support_requirement
    iri: https://demo.example.gov/requirements/health-linked-support
    title: Health-linked conditional support requirement
    description: Requirement to confirm licensed health services are available for the applicant context.
  - id: combined_support_bundle_requirement
    iri: https://demo.example.gov/requirements/combined-support-bundle
    title: Combined support evidence bundle requirement
    description: Requirement represented by the legacy combined cross-authority evidence bundle.
    evidence_type_lists:
      - id: granular-authority-evidence
        title: Civil, household, and health evidence bundle
        description: A grouped option requiring evidence from the civil, social protection, and health authorities.
        evidence_types:
          - civil_child_status_evidence
          - household_support_evidence
          - health_service_availability_evidence
      - id: combined-support-evidence
        title: Combined support evidence
        description: A single composed evidence record satisfying the same requirement.
        evidence_types:
          - combined_support_evidence
  - id: farmer_registration_requirement
    iri: https://demo.example.gov/requirements/nagdi/farmer-registration
    title: Farmer registration requirement
    description: Requirement to confirm that the applicant is registered and active in an agricultural registry.
  - id: agri_lawful_basis_requirement
    iri: https://demo.example.gov/requirements/nagdi/lawful-basis
    title: Agricultural data-use authorization requirement
    description: Requirement to confirm a lawful basis and purpose for agricultural data consultation.
  - id: active_parcel_requirement
    iri: https://demo.example.gov/requirements/nagdi/active-parcel
    title: Active farm parcel requirement
    description: Requirement to confirm that the farmer has an active farm parcel for the season under review.
  - id: crop_declaration_requirement
    iri: https://demo.example.gov/requirements/nagdi/crop-declaration
    title: Crop declaration requirement
    description: Requirement to confirm that a crop has been declared for the deterministic demo season.
  - id: climate_risk_targeting_requirement
    iri: https://demo.example.gov/requirements/nagdi/climate-risk-targeting
    title: Climate-risk targeting requirement
    description: Requirement to confirm that the district and crop are targeted for climate-smart input support.
  - id: voucher_redemption_exclusion_requirement
    iri: https://demo.example.gov/requirements/nagdi/voucher-redemption-exclusion
    title: Voucher redemption exclusion requirement
    description: Requirement to confirm that a farmer has not already redeemed the input voucher under review.
  - id: livestock_holding_requirement
    iri: https://demo.example.gov/requirements/nagdi/livestock-holding
    title: Livestock holding requirement
    description: Requirement to confirm an active livestock holding before movement permit review.
  - id: vaccination_requirement
    iri: https://demo.example.gov/requirements/nagdi/vaccination
    title: Livestock vaccination requirement
    description: Requirement to confirm current vaccination status for herd movement.
  - id: quarantine_clearance_requirement
    iri: https://demo.example.gov/requirements/nagdi/quarantine-clearance
    title: Quarantine clearance requirement
    description: Requirement to confirm that no active quarantine blocks the requested livestock movement.
  - id: climate_smart_input_voucher_requirement
    iri: https://demo.example.gov/requirements/nagdi/climate-smart-input-voucher
    title: Climate-smart input voucher eligibility requirement
    description: Composed requirement for farmer registration, parcel, crop, climate-risk, and redemption checks.
    evidence_type_lists:
      - id: granular-agri-voucher-evidence
        title: Agricultural voucher evidence bundle
        description: Bounded evidence from agricultural registry, land, program, and climate sources.
        evidence_types:
          - farmer_registration_evidence
          - active_farm_parcel_evidence
          - climate_risk_district_evidence
          - voucher_redemption_status_evidence
      - id: composed-agri-voucher-evidence
        title: Composed input voucher eligibility evidence
        description: A single composed evidence result for input voucher review.
        evidence_types:
          - composed_input_voucher_eligibility_evidence
  - id: livestock_movement_permit_requirement
    iri: https://demo.example.gov/requirements/nagdi/livestock-movement-permit
    title: Livestock movement permit eligibility requirement
    description: Composed requirement for livestock holding, vaccination, quarantine, and permit status checks.
    evidence_type_lists:
      - id: granular-livestock-movement-evidence
        title: Livestock movement evidence bundle
        description: Bounded evidence from livestock, vaccination, quarantine, and permit records.
        evidence_types:
          - livestock_vaccination_evidence
          - quarantine_clearance_evidence
          - movement_permit_status_evidence
      - id: composed-livestock-movement-evidence
        title: Composed livestock movement eligibility evidence
        description: A single composed evidence result for livestock movement permit review.
        evidence_types:
          - composed_livestock_movement_eligibility_evidence
  - id: agricultural_market_sizing_requirement
    iri: https://demo.example.gov/requirements/nagdi/agricultural-market-sizing
    title: Agricultural market sizing aggregate requirement
    description: Requirement to provide suppressed district-level planning aggregates without raw farmer row export.
  - id: livestock_herd_planning_requirement
    iri: https://demo.example.gov/requirements/nagdi/livestock-herd-planning
    title: Livestock herd planning aggregate requirement
    description: Requirement to provide suppressed herd-count planning aggregates without raw livestock holder, herd, or animal row export.
evidence_types:
  - id: civil_child_status_evidence
    iri: https://demo.example.gov/evidence-types/civil-child-status
    title: Civil child status evidence
    proves:
      - child_identity_requirement
      - combined_support_bundle_requirement
  - id: household_support_evidence
    iri: https://demo.example.gov/evidence-types/household-support
    title: Household support evidence
    proves:
      - household_support_requirement
      - combined_support_bundle_requirement
  - id: health_service_availability_evidence
    iri: https://demo.example.gov/evidence-types/health-service-availability
    title: Health service availability evidence
    proves:
      - health_linked_support_requirement
      - combined_support_bundle_requirement
  - id: combined_support_evidence
    iri: https://demo.example.gov/evidence-types/combined-support
    title: Combined cross-authority support evidence
    proves:
      - combined_support_bundle_requirement
  - id: farmer_registration_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/farmer-registration
    title: Farmer registration evidence
    proves:
      - farmer_registration_requirement
      - climate_smart_input_voucher_requirement
  - id: active_farm_parcel_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/active-farm-parcel
    title: Active farm parcel evidence
    proves:
      - active_parcel_requirement
      - climate_smart_input_voucher_requirement
  - id: climate_risk_district_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/climate-risk-district
    title: Climate-risk district evidence
    proves:
      - climate_risk_targeting_requirement
      - climate_smart_input_voucher_requirement
  - id: voucher_redemption_status_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/voucher-redemption-status
    title: Voucher redemption status evidence
    proves:
      - voucher_redemption_exclusion_requirement
      - climate_smart_input_voucher_requirement
  - id: livestock_vaccination_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/livestock-vaccination
    title: Livestock vaccination evidence
    proves:
      - vaccination_requirement
      - livestock_movement_permit_requirement
  - id: quarantine_clearance_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/quarantine-clearance
    title: Quarantine clearance evidence
    proves:
      - quarantine_clearance_requirement
      - livestock_movement_permit_requirement
  - id: movement_permit_status_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/movement-permit-status
    title: Movement permit status evidence
    proves:
      - livestock_movement_permit_requirement
  - id: composed_input_voucher_eligibility_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/input-voucher-eligibility
    title: Composed input voucher eligibility evidence
    proves:
      - climate_smart_input_voucher_requirement
  - id: composed_livestock_movement_eligibility_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/livestock-movement-eligibility
    title: Composed livestock movement eligibility evidence
    proves:
      - livestock_movement_permit_requirement
  - id: agricultural_market_sizing_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/agricultural-market-sizing
    title: Agricultural market sizing evidence
    description: Suppressed aggregate evidence for planning and market sizing without individual row disclosure.
    proves:
      - agricultural_market_sizing_requirement
  - id: livestock_herd_planning_evidence
    iri: https://demo.example.gov/evidence-types/nagdi/livestock-herd-planning
    title: Livestock herd planning evidence
    description: Suppressed aggregate evidence for animal-health planning without livestock holder, herd, or animal row disclosure.
    proves:
      - livestock_herd_planning_requirement
public_services:
  - id: health_linked_child_support
    iri: https://demo.example.gov/services/health-linked-child-support
    title: Health-linked child support eligibility review
    description: Public service for reviewing child support eligibility using civil, social protection, and health evidence.
    competent_authority: social_protection_authority
    jurisdiction: https://demo.example.gov/jurisdictions/ZZ
    channels:
      - id: health_linked_child_support_online
        iri: https://demo.example.gov/services/health-linked-child-support/channels/online
        title: Online review channel
        kind: cv:OnlineChannel
        access_url: https://demo.example.gov/services/health-linked-child-support
    holds_requirements:
      - combined_support_bundle_requirement
    data_services:
      - health_facility_lookup_api
    forms:
      - health_linked_child_support_form
  - id: climate_smart_input_voucher
    iri: https://demo.example.gov/services/nagdi/climate-smart-input-voucher
    title: Climate-smart input voucher review
    description: Agricultural service that reviews input voucher eligibility using bounded NAgDI evidence.
    competent_authority: agricultural_programs_authority
    jurisdiction: https://demo.example.gov/jurisdictions/ZZ
    channels:
      - id: climate_smart_input_voucher_online
        iri: https://demo.example.gov/services/nagdi/climate-smart-input-voucher/channels/online
        title: Online voucher review channel
        kind: cv:OnlineChannel
        access_url: https://demo.example.gov/services/nagdi/climate-smart-input-voucher
    holds_requirements:
      - climate_smart_input_voucher_requirement
      - agri_lawful_basis_requirement
    data_services:
      - agri_registry_lookup_api
  - id: livestock_movement_permit
    iri: https://demo.example.gov/services/nagdi/livestock-movement-permit
    title: Livestock movement permit review
    description: Agricultural service that reviews livestock movement eligibility using bounded NAgDI evidence.
    competent_authority: animal_health_authority
    jurisdiction: https://demo.example.gov/jurisdictions/ZZ
    channels:
      - id: livestock_movement_permit_online
        iri: https://demo.example.gov/services/nagdi/livestock-movement-permit/channels/online
        title: Online permit review channel
        kind: cv:OnlineChannel
        access_url: https://demo.example.gov/services/nagdi/livestock-movement-permit
    holds_requirements:
      - livestock_movement_permit_requirement
      - agri_lawful_basis_requirement
    data_services:
      - agri_registry_lookup_api
  - id: agricultural_market_sizing
    iri: https://demo.example.gov/services/nagdi/agricultural-market-sizing
    title: Agricultural market sizing
    description: Aggregate-only planning service for estimating eligible voucher opportunities without farmer discovery.
    competent_authority: nagdi_governance_body
    jurisdiction: https://demo.example.gov/jurisdictions/ZZ
    channels:
      - id: agricultural_market_sizing_online
        iri: https://demo.example.gov/services/nagdi/agricultural-market-sizing/channels/online
        title: Online market sizing channel
        kind: cv:OnlineChannel
        access_url: https://demo.example.gov/services/nagdi/agricultural-market-sizing
    holds_requirements:
      - agri_lawful_basis_requirement
      - agricultural_market_sizing_requirement
    data_services:
      - agri_aggregate_planning_api
data_services:
  - id: health_facility_lookup_api
    iri: https://demo.example.gov/data-services/health-facility-lookup
    title: Health facility lookup API
    description: API route used to verify licensed health service availability.
    endpoint_url: https://demo.example.gov/api/health/facilities
    endpoint_description: https://demo.example.gov/openapi/health-facilities.yaml
    serves_datasets:
      - health_registry
    conforms_to: https://spec.openapis.org/oas/v3.1.0
  - id: agri_registry_lookup_api
    iri: https://demo.example.gov/data-services/nagdi/agri-registry-lookup
    title: Agricultural registry lookup API
    description: Purpose-bound Relay API for farmer, parcel, program, agroclimate, and livestock evidence source lookups.
    endpoint_url: http://agri-registry-relay:8080
    endpoint_description: http://agri-registry-relay:8080/openapi.json
    serves_datasets:
      - agricultural_registry
    conforms_to: https://spec.openapis.org/oas/v3.1.0
  - id: agri_aggregate_planning_api
    iri: https://demo.example.gov/data-services/nagdi/agri-aggregate-planning
    title: Agricultural aggregate planning API
    description: Aggregate-only Relay API for voucher market sizing with minimum cell and geography controls.
    endpoint_url: http://agri-registry-relay:8080
    endpoint_description: http://agri-registry-relay:8080/openapi.json
    serves_datasets:
      - agricultural_registry
    conforms_to: https://spec.openapis.org/oas/v3.1.0
forms:
  - id: health_linked_child_support_form
    iri: https://demo.example.gov/forms/health-linked-child-support/v1
    title: Health-linked child support application form
    description: Form used to start the health-linked child support review.
    service: health_linked_child_support
    channel: health_linked_child_support_online
    validates_with:
      json_schema: http://static-metadata-publisher:8080/metadata/forms/health_linked_child_support_form/schema.json
      shacl: http://static-metadata-publisher:8080/metadata/forms/health_linked_child_support_form/shacl
    sections:
      - id: applicant
        title: Applicant
        min_occurs: 1
        max_occurs: 1
        fields:
          - id: applicant_national_id
            name: applicantNationalId
            label: Applicant national ID
            widget_type: text
            data_type: xsd:string
            concept: https://demo.example.gov/concepts/national-id
            supports_requirement: child_identity_requirement
            required: true
            min_occurs: 1
            max_occurs: 1
            fulfillment:
              modes:
                - manual_input
                - registry_lookup
              preferred_mode: registry_lookup
      - id: children
        title: Children
        repeatable: true
        min_occurs: 1
        fields:
          - id: child_national_id
            name: childNationalId
            label: Child national ID
            widget_type: text
            data_type: xsd:string
            concept: https://demo.example.gov/concepts/national-id
            supports_requirement: child_identity_requirement
            required: true
            min_occurs: 1
            max_occurs: 1
      - id: health_linked
        title: Health service context
        visible_when:
          field: supportType
          equals: health_linked
        fields:
          - id: health_district
            name: healthDistrict
            label: Health district
            widget_type: text
            data_type: xsd:string
            concept: https://demo.example.gov/concepts/health-district
            supports_requirement: health_linked_support_requirement
            required: true
            fulfillment:
              modes:
                - registry_lookup
                - known_from_context
              preferred_mode: registry_lookup
    fields:
      - id: support_type
        name: supportType
        label: Support type
        widget_type: select
        data_type: xsd:string
        concept: https://demo.example.gov/concepts/support-type
        required: true
        fulfillment:
          modes:
            - manual_input
          preferred_mode: manual_input
datasets:
  - id: civil_registry
    title: Civil Registry
    description: Static description of the simulated civil registry authority.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    public_services:
      - id: https://demo.example.gov/services/civil-registry-service
        title: Civil registry service
        description: Service responsible for maintaining civil registration data.
    evidence_offerings:
      - id: civil_child_status_evidence_service
        iri: https://demo.example.gov/evidence-offerings/civil-child-status
        title: Civil vital status evidence service
        evidence_type: civil_child_status_evidence
        issuing_authority:
          id: civil_registration_authority
          iri: did:web:civil-registry.demo.example.gov
          name: Civil Registration Authority
          country: ZZ
        jurisdiction:
          country: ZZ
        level_of_assurance: substantial
        entity: civil_person
        lookup_keys:
          - national_id
        procedure_contexts:
          - health_linked_child_support
        access:
          kind: registry-notary
          conforms_to: registry-notary-federation/v0.1
          endpoint_url: https://metadata.lab.registrystack.org/local-only/civil-notary
          discovery_url: https://metadata.lab.registrystack.org/local-only/civil-notary/.well-known/evidence-service
          ruleset: civil-child-status-v1
        policy:
          purpose:
            - https://demo.example.gov/purpose/child-support-eligibility
            - https://demo.example.gov/purpose/decentralized-evidence-demo
    entities:
      - name: civil_person
        title: Civil Person
        identifiers:
          - name: national_id
            kind: primary
        fields:
          - name: national_id
            type: string
            required: true
          - name: birth_date
            type: date
            required: true
          - name: life_stage
            type: string
            required: true
          - name: deceased
            type: boolean
            required: true
          - name: district
            type: string
            required: true
  - id: social_protection_registry
    title: Social Protection Registry
    description: Static description of the simulated social protection registry authority.
    owner: Social Protection Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    public_services:
      - id: https://demo.example.gov/services/social-protection-registry-service
        title: Social protection registry service
        description: Service responsible for maintaining social protection registry data.
    evidence_offerings:
      - id: household_support_evidence_service
        iri: https://demo.example.gov/evidence-offerings/household-support
        title: Household support evidence service
        evidence_type: household_support_evidence
        issuing_authority:
          id: social_protection_authority
          iri: did:web:social-protection.demo.example.gov
          name: Social Protection Authority
          country: ZZ
        jurisdiction:
          country: ZZ
        level_of_assurance: substantial
        entity: program_enrollment
        lookup_keys:
          - national_id
        procedure_contexts:
          - health_linked_child_support
        access:
          kind: registry-notary
          conforms_to: registry-notary-federation/v0.1
          endpoint_url: https://metadata.lab.registrystack.org/local-only/social-protection-notary
          discovery_url: https://metadata.lab.registrystack.org/local-only/social-protection-notary/.well-known/evidence-service
          ruleset: program-enrollment-status-v1
        policy:
