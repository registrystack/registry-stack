# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080

auth:
  mode: api_key
  api_keys:
    - id: civil_evidence_client
      hash_env: CIVIL_EVIDENCE_CLIENT_TOKEN_HASH
      scopes:
        - civil_registry:evidence_verification
  bearer_tokens:
    - id: civil_evidence_client
      hash_env: CIVIL_EVIDENCE_CLIENT_BEARER_HASH
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: stdout
  hash_secret_env: REGISTRY_WITNESS_AUDIT_HASH_SECRET

federation:
  enabled: true
  node_id: did:web:civil-witness.demo.example.gov
  issuer: https://civil-witness.demo.example.gov
  jwks_uri: https://civil-witness.demo.example.gov/federation/jwks.json
  federation_api: https://civil-witness.demo.example.gov/federation/v1
  supported_protocol_versions:
    - registry-witness-federation/v0.1
  signing:
    kid: did:web:civil-witness.demo.example.gov#federation-response-1
    key_env: CIVIL_FEDERATION_RESPONSE_JWK
    alg: EdDSA
  pairwise_subject_hash:
    secret_env: CIVIL_FEDERATION_PAIRWISE_SUBJECT_HASH_SECRET
  response_shaping:
    minimum_denial_latency_ms: 250
  peers:
    - node_id: did:web:benefits.demo.example.gov
      issuer: https://benefits.demo.example.gov
      jwks_uri: http://static-metadata-publisher:8080/federation/default-benefits-jwks.json
      allow_insecure_private_network: true
      allowed_protocol_versions:
        - registry-witness-federation/v0.1
      allowed_purposes:
        - https://demo.example.gov/purpose/decentralized-evidence-demo
      allowed_profiles:
        - civil_age_band_value
        - civil_alive_predicate
      source_scopes:
        - civil_registry:evidence_verification
  evaluation_profiles:
    - id: civil_age_band_value
      ruleset: civil-age-band-v1
      claim_id: age-band
      subject_id_type: national_id
      disclosure: value
      max_source_observed_age_seconds: 86400
    - id: civil_alive_predicate
      ruleset: person-is-alive-v1
      claim_id: person-is-alive
      subject_id_type: national_id
      disclosure: predicate
      max_source_observed_age_seconds: 86400

evidence:
  enabled: true
  service_id: civil-witness
  api_base_url: http://civil-witness:8080
  inline_batch_limit: 20
  source_connections:
    civil:
      base_url: http://civil-registry-relay:8080
      allow_insecure_private_network: true
      token_env: CIVIL_EVIDENCE_SOURCE_RAW
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          national_id: /person/national_id
          birth_date: /person/birth_date
          civil_status: /person/civil_status
          deceased: /person/deceased
  credential_profiles:
    civil_status_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:civil-evidence.demo.example
      issuer_key_env: REGISTRY_WITNESS_ISSUER_JWK
      issuer_kid: did:web:civil-evidence.demo.example#civil-evidence-demo-key-1
      vct: https://demo.example/credentials/civil-status/v1
      validity_seconds: 86400
      allowed_claims:
        - date-of-birth
        - civil-status
        - age-band
        - person-is-alive
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - value
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: civil
        field: birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - civil_status_sd_jwt
    - id: civil-status
      title: Civil status
      version: 2026-05
      subject_type: person
      value:
        type: string
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            civil_status:
              field: civil_status
              type: string
              required: true
      rule:
        type: extract
        source: civil
        field: civil_status
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - civil_status_sd_jwt
    - id: age-band
      title: Age band
      version: 2026-05
      subject_type: person
      value:
        type: string
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: cel
        expression: "date_age_on(source.civil.birth_date, vars.as_of_date) < 18 ? 'child' : (date_age_on(source.civil.birth_date, vars.as_of_date) >= 65 ? 'elderly' : 'adult')"
        bindings:
          vars:
            as_of_date: "2026-05-27"
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - civil_status_sd_jwt
    - id: person-is-alive
      title: Person is alive
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: civil_child_status_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/civil-child-status
      credential_profiles:
        - civil_status_sd_jwt
