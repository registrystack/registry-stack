# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080

auth:
  api_keys:
    - id: shared_evidence_client
      token_env: SHARED_EVIDENCE_CLIENT_TOKEN
      scopes:
        - civil_registry:evidence_verification
        - social_protection_registry:evidence_verification
        - health_registry:evidence_verification
  bearer_tokens:
    - id: shared_evidence_client
      token_env: SHARED_EVIDENCE_CLIENT_BEARER
      scopes:
        - civil_registry:evidence_verification
        - social_protection_registry:evidence_verification
        - health_registry:evidence_verification

audit:
  sink: stdout

evidence:
  enabled: true
  service_id: shared-eligibility-witness
  api_base_url: http://shared-eligibility-witness:8080
  inline_batch_limit: 20
  source_connections:
    civil:
      base_url: http://civil-registry-relay:8080
      token_env: SHARED_CIVIL_EVIDENCE_SOURCE_RAW
    social_protection:
      base_url: http://social-protection-registry-relay:8080
      token_env: SHARED_SOCIAL_EVIDENCE_SOURCE_RAW
    health:
      base_url: http://health-registry-relay:8080
      token_env: SHARED_HEALTH_EVIDENCE_SOURCE_RAW
  credential_profiles:
    combined_support_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:shared-eligibility-evidence.demo.example
      issuer_key_env: REGISTRY_WITNESS_ISSUER_JWK
      issuer_kid: did:web:shared-eligibility-evidence.demo.example#shared-eligibility-evidence-demo-key-1
      vct: https://demo.example/credentials/combined-support-eligibility/v1
      validity_seconds: 86400
      allowed_claims:
        - civil-record-present
        - social-program-active
        - health-service-available
        - eligible-for-combined-support
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - predicate
  claims:
    - id: civil-record-present
      title: Civil record present
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: registry_data_api
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            national_id:
              field: national_id
              type: string
              required: true
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.national_id == ctx.subject.id && source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
    - id: social-program-active
      title: Social program active
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        enrollment:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: program_enrollment
          lookup:
            input: subject_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            enrollment_status:
              field: enrollment_status
              type: string
              required: true
      rule:
        type: cel
        expression: "source.enrollment.enrollment_status == 'active'"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
    - id: health-service-available
      title: Health service available
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        facility:
          connector: registry_data_api
          connection: health
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: health_facility
          lookup:
            input: subject_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            license_status:
              field: license_status
              type: string
              required: true
            pediatric_service_available:
              field: pediatric_service_available
              type: boolean
              required: true
            practitioner_credential_active:
              field: practitioner_credential_active
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.facility.license_status == 'active' && source.facility.pediatric_service_available == true && source.facility.practitioner_credential_active == true"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
    - id: eligible-for-combined-support
      title: Eligible for combined support
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      depends_on:
        - civil-record-present
        - social-program-active
        - health-service-available
      rule:
        type: cel
        expression: "claims.civil_record_present.satisfied && claims.social_program_active.satisfied && claims.health_service_available.satisfied"
        bindings:
          claims:
            civil_record_present:
              claim: civil-record-present
            social_program_active:
              claim: social-program-active
            health_service_available:
              claim: health-service-available
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 10
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-witness.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - combined_support_sd_jwt
