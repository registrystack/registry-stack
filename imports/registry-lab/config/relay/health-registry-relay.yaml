# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  manifest_path: health-registry-relay.metadata.yaml

catalog:
  title: Health Registry Relay (Decentralized Demo)
  base_url: http://health-registry-relay:8080
  publisher: Health Services Authority (Demo)
  participant_id: did:web:health-registry.demo.example.gov

vocabularies:
  demo: https://demo.example.gov/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: HEALTH_METADATA_CLIENT_HASH
        commitment: sha256:a69075c9fb52a2da5955c1c9baadf6f9062827dd328c7ab1d66ba27c82e99fe0
      scopes:
        - health_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:a45c7d19209177d9e707826c87e438ea2510d0b2c43e141cc987a5fd68b74966
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_ONLY_HASH
        commitment: sha256:4318ea5e99439d687551f6a0e98642905ce1523203e2f6cb04cbbe30b8859eac
      scopes:
        - health_registry:metadata
        - health_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: HEALTH_ROW_READER_HASH
        commitment: sha256:c4385c09795102e8ba0e2a58f799791f82a4a5cc90e75a4f4f865664779a3a8e
      scopes:
        - health_registry:metadata
        - health_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:eb0caa4f5917cb8126b6dcf1bd6da1af2fc4e85d10e2238046440b8714b124ee
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: health_registry
    title: Health Facility Registry
    description: Synthetic facility licensing and service availability records for decentralized evidence demo flows.
    owner: Health Services Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    conforms_to:
      - demo:HealthFacilityRegistry
    defaults:
      refresh:
        mode: manual
    tables:
      - id: facilities_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/health/health-facilities.parquet
          format:
            parquet: {}
        primary_key: facility_id
        schema:
          strict: true
          fields:
            - name: facility_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: facility_name
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: license_status
              type: string
              nullable: false
            - name: maternal_service_available
              type: boolean
              nullable: false
            - name: pediatric_service_available
              type: boolean
              nullable: false
            - name: practitioner_credential_active
              type: boolean
              nullable: false
            - name: updated_on
              type: date
              nullable: false
    entities:
      - name: health_facility
        title: Health Facility
        description: Facility service and license projection for eligibility evidence.
        table: facilities_table
        concept_uri: demo:HealthFacility
        fields:
          - name: id
            from: facility_id
          - name: national_id
          - name: facility_name
          - name: district
          - name: license_status
          - name: maternal_service_available
          - name: pediatric_service_available
          - name: practitioner_credential_active
          - name: updated_on
        access:
          metadata_scope: health_registry:metadata
          aggregate_scope: health_registry:aggregate
          read_scope: health_registry:rows
          evidence_verification_scope: health_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: license_status
              ops: [eq, in]
            - field: maternal_service_available
              ops: [eq]
            - field: pediatric_service_available
              ops: [eq]
            - field: practitioner_credential_active
              ops: [eq]
