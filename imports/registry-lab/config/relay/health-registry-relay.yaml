# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/health-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: health-registry-relay.metadata.yaml
    digest: sha256:16803b10f6453aa13d1c8cbcf132aad9285fe838e025e73833708ce97c7426df
  ecosystem_binding:
    id: baseline-dpi/v1
    version: v1

catalog:
  title: Health Registry Relay (Decentralized Demo)
  base_url: http://health-registry-relay:8080
  publisher: Health Services Authority (Demo)
  participant_id: did:web:health-registry.demo.example.gov

vocabularies:
  demo: https://demo.example.gov/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: HEALTH_METADATA_CLIENT_HASH
        commitment: sha256:6ce93bfaf95801294eb7df1449615604eb0262becb35deb6987105f67e13522b
      scopes:
        - health_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:76940f407141f4ccc09b39212f205ad62c24b05c3f36ccddc1a79e9ad7a3fd1e
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: HEALTH_EVIDENCE_ONLY_HASH
        commitment: sha256:521ae93b6964281ac99843451147595399bc9c3b72de239cd6145a3db97293e5
      scopes:
        - health_registry:metadata
        - health_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: HEALTH_ROW_READER_HASH
        commitment: sha256:deae6d01fd7355591c02efe8ba0c420c2573168c160ee80d990cb4e1fa843714
      scopes:
        - health_registry:metadata
        - health_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_HEALTH_EVIDENCE_SOURCE_HASH
        commitment: sha256:f295eaa20abfcfd56942fc414fbda5935c6504fba4caaabcaa0df0b0c28db5b8
      scopes:
        - health_registry:metadata
        - health_registry:rows
        - health_registry:evidence_verification

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: health_registry
    title: Applicant Service Availability Projection
    description: Synthetic applicant service-availability records derived from facility licensing data for decentralized evidence demo flows.
    owner: Health Services Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    conforms_to:
      - demo:HealthFacilityRegistry
    defaults:
      refresh:
        mode: manual
    tables:
      - id: facilities_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/health/health-facilities.parquet
          format:
            parquet: {}
        primary_key: facility_id
        schema:
          strict: true
          fields:
            - name: facility_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: facility_name
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: license_status
              type: string
              nullable: false
            - name: maternal_service_available
              type: boolean
              nullable: false
            - name: pediatric_service_available
              type: boolean
              nullable: false
            - name: practitioner_credential_active
              type: boolean
              nullable: false
            - name: updated_on
              type: date
              nullable: false
            - name: observed_at
              type: string
              nullable: true
    entities:
      - name: health_facility
        title: Applicant Service Availability
        description: Applicant-district service availability projection for eligibility evidence.
        table: facilities_table
        concept_uri: demo:HealthFacility
        fields:
          - name: id
            from: facility_id
          - name: national_id
          - name: facility_name
          - name: district
          - name: license_status
          - name: maternal_service_available
          - name: pediatric_service_available
          - name: practitioner_credential_active
          - name: updated_on
          - name: observed_at
        access:
          metadata_scope: health_registry:metadata
          aggregate_scope: health_registry:aggregate
          read_scope: health_registry:rows
          evidence_verification_scope: health_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: license_status
              ops: [eq, in]
            - field: maternal_service_available
              ops: [eq]
            - field: pediatric_service_available
              ops: [eq]
            - field: practitioner_credential_active
              ops: [eq]
