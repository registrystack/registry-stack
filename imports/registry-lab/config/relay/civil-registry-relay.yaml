# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  admin_bind: 0.0.0.0:8081
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/civil-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/civil-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: civil-registry-relay.metadata.yaml
    digest: sha256:7da192405ff29422fdee0412a2c98cffe891216ca2267959928969efb8db182c
  ecosystem_binding:
    id: baseline-dpi/v1
    version: v1

catalog:
  title: Civil Registry Relay (Decentralized Demo)
  base_url: http://civil-registry-relay:8080
  publisher: Civil Registration Authority (Demo)
  participant_id: did:web:civil-registry.demo.example.gov

vocabularies:
  demo: https://demo.example.gov/vocab/
  spdci: https://schema.spdci.org/

auth:
  mode: api_key
  api_keys:
    - id: civil_relay_ops
      fingerprint:
        provider: env
        name: CIVIL_RELAY_OPS_HASH
        commitment: sha256:6526561c7bdb8a82d7a58d7c3fb0d341e4767dcb7353ceb9bb1c1b42499bb65b
      scopes:
        - registry_relay:ops_read
        - registry_relay:metrics_read
    - id: metadata_client
      fingerprint:
        provider: env
        name: CIVIL_METADATA_CLIENT_HASH
        commitment: sha256:a2bc4bc9a59b1b5eaee28603e00022fb32064d5582326ca77ede5fa2d0f9b0c3
      scopes:
        - civil_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_SOURCE_HASH
        commitment: sha256:4228f1ea488b7dcb96be5a6aeb2896b90a3f2066edf5de363333962fb828c7ae
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_ONLY_HASH
        commitment: sha256:42dbb952df176a24dd2f4c1a8a4938d25beb63729e13f66e3a2a2bceaf2ab80b
      scopes:
        - civil_registry:metadata
        - civil_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: CIVIL_ROW_READER_HASH
        commitment: sha256:615fabddf76af2fe12739e48e8c465c4ac131b877a28e58783b132008c8350cd
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_CIVIL_EVIDENCE_SOURCE_HASH
        commitment: sha256:02607bf99256d8cad1e96de49ff6fd47d3b0e12543141c8bcaa2286111880c19
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:evidence_verification

standards:
  spdci:
    registries:
      crvs:
        dataset: civil_registry
        entity: civil_person
        registry_type: ns:org:RegistryType:CRVS
        record_type: spdci-extensions-crvs:Person
        identifiers:
          NATIONAL_ID: national_id
          UIN: national_id
          NIN: national_id
        expression_fields:
          given_name: given_name
          surname: surname
          birth_date: birth_date
          life_stage: life_stage
          deceased: deceased
          district: district
        response_fields:
          person.national_id: national_id
          person.given_name: given_name
          person.surname: surname
          person.birth_date: birth_date
          person.life_stage: life_stage
          person.deceased: deceased
          person.district: district

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: civil_registry
    title: Civil Registry
    description: Synthetic life stage records for decentralized evidence demo flows.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    conforms_to:
      - spdci:extensions/crvs/v1/Person
    defaults:
      refresh:
        mode: manual
    tables:
      - id: civil_persons_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/civil-persons.csv
          format:
            csv:
              header_row: 1
        primary_key: national_id
        schema:
          strict: true
          fields:
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: given_name
              type: string
              nullable: false
              sensitive: true
            - name: surname
              type: string
              nullable: false
              sensitive: true
            - name: birth_date
              type: date
              nullable: false
            - name: life_stage
              type: string
              nullable: false
            - name: deceased
              type: boolean
              nullable: false
            - name: district
              type: string
              nullable: false
      - id: civil_person_details_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/civil-person-details.csv
          format:
            csv:
              header_row: 1
        primary_key: person_id
        schema:
          strict: true
          fields:
            - name: person_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: given_name
              type: string
              nullable: false
              sensitive: true
            - name: surname
              type: string
              nullable: false
              sensitive: true
            - name: birth_date
              type: date
              nullable: false
            - name: sex
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: place_of_birth
              type: string
              nullable: false
            - name: life_stage
              type: string
              nullable: false
            - name: deceased
              type: boolean
              nullable: false
            - name: death_date
              type: date
              nullable: true
      - id: civil_identifiers_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/civil-identifiers.csv
          format:
            csv:
              header_row: 1
        primary_key: identifier_id
        schema:
          strict: true
          fields:
            - name: identifier_id
              type: string
              nullable: false
            - name: person_id
              type: string
              nullable: false
            - name: scheme
              type: string
              nullable: false
            - name: value
              type: string
              nullable: false
              sensitive: true
            - name: status
              type: string
              nullable: false
            - name: issued_on
              type: date
              nullable: false
            - name: valid_until
              type: date
              nullable: true
      - id: birth_events_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/birth-events.csv
          format:
            csv:
              header_row: 1
        primary_key: event_id
        schema:
          strict: true
          fields:
            - name: event_id
              type: string
              nullable: false
            - name: child_person_id
              type: string
              nullable: false
            - name: mother_person_id
              type: string
              nullable: true
            - name: father_person_id
              type: string
              nullable: true
            - name: place_of_birth
              type: string
              nullable: false
            - name: date_of_birth
              type: date
              nullable: false
            - name: sex_at_birth
              type: string
              nullable: false
            - name: attendant_or_place_type
              type: string
              nullable: false
      - id: death_events_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/death-events.csv
          format:
            csv:
              header_row: 1
        primary_key: event_id
        schema:
          strict: true
          fields:
            - name: event_id
              type: string
              nullable: false
            - name: deceased_person_id
              type: string
              nullable: false
            - name: date_of_death
              type: date
              nullable: false
            - name: place_of_death
              type: string
              nullable: false
            - name: registration_date
              type: date
              nullable: false
            - name: authority
              type: string
              nullable: false
      - id: civil_status_records_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/civil-status-records.csv
          format:
            csv:
              header_row: 1
        primary_key: record_id
        schema:
          strict: true
          fields:
            - name: record_id
              type: string
              nullable: false
            - name: record_type
              type: string
              nullable: false
            - name: registration_number
              type: string
              nullable: false
            - name: person_id
              type: string
              nullable: false
            - name: event_id
              type: string
              nullable: false
            - name: authority
              type: string
              nullable: false
            - name: registration_status
              type: string
              nullable: false
            - name: registration_date
              type: date
              nullable: false
      - id: certificates_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/certificates.csv
          format:
            csv:
              header_row: 1
        primary_key: certificate_number
        schema:
          strict: true
          fields:
            - name: certificate_number
              type: string
              nullable: false
            - name: record_id
              type: string
              nullable: false
            - name: issue_date
              type: date
              nullable: false
            - name: issuing_office
              type: string
              nullable: false
            - name: certificate_type
              type: string
              nullable: false
            - name: valid_until
              type: date
              nullable: true
      - id: relationships_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/relationships.csv
          format:
            csv:
              header_row: 1
        primary_key: relationship_id
        schema:
          strict: true
          fields:
            - name: relationship_id
              type: string
              nullable: false
            - name: subject_person_id
              type: string
              nullable: false
            - name: related_person_id
              type: string
              nullable: false
            - name: relationship_type
              type: string
              nullable: false
            - name: source_record_id
              type: string
              nullable: false
            - name: effective_from
              type: date
              nullable: false
            - name: effective_until
              type: date
              nullable: true
            - name: relationship_status
              type: string
              nullable: false
    entities:
      - name: civil_person
        title: Civil Person
        description: Person-level life stage projection for evidence computation.
        table: civil_persons_table
        concept_uri: spdci:extensions/crvs/v1/Person
        fields:
          - name: national_id
          - name: given_name
          - name: surname
          - name: birth_date
          - name: life_stage
          - name: deceased
          - name: district
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: national_id
              ops: [eq, in]
            - field: given_name
              ops: [eq]
            - field: surname
              ops: [eq]
            - field: birth_date
              ops: [eq, gte, lte]
            - field: life_stage
              ops: [eq, in]
            - field: deceased
              ops: [eq]
            - field: district
              ops: [eq, in]
      - name: civil_person_detail
        title: Civil Person Detail
        description: Event-linked person detail for identity and record matching demonstrations.
        table: civil_person_details_table
        concept_uri: demo:Person
        fields:
          - name: id
            from: person_id
          - name: national_id
          - name: given_name
          - name: surname
          - name: birth_date
          - name: sex
          - name: district
          - name: place_of_birth
          - name: life_stage
          - name: deceased
          - name: death_date
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: given_name
              ops: [eq]
            - field: surname
              ops: [eq]
            - field: birth_date
              ops: [eq, gte, lte]
            - field: place_of_birth
              ops: [eq]
            - field: deceased
              ops: [eq]
      - name: civil_identifier
        title: Civil Identifier
        description: Identifier records linked to civil persons.
        table: civil_identifiers_table
        concept_uri: demo:Identifier
        fields:
          - name: id
            from: identifier_id
          - name: person_id
          - name: scheme
          - name: value
          - name: status
          - name: issued_on
          - name: valid_until
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: person_id
              ops: [eq, in]
            - field: scheme
              ops: [eq, in]
            - field: value
              ops: [eq]
            - field: status
              ops: [eq]
      - name: birth_event
        title: Birth Event
        description: Registered birth event source record.
        table: birth_events_table
        concept_uri: demo:Birth
        fields:
          - name: id
            from: event_id
          - name: child_person_id
          - name: mother_person_id
          - name: father_person_id
          - name: place_of_birth
          - name: date_of_birth
          - name: sex_at_birth
          - name: attendant_or_place_type
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: child_person_id
              ops: [eq, in]
            - field: mother_person_id
              ops: [eq, in]
            - field: father_person_id
              ops: [eq, in]
            - field: date_of_birth
              ops: [eq, gte, lte]
            - field: place_of_birth
              ops: [eq]
      - name: death_event
        title: Death Event
        description: Registered death event source record.
        table: death_events_table
        concept_uri: demo:Death
        fields:
          - name: id
            from: event_id
          - name: deceased_person_id
          - name: date_of_death
          - name: place_of_death
          - name: registration_date
          - name: authority
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: deceased_person_id
              ops: [eq, in]
            - field: date_of_death
              ops: [eq, gte, lte]
      - name: civil_status_record
        title: Civil Status Record
        description: Registered civil status record linking a person to an event.
        table: civil_status_records_table
        concept_uri: demo:CivilStatusRecord
        fields:
          - name: id
            from: record_id
          - name: record_type
          - name: registration_number
          - name: person_id
          - name: event_id
          - name: authority
          - name: registration_status
          - name: registration_date
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: record_type
              ops: [eq, in]
            - field: registration_number
              ops: [eq]
            - field: person_id
              ops: [eq, in]
            - field: registration_status
              ops: [eq, in]
      - name: certificate
        title: Certificate
        description: Birth or death certificate issued from a civil status record.
        table: certificates_table
        concept_uri: demo:Certificate
        fields:
          - name: id
            from: certificate_number
          - name: record_id
          - name: issue_date
          - name: issuing_office
          - name: certificate_type
          - name: valid_until
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: record_id
              ops: [eq, in]
            - field: certificate_type
              ops: [eq, in]
      - name: relationship
        title: Relationship
        description: Family relationship established from a civil status record.
        table: relationships_table
        concept_uri: demo:Relationship
        fields:
          - name: id
            from: relationship_id
          - name: subject_person_id
          - name: related_person_id
          - name: relationship_type
          - name: source_record_id
          - name: effective_from
          - name: effective_until
          - name: relationship_status
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: subject_person_id
              ops: [eq, in]
            - field: related_person_id
              ops: [eq, in]
            - field: relationship_type
              ops: [eq, in]
            - field: relationship_status
              ops: [eq, in]
