# SPDX-License-Identifier: Apache-2.0

schema_version: registry-manifest/v1
catalog:
  id: decentralized-civil-registry
  base_url: http://civil-registry-relay:8080
  title: Civil Registry Relay (Decentralized Demo)
  publisher:
    name: Civil Registration Authority (Demo)
  standards:
    dcat: '3.0'
    shacl: '1.1'
    json_schema: 2020-12
  application_profiles:
    - id: bregdcat-ap
      version: '3.0'
federation:
  node_id: did:web:civil-registry.demo.example.gov
  issuer: https://civil-registry.demo.example.gov
  jwks_uri: https://civil-registry.demo.example.gov/.well-known/jwks.json
  federation_api: https://civil-registry.demo.example.gov/federation
  supported_protocol_versions:
    - registry-notary-federation/v0.1
evaluation_profiles:
  - id: civil-child-status-v1
    ruleset: civil-child-status-v1
    claim_id: civil_child_status
    subject_id_type: id
    max_source_observed_age_seconds: 86400
ecosystem_bindings:
  - id: baseline-dpi/v1
    version: v1
    profile: baseline-dpi
    type: governed-evidence
    evidence_pack:
      policy_id: demo.civil-row-purpose.v1
      policy_hash: sha256:f7f3b78717b70a4e8463a4601bc36272a5c3a50912347139d187de2e4a520cd0
      odrl_enforcement:
        profile: registry-evidence-gateway-pdp/v1
        constraint_terms:
          - odrl:purpose
requirements:
  - id: child_identity_requirement
    iri: https://demo.example.gov/requirements/child-identity-and-alive
    title: Child identity and alive-status requirement
    description: Requirement to confirm birth date and alive status for a child support decision.
evidence_types:
  - id: civil_child_status_evidence
    iri: https://demo.example.gov/evidence-types/civil-child-status
    title: Civil child status evidence
    description: Evidence that a submitted child identifier resolves to a civil registry record with birth date and alive status.
    proves:
      - child_identity_requirement
datasets:
  - id: civil_registry
    title: Civil Registry
    description: Synthetic life stage records for decentralized evidence demo flows.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    conforms_to:
      - spdci:extensions/crvs/v1/Person
    policy:
      uid: https://demo.example.gov/policies/civil-row-purpose
      assigner: did:web:civil-registry.demo.example.gov
      permissions:
        - action: odrl:use
          constraints:
            - left_operand: odrl:purpose
              operator: odrl:isA
              right_operand:
                iri: https://demo.example.gov/purpose/decentralized-evidence-demo
    evidence_offerings:
      - id: civil_child_status_evidence_service
        iri: https://demo.example.gov/evidence-offerings/civil-child-status
        title: Civil vital status evidence service
        description: Evidence Server endpoint that computes birth date and alive status from the civil registry.
        evidence_type: civil_child_status_evidence
        issuing_authority:
          id: civil_registration_authority
          iri: did:web:civil-registry.demo.example.gov
          name: Civil Registration Authority
          country: ZZ
        jurisdiction:
          country: ZZ
        level_of_assurance: substantial
        entity: civil_person
        lookup_keys:
          - national_id
        access:
          kind: registry-notary
          conforms_to: registry-notary-federation/v0.1
          endpoint_url: https://civil-notary:8080
          discovery_url: https://civil-notary:8080/.well-known/evidence-service
          ruleset: civil-child-status-v1
        policy:
          purpose:
            - https://demo.example.gov/purpose/child-support-eligibility
    entities:
      - name: civil_person
        title: Civil Person
        description: Person-level life stage projection for evidence computation.
        concept_uri: spdci:extensions/crvs/v1/Person
        identifiers:
          - name: national_id
            kind: primary
        fields:
          - name: national_id
            type: string
            required: true
          - name: given_name
            type: string
            required: true
          - name: surname
            type: string
            required: true
          - name: birth_date
            type: date
            required: true
          - name: life_stage
            type: string
            required: true
          - name: deceased
            type: boolean
            required: true
          - name: district
            type: string
            required: true
          - name: observed_at
            type: string
            required: true
      - name: civil_person_detail
        title: Civil Person Detail
        description: Event-linked person detail for identity and record matching demonstrations.
        concept_uri: demo:Person
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: national_id
            type: string
            required: true
          - name: given_name
            type: string
            required: true
          - name: surname
            type: string
            required: true
          - name: birth_date
            type: date
            required: true
          - name: sex
            type: string
            required: true
          - name: district
            type: string
            required: true
          - name: place_of_birth
            type: string
            required: true
          - name: life_stage
            type: string
            required: true
          - name: deceased
            type: boolean
            required: true
          - name: death_date
            type: date
            required: false
      - name: civil_identifier
        title: Civil Identifier
        description: Identifier records linked to civil persons.
        concept_uri: demo:Identifier
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: person_id
            type: string
            required: true
          - name: scheme
            type: string
            required: true
          - name: value
            type: string
            required: true
          - name: status
            type: string
            required: true
          - name: issued_on
            type: date
            required: true
          - name: valid_until
            type: date
            required: false
      - name: birth_event
        title: Birth Event
        description: Registered birth event source record.
        concept_uri: demo:Birth
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: child_person_id
            type: string
            required: true
          - name: mother_person_id
            type: string
            required: false
          - name: father_person_id
            type: string
            required: false
          - name: place_of_birth
            type: string
            required: true
          - name: date_of_birth
            type: date
            required: true
          - name: sex_at_birth
            type: string
            required: true
          - name: attendant_or_place_type
            type: string
            required: true
      - name: death_event
        title: Death Event
        description: Registered death event source record.
        concept_uri: demo:Death
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: deceased_person_id
            type: string
            required: true
          - name: date_of_death
            type: date
            required: true
          - name: place_of_death
            type: string
            required: true
          - name: registration_date
            type: date
            required: true
          - name: authority
            type: string
            required: true
      - name: civil_status_record
        title: Civil Status Record
        description: Registered civil status record linking a person to an event.
        concept_uri: demo:CivilStatusRecord
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: record_type
            type: string
            required: true
          - name: registration_number
            type: string
            required: true
          - name: person_id
            type: string
            required: true
          - name: event_id
            type: string
            required: true
          - name: authority
            type: string
            required: true
          - name: registration_status
            type: string
            required: true
          - name: registration_date
            type: date
            required: true
      - name: certificate
        title: Certificate
        description: Birth or death certificate issued from a civil status record.
        concept_uri: demo:Certificate
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: record_id
            type: string
            required: true
          - name: certificate_type
            type: string
            required: true
          - name: issue_date
            type: date
            required: true
          - name: issuing_office
            type: string
            required: true
          - name: valid_until
            type: date
            required: false
      - name: relationship
        title: Relationship
        description: Family relationship established from a civil status record.
        concept_uri: demo:Relationship
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: subject_person_id
            type: string
            required: true
          - name: related_person_id
            type: string
            required: true
          - name: relationship_type
            type: string
            required: true
          - name: source_record_id
            type: string
            required: true
          - name: effective_from
            type: date
            required: true
          - name: effective_until
            type: date
            required: false
          - name: relationship_status
            type: string
            required: true
vocabularies:
  demo: https://demo.example.gov/vocab/
  spdci: https://schema.spdci.org/
  registry_relay: https://registry-relay.dev/
