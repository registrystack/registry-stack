# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

auth:
  mode: api_key
  api_keys:
    - id: opencrvs_dci_lab_client
      fingerprint:
        provider: env
        name: OPENCRVS_EVIDENCE_CLIENT_TOKEN_HASH
        commitment: sha256:2c52fa6538e9e22cd55066cb007ea73592efb09b9e9d71f97b5d851b9a6d6149
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

config_trust:
  antirollback_state_path: /var/lib/registry-notary/config-state/opencrvs-dci-notary-config-antirollback.json
  local_approval_state_path: /var/lib/registry-notary/config-state/opencrvs-dci-notary-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

evidence:
  enabled: true
  service_id: opencrvs-dci-notary
  api_base_url: http://opencrvs-dci-notary:8080
  inline_batch_limit: 20
  source_connections:
    opencrvs_crvs:
      base_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev
      source_auth:
        type: oauth2_client_credentials
        token_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev/oauth2/client/token
        client_id_env: OPENCRVS_DCI_CLIENT_ID
        client_secret_env: OPENCRVS_DCI_CLIENT_SECRET
        request_format: json
      bulk_mode: none
      dci:
        search_path: /registry/sync/search
        sender_id: registry-notary
        query_type: idtype-value
        registry_type: ns:org:RegistryType:Civil
        registry_event_type: birth
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          child_given_name: /name/given_name
          child_family_name: /name/surname
          child_birth_date: /birth_date
          child_place_of_birth: /birth_place
    opencrvs_crvs_demographic:
      base_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev
      source_auth:
        type: oauth2_client_credentials
        token_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev/oauth2/client/token
        client_id_env: OPENCRVS_DCI_CLIENT_ID
        client_secret_env: OPENCRVS_DCI_CLIENT_SECRET
        request_format: json
      bulk_mode: none
      dci:
        search_path: /registry/sync/search
        sender_id: registry-notary
        query_type: expression
        registry_type: ns:org:RegistryType:Civil
        registry_event_type: birth
        records_path: /message/search_response/0/data/reg_records
  signing_keys:
    opencrvs-dci-demo:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:opencrvs-dci.demo.example.gov#registry-notary-demo-key-1
      status: active
  credential_profiles:
    opencrvs_birth_summary_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:opencrvs-dci.demo.example.gov
      signing_key: opencrvs-dci-demo
      vct: https://demo.example.gov/credentials/opencrvs-birth-summary/v1
      validity_seconds: 600
      allowed_claims:
        - opencrvs-birth-record-exists
        - opencrvs-date-of-birth
        - opencrvs-sex
        - opencrvs-age-band
        - opencrvs-birth-record-exists-by-demographics
      holder_binding:
        mode: none
      disclosure:
        allowed:
          - value
    opencrvs_birth_attributes_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:opencrvs-dci.demo.example.gov
      signing_key: opencrvs-dci-demo
      vct: https://demo.example.gov/credentials/opencrvs-birth-attributes/v1
      validity_seconds: 600
      allowed_claims:
        - opencrvs-child-given-name
        - opencrvs-child-family-name
        - opencrvs-child-date-of-birth
        - opencrvs-child-place-of-birth
      holder_binding:
        mode: none
      disclosure:
        allowed:
          - value
  claims:
    - id: opencrvs-birth-record-exists
      title: Birth Registration Attestation
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
      rule:
        type: exists
        source: birth_record
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
    - id: opencrvs-date-of-birth
      title: OpenCRVS date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: birth_record
        field: birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
    - id: opencrvs-sex
      title: OpenCRVS sex
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            sex:
              field: sex
              type: string
              required: true
      rule:
        type: extract
        source: birth_record
        field: sex
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
    - id: opencrvs-age-band
      title: Age Eligibility Attestation
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: cel
        expression: "date.age_on(source.birth_record.birth_date, vars.as_of_date) < 18 ? 'child' : (date.age_on(source.birth_record.birth_date, vars.as_of_date) >= 65 ? 'elderly' : 'adult')"
        bindings:
          vars:
            as_of_date: "2026-05-29"
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
    - id: opencrvs-birth-record-exists-by-demographics
      title: OpenCRVS birth record exists by demographics
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs_demographic
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.attributes.given_name
            field: given_name
            op: eq
            cardinality: one
          query_fields:
            - input: target.attributes.given_name
              field: childFirstNames
              op: eq
            - input: target.attributes.family_name
              field: childLastName
              op: eq
            - input: target.attributes.birthdate
              field: childDoB
              op: eq
          matching:
            target_type: Person
            method: configured_demographic_lookup
            sufficient_target_inputs:
              - - target.attributes.given_name
                - target.attributes.family_name
                - target.attributes.birthdate
            allowed_target_inputs:
              - target.attributes.given_name
              - target.attributes.family_name
              - target.attributes.birthdate
      rule:
        type: exists
        source: birth_record
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
    - id: opencrvs-child-given-name
      title: OpenCRVS child given name
      version: 2026-05
      subject_type: person
      value:
        type: string
      credential_profiles:
        - opencrvs_birth_attributes_sd_jwt
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            child_given_name:
              field: child_given_name
              type: string
              required: true
      rule:
        type: extract
        source: birth_record
        field: child_given_name
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
    - id: opencrvs-child-family-name
      title: OpenCRVS child family name
      version: 2026-05
      subject_type: person
      value:
        type: string
      credential_profiles:
        - opencrvs_birth_attributes_sd_jwt
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            child_family_name:
              field: child_family_name
              type: string
              required: true
      rule:
        type: extract
        source: birth_record
        field: child_family_name
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
    - id: opencrvs-child-date-of-birth
      title: OpenCRVS child date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      credential_profiles:
        - opencrvs_birth_attributes_sd_jwt
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            child_birth_date:
              field: child_birth_date
              type: date
              required: true
      rule:
        type: extract
        source: birth_record
        field: child_birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
    - id: opencrvs-child-place-of-birth
      title: OpenCRVS child place of birth
      version: 2026-05
      subject_type: person
      value:
        type: string
      credential_profiles:
        - opencrvs_birth_attributes_sd_jwt
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            child_place_of_birth:
              field: child_place_of_birth
              type: string
              required: true
      rule:
        type: extract
        source: birth_record
        field: child_place_of_birth
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
