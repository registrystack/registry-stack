        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
    - id: opencrvs-age-band
      title: Age Eligibility Attestation
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/opencrvs-dci-lab
            allowed_assurance:
              - substantial
            permitted_jurisdictions:
              - ZZ
            require_legal_basis: true
            require_consent: true
            max_source_age_seconds: 86400
            source_observed_at_field: observed_at
            ecosystem_binding:
              id: sp-dci/v1
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: cel
        expression: "date.age_on(source.birth_record.birth_date, vars.as_of_date) < 18 ? 'child' : (date.age_on(source.birth_record.birth_date, vars.as_of_date) >= 65 ? 'elderly' : 'adult')"
        bindings:
          vars:
            as_of_date: "2026-05-29"
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - opencrvs_birth_summary_sd_jwt
