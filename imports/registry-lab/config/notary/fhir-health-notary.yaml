# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

auth:
  mode: api_key
  api_keys:
    - id: fhir_health_evidence_client
      fingerprint:
        provider: env
        name: FHIR_EVIDENCE_CLIENT_TOKEN_HASH
        commitment: sha256:86da288246dedd3cfa397ae70be16c09045148eff1c7d4570394c82e3fff1782
      scopes:
        - health_registry:evidence_verification
  bearer_tokens:
    - id: fhir_health_evidence_client
      fingerprint:
        provider: env
        name: FHIR_EVIDENCE_CLIENT_BEARER_HASH
        commitment: sha256:66b60f4b3f6e0d14755b005a2ffd24e997478b662bc264c72ad6dd3452079a41
      scopes:
        - health_registry:evidence_verification

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

cel:
  worker_count: 4

evidence:
  enabled: true
  service_id: fhir-health-notary
  api_base_url: http://fhir-health-notary:8080
  inline_batch_limit: 20
  allowed_purposes:
    - https://demo.example.gov/purpose/fhir-health-navigation
  source_connections:
    fhir_sidecar:
      base_url: http://fhir-source-adapter-sidecar:8080
      allow_insecure_private_network: true
      token_env: FHIR_SIDECAR_TOKEN_RAW
      retry_on_5xx: false
      bulk_mode: source_adapter_sidecar_batch
  claims:
    - id: patient-record-exists
      title: Patient record exists
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings: &patient_binding
        patient:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: patient
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields: &patient_fields
            patient_id: { field: patient_id, type: string, required: true }
            birth_date: { field: birth_date, type: date }
            deceased: { field: deceased, type: boolean }
      rule:
        type: exists
        source: patient
      disclosure: &predicate_disclosure
        default: value
        allowed: [value]
      formats: &claim_result_formats
        - application/vnd.registry-notary.claim-result+json
    - id: age-over-18
      title: Age over 18
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        patient:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: patient
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            patient_id: { field: patient_id, type: string }
            birth_date: { field: birth_date, type: date, required: true }
            deceased: { field: deceased, type: boolean }
      rule:
        type: cel
        expression: date.age_on(source.patient.birth_date, ctx.today) >= 18
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: not-recorded-deceased
      title: Not recorded deceased
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        patient:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: patient
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            patient_id: { field: patient_id, type: string }
            birth_date: { field: birth_date, type: date }
            deceased: { field: deceased, type: boolean, required: true }
      rule:
        type: cel
        expression: source.patient.deceased == false
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: coverage-active
      title: Coverage active
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        coverage:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: coverage
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            coverage_status: { field: coverage_status, type: string, required: true }
            coverage_class: { field: coverage_class, type: string }
      rule:
        type: cel
        expression: source.coverage.coverage_status == 'active'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: coverage-eligibility-confirmed
      title: Coverage eligibility confirmed
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        eligibility:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: eligibility
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            eligibility_status: { field: eligibility_status, type: string, required: true }
            eligibility_outcome: { field: eligibility_outcome, type: string, required: true }
            service_type: { field: service_type, type: string, required: true }
      rule:
        type: cel
        expression: source.eligibility.eligibility_status == 'active' && source.eligibility.eligibility_outcome == 'complete' && source.eligibility.service_type == 'general-practice'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: enrolled-in-program
      title: Enrolled in program
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        enrollment:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: program_enrollment
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            enrollment_status: { field: enrollment_status, type: string, required: true }
            program_code: { field: program_code, type: string, required: true }
      rule:
        type: cel
        expression: source.enrollment.enrollment_status == 'active' && source.enrollment.program_code == 'tb-program'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: encounter-completed
      title: Encounter completed
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        encounter:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: encounter
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            encounter_status: { field: encounter_status, type: string, required: true }
            encounter_type: { field: encounter_type, type: string, required: true }
      rule:
        type: cel
        expression: source.encounter.encounter_status == 'finished' && source.encounter.encounter_type == 'annual-wellness'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: referral-active
      title: Referral active
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        referral:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: referral
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            referral_status: { field: referral_status, type: string, required: true }
            referral_code: { field: referral_code, type: string, required: true }
      rule:
        type: cel
        expression: source.referral.referral_status == 'active' && source.referral.referral_code == 'general-referral'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: appointment-booked
      title: Appointment booked
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        appointment:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: appointment
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            appointment_status: { field: appointment_status, type: string, required: true }
            appointment_service_type: { field: appointment_service_type, type: string, required: true }
      rule:
        type: cel
        expression: source.appointment.appointment_status == 'booked' && source.appointment.appointment_service_type == 'general-practice'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: lab-result-available
      title: Lab result available
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        lab_report:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: lab_report
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            diagnostic_report_status: { field: diagnostic_report_status, type: string, required: true }
            diagnostic_report_code: { field: diagnostic_report_code, type: string, required: true }
      rule:
        type: cel
        expression: source.lab_report.diagnostic_report_status == 'final' && source.lab_report.diagnostic_report_code == 'viral-load-panel'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: vaccination-recorded
      title: Vaccination recorded
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        immunization:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: immunization
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            immunization_status: { field: immunization_status, type: string, required: true }
            vaccine_code: { field: vaccine_code, type: string, required: true }
      rule:
        type: cel
        expression: source.immunization.immunization_status == 'completed' && source.immunization.vaccine_code == '03'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: prior-authorization-approved
      title: Prior authorization approved
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        authorization:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: prior_authorization
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            authorization_status: { field: authorization_status, type: string, required: true }
            authorization_outcome: { field: authorization_outcome, type: string, required: true }
            authorization_disposition: { field: authorization_disposition, type: string, required: true }
      rule:
        type: cel
        expression: source.authorization.authorization_status == 'active' && source.authorization.authorization_outcome == 'complete' && source.authorization.authorization_disposition == 'approved'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: source-trace-available
      title: Source trace available
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        source_trace:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: source_trace
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          fields:
            trace_id: { field: trace_id, type: string, required: true }
            trace_activity: { field: trace_activity, type: string, required: true }
      rule:
        type: cel
        expression: source.source_trace.trace_id != '' && source.source_trace.trace_activity == 'verify'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: requester-guardian-confirmed
      title: Requester guardian confirmed
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        guardian:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: guardian
          lookup:
            input: target.id
            field: national_id
            op: eq
            cardinality: one
          query_fields:
            - input: target.id
              field: national_id
              op: eq
            - input: requester.id
              field: requester_id
              op: eq
          fields:
            relationship_code: { field: relationship_code, type: string, required: true }
          matching:
            target_type: Person
            requester_type: Person
            allowed_purposes:
              - https://demo.example.gov/purpose/fhir-health-navigation
      rule:
        type: cel
        expression: source.guardian.relationship_code == 'GUARD'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: provider-affiliated-with-facility
      title: Provider affiliated with facility
      version: 2026-06
      subject_type: person
      value: { type: boolean }
      source_bindings:
        affiliation:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: provider_affiliation
          lookup:
            input: target.id
            field: provider_id
            op: eq
            cardinality: one
          fields:
            organization_ref: { field: organization_ref, type: string, required: true }
      rule:
        type: cel
        expression: source.affiliation.organization_ref == 'Organization/org-1'
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
    - id: facility-offers-service
      title: Facility offers service
      version: 2026-06
      subject_type: organization
      value: { type: boolean }
      source_bindings:
        facility_service:
          connector: source_adapter_sidecar
          connection: fhir_sidecar
          required_scope: health_registry:evidence_verification
          dataset: health_registry
          entity: facility_service
          lookup:
            input: target.id
            field: organization_id
            op: eq
            cardinality: one
          fields:
            service_active: { field: service_active, type: boolean, required: true }
      rule:
        type: cel
        expression: source.facility_service.service_active == true
      disclosure: *predicate_disclosure
      formats: *claim_result_formats
