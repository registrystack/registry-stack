# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080

auth:
  mode: api_key
  api_keys:
    - id: social_protection_evidence_client
      hash_env: SOCIAL_EVIDENCE_CLIENT_TOKEN_HASH
      scopes:
        - social_protection_registry:evidence_verification
  bearer_tokens:
    - id: social_protection_evidence_client
      hash_env: SOCIAL_EVIDENCE_CLIENT_BEARER_HASH
      scopes:
        - social_protection_registry:evidence_verification

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

federation:
  enabled: true
  node_id: did:web:social-protection-notary.demo.example.gov
  issuer: https://social-protection-notary.demo.example.gov
  jwks_uri: https://social-protection-notary.demo.example.gov/federation/jwks.json
  federation_api: https://social-protection-notary.demo.example.gov/federation/v1
  supported_protocol_versions:
    - registry-notary-federation/v0.1
  signing:
    signing_key: social-federation-response
  pairwise_subject_hash:
    secret_env: SOCIAL_FEDERATION_PAIRWISE_SUBJECT_HASH_SECRET
  response_shaping:
    minimum_denial_latency_ms: 250
  peers:
    - node_id: did:web:benefits.demo.example.gov
      issuer: https://benefits.demo.example.gov
      jwks_uri: http://static-metadata-publisher:8080/federation/default-benefits-jwks.json
      allow_insecure_private_network: true
      allowed_protocol_versions:
        - registry-notary-federation/v0.1
      allowed_purposes:
        - https://demo.example.gov/purpose/decentralized-evidence-demo
      allowed_profiles:
        - beneficiary_active_predicate
        - household_eligibility_band_value
      source_scopes:
        - social_protection_registry:evidence_verification
  evaluation_profiles:
    - id: beneficiary_active_predicate
      ruleset: beneficiary-active-v1
      claim_id: beneficiary-active
      subject_id_type: national_id
      disclosure: predicate
      max_source_observed_age_seconds: 86400
    - id: household_eligibility_band_value
      ruleset: household-eligibility-band-v1
      claim_id: household-eligibility-band
      subject_id_type: national_id
      disclosure: value
      max_source_observed_age_seconds: 86400

evidence:
  enabled: true
  service_id: social-protection-notary
  api_base_url: http://social-protection-notary:8080
  inline_batch_limit: 20
  source_connections:
    social_protection:
      base_url: http://social-protection-registry-relay:8080
      allow_insecure_private_network: true
      token_env: SOCIAL_EVIDENCE_SOURCE_RAW
  signing_keys:
    social-protection-evidence-demo:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:social-protection-evidence.demo.example#social-protection-evidence-demo-key-1
      status: active
    social-federation-response:
      provider: local_jwk_env
      private_jwk_env: SOCIAL_FEDERATION_RESPONSE_JWK
      alg: EdDSA
      kid: did:web:social-protection-notary.demo.example.gov#federation-response-1
      status: active
  credential_profiles:
    enrollment_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:social-protection-evidence.demo.example
      signing_key: social-protection-evidence-demo
      vct: https://demo.example/credentials/program-enrollment/v1
      validity_seconds: 600
      allowed_claims:
        - program-enrollment-status
        - household-eligibility-band
        - beneficiary-active
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - value
          - predicate
  claims:
    - id: program-enrollment-status
      title: Program enrollment status
      version: 2026-05
      subject_type: person
      value:
        type: string
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        enrollment:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: program_enrollment
          lookup:
            input: subject_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            enrollment_status:
              field: enrollment_status
              type: string
              required: true
      rule:
        type: extract
        source: enrollment
        field: enrollment_status
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - enrollment_sd_jwt
    - id: household-eligibility-band
      title: Household eligibility band
      version: 2026-05
      subject_type: person
      value:
        type: string
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        household:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: household
          lookup:
            input: subject_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            eligibility_band:
              field: eligibility_band
              type: string
              required: true
      rule:
        type: extract
        source: household
        field: eligibility_band
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - enrollment_sd_jwt
    - id: beneficiary-active
      title: Beneficiary active
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      depends_on:
        - program-enrollment-status
      rule:
        type: cel
        expression: "claims.program_enrollment_status.value == 'active'"
        bindings:
          claims:
            program_enrollment_status:
              claim: program-enrollment-status
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 10
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: household_support_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/household-support
      credential_profiles:
        - enrollment_sd_jwt
