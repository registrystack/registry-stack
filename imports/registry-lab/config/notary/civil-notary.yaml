# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

auth:
  mode: api_key
  api_keys:
    - id: civil_notary_ops
      fingerprint:
        provider: env
        name: CIVIL_NOTARY_OPS_TOKEN_HASH
        commitment: sha256:a21ae05ec96f1076b9110bf219ff1f4f851282a8d6c43f4ba396ac2e29f698ca
      scopes:
        - registry_notary:ops_read
        - registry_notary:metrics_read
    - id: civil_evidence_client
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_CLIENT_TOKEN_HASH
        commitment: sha256:e29ade779b522c601d9c97d33701cfa72b81cb1d96ed8494ae09ee1e6a5435fc
      scopes:
        - civil_registry:evidence_verification
  bearer_tokens:
    - id: civil_evidence_client
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_CLIENT_BEARER_HASH
        commitment: sha256:06aaa3f7d41d9b4d5f97e4fc3856b318df17e8e93268e9722abb64e4260c6148
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

replay:
  storage: redis
  redis:
    url_env: REGISTRY_NOTARY_REDIS_URL

config_trust:
  antirollback_state_path: /var/lib/registry-notary/config-state/civil-notary-config-antirollback.json
  local_approval_state_path: /var/lib/registry-notary/config-state/civil-notary-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

federation:
  enabled: true
  node_id: did:web:civil-notary.demo.example.gov
  issuer: https://civil-notary.demo.example.gov
  jwks_uri: https://civil-notary.demo.example.gov/federation/jwks.json
  federation_api: https://civil-notary.demo.example.gov/federation/v1
  supported_protocol_versions:
    - registry-notary-federation/v0.1
  signing:
    signing_key: civil-federation-response
  pairwise_subject_hash:
    secret_env: CIVIL_FEDERATION_PAIRWISE_SUBJECT_HASH_SECRET
  response_shaping:
    minimum_denial_latency_ms: 250
  peers:
    - node_id: did:web:benefits.demo.example.gov
      issuer: https://benefits.demo.example.gov
      jwks_uri: http://static-metadata-publisher:8080/federation/default-benefits-jwks.json
      allow_insecure_private_network: true
      allowed_protocol_versions:
        - registry-notary-federation/v0.1
      allowed_purposes:
        - https://demo.example.gov/purpose/decentralized-evidence-demo
      allowed_profiles:
        - civil_age_band_value
        - civil_alive_predicate
      source_scopes:
        - civil_registry:evidence_verification
  evaluation_profiles:
    - id: civil_age_band_value
      ruleset: civil-age-band-v1
      claim_id: age-band
      subject_id_type: national_id
      disclosure: value
      max_source_observed_age_seconds: 86400
    - id: civil_alive_predicate
      ruleset: person-is-alive-v1
      claim_id: person-is-alive
      subject_id_type: national_id
      disclosure: predicate
      max_source_observed_age_seconds: 86400

evidence:
  enabled: true
  service_id: civil-notary
  api_base_url: http://civil-notary:8080
  inline_batch_limit: 20
  source_connections:
    civil:
      base_url: http://civil-registry-relay:8080
      allow_insecure_private_network: true
      token_env: CIVIL_EVIDENCE_SOURCE_RAW
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          national_id: /person/national_id
          birth_date: /person/birth_date
          life_stage: /person/life_stage
          deceased: /person/deceased
    civil_demographic:
      base_url: http://civil-registry-relay:8080
      allow_insecure_private_network: true
      token_env: CIVIL_EVIDENCE_SOURCE_RAW
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: predicate
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          deceased: /person/deceased
  signing_keys:
    civil-evidence-demo:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:civil-evidence.demo.example#civil-evidence-demo-key-1
      status: active
    civil-federation-response:
      provider: local_jwk_env
      private_jwk_env: CIVIL_FEDERATION_RESPONSE_JWK
      alg: EdDSA
      kid: did:web:civil-notary.demo.example.gov#federation-response-1
      status: active
  credential_profiles:
    life_stage_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:civil-evidence.demo.example
      signing_key: civil-evidence-demo
      vct: https://demo.example/credentials/life-stage/v1
      validity_seconds: 600
      allowed_claims:
        - date-of-birth
        - life-stage
        - age-band
        - person-is-alive
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - value
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: civil
        field: birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - life_stage_sd_jwt
    - id: life-stage
      title: Life stage
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            life_stage:
              field: life_stage
              type: string
              required: true
      rule:
        type: extract
        source: civil
        field: life_stage
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - life_stage_sd_jwt
    - id: age-band
      title: Age Eligibility Attestation
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: cel
        expression: "date.age_on(source.civil.birth_date, vars.as_of_date) < 18 ? 'child' : (date.age_on(source.civil.birth_date, vars.as_of_date) >= 65 ? 'elderly' : 'adult')"
        bindings:
          vars:
            as_of_date: "2026-05-27"
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - life_stage_sd_jwt
    - id: person-is-alive
      title: Vital Status Attestation
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: civil_child_status_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/civil-child-status
      credential_profiles:
        - life_stage_sd_jwt
    - id: civil-person-is-alive-by-demographics
      title: Vital Status Attestation by demographics
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        civil:
          connector: dci
          connection: civil_demographic
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.attributes.given_name
            field: given_name
            op: eq
            cardinality: one
          query_fields:
            - input: target.attributes.given_name
              field: given_name
              op: eq
            - input: target.attributes.family_name
              field: surname
              op: eq
            - input: target.attributes.birthdate
              field: birth_date
              op: eq
          matching:
            target_type: Person
            method: configured_demographic_lookup
            sufficient_target_inputs:
              - - target.attributes.given_name
                - target.attributes.family_name
                - target.attributes.birthdate
            allowed_target_inputs:
              - target.attributes.given_name
              - target.attributes.family_name
              - target.attributes.birthdate
          fields:
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
      cccev:
        requirement_type: InformationRequirement
        evidence_type: civil_child_status_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/civil-child-status
