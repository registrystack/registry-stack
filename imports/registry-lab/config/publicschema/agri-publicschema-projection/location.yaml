version: "0.2"
id: nagdi-agri-location-v1
source: nagdi-agri-relay
target: publicschema
runtime:
  bindings: publicschema-v1
property_mappings:
  - rule_id: location-id
    source: /id
    target: /id
    required: true
  - rule_id: admin-code
    source: /admin_code
    target: /admin_code
    required: true
  - rule_id: name
    source: /name
    target: /name
  - rule_id: concept-uri
    source: /concept_uri
    target: /concept_uri
    required: true
