# SPDX-License-Identifier: Apache-2.0
#
# Built-in http_json sidecar manifest for the mock civil registry.
# Replaces the former OpenFn-engine civil sidecar (http-person-lookup.js).
#
# The source performs a single GET /people/{national_id} against the mock
# registry and maps the response data array straight through.  The mock
# registry returns:
#   { "data": [{ "national_id": "...", "birth_date": "YYYY-MM-DD", ... }] }
#
# The bearer token for the mock registry is supplied through the credential
# (field: apiToken) so it never appears in CEL or config-visible fields.

server:
  bind: "0.0.0.0:8080"

auth:
  bearer_tokens:
    - id: openfn_civil_notary
      hash_env: OPENFN_SIDECAR_TOKEN_HASH

limits:
  max_workers: 2
  worker_timeout_ms: 10000
  max_worker_memory_mb: 256
  max_output_bytes: 1048576
  max_request_bytes: 16384
  max_query_parameter_bytes: 1024
  liveness_window_ms: 30000
  retry_after_seconds: 1
  max_batch_items: 10
  batch_timeout_ms: 20000

sources:
  civil_openfn:
    engine: http_json
    dataset: civil_registry
    entity: civil_person
    credential_env: OPENFN_HTTP_DEMO_CREDENTIAL_JSON
    credential_public_fields:
      - baseUrl
    allow_insecure_private_network: true
    allowed_base_urls:
      - http://openfn-mock-registry:8080
    http_json:
      method: GET
      base_url:
        cel: credential_public.baseUrl
      path:
        cel: '"/people/" + urlEncode(lookup.value)'
      auth:
        type: bearer
        token:
          secret: apiToken
      response:
        records:
          # The mock registry wraps records in a top-level "data" array.
          cel: "has(body.data) ? body.data : (has(body.records) ? body.records : [])"
    smoke_lookup:
      field: national_id
      value: person-123
      fields:
        - national_id
        - birth_date
      purpose: startup-readiness-smoke
