# SPDX-License-Identifier: Apache-2.0
#
# Built-in http_json sidecar manifest for DHIS2 tracker health lookups.
# Replaces the former OpenFn-engine dhis2-health sidecar.
#
# The source queries /api/tracker/trackedEntities/{id} with basic auth and maps
# the JSON response to the same output fields that the retired OpenFn job produced:
#   tracked_entity, org_unit, first_name, last_name,
#   child_program_code, child_program_status, child_program_active,
#   child_age_band, reconciliation_ref,
#   maternal_pnc_status, maternal_pnc_active,
#   child_health_visit_recorded, child_health_visit_count,
#   tb_program_status, tb_program_active
#
# CEL programme/attribute/stage IDs match the retired JS job exactly.
# The CEL collection macros filter/map/exists/all are required (added in the
# same release cycle by the registry-notary CEL engine work).
#
# CEL notes:
#  - No local variables: repeated sub-expressions are inlined. This is verbose
#    but fully valid standard CEL.
#  - The `filter`, `map`, `exists` macros follow the CEL spec:
#      list.filter(e, predicate)  -> filtered list
#      list.exists(e, predicate)  -> bool
#      list.map(e, expr)          -> mapped list
#  - `size(list)` or `list.size()` returns the length.
#  - `has(field)` tests for field presence on a map/object.
#
# Programme IDs  (match JS job constants):
#   CHILD_PROGRAM        = "IpHINAT79UW"
#   MATERNAL_PNC_PROGRAM = "uy2gU8kT1jF"
#   TB_PROGRAM           = "ur1Edk5Oe2n"
# Stage IDs:
#   CHILD_BIRTH_STAGE    = "A03MvHHogjR"
#   BABY_POSTNATAL_STAGE = "ZzYYXq4fJie"
# Attribute IDs:
#   FIRST_NAME_ATTR = "w75KJ2mc4zz"
#   LAST_NAME_ATTR  = "zDhUuAYrxNC"

server:
  bind: "0.0.0.0:8080"

auth:
  bearer_tokens:
    - id: dhis2_health_notary
      hash_env: OPENFN_SIDECAR_TOKEN_HASH

limits:
  max_workers: 4
  worker_timeout_ms: 15000
  max_worker_memory_mb: 512
  max_output_bytes: 1048576
  max_request_bytes: 16384
  max_query_parameter_bytes: 2048
  liveness_window_ms: 30000
  retry_after_seconds: 1
  max_batch_items: 10
  batch_timeout_ms: 30000

sources:
  dhis2_health:
    engine: http_json
    dataset: dhis2_tracker
    entity: person
    credential_env: OPENFN_DHIS2_DEMO_CREDENTIAL_JSON
    credential_public_fields:
      - baseUrl
    allowed_base_urls:
      - https://play.im.dhis2.org/stable-2-43-0-1
    http_json:
      method: GET
      base_url:
        cel: credential_public.baseUrl
      path:
        # lookup.value may arrive as "dhis2:tracked-entity:<id>" (reconciliation ref)
        # or as a bare tracked-entity ID. Strip the prefix if present.
        cel: >-
          "/api/tracker/trackedEntities/" +
          urlEncode(
            lookup.value.startsWith("dhis2:tracked-entity:")
              ? lookup.value.substring(21)
              : lookup.value
          )
      query:
        fields:
          cel: '"trackedEntity,orgUnit,attributes[attribute,value],enrollments[enrollment,program,status,enrolledAt,events[event,programStage,status,occurredAt,scheduledAt]]"'
      auth:
        type: basic
        username:
          secret: username
        password:
          secret: password
      response:
        records:
          # Map the single tracked-entity object to the flat field list.
          # Each sub-expression is inlined (CEL has no let-bindings).
          #
          # enrollments / attributes shorthand:
          #   enr = has(body.enrollments) ? body.enrollments : []
          #   att = has(body.attributes)  ? body.attributes  : []
          #
          # childEnr = enr.filter(e, e.program == "IpHINAT79UW")
          #            [0 if non-empty else sentinel]
          # etc.
          cel: >-
            [
              {
                "tracked_entity":   body.trackedEntity,
                "org_unit":         body.orgUnit,

                "first_name":
                  (has(body.attributes) ? body.attributes : [])
                    .filter(a, a.attribute == "w75KJ2mc4zz").size() > 0
                  ? (has(body.attributes) ? body.attributes : [])
                      .filter(a, a.attribute == "w75KJ2mc4zz")[0].value
                  : null,

                "last_name":
                  (has(body.attributes) ? body.attributes : [])
                    .filter(a, a.attribute == "zDhUuAYrxNC").size() > 0
                  ? (has(body.attributes) ? body.attributes : [])
                      .filter(a, a.attribute == "zDhUuAYrxNC")[0].value
                  : null,

                "child_program_code": "DHIS2_CHILD_PROGRAM",

                "child_program_status":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "IpHINAT79UW").size() > 0
                  ? (has(body.enrollments) ? body.enrollments : [])
                      .filter(e, e.program == "IpHINAT79UW")[0].status
                  : null,

                "child_program_active":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "IpHINAT79UW").size() > 0 &&
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "IpHINAT79UW")[0].status == "ACTIVE",

                "child_age_band":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "IpHINAT79UW").size() > 0
                  ? "5_to_17"
                  : "unknown",

                "reconciliation_ref":
                  "dhis2:tracked-entity:" + body.trackedEntity,

                "maternal_pnc_status":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "uy2gU8kT1jF").size() > 0
                  ? (has(body.enrollments) ? body.enrollments : [])
                      .filter(e, e.program == "uy2gU8kT1jF")[0].status
                  : null,

                "maternal_pnc_active":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "uy2gU8kT1jF").size() > 0 &&
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "uy2gU8kT1jF")[0].status == "ACTIVE",

                "child_health_visit_recorded":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "IpHINAT79UW")
                    .map(e, has(e.events) ? e.events : [])
                    .flatten()
                    .exists(ev,
                      ev.status == "COMPLETED" &&
                      (ev.programStage == "A03MvHHogjR" ||
                       ev.programStage == "ZzYYXq4fJie")),

                "child_health_visit_count":
                  size(
                    (has(body.enrollments) ? body.enrollments : [])
                      .filter(e, e.program == "IpHINAT79UW")
                      .map(e, has(e.events) ? e.events : [])
                      .flatten()
                  ),

                "tb_program_status":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "ur1Edk5Oe2n").size() > 0
                  ? (has(body.enrollments) ? body.enrollments : [])
                      .filter(e, e.program == "ur1Edk5Oe2n")[0].status
                  : null,

                "tb_program_active":
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "ur1Edk5Oe2n").size() > 0 &&
                  (has(body.enrollments) ? body.enrollments : [])
                    .filter(e, e.program == "ur1Edk5Oe2n")[0].status == "ACTIVE"
              }
            ]
    smoke_lookup:
      field: tracked_entity
      value: PQfMcpmXeFE
      fields:
        - tracked_entity
        - child_program_active
        - child_age_band
        - child_program_code
        - reconciliation_ref
        - tb_program_active
      purpose: startup-readiness-smoke
