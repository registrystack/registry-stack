[package]
name = "lab2-governed-config"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false

[dependencies]
aws-lc-rs = "1"
chrono = { version = "0.4" }
olpc-cjson = "0.1"
registry-platform-config = { version = "0.3.3", path = "../../vendor/registry-platform/crates/registry-platform-config" }
registry-platform-ops = { version = "0.3.3", path = "../../vendor/registry-platform/crates/registry-platform-ops" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
serde_yaml = { version = "0.9" }
sha2 = { version = "0.11" }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tough = { version = "0.22.0" }
