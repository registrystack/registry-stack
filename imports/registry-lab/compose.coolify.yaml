name: registry-lab

x-hosted-domains:
  lab-homepage: lab.registrystack.org
  citizen-civil-notary: citizen-notary.lab.registrystack.org
  civil-registry-relay: civil-relay.lab.registrystack.org
  social-protection-registry-relay: social-relay.lab.registrystack.org
  health-registry-relay: health-relay.lab.registrystack.org
  static-metadata-publisher: metadata.lab.registrystack.org
  zitadel: zitadel.lab.registrystack.org
  dhis2-health-notary: dhis2-notary.lab.registrystack.org
  opencrvs-dci-notary: opencrvs-notary.lab.registrystack.org

x-relay-common: &relay-common
  image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/jeremi/registry-relay@sha256:84258e385a00e4777a45574026b885e4e9602191a77626613fecd15d9ea3b3eb}
  environment: &relay-env
    RUST_LOG: ${RUST_LOG:-info}
    REGISTRY_RELAY_AUDIT_HASH_SECRET: ${REGISTRY_RELAY_AUDIT_HASH_SECRET:-}
    CIVIL_METADATA_CLIENT_HASH: ${CIVIL_METADATA_CLIENT_HASH:-}
    CIVIL_EVIDENCE_SOURCE_HASH: ${CIVIL_EVIDENCE_SOURCE_HASH:-}
    CIVIL_EVIDENCE_ONLY_HASH: ${CIVIL_EVIDENCE_ONLY_HASH:-}
    CIVIL_ROW_READER_HASH: ${CIVIL_ROW_READER_HASH:-}
    SHARED_CIVIL_EVIDENCE_SOURCE_HASH: ${SHARED_CIVIL_EVIDENCE_SOURCE_HASH:-}
    SOCIAL_METADATA_CLIENT_HASH: ${SOCIAL_METADATA_CLIENT_HASH:-}
    SOCIAL_EVIDENCE_SOURCE_HASH: ${SOCIAL_EVIDENCE_SOURCE_HASH:-}
    SOCIAL_EVIDENCE_ONLY_HASH: ${SOCIAL_EVIDENCE_ONLY_HASH:-}
    SOCIAL_ROW_READER_HASH: ${SOCIAL_ROW_READER_HASH:-}
    SOCIAL_AGGREGATE_READER_HASH: ${SOCIAL_AGGREGATE_READER_HASH:-}
    SHARED_SOCIAL_EVIDENCE_SOURCE_HASH: ${SHARED_SOCIAL_EVIDENCE_SOURCE_HASH:-}
    HEALTH_METADATA_CLIENT_HASH: ${HEALTH_METADATA_CLIENT_HASH:-}
    HEALTH_EVIDENCE_SOURCE_HASH: ${HEALTH_EVIDENCE_SOURCE_HASH:-}
    HEALTH_EVIDENCE_ONLY_HASH: ${HEALTH_EVIDENCE_ONLY_HASH:-}
    HEALTH_ROW_READER_HASH: ${HEALTH_ROW_READER_HASH:-}
    SHARED_HEALTH_EVIDENCE_SOURCE_HASH: ${SHARED_HEALTH_EVIDENCE_SOURCE_HASH:-}
  restart: unless-stopped
  expose:
    - "8080"
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

x-notary-common: &notary-common
  image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/jeremi/registry-notary@sha256:4705721671235e12ddcbd3cc6b2c8bc71f40764cca17599c2a7dbb25aa544137}
  environment: &notary-env
    RUST_LOG: ${RUST_LOG:-info}
    REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:-}
    REGISTRY_NOTARY_ISSUER_JWK: ${REGISTRY_NOTARY_ISSUER_JWK:-}
    REGISTRY_NOTARY_ACCESS_TOKEN_JWK: ${REGISTRY_NOTARY_ACCESS_TOKEN_JWK:-}
    REGISTRY_NOTARY_ESIGNET_RP_JWK: ${REGISTRY_NOTARY_ESIGNET_RP_JWK:-}
    REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
    CIVIL_EVIDENCE_SOURCE_RAW: ${CIVIL_EVIDENCE_SOURCE_RAW:-}
  restart: unless-stopped
  expose:
    - "8080"
  healthcheck:
    # The notary image ships only the binary + sh (no curl/wget for an HTTP
    # /healthz probe), and this build has no `healthcheck` subcommand, so use
    # `--version` as a process-liveness check.
    test: ["CMD", "registry-notary", "--version"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  # Coolify does not seed compose bind mounts from the git repo: relative
  # bind mounts are rewritten to empty persistent dirs. This one-shot init
  # clones the public repo and populates named config volumes that every
  # service mounts at its expected path. Re-runs on each deploy (overwrites).
  config-loader:
    image: ${CONFIG_LOADER_IMAGE:-alpine:3.20}
    restart: "no"
    environment:
      CONFIG_REPO_URL: ${CONFIG_REPO_URL:-https://github.com/jeremi/registry-lab}
      CONFIG_REPO_REF: registry-stack-technical-preview-2026-06-04
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        apk add --no-cache git >/dev/null
        rm -rf /tmp/repo
        git clone --depth 1 --branch "$$CONFIG_REPO_REF" "$$CONFIG_REPO_URL" /tmp/repo
        for d in relay notary data pginit openfn-tmpl openfn-jobs static-scripts lab-homepage; do
          mkdir -p "/out/$$d"
          find "/out/$$d" -mindepth 1 -delete 2>/dev/null || true
        done
        cp -a /tmp/repo/config/coolify/relay/. /out/relay/
        cp -a /tmp/repo/config/coolify/notary/citizen-civil-notary.yaml /out/notary/
        cp -a /tmp/repo/config/coolify/notary/dhis2-health-notary.yaml /out/notary/
        cp -a /tmp/repo/config/coolify/notary/opencrvs-dci-notary.yaml /out/notary/opencrvs-dci-notary.yaml.template
        cp -a /tmp/repo/data/. /out/data/
        cp -a /tmp/repo/config/postgres/init.sql /out/pginit/
        cp -a /tmp/repo/config/coolify/openfn/. /out/openfn-tmpl/
        cp -a /tmp/repo/config/openfn/jobs/. /out/openfn-jobs/
        cp -a /tmp/repo/scripts/static-metadata-server.py /out/static-scripts/
        cp -a /tmp/repo/scripts/lab-homepage-server.py /out/static-scripts/
        cp -a /tmp/repo/config/lab-homepage/. /out/lab-homepage/
        echo "config-loader: populated config volumes from $$CONFIG_REPO_REF"
    volumes:
      - cfg-relay:/out/relay
      - cfg-notary:/out/notary
      - cfg-data:/out/data
      - cfg-pginit:/out/pginit
      - cfg-openfn-tmpl:/out/openfn-tmpl
      - cfg-openfn-jobs:/out/openfn-jobs
      - cfg-static-scripts:/out/static-scripts
      - cfg-lab-homepage:/out/lab-homepage

  postgres:
    image: ${REGISTRY_LAB_POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: ${REGISTRY_LAB_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${REGISTRY_LAB_POSTGRES_PASSWORD:-replace-in-coolify}
      POSTGRES_DB: ${REGISTRY_LAB_POSTGRES_DB:-registry_lab}
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - pgdata:/var/lib/postgresql/data
      - cfg-pginit:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: ${REGISTRY_LAB_REDIS_IMAGE:-redis:7.4-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  zitadel-seed-init:
    image: ${REGISTRY_LAB_ALPINE_IMAGE:-alpine:3.20}
    restart: "no"
    command: ["chown", "-R", "1000:1000", "/seed"]
    volumes:
      - zitadel-seed:/seed

  zitadel:
    image: ${REGISTRY_LAB_ZITADEL_IMAGE:-ghcr.io/zitadel/zitadel:v2.66.4}
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-}
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${REGISTRY_LAB_POSTGRES_USER:-postgres}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${REGISTRY_LAB_POSTGRES_PASSWORD:-replace-in-coolify}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${REGISTRY_LAB_POSTGRES_USER:-postgres}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${REGISTRY_LAB_POSTGRES_PASSWORD:-replace-in-coolify}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: zitadel.lab.registrystack.org
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-bootstrap-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bootstrap Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-12-31T23:59:59Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /seed/zitadel-pat
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-seed-init:
        condition: service_completed_successfully
    volumes:
      - zitadel-seed:/seed
    expose:
      - "8080"
    labels:
      traefik.http.services.zitadel.loadbalancer.server.scheme: h2c
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  civil-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/civil-registry-relay.yaml"]
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-relay:/etc/registry-relay:ro
      - cfg-data:/demo/data:ro
      - civil-registry-cache:/var/lib/registry-relay/cache

  social-protection-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/social-protection-registry-relay.yaml"]
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-relay:/etc/registry-relay:ro
      - cfg-data:/demo/data:ro
      - social-protection-registry-cache:/var/lib/registry-relay/cache

  health-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/health-registry-relay.yaml"]
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-relay:/etc/registry-relay:ro
      - cfg-data:/demo/data:ro
      - health-registry-cache:/var/lib/registry-relay/cache

  static-metadata-publisher:
    image: ${REGISTRY_LAB_STATIC_METADATA_IMAGE:-python:3.12.3-slim-bookworm}
    command: ["python", "/opt/lab-scripts/static-metadata-server.py", "--port", "8080", "--host", "0.0.0.0", "--directory", "/srv/static"]
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-static-scripts:/opt/lab-scripts:ro
      - static-content:/srv/static:ro
    healthcheck:
      # Liveness only: the server is alive whenever it answers. The published
      # bundle (/.well-known/registry-manifest.json) is generated separately by
      # publish-static-metadata.sh and is not seeded here yet, so probing the
      # root keeps the check honest without requiring that content to exist.
      test:
        - CMD-SHELL
        - "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/\", timeout=2).read()'"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  lab-homepage:
    image: ${REGISTRY_LAB_HOMEPAGE_IMAGE:-python:3.12.3-slim-bookworm}
    command:
      - python
      - /opt/lab-scripts/lab-homepage-server.py
      - --port
      - "8080"
      - --host
      - 0.0.0.0
      - --config
      - /etc/registry-lab-homepage/public-demo-credentials.json
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      CIVIL_METADATA_CLIENT_RAW: ${CIVIL_METADATA_CLIENT_RAW:-}
      CIVIL_EVIDENCE_ONLY_RAW: ${CIVIL_EVIDENCE_ONLY_RAW:-}
      CIVIL_ROW_READER_RAW: ${CIVIL_ROW_READER_RAW:-}
      SOCIAL_METADATA_CLIENT_RAW: ${SOCIAL_METADATA_CLIENT_RAW:-}
      SOCIAL_EVIDENCE_ONLY_RAW: ${SOCIAL_EVIDENCE_ONLY_RAW:-}
      SOCIAL_ROW_READER_RAW: ${SOCIAL_ROW_READER_RAW:-}
      SOCIAL_AGGREGATE_READER_RAW: ${SOCIAL_AGGREGATE_READER_RAW:-}
      HEALTH_METADATA_CLIENT_RAW: ${HEALTH_METADATA_CLIENT_RAW:-}
      HEALTH_EVIDENCE_ONLY_RAW: ${HEALTH_EVIDENCE_ONLY_RAW:-}
      HEALTH_ROW_READER_RAW: ${HEALTH_ROW_READER_RAW:-}
      DHIS2_EVIDENCE_CLIENT_TOKEN: ${DHIS2_EVIDENCE_CLIENT_TOKEN:-}
      DHIS2_EVIDENCE_CLIENT_BEARER: ${DHIS2_EVIDENCE_CLIENT_BEARER:-}
      OPENCRVS_EVIDENCE_CLIENT_TOKEN: ${OPENCRVS_EVIDENCE_CLIENT_TOKEN:-}
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-static-scripts:/opt/lab-scripts:ro
      - cfg-lab-homepage:/etc/registry-lab-homepage:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/healthz\", timeout=2).read()'"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  citizen-civil-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/citizen-civil-notary.yaml"]
    volumes:
      - cfg-notary:/etc/registry-notary:ro
      - notary-config-state:/var/lib/registry-notary/config-state
    depends_on:
      config-loader:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      civil-registry-relay:
        condition: service_healthy

  openfn-dhis2-sidecar:
    image: ${REGISTRY_NOTARY_OPENFN_SIDECAR_IMAGE:-ghcr.io/jeremi/registry-notary-openfn-sidecar@sha256:28b6c8f3673a12b45cfae97ed5d1c82505ed9eaccf7ee699c396eab7c0987d3f}
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        : "$${OPENFN_DHIS2_HOST_URL:?missing OPENFN_DHIS2_HOST_URL}"
        escaped="$$(printf '%s' "$${OPENFN_DHIS2_HOST_URL%/}" | sed 's/[\\&|]/\\&/g')"
        sed "s|__OPENFN_DHIS2_HOST_URL__|$${escaped}|g" \
          /etc/registry-notary-openfn/openfn-dhis2-sidecar.yaml.template \
          > /tmp/openfn-dhis2-sidecar.yaml
        exec registry-notary-openfn-sidecar --config /tmp/openfn-dhis2-sidecar.yaml
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      OPENFN_SIDECAR_TOKEN_HASH: ${OPENFN_SIDECAR_TOKEN_HASH:-}
      OPENFN_DHIS2_HOST_URL: ${OPENFN_DHIS2_HOST_URL:-}
      OPENFN_DHIS2_USERNAME: ${OPENFN_DHIS2_USERNAME:-}
      OPENFN_DHIS2_PASSWORD: ${OPENFN_DHIS2_PASSWORD:-}
      OPENFN_DHIS2_DEMO_CREDENTIAL_JSON: '{"hostUrl":"${OPENFN_DHIS2_HOST_URL:-}","baseUrl":"${OPENFN_DHIS2_HOST_URL:-}","username":"${OPENFN_DHIS2_USERNAME:-}","password":"${OPENFN_DHIS2_PASSWORD:-}"}'
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-openfn-tmpl:/etc/registry-notary-openfn:ro
      - cfg-openfn-jobs:/opt/openfn/jobs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:8080/ready\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));'"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  dhis2-health-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/dhis2-health-notary.yaml"]
    environment:
      <<: *notary-env
      DHIS2_EVIDENCE_CLIENT_TOKEN_HASH: ${DHIS2_EVIDENCE_CLIENT_TOKEN_HASH:-}
      DHIS2_EVIDENCE_CLIENT_BEARER_HASH: ${DHIS2_EVIDENCE_CLIENT_BEARER_HASH:-}
      OPENFN_SIDECAR_TOKEN_RAW: ${OPENFN_SIDECAR_TOKEN_RAW:-}
    volumes:
      - cfg-notary:/etc/registry-notary:ro
      - notary-config-state:/var/lib/registry-notary/config-state
    depends_on:
      config-loader:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      openfn-dhis2-sidecar:
        condition: service_started

  opencrvs-dci-notary-config:
    image: ${REGISTRY_LAB_ALPINE_IMAGE:-alpine:3.20}
    restart: "no"
    entrypoint: ["/bin/sh", "-eu", "-c"]
    command:
      - |
        : "$${OPENCRVS_DCI_BASE_URL:?missing OPENCRVS_DCI_BASE_URL}"
        opencrvs_base_url="$${OPENCRVS_DCI_BASE_URL%/}"
        escaped="$$(printf '%s' "$${opencrvs_base_url}" | sed 's/[\\&|]/\\&/g')"
        sed "s|__OPENCRVS_DCI_BASE_URL__|$${escaped}|g" \
          /etc/registry-notary/opencrvs-dci-notary.yaml.template \
          > /out/opencrvs-dci-notary.yaml
    environment:
      OPENCRVS_DCI_BASE_URL: ${OPENCRVS_DCI_BASE_URL:-}
    volumes:
      - cfg-notary:/etc/registry-notary:ro
      - opencrvs-notary-config:/out
    depends_on:
      config-loader:
        condition: service_completed_successfully

  opencrvs-dci-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary-rendered/opencrvs-dci-notary.yaml"]
    environment:
      <<: *notary-env
      OPENCRVS_EVIDENCE_CLIENT_TOKEN_HASH: ${OPENCRVS_EVIDENCE_CLIENT_TOKEN_HASH:-}
      OPENCRVS_DCI_CLIENT_ID: ${OPENCRVS_DCI_CLIENT_ID:-}
      OPENCRVS_DCI_CLIENT_SECRET: ${OPENCRVS_DCI_CLIENT_SECRET:-}
      OPENCRVS_DCI_SHA_SECRET: ${OPENCRVS_DCI_SHA_SECRET:-}
    volumes:
      - opencrvs-notary-config:/etc/registry-notary-rendered:ro
      - notary-config-state:/var/lib/registry-notary/config-state
    depends_on:
      opencrvs-dci-notary-config:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis-data:
  zitadel-seed:
  civil-registry-cache:
  social-protection-registry-cache:
  health-registry-cache:
  cfg-relay:
  cfg-notary:
  cfg-data:
  cfg-pginit:
  cfg-openfn-tmpl:
  cfg-openfn-jobs:
  cfg-static-scripts:
  cfg-lab-homepage:
  static-content:
  opencrvs-notary-config:
  notary-config-state:
