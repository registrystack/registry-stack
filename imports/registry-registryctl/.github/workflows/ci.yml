name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RUST_TOOLCHAIN: 1.95.0

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: fmt, clippy, tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup component add rustfmt clippy --toolchain "$RUST_TOOLCHAIN"
          rustup default "$RUST_TOOLCHAIN"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Config vocabulary guard
        run: scripts/check-stale-config-vocabulary.sh

      - name: Lint
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

  contract-smoke:
    name: contract smoke compile gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      # registryctl smoke and registryctl notary smoke require a generated
      # project plus a live local stack. PR CI keeps this as a compile-only gate.
      - name: Compile registryctl smoke commands
        run: |
          cargo build --locked --bin registryctl
          cargo run --locked -- smoke --help
          cargo run --locked -- notary smoke --help
