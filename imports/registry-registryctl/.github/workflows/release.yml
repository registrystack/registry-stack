name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Semver tag to validate, for example v0.1.0"
        required: true
        default: "v0.1.0"
      dry_run:
        description: "Build and verify artifacts without creating a GitHub release"
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  RUST_TOOLCHAIN: 1.95.0

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-aarch64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target "${{ matrix.target }}"
          rustup default "$RUST_TOOLCHAIN"

      - name: Validate release tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Release tag must be semver-like, for example v0.1.0: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

          crate_version="$(python3 -c 'import pathlib, tomllib; print(tomllib.load(pathlib.Path("Cargo.toml").open("rb"))["package"]["version"])')"
          if [[ "$RELEASE_TAG" != "v${crate_version}" ]]; then
            echo "Release tag ${RELEASE_TAG} does not match Cargo.toml package version ${crate_version}" >&2
            exit 1
          fi

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          asset="registryctl-${{ matrix.asset }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/registryctl" dist/registryctl
          tar -C dist -czf "$asset" registryctl
          shasum -a 256 "$asset" > "$asset.sha256"
          shasum -a 256 -c "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: registryctl-${{ matrix.asset }}
          path: |
            registryctl-${{ matrix.asset }}.tar.gz
            registryctl-${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: write
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Verify downloaded checksums
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -name '*.sha256' -print | sort | while read -r sum_file; do
            (
              cd "$(dirname "$sum_file")"
              shasum -a 256 -c "$(basename "$sum_file")"
            )
          done

      - name: Dry-run release
        if: env.DRY_RUN == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry run for ${RELEASE_TAG}; release creation skipped."
          find release-assets -maxdepth 1 -type f -print | sort

      - name: Publish tagged release
        if: env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" release-assets/* \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --notes "registryctl ${RELEASE_TAG}"
