name: Release Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-aarch64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: macos-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          asset="registryctl-${{ matrix.asset }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/registryctl" dist/registryctl
          tar -C dist -czf "$asset" registryctl
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: registryctl-${{ matrix.asset }}
          path: |
            registryctl-${{ matrix.asset }}.tar.gz
            registryctl-${{ matrix.asset }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish snapshot release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git tag -f snapshot "$GITHUB_SHA"
          git push -f origin snapshot
          gh release delete snapshot --yes --cleanup-tag || true
          git tag -f snapshot "$GITHUB_SHA"
          git push -f origin snapshot
          gh release create snapshot release-assets/* \
            --title "registryctl snapshot" \
            --notes "Latest registryctl binaries built from main at ${GITHUB_SHA}." \
            --prerelease

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --title "$GITHUB_REF_NAME" \
            --notes "registryctl $GITHUB_REF_NAME"
