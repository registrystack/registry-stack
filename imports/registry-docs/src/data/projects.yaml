- id: registry-platform
  name: Registry Platform
  repo_path: ../registry-platform
  target_repo_path: ../registry-platform
  role: Shared Rust workspace for security and operational primitives consumed by Registry Relay, Registry Witness, and related registry services, including auth helpers, OIDC verification, JWKS fetching, audit envelopes, HTTP security, outbound HTTP policy, crypto, SD-JWT VC support, and test fixtures.
  owns:
    - Shared auth, OIDC, JWKS fetching, audit, HTTP security, outbound HTTP, crypto, SD-JWT, and testing primitives.
    - OID4VCI credential offer, nonce, credential request, and issuer metadata primitives via the `registry-platform-oid4vci` crate.
    - Cross-service crate APIs that must behave consistently in Relay, Witness, and future registry services.
    - Shared Rust hygiene templates and supported integration-test fixtures.
  does_not_own:
    - Registry Relay runtime data access, entity routing, metadata publication, or scope policy semantics.
    - Registry Witness claim configuration, evaluation rules, disclosure policy decisions, or service routes.
    - Product-level authorization policy, tenant isolation, audit retention, secret provisioning, or deployment configuration.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-platform
    - label: Registry Platform crates
      url: https://github.com/jeremi/registry-platform/tree/main/crates
  rename_status: New shared workspace; not part of the 2026-05-23 rename wave.
- id: registry-manifest
  name: Registry Manifest
  repo_path: ../registry-manifest
  target_repo_path: ../registry-manifest
  role: Renders standards-compliant catalog, service, schema, form, policy, evidence-offering, and public Witness federation metadata artifacts (DCAT, CPSV-AP, CCCEV, BRegDCAT-AP, SHACL, JSON Schema, OGC Records, ODRL) from a single YAML metadata manifest, so a registry's published surface stays consistent across formats.
  owns:
    - Metadata manifest model and compiled metadata model.
    - Pure renderers for catalog, DCAT, CPSV-AP service catalogues, CCCEV requirements and evidence type lists, BRegDCAT-AP, SHACL, JSON Schema, form JSON Schema, OGC Records, policies, and evidence offerings.
    - Public Registry Witness federation metadata and evaluation profile validation.
    - CLI validation, rendering, static publication, and profile fixture validation.
  does_not_own:
    - Registry Relay runtime data access.
    - Auth, audit, observability, DataFusion, Postgres, Axum, or secret handling.
    - Production source configuration.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-manifest
    - label: Local examples
      url: https://github.com/jeremi/registry-manifest/blob/main/examples/README.md
  rename_status: Already using the target repo name locally.
- id: registry-relay
  name: Registry Relay
  repo_path: ../registry-relay
  target_repo_path: ../registry-relay
  role: Read-only HTTP gateway that fronts a sensitive registry database. Exposes entity-shaped query routes, caller-scoped metadata, and evidence-offering verification while composing shared auth, OIDC, audit, HTTP security, crypto, and SD-JWT primitives from Registry Platform.
  owns:
    - Runtime configuration and source binding.
    - Entity-shaped Registry Data API routes.
    - Relay-specific API key and OIDC resource-server configuration, scope checks, and route enforcement.
    - Caller-scoped metadata publication.
    - Relay-native evidence offering verification.
  does_not_own:
    - Record provisioning or writes in v1.
    - Portable metadata schema ownership.
    - Standalone claim service internals owned by Registry Witness.
    - Shared security and operational primitives owned by Registry Platform.
    - Storage table ids or arbitrary SQL in public APIs.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-relay
    - label: Local API docs
      url: https://github.com/jeremi/registry-relay/blob/main/docs/api.md
    - label: Local metadata docs
      url: https://github.com/jeremi/registry-relay/blob/main/docs/metadata.md
  rename_status: Local checkout renamed to `registry-relay`; old worktrees under `registry_relay-*` remain for historical evidence.
- id: registry-witness
  name: Registry Witness
  repo_path: ../registry-witness
  target_repo_path: ../registry-witness
  role: Standalone service that evaluates eligibility claims against registry data, serves static-peer federated delegated evaluation, and issues SD-JWT verifiable credentials with selective disclosure, composing shared auth, audit, OIDC, HTTP security, crypto, SD-JWT, and testing primitives from Registry Platform.
  owns:
    - Claim configuration and evaluation.
    - Disclosure policy and redacted audit event semantics.
    - Registry Witness API routes.
    - Static-peer delegated evaluation at `/federation/v1/evaluations`.
    - Credential issuance workflow and claim-to-credential mapping.
    - OID4VCI Draft 13 credential offer flow (credential-offer, nonce, credential endpoints) and the `/.well-known/openid-credential-issuer` metadata endpoint.
    - HTTP source connectors for Registry Data API and SP DCI-style sources.
  does_not_own:
    - Registry Relay source code or runtime internals.
    - Portable metadata renderers owned by Registry Manifest.
    - Shared security and operational primitives owned by Registry Platform.
    - Open federation, dynamic trust-chain discovery, shared replay storage, or federated credential issuance.
    - Browser inspection workflows owned by Registry Atlas.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-witness
    - label: OpenAPI source
      url: https://github.com/jeremi/registry-witness/blob/main/crates/registry-witness-server/src/openapi.rs
  rename_status: Already using the target repo name locally.
- id: registry-atlas
  name: Registry Atlas
  repo_path: ../registry-atlas
  target_repo_path: ../registry-atlas
  role: Browser workbench for inspecting what a registry publishes (catalogues, public services, requirements, schemas, policies, forms, and evidence offerings) and navigating the service-first semantic graph before integration code is written.
  owns:
    - Browser UI for published catalogue, CPSV-AP service, CCCEV requirement, and registry discovery artifacts.
    - Local fetch proxy for inspected metadata endpoints.
    - Service-first semantic navigation over public services, requirements, evidence option groups, providers, access services, forms, and discovery gaps.
    - Strict capability queries over accepted machine terms.
    - Semantic asset discovery fixtures and envelopes.
  does_not_own:
    - Registry runtime APIs.
    - Legal authorization or source-of-truth decisions based only on metadata discovery.
    - Natural-language inference in v0.1 capability discovery.
    - Persistent token storage in browser or proxy logs.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-atlas
    - label: Local capability spec
      url: https://github.com/jeremi/registry-atlas/blob/main/SYSTEM_CAPABILITY_DISCOVERY_SPEC.md
  rename_status: Already using the target repo name locally.
- id: registry-lab
  name: Registry Lab
  repo_path: ../registry-lab
  target_repo_path: ../registry-lab
  role: Docker Compose demo of the registry runtime on a laptop. Wires three Relay instances, four Witness instances, live Postgres and Zitadel services, a private OpenFn sidecar scenario, a static metadata publisher, and narrated demo clients together with Registry Platform, Relay, and Witness source pins, fixtures, and smoke tests.
  owns:
    - End-to-end local topology for Relay, Witness, live Postgres, live Zitadel, the private OpenFn sidecar path, the static metadata publisher, and demo-client fixtures (Atlas is run separately and is not in the compose topology at v0.1).
    - Demo scripts, smoke checks, generated local credentials, live-service checks, service-first discovery checks, and narrated client flows.
    - Citizen self-attestation walkthrough that exercises the Witness OID4VCI flow end-to-end through the `just citizen-oid4vci-*` recipes.
    - Acceptance rehearsal after rename waves land.
  does_not_own:
    - Production deployment guidance.
    - Normative API or metadata contracts.
    - Real product integrations for OpenCRVS, OpenSPP, DHIS2, OpenIMIS, MOSIP, or other systems.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-lab/blob/main/README.md
    - label: Rename plan
      url: https://github.com/jeremi/registry-legend/blob/main/rename-plan-2026-05-23.md
  rename_status: Local checkout renamed to `registry-lab`; stable demo identifiers may still contain `decentralized-demo` as protocol and artifact values.
