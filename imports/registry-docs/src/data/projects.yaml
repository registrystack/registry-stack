- id: registry-manifest
  name: Registry Manifest
  repo_path: ../registry-manifest
  target_repo_path: ../registry-manifest
  role: Renders standards-compliant catalog, schema, and policy artifacts (DCAT, BRegDCAT-AP, SHACL, JSON Schema, OGC Records, ODRL) from a single YAML metadata manifest, so a registry's published surface stays consistent across formats.
  owns:
    - Metadata manifest model and compiled metadata model.
    - Pure renderers for catalog, DCAT, BRegDCAT-AP, SHACL, JSON Schema, OGC Records, policies, and evidence offerings.
    - CLI validation, rendering, static publication, and profile fixture validation.
  does_not_own:
    - Registry Relay runtime data access.
    - Auth, audit, observability, DataFusion, Postgres, Axum, or secret handling.
    - Production source configuration.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-manifest
    - label: Local examples
      url: https://github.com/jeremi/registry-manifest/blob/main/examples/README.md
  rename_status: Already using the target repo name locally.
- id: registry-relay
  name: Registry Relay
  repo_path: ../registry-relay
  target_repo_path: ../registry-relay
  role: Read-only HTTP gateway that fronts a sensitive registry database. Exposes entity-shaped query routes with API-key or OIDC auth, audit logging, and DCAT-shaped metadata, without giving callers direct database or SQL access.
  owns:
    - Runtime configuration and source binding.
    - Entity-shaped Registry Data API routes.
    - API key and OIDC resource-server authorization.
    - Caller-scoped metadata publication.
    - Relay-native evidence offering verification.
  does_not_own:
    - Record provisioning or writes in v1.
    - Portable metadata schema ownership.
    - Standalone claim service internals owned by Registry Witness.
    - Storage table ids or arbitrary SQL in public APIs.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-relay
    - label: Local API docs
      url: https://github.com/jeremi/registry-relay/blob/main/docs/api.md
    - label: Local metadata docs
      url: https://github.com/jeremi/registry-relay/blob/main/docs/metadata.md
  rename_status: Local checkout renamed to `registry-relay`; old worktrees under `registry_relay-*` remain for historical evidence.
- id: registry-witness
  name: Registry Witness
  repo_path: ../registry-witness
  target_repo_path: ../registry-witness
  role: Standalone service that evaluates eligibility claims against registry data and issues SD-JWT verifiable credentials with selective disclosure, so programs can attest a person qualifies without exposing the underlying records.
  owns:
    - Claim configuration and evaluation.
    - Disclosure policy and redacted audit events.
    - Registry Witness API routes.
    - SD-JWT VC issuance primitives.
    - HTTP source connectors for Registry Data API and SP DCI-style sources.
  does_not_own:
    - Registry Relay source code or runtime internals.
    - Portable metadata renderers owned by Registry Manifest.
    - Browser inspection workflows owned by Registry Atlas.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-witness
    - label: OpenAPI source
      url: https://github.com/jeremi/registry-witness/blob/main/crates/registry-witness-server/src/openapi.rs
  rename_status: Already using the target repo name locally.
- id: registry-atlas
  name: Registry Atlas
  repo_path: ../registry-atlas
  target_repo_path: ../registry-atlas
  role: Browser workbench for inspecting what a registry publishes (catalog, schemas, policies, evidence offerings) and checking strict capability matches against the standards it claims to emit.
  owns:
    - Browser UI for published catalogue and registry discovery artifacts.
    - Local fetch proxy for inspected metadata endpoints.
    - Strict capability queries over accepted machine terms.
    - Semantic asset discovery fixtures and envelopes.
  does_not_own:
    - Registry runtime APIs.
    - Natural-language inference in v0.1 capability discovery.
    - Persistent token storage in browser or proxy logs.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-atlas
    - label: Local capability spec
      url: https://github.com/jeremi/registry-atlas/blob/main/SYSTEM_CAPABILITY_DISCOVERY_SPEC.md
  rename_status: Already using the target repo name locally.
- id: registry-lab
  name: Registry Lab
  repo_path: ../registry-lab
  target_repo_path: ../registry-lab
  role: Docker Compose demo of the registry runtime on a laptop. Wires three Relay instances, three Witness instances, a static metadata publisher, and a narrated demo client together with fixtures and smoke tests.
  owns:
    - End-to-end local topology for Relay, Witness, the static metadata publisher, and demo-client fixtures (Atlas is run separately and is not in the compose topology at v0.1).
    - Demo scripts, smoke checks, generated local credentials, and narrated client flow.
    - Acceptance rehearsal after rename waves land.
  does_not_own:
    - Production deployment guidance.
    - Normative API or metadata contracts.
    - Real product integrations for OpenCRVS, OpenSPP, DHIS2, OpenIMIS, MOSIP, or other systems.
  source_docs:
    - label: README
      url: https://github.com/jeremi/registry-lab/blob/main/README.md
    - label: Rename plan
      url: https://github.com/jeremi/registry-legend/blob/main/rename-plan-2026-05-23.md
  rename_status: Local checkout renamed to `registry-lab`; some scripts and fixtures may still reference the old `decentralized-evidence-demo` name.
