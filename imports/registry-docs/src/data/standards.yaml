  last_checked: 2026-06-11
  notes: >-
    Registry Notary exposes the OID4VCI credential offer, nonce, credential,
    and issuer-metadata routes. The hosted lab issuer metadata advertises
    `format: dc+sd-jwt` for the citizen credential configuration. Registry
    Platform owns the underlying primitives in the `registry-platform-oid4vci`
    crate. Registry Lab exercises the full flow through the
    `just citizen-oid4vci-*` recipes. Conformance to the full OID4VCI profile,
    including Draft 13 `vc+sd-jwt` compatibility, is not asserted; the surfaces
    emit the protocol shape and have been validated against the lab smoke script.
