      - src: docs/sd-jwt-vc-conformance-profile.md
        dest: products/registry-notary/sd-jwt-vc-conformance-profile
        label: SD-JWT VC conformance profile
        nav_order: 130
        doc_type: reference
    # Excluded (intentionally not public via the docs site):
    #   docs/release-notes.md               release notes (repo-owned)
    #   docs/security-assurance.md          release/supply-chain detail, repo-owned
    #   docs/api-reference.md               repo-owned; the site serves the Redoc reference at /api/registry-notary.html
