# Manifest for the build-time docs aggregation pipeline (Wave 3).
#
# `scripts/sync-repo-docs.mjs` reads this file, pulls the allowlisted markdown
# from each product repo (sibling checkout in dev, shallow clone at `ref` in
# CI), and renders Starlight pages under src/content/docs/products/<repo>/.
#
# Allowlist, not pull-all. Each repo carries repo-owned docs (release notes,
# contributor guides, deep operator references) that are better read in the
# repository. Only the genuinely public how-to / reference / explanation /
# tutorial set is listed here.
#
# Fields per repo:
#   remote  GitHub repository the page links and clones from.
#   ref     Pinned commit (bumped explicitly) for reproducible CI builds and
#           for editUrl / GitHub fallback links.
#   version Human-facing version label for the pinned ref. Release docsets in
#           src/data/docsets.yaml bind public doc versions to exact refs.
#   local   Sibling checkout used as the source when it exists (dev). The clone
#           path is used only when no sibling checkout resolves.
# Fields per docs entry:
#   src         path within the repo (relative to the repo root).
#   dest        site route under src/content/docs (no extension).
#   label       Starlight page title and sidebar label.
#   nav_order   ordering hint for the sidebar (lower first).
#   doc_type    Diataxis type for site frontmatter (tutorial | how-to |
#               explanation | reference | decision).
#   description optional; site frontmatter description. Falls back to a derived
#               summary when omitted.
repos:
  registry-relay:
    remote: https://github.com/jeremi/registry-relay
    ref: 479b27709f8f2653d1fd0a882ed809d6185a2d2b
    version: main snapshot
    local: ../registry-relay
    docs:
      - src: docs/README.md
        dest: products/registry-relay/index
        label: Registry Relay
        nav_order: 0
        doc_type: explanation
        description: Operator and adopter documentation for Registry Relay, pulled from the product repository.
      - src: docs/client-integration.md
        dest: products/registry-relay/client-integration
        label: Client integration
        nav_order: 20
        doc_type: how-to
      - src: docs/configuration.md
        dest: products/registry-relay/configuration
        label: Configuration
        nav_order: 30
        doc_type: reference
    # Excluded (intentionally not public via the docs site):
    #   docs/release-notes.md               release notes (repo-owned)
    #   docs/provenance.md                  deep reference, repo-owned
    #   docs/security-assurance.md          release/supply-chain detail, repo-owned
    #   docs/relay-scenario-catalog.md      product/demo guide (marketing-adjacent)
    #   docs/xlsx-readiness-contract.md     deep source contract, repo-owned
    #   docs/api.md                         repo-owned; the site serves the Redoc route reference at /api/registry-relay.html
    #   docs/ops.md                         operator runbook, repo-owned
    #   docs/metadata.md                    deep metadata reference, repo-owned
    #   docs/standards-adapter-operator-guide.md  operator rollout guide, repo-owned
    #   docs/development.md                 contributor guide, repo-owned
  registry-notary:
    remote: https://github.com/jeremi/registry-notary
    ref: 313a226b92a6e2075003b04353dcbdab335c2c10
    version: main snapshot
    local: ../registry-notary
    docs:
      - src: docs/README.md
        dest: products/registry-notary/index
        label: Registry Notary
        nav_order: 0
        doc_type: explanation
        description: Integrator and operator documentation for Registry Notary, pulled from the product repository.
      - src: docs/architecture-overview.md
        dest: products/registry-notary/architecture-overview
        # "Notary architecture" (not the repo's "Architecture overview") so the
        # sidebar entry does not collide with Explanation > Architecture.
        label: Notary architecture
        nav_order: 10
        doc_type: explanation
      - src: docs/client-sdk-guide.md
        dest: products/registry-notary/client-sdk-guide
        label: Client SDK guide
        nav_order: 40
        doc_type: how-to
      - src: docs/identity-and-record-matching.md
        dest: products/registry-notary/identity-and-record-matching
        label: Identity and record matching
        nav_order: 50
        doc_type: explanation
      - src: docs/source-claim-modeling-guide.md
