        label: Source and claim modeling
        nav_order: 60
        doc_type: how-to
      - src: docs/operator-config-reference.md
        dest: products/registry-notary/operator-config-reference
        label: Operator configuration reference
        nav_order: 70
        doc_type: reference
      - src: docs/credential-lifecycle-status.md
        dest: products/registry-notary/credential-lifecycle-status
        label: Credential lifecycle and status
        nav_order: 80
        doc_type: how-to
      - src: docs/signing-key-provider.md
        dest: products/registry-notary/signing-key-provider
        label: Signing key provider
        nav_order: 90
