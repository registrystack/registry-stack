  <title>Registry Notary C4 component view</title>
  <desc>C4-style component diagram for Registry Notary. The Notary service contains request routes, authentication, claim evaluation, source connectors, disclosure policy, credential issuance, and audit. External clients and wallets call the service, and registry sources provide facts over HTTP.</desc>

