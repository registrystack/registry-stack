<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img"
     font-family="'Public Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     text-rendering="geometricPrecision">
  <title>Registry Witness disclosure lens</title>
  <desc>Registry Witness evaluates a claim against registry facts, then a disclosure policy lens controls what leaves the service. The same evaluated fact can become a full value, a predicate, a redacted result, or selected fields inside an SD-JWT VC.</desc>

  <g fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">
    <text x="24" y="32">EVALUATED FACT</text>
    <text x="292" y="32">DISCLOSURE LENS</text>
    <text x="536" y="32">WHAT LEAVES</text>
  </g>
  <g fill="#000091">
    <rect x="24" y="40" width="32" height="2"/>
    <rect x="292" y="40" width="32" height="2"/>
    <rect x="536" y="40" width="32" height="2"/>
  </g>

  <rect x="44" y="116" width="176" height="168" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="68" y="150" fill="#161616" font-size="14" font-weight="700">Claim evaluation</text>
  <text x="68" y="174" fill="#3a3a3a" font-size="12.5">Rule plus source facts</text>
  <text x="68" y="192" fill="#3a3a3a" font-size="12.5">produce one internal</text>
  <text x="68" y="210" fill="#3a3a3a" font-size="12.5">claim result.</text>
  <line x1="68" y1="234" x2="196" y2="234" stroke="#e5e5e5" stroke-width="1"/>
  <text x="68" y="260" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">value, rule, subject</text>

  <path d="M322 96 C396 112 430 160 430 220 C430 280 396 328 322 344 C280 306 260 264 260 220 C260 176 280 134 322 96 Z"
        fill="#ffffff" stroke="#000091" stroke-width="1.4"/>
  <text x="304" y="184" fill="#161616" font-size="15" font-weight="700">Disclosure</text>
  <text x="316" y="206" fill="#161616" font-size="15" font-weight="700">policy</text>
  <text x="302" y="232" fill="#3a3a3a" font-size="12.5">allowed modes</text>
  <text x="304" y="250" fill="#3a3a3a" font-size="12.5">downgrade rule</text>
  <text x="318" y="268" fill="#3a3a3a" font-size="12.5">defaults</text>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="520" y="78" width="156" height="54"/>
    <rect x="520" y="158" width="156" height="54"/>
    <rect x="520" y="238" width="156" height="54"/>
    <rect x="520" y="318" width="156" height="54"/>
  </g>
  <g fill="#161616" font-size="12.5" font-weight="700">
    <text x="540" y="110">Full value</text>
    <text x="540" y="190">Predicate</text>
    <text x="540" y="270">Redacted result</text>
    <text x="540" y="350">SD-JWT disclosure</text>
  </g>
  <g fill="#6a6a6a" font-size="11.5">
    <text x="540" y="124">When allowed</text>
    <text x="540" y="204">Boolean only</text>
    <text x="540" y="284">No claim data</text>
    <text x="540" y="364">Selected fields</text>
  </g>

  <g stroke="#000091" stroke-width="1.2" fill="none">
    <path d="M220 200 C240 200 246 206 260 216"/>
    <polyline points="252,215 260,216 256,209"/>
    <path d="M430 178 C468 146 486 110 520 105"/>
    <polyline points="513,102 520,105 514,110"/>
    <path d="M430 208 C466 196 486 188 520 185"/>
    <polyline points="513,182 520,185 514,190"/>
    <path d="M430 236 C466 248 486 264 520 265"/>
    <polyline points="513,261 520,265 513,269"/>
    <path d="M430 264 C466 306 486 344 520 345"/>
    <polyline points="513,341 520,345 513,349"/>
  </g>

  <g stroke="#6a6a6a" stroke-width="1" stroke-dasharray="4 4" fill="none">
    <path d="M330 344 C326 376 170 374 132 284"/>
  </g>
  <text x="196" y="388" fill="#6a6a6a" font-size="12.5">Audit records the evaluation path.</text>

  <line x1="24" y1="402" x2="696" y2="402" stroke="#e5e5e5" stroke-width="1"/>
</svg>
