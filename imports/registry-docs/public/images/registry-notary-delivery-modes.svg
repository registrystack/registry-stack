<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="w-title w-desc" fill="none">
  <title id="w-title">Registry Notary: two delivery modes for the same evidence</title>
  <desc id="w-desc">Registry Notary reads a source registry and issues a signed SD-JWT VC. The same credential reaches consumers through two delivery paths. In the wallet-mediated path, the holder receives the credential in a wallet and presents it to a citizen-facing service. In the system-to-system path, a backend service requests the credential directly from Notary over its API. The credential payload is identical; only the delivery mode differs.</desc>

  <style>
    .h { font: 600 13px 'Public Sans', system-ui, sans-serif; fill: #161616; }
    .m { font: 600 10.5px 'Public Sans', system-ui, sans-serif; fill: #6a6a6a; letter-spacing: 0.08em; }
    .c { font: 400 11px 'IBM Plex Mono', ui-monospace, monospace; fill: #6a6a6a; }
    .b { font: 400 12px 'Public Sans', system-ui, sans-serif; fill: #3a3a3a; }
    .a { font: 600 13px 'Public Sans', system-ui, sans-serif; fill: #000091; }
  </style>

  <!-- Top captions -->
  <text x="24" y="40" class="m">SOURCE</text>
  <text x="188" y="40" class="m">REGISTRY WITNESS · ISSUER</text>
  <text x="440" y="40" class="m">VIA WALLET · HOLDER-MEDIATED</text>

  <!-- Source registry box -->
  <rect x="24" y="144" width="140" height="72" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <text x="36" y="166" class="h">Source registry</text>
  <line x1="36" y1="176" x2="152" y2="176" stroke="#e5e5e5"/>
  <text x="36" y="194" class="c">Registry Data API</text>
  <text x="36" y="210" class="c">DCI · GovStack BB</text>

  <!-- Notary box -->
  <rect x="188" y="144" width="180" height="72" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <rect x="188" y="144" width="4" height="72" fill="#000091"/>
  <text x="204" y="166" class="a">Registry Notary</text>
  <line x1="204" y1="176" x2="356" y2="176" stroke="#e5e5e5"/>
  <text x="204" y="194" class="b">evaluates claims</text>
  <text x="204" y="210" class="b">signs SD-JWT VC</text>

  <!-- Wallet box (upper lane) -->
  <rect x="440" y="54" width="110" height="72" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <text x="452" y="76" class="h">Wallet</text>
  <line x1="452" y1="86" x2="538" y2="86" stroke="#e5e5e5"/>
  <text x="452" y="104" class="b">holder</text>
  <text x="452" y="120" class="b">stores · presents</text>

  <!-- Citizen service box (upper lane) -->
  <rect x="580" y="54" width="116" height="72" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <text x="592" y="76" class="h">Citizen service</text>
  <line x1="592" y1="86" x2="684" y2="86" stroke="#e5e5e5"/>
  <text x="592" y="104" class="b">self-service</text>
  <text x="592" y="120" class="b">verifier</text>

  <!-- Backend service box (lower lane) -->
  <rect x="580" y="234" width="116" height="72" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <text x="592" y="256" class="h">Backend service</text>
  <line x1="592" y1="266" x2="684" y2="266" stroke="#e5e5e5"/>
  <text x="592" y="284" class="b">another program</text>
  <text x="592" y="300" class="b">verifier</text>

  <!-- Bottom lane caption -->
  <text x="440" y="222" class="m">DIRECT API · SYSTEM-TO-SYSTEM</text>

  <!-- Arrow: Source → Notary -->
  <line x1="164" y1="180" x2="180" y2="180" stroke="#161616"/>
  <polygon points="188,180 180,176 180,184" fill="#161616"/>

  <!-- Notary exits to a branch point at x=400, y=180 -->
  <line x1="368" y1="180" x2="400" y2="180" stroke="#161616"/>

  <!-- Upper branch: branch → up → wallet -->
  <line x1="400" y1="180" x2="400" y2="90" stroke="#161616"/>
  <line x1="400" y1="90" x2="432" y2="90" stroke="#161616"/>
  <polygon points="440,90 432,86 432,94" fill="#161616"/>

  <!-- Wallet → Citizen service -->
  <line x1="550" y1="90" x2="572" y2="90" stroke="#161616"/>
  <polygon points="580,90 572,86 572,94" fill="#161616"/>

  <!-- Lower branch: branch → down → backend service -->
  <line x1="400" y1="180" x2="400" y2="270" stroke="#161616"/>
  <line x1="400" y1="270" x2="572" y2="270" stroke="#161616"/>
  <polygon points="580,270 572,266 572,274" fill="#161616"/>

  <!-- Footer note -->
  <line x1="24" y1="334" x2="696" y2="334" stroke="#e5e5e5"/>
  <text x="24" y="354" class="b">Both paths deliver the same signed SD-JWT VC.</text>
  <text x="24" y="370" class="b">Only the delivery mode and the consumer differ.</text>
</svg>
