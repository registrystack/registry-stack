<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img"
     font-family="'Public Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     text-rendering="geometricPrecision">
  <title>Registry Relay private to public surface</title>
  <desc>Registry Relay sits between private registry storage and public entity views. Private file and table details stop at the Relay boundary. Relay applies authentication, scope checks, entity mapping, field projection, metadata scoping, and audit before returning public views to callers.</desc>

  <g fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">
    <text x="24" y="32">PRIVATE STORAGE</text>
    <text x="266" y="32">RELAY CONTROL SURFACE</text>
    <text x="532" y="32">PUBLIC VIEWS</text>
  </g>
  <g fill="#000091">
    <rect x="24" y="40" width="32" height="2"/>
    <rect x="266" y="40" width="32" height="2"/>
    <rect x="532" y="40" width="32" height="2"/>
  </g>

  <rect x="24" y="76" width="184" height="244" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <rect x="256" y="64" width="208" height="300" fill="#ffffff" stroke="#000091" stroke-width="1.4"/>
  <rect x="512" y="76" width="184" height="244" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>

  <text x="48" y="110" fill="#161616" font-size="14" font-weight="700">Raw source shape</text>
  <text x="280" y="98" fill="#161616" font-size="15" font-weight="700">Registry Relay</text>
  <text x="280" y="118" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">registry-relay</text>
  <text x="536" y="110" fill="#161616" font-size="14" font-weight="700">Caller-facing shape</text>

  <g stroke="#e5e5e5" stroke-width="1" fill="none">
    <rect x="48" y="136" width="136" height="112"/>
    <line x1="48" y1="164" x2="184" y2="164"/>
    <line x1="48" y1="192" x2="184" y2="192"/>
    <line x1="48" y1="220" x2="184" y2="220"/>
    <line x1="94" y1="136" x2="94" y2="248"/>
    <line x1="140" y1="136" x2="140" y2="248"/>
  </g>
  <g fill="#6a6a6a" font-size="11">
    <text x="58" y="154">table</text>
    <text x="104" y="154">col</text>
    <text x="150" y="154">col</text>
    <text x="58" y="182">csv</text>
    <text x="58" y="210">xlsx</text>
    <text x="58" y="238">db</text>
  </g>
  <text x="48" y="274" fill="#3a3a3a" font-size="12.5">Source paths, table IDs,</text>
  <text x="48" y="292" fill="#3a3a3a" font-size="12.5">columns, and refresh</text>
  <text x="48" y="310" fill="#3a3a3a" font-size="12.5">rules stay private.</text>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="280" y="142" width="160" height="38"/>
    <rect x="280" y="192" width="160" height="38"/>
    <rect x="280" y="242" width="160" height="38"/>
    <rect x="280" y="292" width="160" height="38"/>
  </g>
  <g fill="#161616" font-size="12.5" font-weight="700">
    <text x="298" y="166">Auth and scopes</text>
    <text x="298" y="216">Entity mapping</text>
    <text x="298" y="266">Field projection</text>
    <text x="298" y="316">Audit envelope</text>
  </g>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="536" y="136" width="136" height="44"/>
    <rect x="536" y="198" width="136" height="44"/>
    <rect x="536" y="260" width="136" height="44"/>
  </g>
  <g fill="#161616" font-size="12.5" font-weight="700">
    <text x="552" y="162">Entity rows</text>
    <text x="552" y="224">Scoped metadata</text>
    <text x="552" y="286">Aggregates</text>
  </g>
  <g fill="#6a6a6a" font-size="11.5">
    <text x="552" y="176">dataset/entity</text>
    <text x="552" y="238">visible to caller</text>
    <text x="552" y="300">declared only</text>
  </g>

  <g stroke="#000091" stroke-width="1.2" fill="none">
    <path d="M184 166 C218 166 230 156 256 156"/>
    <polyline points="250,152 256,156 250,160"/>
    <path d="M184 220 C224 220 224 262 280 262"/>
    <polyline points="274,258 280,262 274,266"/>
    <path d="M440 160 C474 160 496 158 536 158"/>
    <polyline points="530,154 536,158 530,162"/>
    <path d="M440 212 C482 212 492 220 536 220"/>
    <polyline points="530,216 536,220 530,224"/>
    <path d="M440 264 C478 264 494 282 536 282"/>
    <polyline points="530,278 536,282 530,286"/>
  </g>

  <line x1="232" y1="76" x2="232" y2="320" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="24" y1="392" x2="696" y2="392" stroke="#e5e5e5" stroke-width="1"/>
</svg>
