StylesPath = styles
MinAlertLevel = suggestion
Vocab = RegistryDocs

[formats]
mdx = md

[*.md]
BasedOnStyles = Vale, RegistryDocsBase, RegistryDocs
Vale.Terms = NO
Vale.Spelling = NO

[*.mdx]
BasedOnStyles = Vale, RegistryDocsBase, RegistryDocs
Vale.Terms = NO
Vale.Spelling = NO
TokenIgnores = (?s)---.*?---, (?s)\{/\*.*?\*/\}, `[^`]*`, (?s)<[^>]+>, import .*

# Formal specification layer. These documents use RFC 2119 keywords (MUST,
# SHOULD, MAY), so FuturePromises is disabled here: "the relay SHOULD support X"
# is normative language, not an unkept promise. RegistryDocsSpec replaces it
# with conformance-honesty checks. TokenIgnores is repeated because a path
# section's settings do not inherit the format section's keys.
[src/content/docs/spec/**]
BasedOnStyles = Vale, RegistryDocsBase, RegistryDocs, RegistryDocsSpec
RegistryDocsBase.FuturePromises = NO
Vale.Terms = NO
Vale.Spelling = NO
TokenIgnores = (?s)---.*?---, (?s)\{/\*.*?\*/\}, `[^`]*`, (?s)<[^>]+>, import .*
