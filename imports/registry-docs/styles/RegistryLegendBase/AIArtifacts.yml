extends: existence
message: "Remove AI-generated boilerplate: '%s'. Write the docs claim directly."
level: error
ignorecase: true
tokens:
  - '\bAs (?:an AI|a large language model)\b'
  - '\bI (?:am|''m) (?:an AI|a large language model)\b'
  - '\b(?:my|the) knowledge cutoff\b'
  - '\bI (?:do not|don''t) have access to (?:real-time|current) (?:information|data)\b'
  - '\bI (?:cannot|can''t) browse (?:the )?(?:internet|web)\b'
  - '\bGenerated by (?:ChatGPT|OpenAI)\b'
