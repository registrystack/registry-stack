    entities:
      - name: social_group
        title: Social Registry Group
        description: Synthetic social-registry group exposed through the SP DCI Social Registry sync-search adapter.
        table: social_groups_table
        concept_uri: spdci:extensions/social/v1/Group
        fields:
          - name: group_id
            from: group_id
          - name: group_type
            from: group_type
          - name: district
            from: district
          - name: address_line
            from: address_line
          - name: poverty_score
            from: poverty_score
          - name: poverty_score_type
            from: poverty_score_type
          - name: group_size
            from: group_size
          - name: head_member_id
            from: head_member_id
          - name: head_national_id
            from: head_national_id
          - name: head_given_name
            from: head_given_name
          - name: head_surname
