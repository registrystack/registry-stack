# SPDX-License-Identifier: Apache-2.0
# Optional Social Protection Digital Convergence Initiative (SP DCI)
# Registry gateway demo with separate Disability, Social, Civil, and Farmer datasets.
# Run with:
#   cargo run --features spdci-api-standards,standards-cel-mapping -- --config demo/config/disability_registry.yaml

server:
  bind: 0.0.0.0:4242

metadata:
  manifest_path: disability_registry.metadata.yaml

catalog:
  title: SP DCI Registry Gateway Demo
  base_url: http://127.0.0.1:4242
  publisher: Ministry of Social Affairs (Demo)

vocabularies:
  spdci: https://schema.spdci.org/

auth:
  mode: api_key
  api_keys:
    - id: catalog_viewer
      hash_env: CATALOG_VIEWER_HASH
      scopes:
        - disability_registry:metadata
        - civil_registry:metadata
        - social_registry:metadata
        - farmer_registry:metadata

    - id: planning_analyst
      hash_env: PLANNING_ANALYST_HASH
      scopes:
        - disability_registry:metadata
        - civil_registry:metadata
        - social_registry:metadata
        - farmer_registry:metadata

    - id: casework_system
      hash_env: CASEWORK_SYSTEM_HASH
      scopes:
        - disability_registry:metadata
        - disability_registry:rows
        - disability_registry:verify
        - disability_registry:claim_verification
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:verify
        - social_registry:metadata
        - social_registry:rows
        - social_registry:verify
        - farmer_registry:metadata
        - farmer_registry:rows
        - farmer_registry:verify

    - id: verification_service
      hash_env: VERIFICATION_SERVICE_HASH
      scopes:
        - disability_registry:verify
        - disability_registry:claim_verification
        - civil_registry:verify
        - social_registry:verify
        - farmer_registry:verify

    - id: operations_admin
      hash_env: OPERATIONS_ADMIN_HASH
      scopes:
        - admin
        - disability_registry:metadata
        - civil_registry:metadata
        - social_registry:metadata
        - farmer_registry:metadata

claim_verification:
  binding_key_id: demo-disability-v1
  # Env value format: hex:<64+ lowercase hex chars>
  # demo/scripts/generate_demo_keys.py emits this value for local review.
  binding_key_env: CLAIM_VERIFICATION_BINDING_KEY

standards:
  spdci:
    disability_registry:
      dataset: disability_registry
      entity: disabled_person
      query_key: personal_details.member_identifier
      query_field: member_identifier
      disabled_status_field: disability_status
      disabled_positive_values: [approved]
    registries:
      dr:
        dataset: disability_registry
        entity: disabled_person
        registry_type: ns:org:RegistryType:DR
        record_type: spdci-extensions-dci:DisabledPerson
        identifiers:
          DISABILITY_ID: member_identifier
          MEMBER_ID: member_identifier
          UIN: member_identifier
          NIN: member_identifier
          DRN: member_identifier
          NATIONAL_ID: member_identifier
          NID: member_identifier
        expression_fields:
          personal_details.member_identifier: member_identifier
          disability_status: disability_status
          disability_details.impairment_type: impairment_type
          home_district: home_district
        response_mapping_path: demo/mappings/spdci/dr-disabled-person.yaml
        response_schema_path: demo/schemas/spdci/dr-disabled-person.schema.json
      sr:
        dataset: social_registry
        entity: social_group
        registry_type: ns:org:RegistryType:Social
        record_type: SRPerson
        identifiers:
          GROUP_ID: group_id
          HOUSEHOLD_ID: group_id
          UIN: head_national_id
          NIN: head_national_id
        expression_fields:
          group_identifier.identifier_value: group_id
          group_type: group_type
          place.address: district
          poverty_score: poverty_score
        response_mapping_path: demo/mappings/spdci/sr-social-group.yaml
        response_schema_path: demo/schemas/spdci/sr-social-group.schema.json
      crvs:
        dataset: civil_registry
        entity: civil_person
        registry_type: ns:org:RegistryType:Civil
        record_type: spdci-extensions-dci:Person
        identifiers:
          PERSON_ID: id
          BIRTH_REG_NO: id
          NATIONAL_ID: national_id
          UIN: national_id
          NIN: national_id
        expression_fields:
          sample_field: id
          identifier.identifier_value: national_id
          sex: sex
          birth_date: birth_date
          registration_date: registration_date
          address.locality: district
        response_mapping_path: demo/mappings/spdci/crvs-person.yaml
        response_schema_path: demo/schemas/spdci/crvs-person.schema.json
      fr:
        dataset: farmer_registry
        entity: farmer
        registry_type: ns:org:RegistryType:FR
        record_type: spdci-extensions-dci:Farmer
        identifiers:
          FARMER_ID: id
          MEMBER_ID: id
          UIN: national_id
          NIN: national_id
        expression_fields:
          famer_personal_details.member_identifier.identifier_value: id
          farmer_personal_details.member_identifier.identifier_value: id
          family_details.group_identifier.identifier_value: family_id
          farm_details.farm_type: farm_type
          farm_details.place.name: farm_place_name
        response_mapping_path: demo/mappings/spdci/fr-farmer.yaml
        response_schema_path: demo/schemas/spdci/fr-farmer.schema.json

audit:
  sink: stdout
  format: jsonl

datasets:
  - id: disability_registry
    title: SP DCI Disability Registry
    description: >-
      Synthetic disability registry backed by the SP DCI demo workbook. It
      demonstrates disabled-status, disability-details, and disability-support
      lookups.
    owner: Ministry of Social Affairs
    sensitivity: personal
    access_rights: restricted
    update_frequency: monthly
    conforms_to:
      - spdci:extensions/dr/v1/DisabledPerson
    applicable_legislation:
      - https://demo.example.gov/legislation/disability-registry-act
    public_services:
      - id: https://demo.example.gov/services/disability-registration
        title: Disability registration service
        description: Public service responsible for registering and maintaining certified disability status in the demo environment.
    defaults:
      refresh:
        mode: manual

    tables:
      - id: disabled_people_table
        source:
          type: file
          path: demo/data/disability_registry.xlsx
          format:
            xlsx:
              sheet: DisabledPeople
        primary_key: person_id
        schema:
          strict: true
          fields:
            - name: person_id
              type: string
              nullable: false
            - name: member_identifier
              type: string
              nullable: false
            - name: given_name
              type: string
              nullable: false
            - name: surname
              type: string
              nullable: false
            - name: sex
              type: string
              nullable: false
            - name: birth_date
              type: date
              nullable: false
            - name: disability_status
              type: string
              nullable: false
            - name: disability_level
              type: string
              nullable: true
            - name: impairment_type
              type: string
              nullable: true
            - name: impairment_level
              type: string
              nullable: true
            - name: human_assistance_type
              type: string
              nullable: true
            - name: support_frequency
              type: string
              nullable: true
            - name: support_status
              type: string
              nullable: true
            - name: disability_details
              type: string
              nullable: true
            - name: disability_support
              type: string
              nullable: true
            - name: home_district
              type: string
              nullable: true
            - name: age_band
              type: string
              nullable: true
            - name: registration_date
              type: date
              nullable: true
            - name: last_updated
              type: date
              nullable: true


    entities:
      - name: disabled_person
        title: Disabled Person
        description: Person record exposed through the SP DCI Disability Registry sync adapter.
        table: disabled_people_table
        concept_uri: spdci:extensions/dr/v1/DisabledPerson
        fields:
          - name: id
            from: person_id
          - name: member_identifier
            from: member_identifier
          - name: given_name
            from: given_name
          - name: surname
            from: surname
          - name: sex
            from: sex
          - name: birth_date
            from: birth_date
          - name: disability_status
            from: disability_status
          - name: disability_level
            from: disability_level
          - name: impairment_type
            from: impairment_type
          - name: impairment_level
            from: impairment_level
          - name: human_assistance_type
            from: human_assistance_type
          - name: support_frequency
            from: support_frequency
          - name: support_status
            from: support_status
          - name: disability_details
            from: disability_details
          - name: disability_support
            from: disability_support
          - name: home_district
            from: home_district
          - name: age_band
            from: age_band
          - name: registration_date
            from: registration_date
          - name: last_updated
            from: last_updated
        access:
          metadata_scope:    disability_registry:metadata
          aggregate_scope:   disability_registry:aggregate
          read_scope:        disability_registry:rows
          verify_scope:      disability_registry:verify
          claim_verification_scope: disability_registry:claim_verification
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: member_identifier
              ops: [eq, in]
            - field: disability_status
              ops: [eq, in]
            - field: impairment_type
              ops: [eq, in]
            - field: home_district
              ops: [eq, in]
        claim_verification:
          rulesets:
            disability-status-v1:
              mode: normalized_exact
              required_claims: [member_identifier, disability_status]
              candidate_lookup: [member_identifier]
              match_fields:
                member_identifier: member_identifier
                disability_status: disability_status
              expose_ambiguous: false


  - id: civil_registry
    title: SP DCI Civil Registry
    description: >-
      Synthetic civil registry backed by the SP DCI demo workbook. It
      demonstrates the CRVS sync-search adapter without making the disability
      registry the system owner.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: monthly
    conforms_to:
      - spdci:extensions/crvs/v1/Person
    defaults:
      refresh:
        mode: manual

    tables:
      - id: civil_persons_table
        source:
          type: file
          path: demo/data/disability_registry.xlsx
          format:
            xlsx:
              sheet: CivilPersons
        primary_key: civil_person_id
        schema:
          strict: true
          fields:
            - name: civil_person_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
            - name: given_name
              type: string
              nullable: false
            - name: surname
              type: string
              nullable: false
            - name: sex
              type: string
              nullable: false
            - name: birth_date
              type: date
              nullable: false
            - name: birth_place
              type: string
              nullable: false
            - name: address_line
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: phone
              type: string
              nullable: false
            - name: email
              type: string
              nullable: false
            - name: registration_date
              type: date
              nullable: false
            - name: last_updated
              type: date
              nullable: false


    entities:
      - name: civil_person
        title: Civil Person
        description: Synthetic civil-registration person exposed through the SP DCI CRVS sync-search adapter.
        table: civil_persons_table
        concept_uri: spdci:extensions/crvs/v1/Person
        fields:
          - name: id
            from: civil_person_id
          - name: national_id
            from: national_id
          - name: given_name
            from: given_name
          - name: surname
            from: surname
          - name: sex
            from: sex
          - name: birth_date
            from: birth_date
          - name: birth_place
            from: birth_place
          - name: address_line
            from: address_line
          - name: district
            from: district
          - name: phone
            from: phone
          - name: email
            from: email
          - name: registration_date
            from: registration_date
          - name: last_updated
            from: last_updated
        access:
          metadata_scope:    civil_registry:metadata
          aggregate_scope:   civil_registry:aggregate
          read_scope:        civil_registry:rows
          verify_scope:      civil_registry:verify
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: sex
              ops: [eq, in]
            - field: birth_date
              ops: [eq, gte, lte]
            - field: registration_date
              ops: [eq, gte, lte]
            - field: district
              ops: [eq, in]


  - id: social_registry
