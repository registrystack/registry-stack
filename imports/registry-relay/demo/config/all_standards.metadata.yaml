      type: string
      required: true
    - name: member_identifier
      type: string
      required: true
    - name: given_name
      type: string
      required: true
    - name: surname
      type: string
      required: true
    - name: sex
      type: string
      required: true
    - name: birth_date
      type: date
      required: true
    - name: disability_status
      type: string
      required: true
    - name: disability_level
      type: string
    - name: impairment_type
      type: string
    - name: impairment_level
      type: string
    - name: human_assistance_type
      type: string
    - name: support_frequency
      type: string
    - name: support_status
      type: string
    - name: disability_details
      type: string
    - name: disability_support
      type: string
    - name: home_district
      type: string
    - name: age_band
      type: string
    - name: registration_date
      type: date
    - name: last_updated
