- id: subject_registry
  title: Subject Registry
  description: 'Canonical mapping between subject identifiers used by different administrative
    datasets. Contains no personal data: only opaque canonical ids and per-dataset
    aliases. The linkage itself is the sensitive surface; access is gated to the linkage_service
    persona only.'
  owner: Government Identity Coordination Function
  sensitivity: confidential
  access_rights: restricted
  update_frequency: as_needed
  entities:
  - name: subject
    title: Subject
    description: A canonical subject identity with per-dataset aliases. The registry
      deliberately has no relationships to personal datasets; cross-dataset composition
      stays client-side and is audited per call.
    identifiers:
    - name: canonical_id
      kind: primary
    fields:
    - name: canonical_id
      type: string
      required: true
    - name: benefits_person_alias
      type: string
    - name: benefits_household_alias
      type: string
    - name: education_student_alias
      type: string
    - name: education_guardian_alias
      type: string
    - name: linkage_method
      type: string
      required: true
    - name: linkage_confidence
      type: string
      required: true
    - name: linked_on
      type: date
      required: true
- id: disability_registry
  title: SP DCI Disability Registry
  description: Synthetic disability registry backed by the SP DCI demo workbook. It demonstrates disabled-status, disability-details, and disability-support lookups.
  owner: Ministry of Social Affairs
  sensitivity: personal
  access_rights: restricted
  update_frequency: monthly
  conforms_to:
  - spdci:extensions/dr/v1/DisabledPerson
  applicable_legislation:
  - https://demo.example.gov/legislation/disability-registry-act
  public_services:
  - id: https://demo.example.gov/services/disability-registration
    title: Disability registration service
    description: Public service responsible for registering and maintaining certified disability status in the demo environment.
  policy:
    uid: https://demo.example.gov/datasets/disability_registry#illustrative-offer
    assigner: did:web:social-affairs.demo.example.gov
    profile:
    - https://demo.example.gov/odrl/profile/illustrative-government-data-sharing
    permissions:
    - action: odrl:use
      constraints:
      - left_operand: odrl:purpose
        operator: odrl:isA
        right_operand:
          iri: https://demo.example.gov/purpose/disability-benefit-eligibility
      - left_operand: odrl:recipient
        operator: odrl:isA
        right_operand:
          iri: https://demo.example.gov/recipient/social-protection-program
      duties:
      - action: odrl:attribute
      - action: odrl:delete
        constraints:
        - left_operand: odrl:elapsedTime
          operator: odrl:lteq
          right_operand:
            value: P90D
          datatype: xsd:duration
    prohibitions:
    - action: odrl:sell
    - action: https://demo.example.gov/odrl/action/reidentify
  evidence_offerings:
  - id: disability_status_evidence_offering
    iri: https://demo.example.gov/evidence-offerings/disability-status
    title: Disability status evidence
    description: Registry Relay verification for disability status by member identifier.
    evidence_type: disability_status_evidence
    issuing_authority:
      id: ministry_of_social_affairs
      iri: did:web:social-affairs.demo.example.gov
      name: Ministry of Social Affairs
      country: ZZ
    jurisdiction:
      country: ZZ
    level_of_assurance: substantial
    entity: disabled_person
    lookup_keys:
    - member_identifier
    access:
      kind: registry-witness
      conforms_to: registry_relay:registry-witness-v1
      ruleset: disability-status-v1
    policy:
      purpose:
      - https://demo.example.gov/purpose/disability-benefit-eligibility
  entities:
  - name: disabled_person
    title: Disabled Person
    description: Person record exposed through the SP DCI Disability Registry sync
      adapter.
    concept_uri: spdci:extensions/dr/v1/DisabledPerson
    identifiers:
    - name: id
      kind: primary
    fields:
