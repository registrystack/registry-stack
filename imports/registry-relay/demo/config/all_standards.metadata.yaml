      type: string
      required: true
    - name: household_id
      type: string
      required: true
    - name: age_band
      type: string
      required: true
    - name: sex
      type: string
      required: true
    - name: disability_status
      type: string
      required: true
    - name: benefit_role
      type: string
      required: true
    - name: eligibility_status
      type: string
      required: true
    relationships:
