datasets:
- id: benefits_casework
  title: Benefits Casework
  description: Household, person, benefit case, and payment data for social protection
    programme administration. Used for eligibility checks, grievance follow-up, reconciliation,
    and planning aggregates.
  owner: Ministry of Social Affairs
  sensitivity: personal
  access_rights: restricted
  update_frequency: monthly
  entities:
  - name: household
    title: Household
    description: A household enrolled in the benefits programme
    identifiers:
    - name: id
      kind: primary
    fields:
    - name: id
      type: string
      required: true
    - name: district
      type: string
      required: true
    - name: municipality
      type: string
      required: true
    - name: household_size
      type: number
      required: true
    - name: poverty_band
      type: string
      required: true
    - name: enrollment_status
      type: string
      required: true
    - name: enrolled_on
      type: date
      required: true
    relationships:
    - name: members
      target_entity: person
      cardinality: many
    - name: cases
      target_entity: case
      cardinality: many
    - name: payments
      target_entity: payment
      cardinality: many
  - name: person
    title: Person
    description: An individual member of a benefit household
    identifiers:
    - name: id
      kind: primary
    fields:
