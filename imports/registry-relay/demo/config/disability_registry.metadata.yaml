# SPDX-License-Identifier: Apache-2.0
# Portable metadata manifest generated from disability_registry.yaml.

schema_version: registry-metadata/v1
catalog:
  id: spdci-registry-gateway
  base_url: http://127.0.0.1:4242
  title: SP DCI Registry Gateway Demo
  publisher:
    name: Ministry of Social Affairs (Demo)
  standards:
    dcat: '3.0'
    shacl: '1.1'
    json_schema: 2020-12
  application_profiles:
  - id: bregdcat-ap
    version: '3.0'
datasets:
- id: disability_registry
  title: SP DCI Disability Registry
  description: Synthetic disability registry backed by the SP DCI demo workbook. It demonstrates disabled-status, disability-details, and disability-support lookups.
  owner: Ministry of Social Affairs
  sensitivity: personal
  access_rights: restricted
  update_frequency: monthly
  conforms_to:
  - spdci:extensions/dr/v1/DisabledPerson
  applicable_legislation:
  - https://demo.example.gov/legislation/disability-registry-act
  public_services:
  - id: https://demo.example.gov/services/disability-registration
    title: Disability registration service
    description: Public service responsible for registering and maintaining certified disability status in the demo environment.
  policy:
    uid: https://demo.example.gov/datasets/disability_registry#illustrative-offer
    assigner: did:web:social-affairs.demo.example.gov
    profile:
    - https://demo.example.gov/odrl/profile/illustrative-government-data-sharing
    permissions:
    - action: odrl:use
      constraints:
      - left_operand: odrl:purpose
        operator: odrl:isA
        right_operand:
          iri: https://demo.example.gov/purpose/disability-benefit-eligibility
      - left_operand: odrl:recipient
        operator: odrl:isA
        right_operand:
          iri: https://demo.example.gov/recipient/social-protection-program
      duties:
      - action: odrl:attribute
      - action: odrl:delete
        constraints:
        - left_operand: odrl:elapsedTime
          operator: odrl:lteq
          right_operand:
            value: P90D
          datatype: xsd:duration
    prohibitions:
    - action: odrl:sell
    - action: https://demo.example.gov/odrl/action/reidentify
  entities:
  - name: disabled_person
    title: Disabled Person
    description: Person record exposed through the SP DCI Disability Registry sync
      adapter.
    concept_uri: spdci:extensions/dr/v1/DisabledPerson
    identifiers:
    - name: id
      kind: primary
    fields:
    - name: id
      type: string
      required: true
    - name: member_identifier
      type: string
      required: true
    - name: given_name
      type: string
      required: true
    - name: surname
      type: string
      required: true
    - name: sex
      type: string
      required: true
    - name: birth_date
      type: date
      required: true
    - name: disability_status
      type: string
      required: true
    - name: disability_level
      type: string
    - name: impairment_type
      type: string
    - name: impairment_level
      type: string
    - name: human_assistance_type
      type: string
    - name: support_frequency
      type: string
    - name: support_status
      type: string
    - name: disability_details
      type: string
    - name: disability_support
      type: string
    - name: home_district
      type: string
    - name: age_band
      type: string
    - name: registration_date
      type: date
    - name: last_updated
      type: date
