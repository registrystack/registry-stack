      required: true
    - name: household_id
      type: string
      required: true
    - name: case_type
      type: string
      required: true
    - name: case_status
      type: string
      required: true
    - name: opened_on
      type: date
      required: true
    - name: closed_on
      type: date
    - name: priority
      type: string
      required: true
    relationships:
