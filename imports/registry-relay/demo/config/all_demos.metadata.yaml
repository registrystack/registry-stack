datasets:
- id: benefits_casework
  title: Benefits Casework
  description: Household, person, benefit case, and payment data for social protection
    programme administration. Used for eligibility checks, grievance follow-up, reconciliation,
    and planning aggregates.
  owner: Ministry of Social Affairs
  sensitivity: personal
  access_rights: restricted
  update_frequency: monthly
  evidence_offerings:
  - id: benefits_person_evidence
    iri: https://demo.example.gov/evidence-offerings/benefits-person
    title: Benefits person status evidence
    description: Registry Relay verification for submitted benefits person eligibility status and role facts.
    evidence_type: benefits_person_record_evidence
    issuing_authority:
      id: ministry_of_social_affairs
      iri: did:web:social-affairs.demo.example.gov
      name: Ministry of Social Affairs
      country: ZZ
    jurisdiction:
      country: ZZ
    level_of_assurance: substantial
    entity: person
    lookup_keys:
    - id
    access:
      kind: registry-witness
      conforms_to: registry_relay:registry-witness-v1
      ruleset: benefits-person-v1
    policy:
      purpose:
      - https://demo.example.gov/purpose/social-protection-eligibility
  entities:
  - name: household
    title: Household
    description: A household enrolled in the benefits programme
    identifiers:
    - name: id
      kind: primary
    fields:
