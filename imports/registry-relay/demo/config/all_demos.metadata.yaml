      type: string
      required: true
    - name: district
      type: string
      required: true
    - name: municipality
      type: string
      required: true
    - name: household_size
      type: number
      required: true
    - name: poverty_band
      type: string
      required: true
    - name: enrollment_status
      type: string
      required: true
    - name: enrolled_on
      type: date
      required: true
    relationships:
    - name: members
      target_entity: person
      cardinality: many
    - name: cases
      target_entity: case
      cardinality: many
    - name: payments
      target_entity: payment
      cardinality: many
  - name: person
    title: Person
    description: An individual member of a benefit household
    identifiers:
    - name: id
      kind: primary
    fields:
    - name: id
      type: string
      required: true
    - name: household_id
      type: string
      required: true
    - name: age_band
      type: string
      required: true
    - name: sex
      type: string
      required: true
    - name: disability_status
      type: string
      required: true
    - name: benefit_role
      type: string
      required: true
    - name: eligibility_status
