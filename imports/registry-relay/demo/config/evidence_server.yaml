# SPDX-License-Identifier: Apache-2.0
# Standalone Evidence Server process for the split Evidence Server demo.
# It computes evidence by calling the separate registry-relay process declared
# in evidence_registries.yaml.

server:
  bind: 127.0.0.1:4255

catalog:
  title: Evidence Server Demo
  base_url: http://127.0.0.1:4255
  publisher: Government Data Reuse Cell (Demo)

vocabularies:
  spdci: https://schema.spdci.org/

auth:
  mode: api_key
  api_keys:
    - id: verification_service
      hash_env: VERIFICATION_SERVICE_HASH
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification
    - id: casework_system
      hash_env: CASEWORK_SYSTEM_HASH
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - farmer_registry:metadata
        - farmer_registry:rows

evidence:
  enabled: true
  service_id: demo.evidence-server
  inline_batch_limit: 20
  source_connections:
    crvs:
      base_url: http://127.0.0.1:4256
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
    registry_relay:
      base_url: http://127.0.0.1:4256
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
  credential_profiles:
    smallholder_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:agriculture.demo.example.gov
      issuer_key_env: EVIDENCE_SERVER_ISSUER_JWK
      issuer_kid: did:web:agriculture.demo.example.gov#evidence-server-demo-key-1
      vct: https://demo.example.gov/credentials/smallholder-farmer/v1
      validity_seconds: 86400
      allowed_claims:
        - farmer-under-4ha
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        crvs:
          connector: dci
          connection: crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: crvs
        field: birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.evidence-server.claim-result+json
        - 'application/ld+json; profile="cccev"'
    - id: farmed-land-size
      title: Farmed land size
      version: 2026-05
      subject_type: person
      value:
        type: number
        unit: hectare
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        farmer:
          connector: registry_data_api
          connection: registry_relay
          required_scope: farmer_registry:evidence_verification
          dataset: farmer_registry
          entity: farmer
          lookup:
            input: subject_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            farmed_land_size_hectares:
              field: farmed_land_size_hectares
              type: number
              unit: hectare
              required: true
      rule:
        type: extract
        source: farmer
        field: farmed_land_size_hectares
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.evidence-server.claim-result+json
    - id: farmer-under-4ha
      title: Farmer under four hectares
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      depends_on:
        - farmed-land-size
      rule:
        type: cel
        expression: "claims.farmed_land_size.value < 4.0"
        bindings:
          claims:
            farmed_land_size:
              claim: farmed-land-size
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 10
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.evidence-server.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - smallholder_sd_jwt
      cccev:
        requirement_type: InformationRequirement
      oots:
        enabled: false

standards:
  spdci:
    registries:
      crvs:
        dataset: civil_registry
        entity: civil_person
        registry_type: ns:org:RegistryType:CRVS
        record_type: spdci-extensions-crvs:Person
        identifiers:
          NATIONAL_ID: national_id
          UIN: national_id
          NIN: national_id
        expression_fields:
          birth_date: birth_date
          address.locality: district

audit:
  sink: file
  path: demo/var/evidence-server-audit.jsonl
  format: jsonl
  rotate:
    max_size_mb: 10
    max_files: 3

datasets: []
