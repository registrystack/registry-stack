# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false

auth:
  api_keys:
    - id: civil_evidence_client
      token_env: CIVIL_EVIDENCE_CLIENT_TOKEN
      scopes:
        - civil_registry:evidence_verification
  bearer_tokens:
    - id: civil_evidence_client
      token_env: CIVIL_EVIDENCE_CLIENT_BEARER
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: stdout

evidence:
  enabled: true
  service_id: civil-registry-notary
  api_base_url: http://civil-registry-notary:8080
  inline_batch_limit: 20
  source_connections:
    civil:
      base_url: http://civil-registry-relay:8080
      token_env: CIVIL_EVIDENCE_SOURCE_RAW
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          national_id: /person/national_id
          birth_date: /person/birth_date
          civil_status: /person/civil_status
          deceased: /person/deceased
  credential_profiles:
    civil_status_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:civil-evidence.demo.example
      issuer_key_env: REGISTRY_NOTARY_ISSUER_JWK
      issuer_kid: did:web:civil-evidence.demo.example#civil-evidence-demo-key-1
      vct: https://demo.example/credentials/civil-status/v1
      validity_seconds: 86400
      allowed_claims:
        - date-of-birth
        - civil-status
        - person-is-alive
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - value
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: civil
        field: birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - civil_status_sd_jwt
    - id: civil-status
      title: Civil status
      version: 2026-05
      subject_type: person
      value:
        type: string
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            civil_status:
              field: civil_status
              type: string
              required: true
      rule:
        type: extract
        source: civil
        field: civil_status
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - civil_status_sd_jwt
    - id: person-is-alive
      title: Person is alive
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        civil:
          connector: dci
          connection: civil
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            deceased:
              field: deceased
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.civil.deceased == false"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - civil_status_sd_jwt
