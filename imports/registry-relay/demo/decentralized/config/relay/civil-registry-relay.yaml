# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  cache_dir: /var/lib/registry-relay/cache

metadata:
  source:
    path: civil-registry-relay.metadata.yaml

catalog:
  title: Civil Registry Relay (Decentralized Demo)
  base_url: http://civil-registry-relay:8080
  publisher: Civil Registration Authority (Demo)
  participant_id: did:web:civil-registry.demo.example.gov

vocabularies:
  demo: https://demo.example.gov/vocab/
  spdci: https://schema.spdci.org/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: CIVIL_METADATA_CLIENT_HASH
        commitment: sha256:fb77b8dd8715d6d2ef6298a7fbb986bbc8d98bd5c75518b42801941573ff75f1
      scopes:
        - civil_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_SOURCE_HASH
        commitment: sha256:c736f6aff2f88e3fcf3023548ee19376fca06dec13f33fc5695aa61c8c0f3216
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: CIVIL_EVIDENCE_ONLY_HASH
        commitment: sha256:a33b52157bf8000da1af36a112d668c7b3ca99b9f8f28dc151b7d2ab6898371d
      scopes:
        - civil_registry:metadata
        - civil_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: CIVIL_ROW_READER_HASH
        commitment: sha256:ba9b5fe986b7358858db9cb21ee79b50db2b360ad2348db99458b9ef6630a139
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_CIVIL_EVIDENCE_SOURCE_HASH
        commitment: sha256:fa5e62049f9495c6ea2b366536496bb1eedf3eb2cc2908391f7f26fbe7189213
      scopes:
        - civil_registry:metadata
        - civil_registry:rows
        - civil_registry:evidence_verification

standards:
  spdci:
    registries:
      crvs:
        dataset: civil_registry
        entity: civil_person
        registry_type: ns:org:RegistryType:CRVS
        record_type: spdci-extensions-crvs:Person
        identifiers:
          NATIONAL_ID: national_id
          UIN: national_id
          NIN: national_id
        expression_fields:
          birth_date: birth_date
          civil_status: civil_status
          deceased: deceased
          district: district
        response_fields:
          person.national_id: national_id
          person.birth_date: birth_date
          person.civil_status: civil_status
          person.deceased: deceased
          person.district: district

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: civil_registry
    title: Civil Registry
    description: Synthetic civil status records for decentralized evidence demo flows.
    owner: Civil Registration Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    conforms_to:
      - spdci:extensions/crvs/v1/Person
    defaults:
      refresh:
        mode: manual
    tables:
      - id: civil_persons_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/civil/civil-persons.csv
          format:
            csv:
              header_row: 1
        primary_key: national_id
        schema:
          strict: true
          fields:
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: given_name
              type: string
              nullable: false
              sensitive: true
            - name: surname
              type: string
              nullable: false
              sensitive: true
            - name: birth_date
              type: date
              nullable: false
            - name: civil_status
              type: string
              nullable: false
            - name: deceased
              type: boolean
              nullable: false
            - name: district
              type: string
              nullable: false
    entities:
      - name: civil_person
        title: Civil Person
        description: Person-level civil status projection for evidence computation.
        table: civil_persons_table
        concept_uri: spdci:extensions/crvs/v1/Person
        fields:
          - name: national_id
          - name: given_name
          - name: surname
          - name: birth_date
          - name: civil_status
          - name: deceased
          - name: district
        access:
          metadata_scope: civil_registry:metadata
          aggregate_scope: civil_registry:aggregate
          read_scope: civil_registry:rows
          evidence_verification_scope: civil_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: national_id
              ops: [eq, in]
            - field: given_name
              ops: [eq]
            - field: surname
              ops: [eq]
            - field: birth_date
              ops: [eq, gte, lte]
            - field: civil_status
              ops: [eq, in]
            - field: deceased
              ops: [eq]
            - field: district
              ops: [eq, in]
