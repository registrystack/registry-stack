# SPDX-License-Identifier: Apache-2.0

schema_version: registry-manifest/v1
catalog:
  id: decentralized-health-registry
  base_url: http://health-registry-relay:8080
  title: Health Registry Relay (Decentralized Demo)
  publisher:
    name: Health Services Authority (Demo)
  standards:
    dcat: '3.0'
    shacl: '1.1'
    json_schema: 2020-12
  application_profiles:
    - id: bregdcat-ap
      version: '3.0'
federation:
  node_id: did:web:health-registry.demo.example.gov
  issuer: https://health-registry.demo.example.gov
  jwks_uri: https://health-registry.demo.example.gov/.well-known/jwks.json
  federation_api: https://health-registry.demo.example.gov/federation
  supported_protocol_versions:
    - registry-notary-federation/v0.1
evaluation_profiles:
  - id: health-service-availability-v1
    ruleset: health-service-availability-v1
    claim_id: health_service_availability
    subject_id_type: id
    max_source_observed_age_seconds: 86400
requirements:
  - id: health_linked_support_requirement
    iri: https://demo.example.gov/requirements/health-linked-support
    title: Health-linked support requirement
    description: Requirement to confirm that licensed services are available in the applicant district.
evidence_types:
  - id: health_service_availability_evidence
    iri: https://demo.example.gov/evidence-types/health-service-availability
    title: Health service availability evidence
    description: Evidence that a licensed facility offers the required service in a district.
    proves:
      - health_linked_support_requirement
datasets:
  - id: health_registry
    title: Health Facility Registry
    description: Synthetic facility licensing and service availability records for decentralized evidence demo flows.
    owner: Health Services Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    evidence_offerings:
      - id: health_service_availability_evidence_service
        iri: https://demo.example.gov/evidence-offerings/health-service-availability
        title: Health service availability evidence service
        description: Registry Notary endpoint that computes facility license and service availability.
        evidence_type: health_service_availability_evidence
        issuing_authority:
          id: health_services_authority
          iri: did:web:health-registry.demo.example.gov
          name: Health Services Authority
          country: ZZ
        jurisdiction:
          country: ZZ
        level_of_assurance: substantial
        entity: health_facility
        lookup_keys:
          - national_id
        access:
          kind: registry-notary
          conforms_to: registry-notary-federation/v0.1
          endpoint_url: https://shared-eligibility-notary:8080
          discovery_url: https://shared-eligibility-notary:8080/.well-known/evidence-service
          ruleset: health-service-availability-v1
        policy:
          purpose:
            - https://demo.example.gov/purpose/health-linked-support-eligibility
    entities:
      - name: health_facility
        title: Health Facility
        description: Facility service and license projection for eligibility evidence.
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: national_id
            type: string
            required: true
          - name: facility_name
            type: string
            required: true
          - name: district
            type: string
            required: true
          - name: license_status
            type: string
            required: true
          - name: maternal_service_available
            type: boolean
            required: true
          - name: pediatric_service_available
            type: boolean
            required: true
          - name: practitioner_credential_active
            type: boolean
            required: true
          - name: updated_on
            type: date
            required: true
vocabularies:
  registry_relay: https://registry-relay.dev/
