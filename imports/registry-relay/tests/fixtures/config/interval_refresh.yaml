# Tests humantime parsing for refresh.interval (1h == 3600s).
server:
  bind: 127.0.0.1:8080
catalog:
  title: t
  base_url: https://example.test
  publisher: p
vocabularies: {}
auth:
  mode: api_key
  api_keys:
    - id: k1
      hash_env: TEST_KEY_HASH_INTERVAL
      scopes:
        - admin
audit:
  sink: stdout
datasets:
  - id: ds_interval
    title: T
    description: D
    owner: O
    sensitivity: public
    access_rights: public
    update_frequency: monthly
    conforms_to: []
    source:
      type: file
      path: ./data/x.xlsx
    refresh:
      mode: interval
      interval: 1h
    resources: []
