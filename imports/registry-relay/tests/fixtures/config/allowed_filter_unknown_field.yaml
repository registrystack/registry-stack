# Tests config.validation_error: allowed_filters references a field
# absent from the resource schema.
server:
  bind: 127.0.0.1:8080
catalog:
  title: t
  base_url: https://example.test
  publisher: p
vocabularies: {}
auth:
  mode: api_key
  api_keys:
    - id: k1
      fingerprint:
        provider: env
        name: TEST_KEY_HASH_FILTER
        commitment: sha256:0a31891748bc7cd19b09dddaa744481775ef146f1ebe300f107aa5aa6d2f57a3
      scopes:
        - ds_one:metadata
audit:
  sink: stdout
datasets:
  - id: ds_one
    title: T
    description: D
    owner: O
    sensitivity: public
    access_rights: public
    update_frequency: monthly
    conforms_to: []
    defaults:
      refresh:
        mode: manual
    tables:
      - id: r_one
        source:
          type: file
          path: ./data/x.xlsx
        schema:
          strict: true
          fields:
            - name: real_field
              type: string
              nullable: false
        access:
          metadata_scope: ds_one:metadata
          aggregate_scope: ds_one:aggregate
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: nope
              ops: [eq]
        aggregates: []
