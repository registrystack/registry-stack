# Tests config.validation_error: concept_uri uses an unregistered prefix.
server:
  bind: 127.0.0.1:8080
catalog:
  title: t
  base_url: https://example.test
  publisher: p
vocabularies:
  psc: https://publicschema.org/
auth:
  mode: api_key
  api_keys:
    - id: k1
      fingerprint:
        provider: env
        name: TEST_KEY_HASH_VOCAB
        commitment: sha256:d91e6e03e681c2ba7a95a367fe95d95dd4283921e9d41ee9540a647077a45a07
      scopes:
        - ds_one:metadata
audit:
  sink: stdout
datasets:
  - id: ds_one
    title: T
    description: D
    owner: O
    sensitivity: public
    access_rights: public
    update_frequency: monthly
    conforms_to: []
    defaults:
      refresh:
        mode: manual
    tables:
      - id: r_one
        source:
          type: file
          path: ./data/x.xlsx
        schema:
          strict: true
          fields:
            - name: f1
              type: string
              nullable: false
              concept_uri: nope:Foo
        access:
          metadata_scope: ds_one:metadata
          aggregate_scope: ds_one:aggregate
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters: []
        aggregates: []
