# Tests config.validation_error: catalog.publisher_iri uses an unregistered
# vocabulary prefix.
server:
  bind: 127.0.0.1:8080
catalog:
  title: t
  base_url: https://example.test
  publisher: p
  publisher_iri: "nope:publisher"
vocabularies:
  psc: https://publicschema.org/
auth:
  mode: api_key
  api_keys:
    - id: k1
      fingerprint:
        provider: env
        name: TEST_KEY_HASH_PUBLISHER_IRI
        commitment: sha256:8e472ed47b754cf197be958e1bab890607015c4373ffa1528c5674904a2cc8e8
      scopes:
        - ds_one:metadata
audit:
  sink: stdout
datasets:
  - id: ds_one
    title: T
    description: D
    owner: O
    sensitivity: public
    access_rights: public
    update_frequency: monthly
    conforms_to: []
    defaults:
      refresh:
        mode: manual
    tables:
      - id: r_one
        source:
          type: file
          path: ./data/x.xlsx
        schema:
          strict: true
          fields:
            - name: f1
              type: string
              nullable: false
        access:
          metadata_scope: ds_one:metadata
          aggregate_scope: ds_one:aggregate
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters: []
        aggregates: []
