[package]
name = "data_gate"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Controlled Data Gateway: config-driven, read-only APIs over sensitive tabular files."
publish = false

# ─── runtime ─────────────────────────────────────────────────────────────────
[dependencies]
tokio = { version = "1", features = [
    "rt-multi-thread",
    "signal",
    "fs",
    "net",
    "macros",
    "time",
] }
axum = { version = "0.8" }
tower = { version = "0.5" }
tower-http = { version = "0.6", features = [
    "trace",
    "request-id",
    "cors",
    "timeout",
    "limit",
    "set-header",
] }

# ─── data ────────────────────────────────────────────────────────────────────
# datafusion minor is pinned per architect risk #1: bumping means re-typing
# the Source trait's RecordBatch return across multiple modules.
# Current pin: 53.1 (latest stable as of Wave 0, 2026-05-15).
datafusion = { version = "53.1" }
calamine = { version = "0.35" }
csv = { version = "1" }
# Used by Source/Format trait surfaces (BoxStream); also a transitive
# of datafusion but pinned here so the public surface compiles without
# relying on a re-export path.
futures = { version = "0.3" }
bytes = { version = "1" }
# Atomic state swap for IngestPlan readiness (single-writer, many-reader).
arc-swap = { version = "1" }
# Implements DataFusion's async TableProvider delegation for atomic swaps.
async-trait = { version = "0.1" }
# CancellationToken for refresh-loop shutdown.
tokio-util = { version = "0.7" }

# ─── serialization / config ──────────────────────────────────────────────────
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
# serde_yml: maintained community fork of the archived serde_yaml.
# Version is pinned to the exact minor as it is a young fork;
# re-evaluate before Wave 3 (architect note Section 9 risk #2).
serde_yml = { version = "0.0.12" }
humantime-serde = { version = "1" }

# ─── auth / crypto ───────────────────────────────────────────────────────────
argon2 = { version = "0.5" }
getrandom = { version = "0.3" }
hmac = { version = "0.12" }
sha2 = { version = "0.10" }
subtle = { version = "2" }
zeroize = { version = "1" }

# ─── time / ids ──────────────────────────────────────────────────────────────
time = { version = "0.3", features = ["serde", "formatting", "parsing", "macros"] }
ulid = { version = "1" }

# ─── observability ───────────────────────────────────────────────────────────
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["fmt", "json", "env-filter"] }
tracing-error = { version = "0.2" }

# ─── errors / problem details ────────────────────────────────────────────────
thiserror = { version = "2" }
http-api-problem = { version = "0.60" }

# ─── openapi ─────────────────────────────────────────────────────────────────
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-axum = { version = "0.2" }

# ─── dev / test ──────────────────────────────────────────────────────────────
[dev-dependencies]
axum-test = { version = "20" }
assert-json-diff = { version = "2" }
proptest = { version = "1" }
tempfile = { version = "3" }
insta = { version = "1", features = ["json"] }
utoipa-swagger-ui = { version = "9", features = ["axum"] }
