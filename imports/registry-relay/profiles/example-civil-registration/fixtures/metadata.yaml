schema_version: registry-manifest/v1
catalog:
  id: example-civil-registration
  base_url: https://civil-registration.example.gov
  title:
    en: Civil Registration Metadata
  description:
    en: Portable metadata for a hypothetical civil registration application.
  publisher:
    name: Civil Registration Authority
    iri: https://civil-registration.example.gov/authority
    authority_type: eli:PublicAuthority
  participant_id: https://civil-registration.example.gov/authority
  conforms_to:
    - https://semiceu.github.io/BRegDCAT-AP/releases/3.0.0/
  standards:
    dcat: "3.0"
    shacl: "1.1"
    json_schema: "2020-12"
  application_profiles:
    - id: bregdcat-ap
      version: "3.0.0"
vocabularies:
  person: https://person-schema.example.gov/vocab/
  civreg: https://civil-registration.example.gov/vocab/
  eli: http://data.europa.eu/eli/ontology#
profiles:
  - id: example-civil-registration
    version: "1"
datasets:
  - id: vital-events
    title:
      en: Vital Events
    conforms_to:
      - https://semiceu.github.io/BRegDCAT-AP/releases/3.0.0/
    status: under_development
    access_rights: restricted
    entities:
      - name: person
        title:
          en: Person
        identifiers:
          - name: person_id
            kind: local
        fields:
          - name: person_id
            type: string
            required: true
            constraints:
              min_length: 1
              max_length: 64
              pattern: "^[A-Za-z0-9-]+$"
            concepts:
              - person:Person.identifier
          - name: birth_date
            type: date
            concepts:
              - person:Person.birthDate
              - civreg:BirthRecord.child.birthDate
          - name: sex
            type: code
            codelist: sex
            concepts:
              - person:Person.sex
      - name: vital_event
        title:
          en: Vital Event
        identifiers:
          - name: event_id
            kind: local
        fields:
          - name: event_id
            type: string
            required: true
            concepts:
              - civreg:VitalEvent.identifier
          - name: event_type
            type: code
            required: true
            codelist: vital_event_type
            constraints:
              in:
                - birth
                - death
            concepts:
              - civreg:VitalEvent.type
          - name: registration_date
            type: date
            concepts:
              - civreg:VitalEvent.registrationDate
codelists:
  - id: sex
    scheme_iri: https://civil-registration.example.gov/codelists/sex
    external_ref: https://civil-registration.example.gov/codelists/sex.ttl
    concepts:
      - code: female
        iri: https://civil-registration.example.gov/codelists/sex/female
        label:
          en: Female
      - code: male
        iri: https://civil-registration.example.gov/codelists/sex/male
        label:
          en: Male
  - id: vital_event_type
    scheme_iri: https://civil-registration.example.gov/codelists/vital-event-type
    external_ref: https://civil-registration.example.gov/codelists/vital-event-type.ttl
    concepts:
      - code: birth
        iri: https://civil-registration.example.gov/codelists/vital-event-type/birth
        label:
          en: Birth
      - code: death
        iri: https://civil-registration.example.gov/codelists/vital-event-type/death
        label:
          en: Death
