schema_version: registry-metadata/v1
catalog:
  id: example-benefits-sync
  base_url: https://dci.example.gov
  title:
    en: Example Benefits Sync Metadata
  description:
    en: Portable metadata for a hypothetical benefits sync registry.
  publisher:
    name: Disability Registry Authority
    iri: https://dci.example.gov/authority
    authority_type: eli:PublicAuthority
  participant_id: https://dci.example.gov/authority
  conforms_to:
    - https://semiceu.github.io/BRegDCAT-AP/releases/3.0.0/
  standards:
    dcat: "3.0"
    shacl: "1.1"
    json_schema: "2020-12"
  application_profiles:
    - id: bregdcat-ap
      version: "3.0.0"
vocabularies:
  sync: https://benefits-sync.example.gov/vocab/
  person: https://person-schema.example.gov/vocab/
  eli: http://data.europa.eu/eli/ontology#
profiles:
  - id: example-benefits-sync
    version: "1"
datasets:
  - id: disability-registry
    title:
      en: Disability Registry
    conforms_to:
      - https://semiceu.github.io/BRegDCAT-AP/releases/3.0.0/
    status: active
    access_rights: restricted
    entities:
      - name: disabled_person
        title:
          en: Disabled Person
        identifiers:
          - name: subject_id
            kind: local
        fields:
          - name: subject_id
            type: string
            required: true
            constraints:
              min_length: 1
              max_length: 64
            concepts:
              - sync:RegistrySubject.identifier
              - person:Person.identifier
          - name: disability_status
            type: code
            required: true
            codelist: disability_status
            constraints:
              in:
                - certified
                - not_certified
            concepts:
              - sync:DisabilityRegistry.disabilityStatus
          - name: consent_status
            type: code
            required: true
            codelist: consent_status
            constraints:
              in:
                - granted
                - revoked
            concepts:
              - sync:RegistrySubject.consentStatus
codelists:
  - id: disability_status
    scheme_iri: https://dci.example.gov/codelists/disability-status
    external_ref: https://dci.example.gov/codelists/disability-status.ttl
    concepts:
      - code: certified
        iri: https://dci.example.gov/codelists/disability-status/certified
        label:
          en: Certified
      - code: not_certified
        iri: https://dci.example.gov/codelists/disability-status/not-certified
        label:
          en: Not certified
  - id: consent_status
    scheme_iri: https://dci.example.gov/codelists/consent-status
    external_ref: https://dci.example.gov/codelists/consent-status.ttl
    concepts:
      - code: granted
        iri: https://dci.example.gov/codelists/consent-status/granted
        label:
          en: Granted
      - code: revoked
        iri: https://dci.example.gov/codelists/consent-status/revoked
        label:
          en: Revoked
