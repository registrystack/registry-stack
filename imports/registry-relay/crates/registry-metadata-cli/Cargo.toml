[package]
name = "registry-metadata-cli"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
publish = false

[[bin]]
name = "registry-metadata"
path = "src/main.rs"

[dependencies]
registry-metadata-core = { version = "0.1.0", path = "../registry-metadata-core" }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1" }
serde_yml = { version = "0.0.12" }
