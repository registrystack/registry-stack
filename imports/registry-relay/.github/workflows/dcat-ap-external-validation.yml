name: dcat-ap-external-validation

on:
  workflow_dispatch:
    inputs:
      validation_type:
        description: SEMIC validation type
        required: true
        default: dcatap.3_0_1_base
      bregdcatap_validation_type:
        # SEMIC ITB advertises bregdcatap.2_0_0 and bregdcatap.2_1_0 today; pin
        # to the later one so the step produces a report. BRegDCAT-AP 3.0.0 is
        # an annex to DCAT-AP 3.0 and may never get its own SEMIC ITB slug; if
        # SEMIC publishes a bregdcatap.3_0_0 slug, update this default, but
        # otherwise leaving the 2_1_0 gap report in place is the intended
        # steady state.
        description: SEMIC BRegDCAT-AP validation type (gap report only, continue-on-error)
        required: true
        default: bregdcatap.2_1_0
      catalog_path:
        description: Export path for the generated catalog artifact
        required: true
        default: target/dcat-ap/catalog.dcat-ap.jsonld
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_BACKTRACE: 1
  SEMIC_VALIDATION_TYPE: ${{ github.event.inputs.validation_type || 'dcatap.3_0_1_base' }}
  SEMIC_BREGDCATAP_VALIDATION_TYPE: ${{ github.event.inputs.bregdcatap_validation_type || 'bregdcatap.2_1_0' }}
  CATALOG_PATH: ${{ github.event.inputs.catalog_path || 'target/dcat-ap/catalog.dcat-ap.jsonld' }}
  SEMIC_REPORT_PATH: target/dcat-ap/semic-report.json
  SEMIC_BREGDCATAP_REPORT_PATH: target/dcat-ap/semic-bregdcatap-report.json

jobs:
  semic-dcat-ap:
    name: SEMIC DCAT-AP validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: dcat-ap-external-validation

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Export sample DCAT-AP catalog
        env:
          REGISTRY_RELAY_EXPORT_DCAT_AP_PATH: ${{ env.CATALOG_PATH }}
        run: cargo test --test catalog_entity export_generated_dcat_ap_catalog_when_path_is_set

      - name: Validate sample DCAT-AP catalog with local SHACL smoke profiles (DCAT-AP + BRegDCAT-AP)
        run: |
          uv run --with 'pyshacl>=0.27,<0.31' --with 'rdflib-jsonld>=0.6' \
            python scripts/validate_dcat_shacl.py \
            --catalog "${CATALOG_PATH}"

      - name: Validate sample DCAT-AP catalog with SEMIC
        run: |
          python scripts/validate_semic_dcat_ap.py \
            --catalog "${CATALOG_PATH}" \
            --validation-type "${SEMIC_VALIDATION_TYPE}" \
            --save-report "${SEMIC_REPORT_PATH}"

      - name: BRegDCAT-AP gap report via SEMIC (continue-on-error, informational only)
        continue-on-error: true
        run: |
          python scripts/validate_semic_dcat_ap.py \
            --catalog "${CATALOG_PATH}" \
            --validation-type "${SEMIC_BREGDCATAP_VALIDATION_TYPE}" \
            --save-report "${SEMIC_BREGDCATAP_REPORT_PATH}"

      - name: Assert BRegDCAT-AP gap report was produced
        # The previous step is continue-on-error so a failing validation does
        # not block CI, but if the SEMIC slug is invalid the script raises
        # before writing a report and the gap signal vanishes silently. This
        # step fails loudly when the file is missing or empty so a wrong slug
        # cannot hide.
        run: |
          if [[ ! -s "${SEMIC_BREGDCATAP_REPORT_PATH}" ]]; then
            echo "::error::BRegDCAT-AP gap report missing or empty at ${SEMIC_BREGDCATAP_REPORT_PATH}." \
                 "Check that ${SEMIC_BREGDCATAP_VALIDATION_TYPE} is a valid SEMIC ITB slug" \
                 "(see https://www.itb.ec.europa.eu/shacl/semic-shacl/api/info)."
            exit 1
          fi

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcat-ap-validation
          path: |
            ${{ env.CATALOG_PATH }}
            ${{ env.SEMIC_REPORT_PATH }}
            ${{ env.SEMIC_BREGDCATAP_REPORT_PATH }}
          if-no-files-found: ignore
