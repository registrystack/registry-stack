name: Security Assurance

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install Go security tools
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.24.3
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run contract checks
        run: python3 scripts/check_security_assurance.py

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-banner --no-git --config .gitleaks.toml

      - name: Run actionlint
        run: actionlint

      - name: Run zizmor
        run: uvx zizmor --no-exit-codes .

      - name: Run hadolint
        run: |
          docker run --rm -i hadolint/hadolint:v2.12.0 /bin/hadolint --ignore DL3022 --ignore DL3008 - < Dockerfile
          docker run --rm -i hadolint/hadolint:v2.12.0 /bin/hadolint --ignore DL3022 --ignore DL3008 - < Dockerfile.demo

      - name: Run Semgrep
        run: uvx semgrep --config .semgrep.yml --error .

      - name: Generate security assurance report
        run: scripts/check-security.sh

      - name: Upload security assurance report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: registry-relay-security-assurance-report
          path: target/security/security-assurance-report.md
