name: Container Image

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: ${{ (github.head_ref || github.ref_name) == 'codex/audit-hash-helpers' && 'codex/audit-reference-hashing' || ((github.head_ref || github.ref_name) == 'commons-release-cleanup' && 'commons-release-cleanup' || 'main') }}
  REGISTRY_MANIFEST_REPOSITORY: jeremi/registry-manifest
  REGISTRY_MANIFEST_REF: main
  CEL_MAPPING_REPOSITORY: PublicSchema/crosswalk
  CEL_MAPPING_REF: ca7411d735f1507b9db0db637f79aff7e4ae4611
  REGISTRY_RELAY_IMAGE: ghcr.io/jeremi/registry-relay
  REGISTRY_RELAY_RELEASE_FEATURES: spdci-api-standards,standards-cel-mapping,ogcapi-features,ogcapi-edr,ogcapi-records

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout registry-relay
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: registry-relay
          persist-credentials: false

      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          path: registry-platform
          persist-credentials: false

      - name: Checkout registry-manifest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.REGISTRY_MANIFEST_REPOSITORY }}
          ref: ${{ env.REGISTRY_MANIFEST_REF }}
          token: ${{ secrets.REGISTRY_MANIFEST_TOKEN || github.token }}
          path: registry-manifest
          persist-credentials: false

      - name: Checkout cel-mapping
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CEL_MAPPING_REPOSITORY }}
          ref: ${{ env.CEL_MAPPING_REF }}
          path: cel-mapping
          persist-credentials: false

      - name: Build registry-relay image
        run: |
          docker build \
            --build-context registry-platform=registry-platform \
            --build-context registry-manifest=registry-manifest \
            --build-context cel-mapping=cel-mapping \
            --build-arg "REGISTRY_RELAY_FEATURES=$REGISTRY_RELAY_RELEASE_FEATURES" \
            --file registry-relay/Dockerfile \
            --tag "$REGISTRY_RELAY_IMAGE:sha-${GITHUB_SHA}" \
            --tag "$REGISTRY_RELAY_IMAGE:main" \
            registry-relay
      - name: Verify registry-relay image can run hosted feature surfaces
        run: |
          set -euo pipefail
          run_config() {
            config="$1"
            shift
            cid="$(docker run -d \
              -e REGISTRY_RELAY_AUDIT_HASH_SECRET=release-image-contract-secret-32-bytes \
              "$@" \
              -v "$PWD/registry-relay/demo/decentralized:/demo:ro" \
              -w /demo/config/relay \
              "$REGISTRY_RELAY_IMAGE:sha-${GITHUB_SHA}" \
              --config "$config")"
            for _ in $(seq 1 30); do
              logs="$(docker logs "$cid" 2>&1 || true)"
              if echo "$logs" | grep -E "feature disabled|config\\.feature_disabled"; then
                docker rm -f "$cid" >/dev/null 2>&1 || true
                echo "$logs"
                exit 1
              fi
              if echo "$logs" | grep -E "registry-relay listening" >/dev/null; then
                docker exec "$cid" /usr/local/bin/registry-relay healthcheck
                docker rm -f "$cid" >/dev/null 2>&1 || true
                echo "verified $config"
                return 0
              fi
              if [ "$(docker inspect --format '{{.State.Running}}' "$cid")" != "true" ]; then
                docker rm -f "$cid" >/dev/null 2>&1 || true
                echo "$logs"
                exit 1
              fi
              sleep 1
            done
            docker logs "$cid" 2>&1 || true
            docker rm -f "$cid" >/dev/null 2>&1 || true
            echo "$config did not reach registry-relay listening" >&2
            exit 1
          }
          run_config civil-registry-relay.yaml \
            -e CIVIL_METADATA_CLIENT_HASH=sha256:bd40fc0d7a779c4853ebec99382b39332fed8d321475a5903931b892f617425d \
            -e CIVIL_EVIDENCE_SOURCE_HASH=sha256:72ed7a3a27764c1412f15b275071b0e4c31617fb165c3bb461a330706114c7e8 \
            -e CIVIL_EVIDENCE_ONLY_HASH=sha256:d84339b69a53f727908d3bec667143dbd06d6197248f9d33700b0ce02d0b8692 \
            -e CIVIL_ROW_READER_HASH=sha256:ceccb012571617538e3c47693e1d7d09e84a26d7f6a033534e638fafc52f06f7 \
            -e SHARED_CIVIL_EVIDENCE_SOURCE_HASH=sha256:531fa4aafc18c2b700b43f8103dc1ccf01dd2dc46969778f3f3a104c6f58bbeb
          run_config social-protection-registry-relay.yaml \
            -e SOCIAL_METADATA_CLIENT_HASH=sha256:bd40fc0d7a779c4853ebec99382b39332fed8d321475a5903931b892f617425d \
            -e SOCIAL_EVIDENCE_SOURCE_HASH=sha256:72ed7a3a27764c1412f15b275071b0e4c31617fb165c3bb461a330706114c7e8 \
            -e SOCIAL_EVIDENCE_ONLY_HASH=sha256:d84339b69a53f727908d3bec667143dbd06d6197248f9d33700b0ce02d0b8692 \
            -e SOCIAL_ROW_READER_HASH=sha256:ceccb012571617538e3c47693e1d7d09e84a26d7f6a033534e638fafc52f06f7 \
            -e SOCIAL_AGGREGATE_READER_HASH=sha256:531fa4aafc18c2b700b43f8103dc1ccf01dd2dc46969778f3f3a104c6f58bbeb \
            -e SHARED_SOCIAL_EVIDENCE_SOURCE_HASH=sha256:f573de5cd190351a911ec6578c1cf44f0f80c093d25230a6183e8cca0e216eb1
      - name: Generate image SBOM and advisory vulnerability report
        run: |
          set -o pipefail
          mkdir -p registry-relay/target/security
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-relay/target/security:/out" \
            anchore/syft:v1.18.1@sha256:b8c170b8e51bfc4779ec3ef4399942c57290f5ce76a9c3af564c9d00d4946a6b "$REGISTRY_RELAY_IMAGE:sha-${GITHUB_SHA}" \
            -o spdx-json=/out/registry-relay-image.spdx.json
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/registry-relay/target/security:/out" \
            anchore/grype:v0.85.0@sha256:8d7a54c4281e334a60c2d1616269411a940efad44c2cc1533ddc76689b9268af "$REGISTRY_RELAY_IMAGE:sha-${GITHUB_SHA}" \
            -o json > registry-relay/target/security/registry-relay-image-vulnerabilities.json
          python3 registry-relay/scripts/check_advisory_baselines.py grype \
            registry-relay/target/security/registry-relay-image-vulnerabilities.json \
            --subject registry-relay-image
      - name: Upload image security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: registry-relay-image-security-evidence
          path: registry-relay/target/security/

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "$REGISTRY_RELAY_IMAGE:sha-${GITHUB_SHA}"
          docker push "$REGISTRY_RELAY_IMAGE:main"
