name: Binary Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: binary-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: c7a8c458c0a939eecc309fed1d35d5e32126927b
  REGISTRY_MANIFEST_REPOSITORY: jeremi/registry-manifest
  REGISTRY_MANIFEST_REF: 431ebef0cb3f8bfe1c7bcf7f10ae790326a64403
  CROSSWALK_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 1d44ec735fdc8a7c719264b339574371e8330337

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive_ext: tar.xz
            bin_ext: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_ext: tar.xz
            bin_ext: ""
          - target: aarch64-apple-darwin
            runner: macos-15
            archive_ext: tar.xz
            bin_ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-2025
            archive_ext: zip
            bin_ext: ".exe"
    defaults:
      run:
        shell: bash
        working-directory: registry-relay
    steps:
      - name: Checkout registry-relay
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: registry-relay
          persist-credentials: false

      - name: Verify release tag provenance
        if: github.event_name == 'push' && github.ref_type == 'tag' && matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: registry-relay
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME:-}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release binary tags must be stable semver tags like v0.1.2." >&2
            exit 1
          fi
          crate_version="$(python3 -c 'import pathlib, tomllib; print(tomllib.load(pathlib.Path("Cargo.toml").open("rb"))["package"]["version"])')"
          if [[ "$GITHUB_REF_NAME" != "v${crate_version}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match Cargo.toml package version ${crate_version}." >&2
            exit 1
          fi

          release_sha="$(git rev-parse HEAD)"
          IFS=$'\t' read -r protected protected_main_sha < <(
            gh api "repos/${GITHUB_REPOSITORY}/branches/main" \
              --jq '[.protected, .commit.sha] | @tsv'
          )
          if [[ "$protected" != "true" ]]; then
            echo "Official release binaries require the repository's main branch to be protected." >&2
            exit 1
          fi
          if [[ ! "$protected_main_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve protected main branch to an immutable commit SHA." >&2
            exit 1
          fi

          status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${release_sha}...${protected_main_sha}" --jq '.status')"
          if [[ "$status" != "ahead" && "$status" != "identical" ]]; then
            echo "Official release binaries require tag commit $release_sha to be reachable from protected main (compare status: ${status})." >&2
            exit 1
          fi

      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          path: registry-platform
          persist-credentials: false

      - name: Checkout registry-manifest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.REGISTRY_MANIFEST_REPOSITORY }}
          ref: ${{ env.REGISTRY_MANIFEST_REF }}
          token: ${{ secrets.REGISTRY_MANIFEST_TOKEN || github.token }}
          path: registry-manifest
          persist-credentials: false

      - name: Checkout crosswalk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CROSSWALK_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: crosswalk
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Build release binary
        # .cargo/config.toml routes the aarch64-apple-darwin linker through
        # Homebrew's ld64.lld for fast local dev links; hosted macOS runners
        # do not ship it. A set-but-empty RUSTFLAGS suppresses all config
        # rustflags (cargo's extra-flags sources are mutually exclusive and
        # env wins); an empty CARGO_TARGET_*_RUSTFLAGS does NOT work because
        # env values for list-type config keys merge with config.toml.
        env:
          RUSTFLAGS: ""
        run: cargo build --release --locked

      - name: Smoke binary startup
        run: |
          set +e
          "target/release/registry-relay${{ matrix.bin_ext }}" --config __missing_release_smoke_config.yaml > target/release-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "registry-relay unexpectedly succeeded with a missing config" >&2
            exit 1
          fi

      - name: Package archive
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BIN_EXT: ${{ matrix.bin_ext }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Release binary tags must be stable semver tags like v0.1.2." >&2
              exit 1
            fi
          else
            version="manual-${GITHUB_RUN_NUMBER}"
          fi
          package="registry-relay-${version}-${TARGET}"
          package_dir="target/dist/${package}"
          mkdir -p "$package_dir"
          cp "target/release/registry-relay${BIN_EXT}" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            PACKAGE_DIR="$package_dir" PACKAGE_ZIP="target/dist/${package}.zip" \
              pwsh -NoProfile -Command "Compress-Archive -Path (Join-Path \$env:PACKAGE_DIR '*') -DestinationPath \$env:PACKAGE_ZIP -Force"
          else
            tar -C target/dist -cJf "target/dist/${package}.tar.xz" "$package"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: registry-relay-${{ matrix.target }}
          path: registry-relay/target/dist/*.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release
          find dist -type f \( -name '*.tar.xz' -o -name '*.zip' \) -exec cp {} release/ \;
          cd release
          sha256sum ./* > SHA256SUMS
          ls -la

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release/* --clobber
          else
            gh release create "$TAG" release/* --verify-tag --title "$TAG" --notes "Binary release for $TAG."
          fi
