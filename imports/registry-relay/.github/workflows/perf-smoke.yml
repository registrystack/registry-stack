name: perf-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]

# See ci.yml for the rationale; cancel superseded runs on branches, keep main.
concurrency:
  group: perf-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  K6_DOCKER_IMAGE: grafana/k6:0.57.0
  REGISTRY_PLATFORM_REPOSITORY: jeremi/registry-platform
  REGISTRY_PLATFORM_REF: 05a03973c3048b4d98d22cb29a55837f62594c12
  REGISTRY_MANIFEST_REPOSITORY: jeremi/registry-manifest
  REGISTRY_MANIFEST_REF: a2e648aaac864563a3311b9d95b8143afa1b7334
  CEL_MAPPING_REPOSITORY: PublicSchema/crosswalk
  CROSSWALK_REF: 54e0f537830837fcd0c9efa87990987b1846931c

# Smoke-checks the perf scaffolding with a short CI-sized k6 run.
# It verifies:
#   1. The Criterion benches compile (`cargo bench --no-run`).
#   2. The fixture generator runs end-to-end at the small profile.
#   3. Every k6 scenario passes `node --check` for basic syntax.
#   4. A short small-profile k6 smoke runs against the release server.
# Scheduled perf jobs should still run medium, large, soak, and breakpoint profiles.

# Default the GITHUB_TOKEN to read-only on contents; this workflow only reads.
permissions:
  contents: read

jobs:
  perf-smoke:
    name: perf-smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout registry-platform
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.REGISTRY_PLATFORM_REPOSITORY }}
          ref: ${{ env.REGISTRY_PLATFORM_REF }}
          token: ${{ secrets.REGISTRY_PLATFORM_TOKEN || github.token }}
          path: registry-platform

      - name: Link registry-platform path dependency
        run: ln -s "$GITHUB_WORKSPACE/registry-platform" "$GITHUB_WORKSPACE/../registry-platform"

      - name: Checkout cel-mapping
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.CEL_MAPPING_REPOSITORY }}
          ref: ${{ env.CROSSWALK_REF }}
          path: cel-mapping

      - name: Link cel-mapping path dependency
        run: ln -s "$GITHUB_WORKSPACE/cel-mapping" "$GITHUB_WORKSPACE/../cel-mapping"

      - name: Checkout registry-manifest
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.REGISTRY_MANIFEST_REPOSITORY }}
          ref: ${{ env.REGISTRY_MANIFEST_REF }}
          token: ${{ secrets.REGISTRY_MANIFEST_TOKEN || github.token }}
          path: registry-manifest

      - name: Link registry-manifest path dependency
        run: ln -s "$GITHUB_WORKSPACE/registry-manifest" "$GITHUB_WORKSPACE/../registry-manifest"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: perf-smoke

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Node (for node --check)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Compile Criterion benches
        run: cargo bench --no-run

      - name: Build release binary for k6 smoke
        run: cargo build --release

      - name: Generate small fixture profile
        run: uv run perf/scripts/generate_perf_data.py --profile small

      - name: Generate perf credentials
        run: uv run perf/scripts/generate_perf_keys.py --env-file target/perf/perf.env --force

      - name: Syntax-check every k6 scenario
        run: |
          set -euo pipefail
          fail=0
          for f in perf/k6/*.js perf/k6/lib/*.js; do
            if ! node --check "$f"; then
              echo "node --check failed: $f"
              fail=1
            fi
          done
          exit "$fail"

      - name: Syntax-check perf Python scripts
        run: |
          set -euo pipefail
          for f in perf/scripts/*.py; do
            python -c "import ast, sys; ast.parse(open('$f').read())"
          done

      - name: Run small k6 smoke
        run: |
          set -euo pipefail
          mkdir -p target/perf/reports
          set -a
          . target/perf/perf.env
          set +a
          target/release/registry-relay --config perf/config/small.yaml >target/perf/relay-smoke.log 2>&1 &
          relay_pid="$!"
          trap 'kill "$relay_pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 150); do
            if curl -fsS http://127.0.0.1:18080/ready >/dev/null; then
              break
            fi
            sleep 0.2
          done
          curl -fsS http://127.0.0.1:18080/ready >/dev/null
          for scenario in cached_304 hot_200; do
            docker run --rm --network host \
              --env-file target/perf/perf.env \
              -e REGISTRY_RELAY_DURATION=5s \
              -e REGISTRY_RELAY_VUS=2 \
              -e REGISTRY_RELAY_NO_THRESHOLD=1 \
              -e K6_SUMMARY_TREND_STATS=min,med,avg,max,p\(90\),p\(95\),p\(99\) \
              -v "$PWD:/workspace" \
              -w /workspace \
              "$K6_DOCKER_IMAGE" run "perf/k6/${scenario}.js"
          done
