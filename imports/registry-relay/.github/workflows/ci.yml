name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same ref so a fast-follow push does not
# keep an outdated build alive next to the new one. Main is kept (we want
# every merged commit's CI result), branches are racy and can be cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUST_BACKTRACE: 1

# Third-party actions are pinned to major version tags.
# Maintainers review tag movements; SHA pins are equivalent but harder to audit.
# dtolnay/rust-toolchain and Swatinem/rust-cache are well-maintained
# and track stable semantics under their major versions.

jobs:
  # ── Lint + test matrix (gnu and musl) ────────────────────────────────────
  build-and-test:
    name: build-and-test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # pinned to major v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable   # pinned to major stable channel
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2   # pinned to major v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl toolchain (musl target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update -q && sudo apt-get install -y musl-tools

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (treat warnings as errors)
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Clippy all features (treat warnings as errors)
        run: cargo clippy --all-targets --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Run all-features tests
        run: cargo test --all-features --target ${{ matrix.target }}

  # ── cargo-deny (license + advisory + bans) ───────────────────────────────
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4   # pinned to major v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2   # pinned to major v2
        with:
          # `arguments` defaults to `--all-features` and is interpolated
          # BEFORE the subcommand. The check types are positional args of
          # `check`, so they belong in `command-arguments`.
          command: check
          command-arguments: licenses advisories bans sources

  # ── Postgres-backed datasource integration ───────────────────────────────
  postgres-integration:
    name: postgres-integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: postgres-integration

      - name: Run Postgres datasource integration tests
        env:
          DATA_GATE_POSTGRES_TEST_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
        run: cargo test --test postgres_snapshot -- --ignored --nocapture

  # ── Container image build ────────────────────────────────────────────────
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Buildx + GHA cache backend persists the Dockerfile's
      # `RUN --mount=type=cache` cargo registry and target directories
      # across runs. First run is a cold compile; subsequent runs reuse
      # the cargo caches and only rebuild changed crates.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: registry-relay:ci
          load: false
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
