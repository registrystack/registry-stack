name: Bug report
description: Report a reproducible problem in Registry Relay.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Please do not report security vulnerabilities in public issues. Use private vulnerability reporting instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps, config shape, request, or test case that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Commit, OS, Rust version, enabled features, and relevant datasource type.
    validations:
      required: false
