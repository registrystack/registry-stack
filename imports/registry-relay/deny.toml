[advisories]
# Warn on unmaintained crates; error on actively vulnerable ones.
# The default policy for Wave 0 is to warn so CI is not broken by
# advisories on transitive deps we cannot control yet.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # RUSTSEC-2024-0436: serde_yaml (unmaintained). We use serde_yml (the
    # community fork), but the advisory database currently flags both.
    # Tracked: re-evaluate at Wave 3 per architect note Section 9 risk #2.
    "RUSTSEC-2024-0436",
    # RUSTSEC-2025-0068: serde_yml flagged as unmaintained by advisory db.
    # Tracked: re-evaluate at Wave 3 per architect note Section 9 risk #2.
    "RUSTSEC-2025-0068",
]

[licenses]
# Architect decision #10: Apache-2.0 only for this project.
# Allow these common permissive licenses in the dependency tree.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    # Unicode-3.0: used by ICU / IDNA crates (transitive through url crate).
    # Requires a current cargo-deny; 0.14.x does not know this SPDX term.
    "Unicode-3.0",
    # CC0-1.0: public domain dedication; used by some utility crates
    "CC0-1.0",
    # bzip2-1.0.6: permissive; used by the bzip2 crate (datafusion transitive dep)
    "bzip2-1.0.6",
]
exceptions = []

[[licenses.clarify]]
# ring uses a non-SPDX license expression; clarify it so cargo-deny can parse it.
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Warn on duplicate versions of the same crate.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
# Only allow crates from crates.io; deny git and local path deps in
# the published dependency graph.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
