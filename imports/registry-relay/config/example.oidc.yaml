# SPDX-License-Identifier: Apache-2.0
# OIDC / OAuth2 resource-server example. Derived from `config/example.yaml`
# with the `auth:` block swapped from `api_key` to `oidc` against a
# local Zitadel instance, and trimmed of illustrative material that is
# orthogonal to the auth path (extra aggregates, the provenance walk-
# through comment block). Refer to `config/example.yaml` for the full
# entity / aggregate / provenance surface.
#
# The relay is a resource server: it verifies bearer JWTs against the
# configured IdP's JWKS and never mints or refreshes tokens.
#
# Pair this config with the publicschema.com dev compose stack, which
# provisions a Zitadel organisation, project, OIDC application, test
# user, machine service account, and the relay-facing project roles on
# first boot. See `apps/publicschema.com/compose/seed/zitadel-bootstrap.md`
# for what gets created and how credentials land in
# `compose/seed/zitadel.env`.

server:
  bind: 0.0.0.0:8080

catalog:
  title: Internal Government Registry Relay
  base_url: https://data.example.gov
  publisher: Ministry of Digital Government
  participant_id: did:web:data.example.gov

vocabularies:
  psc:    https://publicschema.org/
  m8g:    http://data.europa.eu/m8g/
  schema: https://schema.org/
  dct:    http://purl.org/dc/terms/
  sdmx:   http://purl.org/linked-data/sdmx/2009/concept#

auth:
  mode: oidc
  oidc:
    # Issuer URL, compared verbatim against the JWT `iss` claim.
    issuer: http://localhost:8080
    # Accepted `aud` values. Tokens whose `aud` does not intersect this
    # list are rejected. Zitadel typically includes the project resource
    # id and the client id; list whichever the relay is meant to serve.
    audience:
      - registry-relay
    # Resolve the JWKS URL via OIDC discovery. Either `discovery_url`
    # or `jwks_url` is required; the validator rejects both at once.
    discovery_url: http://localhost:8080/.well-known/openid-configuration
    # Local Zitadel runs over loopback HTTP. Production configs should
    # omit this and use HTTPS issuer/discovery/JWKS URLs.
    allow_dev_insecure_fetch_urls: true
    # Signature algorithms accepted by the verifier. RS256 is Zitadel's
    # default; ES256 and EdDSA are accepted for other IdPs. HS* and
    # `none` are intentionally absent from the algorithm enum.
    algorithms:
      - RS256
    # JWKS cache TTL. The cache also refreshes on unknown `kid`
    # (rate-limited), so this is the steady-state rotation pickup
    # latency, not the upper bound.
    jwks_cache_ttl: 10m
    # Clock skew tolerance on `exp` and `nbf`.
    leeway: 60s
    # JWT claim to read scopes from. `scope` (RFC 8693 / RFC 9068
    # space-separated string) is the default; some IdPs emit an array
    # under `scp` or `permissions`, or an object keyed by role name
    # (Zitadel's `urn:zitadel:iam:org:project:roles`). All three shapes
    # are accepted; for object shape the keys are used as scopes.
    scope_claim: "urn:zitadel:iam:org:project:roles"
    # Optional rename map applied before scope-based access checks.
    # Adapt IdP role names to the relay's `<dataset_id>:<level>` shape.
    # Keys here are the role names as they appear in the claim (for
    # Zitadel object shape, the bare role keys).
    scope_map:
      "social-registry-reader":    "social_registry:rows"
      "social-registry-aggregate": "social_registry:aggregate"
    # Optional allowlist matched against the token's `azp` (preferred)
    # or `client_id`. Empty list means any client is accepted.
    allowed_clients: []
    # Accepted JOSE `typ` header values. Defaults to JWT and at+jwt
    # (RFC 9068). ID tokens (`id+jwt`) are intentionally rejected by
    # default; the relay verifies access tokens.
    token_types:
      - JWT
      - at+jwt

datasets:
  - id: social_registry
    title: Social Registry
    description: Registry of households participating in Program X
    owner: Ministry of Social Affairs
    sensitivity: personal
    access_rights: restricted
    update_frequency: monthly
    conforms_to:
      - psc:concepts/Person
      - psc:concepts/Enrollment
      - m8g:CorePerson

    tables:
      - id: households_table
        materialization: snapshot
        source:
          type: file
          path: ./data/social_registry.xlsx
          format:
            xlsx:
              sheet: Households
        refresh:
          mode: mtime
          interval: 1h
        primary_key: household_id
        schema:
          strict: true
          fields:
            - name: household_id
              type: string
              nullable: false
            - name: region_code
              type: string
              nullable: true
            - name: enrollment_date
              type: date
              nullable: true

      - id: individuals_table
        materialization: snapshot
        source:
          type: file
          path: ./data/social_registry.xlsx
          format:
            xlsx:
              sheet: Individuals
        refresh:
          mode: mtime
          interval: 1h
        primary_key: individual_id
        schema:
          strict: true
          fields:
            - name: individual_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: municipality_code
              type: string
              nullable: true
              codelist: https://www.insee.fr/codes/cog
            - name: payment_amount
              type: number
              nullable: true
              unit: EUR

    aggregates:
      - id: by_municipality
        title: Individuals by municipality
        description: Number of individuals by municipality
        source_entity: individual
        default_group_by:
          - municipality_code
        dimensions:
          - id: municipality_code
            label: Municipality
            field: municipality_code
            codelist: https://www.insee.fr/codes/cog
        indicators:
          - id: individual_count
            label: Individuals
            function: count
            column: id
            unit_measure: people
        allowed_filters:
          - field: municipality_code
            ops: [eq, in]
        disclosure_control:
          min_group_size: 5
          suppression: omit

    entities:
      - name: household
        title: Household
        description: A household participating in Program X
        table: households_table
        concept_uri: psc:concepts/Household
        fields:
          - name: id
            from: household_id
            concept_uri: psc:properties/householdIdentifier
          - name: region
            from: region_code
            concept_uri: m8g:Location
          - name: enrolled_on
            from: enrollment_date
            concept_uri: psc:properties/enrollmentDate
        relationships:
          - name: members
            kind: has_many
            target: individual
            foreign_key: household_id
        access:
          metadata_scope:    social_registry:metadata
          aggregate_scope:   social_registry:aggregate
          read_scope:        social_registry:rows
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: region
              ops: [eq, in]
          allowed_expansions: [members]

      - name: individual
        title: Individual
        description: A person enrolled in Program X
        table: individuals_table
        concept_uri: psc:concepts/Person
        fields:
          - name: id
            from: individual_id
            concept_uri: psc:properties/personIdentifier
          - name: household_id
            from: household_id
            concept_uri: psc:properties/householdIdentifier
          - name: municipality_code
            from: municipality_code
            concept_uri: m8g:Location
          - name: payment_amount
            from: payment_amount
            concept_uri: psc:properties/paymentAmount
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
        access:
          metadata_scope:    social_registry:metadata
          aggregate_scope:   social_registry:aggregate
          read_scope:        social_registry:rows
        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: municipality_code
              ops: [eq, in]
          allowed_expansions: [household]

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET
