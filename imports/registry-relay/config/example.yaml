# Canonical Wave 0 example. Do not drift this file from Spec.md Section 4.
# Any change here must be matched by a Spec.md edit in the same commit.

server:
  bind: 0.0.0.0:8080

catalog:
  title: Internal Government Data Gateway
  base_url: https://data.example.gov
  publisher: Ministry of Digital Government

vocabularies:
  # optional prefix registry, used to shorten URIs in the rest of the config
  psc:    https://publicschema.org/
  m8g:    http://data.europa.eu/m8g/        # SEMIC Core Vocabularies
  schema: https://schema.org/
  dct:    http://purl.org/dc/terms/
  sdmx:   http://purl.org/linked-data/sdmx/2009/concept#

auth:
  mode: api_key
  api_keys:
    - id: statistics_office
      hash_env: STATS_OFFICE_API_KEY_HASH
      scopes:
        - social_registry:metadata
        - social_registry:aggregate

    - id: program_system
      hash_env: PROGRAM_SYSTEM_API_KEY_HASH
      scopes:
        - social_registry:metadata
        - social_registry:aggregate
        - social_registry:rows

datasets:
  - id: social_registry
    title: Social Registry
    description: Registry of households participating in Program X
    owner: Ministry of Social Affairs
    sensitivity: personal
    access_rights: restricted
    update_frequency: monthly
    conforms_to:
      - psc:concepts/Person
      - psc:concepts/Enrollment
      - m8g:CorePerson

    source:
      type: file
      path: ./data/social_registry.xlsx
      # optional, for messy spreadsheets
      header_row: 1
      data_range: A2:E100000

    refresh:
      mode: mtime         # mtime | interval | manual
      interval: 1h        # used when mode == interval

    resources:
      - id: beneficiaries
        sheet: Beneficiaries
        primary_key: beneficiary_id

        schema:
          strict: true
          fields:
            - name: beneficiary_id
              type: string
              nullable: false
              concept_uri: psc:properties/personIdentifier
            - name: household_id
              type: string
              nullable: false
              concept_uri: psc:properties/householdIdentifier
            - name: municipality_code
              type: string
              nullable: true
              concept_uri: m8g:Location
              codelist: https://www.insee.fr/codes/cog   # optional codelist URI
            - name: enrollment_date
              type: date
              nullable: true
              concept_uri: psc:properties/enrollmentDate
            - name: payment_amount
              type: number
              nullable: true
              concept_uri: psc:properties/paymentAmount
              unit: EUR

        access:
          metadata_scope: social_registry:metadata
          aggregate_scope: social_registry:aggregate
          row_scope: social_registry:rows

        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          allowed_filters:
            - field: beneficiary_id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: municipality_code
              ops: [eq, in]
            - field: enrollment_date
              ops: [eq, gte, lte, between]

        aggregates:
          - id: beneficiaries_by_municipality
            description: Number of beneficiaries by municipality
            group_by:
              - municipality_code
            measures:
              - name: beneficiary_count
                function: count
                column: beneficiary_id
            disclosure_control:
              min_group_size: 5
              suppression: omit   # omit | mask

          - id: payments_by_municipality
            description: Total and average payments by municipality
            group_by:
              - municipality_code
            measures:
              - name: total_payment
                function: sum
                column: payment_amount
              - name: average_payment
                function: avg
                column: payment_amount
            disclosure_control:
              min_group_size: 5
              suppression: mask

audit:
  sink: stdout            # stdout | file | syslog
  format: jsonl
  # path: /var/log/data_gate/audit.jsonl   # when sink == file
