# SPDX-License-Identifier: Apache-2.0
# Canonical V1 example. Keep this file aligned with docs/configuration.md,
# docs/api.md, and docs/ops.md.

server:
  bind: 0.0.0.0:8080

catalog:
  title: Internal Government Registry Relay
  base_url: https://data.example.gov
  publisher: Ministry of Digital Government
  participant_id: did:web:data.example.gov

vocabularies:
  # optional prefix registry, used to shorten URIs in the rest of the config
  psc:    https://publicschema.org/
  m8g:    http://data.europa.eu/m8g/        # SEMIC Core Vocabularies
  schema: https://schema.org/
  dct:    http://purl.org/dc/terms/
  sdmx:   http://purl.org/linked-data/sdmx/2009/concept#

auth:
  mode: api_key
  api_keys:
    - id: statistics_office
      hash_env: STATS_OFFICE_API_KEY_HASH
      scopes:
        - social_registry:metadata
        - social_registry:aggregate

    - id: program_system
      hash_env: PROGRAM_SYSTEM_API_KEY_HASH
      scopes:
        - social_registry:metadata
        - social_registry:aggregate
        - social_registry:rows

    - id: identity_verification_service
      hash_env: VERIFICATION_SERVICE_API_KEY_HASH
      scopes:
        - social_registry:metadata
        - social_registry:evidence_verification

claim_verification:
  binding_key_id: example-v1
  # Env value format: hex:<64+ lowercase hex chars>
  # Generate with: printf 'hex:%s\n' "$(openssl rand -hex 32)"
  binding_key_env: CLAIM_VERIFICATION_BINDING_KEY

evidence_verification:
  rate_limit:
    enabled: true
    burst: 120
    window_seconds: 60
    max_buckets: 8192

datasets:
  - id: social_registry
    title: Social Registry
    description: Registry of households participating in Program X
    owner: Ministry of Social Affairs
    sensitivity: personal
    access_rights: restricted
    update_frequency: monthly
    conforms_to:
      - psc:concepts/Person
      - psc:concepts/Enrollment
      - m8g:CorePerson

    tables:
      - id: households_table
        materialization: snapshot
        source:
          type: file
          path: ./data/social_registry.xlsx
          format:
            xlsx:
              sheet: Households
        refresh:
          mode: mtime         # mtime | interval | manual
          interval: 1h
        primary_key: household_id
        schema:
          strict: true
          fields:
            - name: household_id
              type: string
              nullable: false
            - name: region_code
              type: string
              nullable: true
            - name: enrollment_date
              type: date
              nullable: true

      - id: individuals_table
        materialization: snapshot
        source:
          type: file
          path: ./data/social_registry.xlsx
          format:
            xlsx:
              sheet: Individuals
        refresh:
          mode: mtime
          interval: 1h
        primary_key: individual_id
        schema:
          strict: true
          fields:
            - name: individual_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: municipality_code
              type: string
              nullable: true
              codelist: https://www.insee.fr/codes/cog
            - name: payment_amount
              type: number
              nullable: true
              unit: EUR

    entities:
      - name: household
        title: Household
        description: A household participating in Program X
        table: households_table
        concept_uri: psc:concepts/Household
        fields:
          - name: id
            from: household_id
            concept_uri: psc:properties/householdIdentifier
          - name: region
            from: region_code
            concept_uri: m8g:Location
          - name: enrolled_on
            from: enrollment_date
            concept_uri: psc:properties/enrollmentDate
        relationships:
          - name: members
            kind: has_many
            target: individual
            foreign_key: household_id
        access:
          metadata_scope:    social_registry:metadata
          aggregate_scope:   social_registry:aggregate
          read_scope:        social_registry:rows
          evidence_verification_scope: social_registry:evidence_verification
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: region
              ops: [eq, in]
          allowed_expansions: [members]

      - name: individual
        title: Individual
        description: A person enrolled in Program X
        table: individuals_table
        concept_uri: psc:concepts/Person
        fields:
          - name: id
            from: individual_id
            concept_uri: psc:properties/personIdentifier
          - name: household_id
            from: household_id
            concept_uri: psc:properties/householdIdentifier
          - name: municipality_code
            from: municipality_code
            concept_uri: m8g:Location
          - name: payment_amount
            from: payment_amount
            concept_uri: psc:properties/paymentAmount
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
        access:
          metadata_scope:    social_registry:metadata
          aggregate_scope:   social_registry:aggregate
          read_scope:        social_registry:rows
          evidence_verification_scope: social_registry:evidence_verification
        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: municipality_code
              ops: [eq, in]
          allowed_expansions: [household]
        aggregates:
          - id: by_municipality
            description: Number of individuals by municipality
            group_by:
              - municipality_code
            measures:
              - name: individual_count
                function: count
                column: id
            disclosure_control:
              min_group_size: 5
              suppression: omit

          - id: payments_by_municipality
            description: Total and average payments by municipality
            group_by:
              - municipality_code
            measures:
              - name: total_payment
                function: sum
                column: payment_amount
              - name: average_payment
                function: avg
                column: payment_amount
            disclosure_control:
              min_group_size: 5
              suppression: mask

          - id: by_household_region
            description: Number of individuals by household region
            joins:
              - relationship: household
            group_by:
              - household.region
            measures:
              - name: individual_count
                function: count
                column: id
            disclosure_control:
              min_group_size: 5
              suppression: omit

        claim_verification:
          rulesets:
            identity-match-v1:
              mode: normalized_exact
              required_claims: [id]
              candidate_lookup: [id]
              match_fields:
                id: id
              expose_ambiguous: false
              scope: social_registry:evidence_verification

audit:
  sink: stdout            # stdout | file | syslog
  format: jsonl
  # path: /var/log/registry-relay/audit.jsonl   # when sink == file

# Data provenance (signed Verifiable Credentials).
#
# When `enabled: false` (or the whole `provenance:` block is omitted),
# provenance stays invisible: no Accept negotiation, no signing, no
# extra audit events. Plain JSON responses stay unchanged.
#
# Opting in requires a local software signer and an issuer DID. Two
# issuer modes:
#
# * `gateway`: registry-relay self-issues under its own DID and hosts
#   `/.well-known/did.json`.
# * `delegated`: registry-relay signs under a ministry's DID. The ministry
#   hosts its own DID Document including the gateway's `kid`. registry-relay
#   does NOT publish `/.well-known/did.json` in this mode.
#
# See `docs/provenance.md` for the full operational contract.
#
# provenance:
#   enabled: false
#   accepted_media_types:
#     - application/vc+jwt
#     - application/jwt
#     - application/vnd.registry-relay.evidence-verification+jwt
#   schema_base_url: https://data.example.gov/schemas
#   context_base_url: https://data.example.gov/contexts
#   claim_validity:
#     aggregate_result: 1h    # tune to dataset refresh cadence
#     entity_record:    24h   # tune to consumer caching window
#   issuer:
#     mode: gateway
#     did: did:web:data.example.gov
#     verification_method_id: did:web:data.example.gov#issuance
#     signer:
#       kind: software
#       jwk_env: REGISTRY_RELAY_PROVENANCE_JWK   # private JWK (JSON), never logged
#       signing_algorithm: EdDSA
#     retired_keys: []                     # public JWKs of rotated-out keys
