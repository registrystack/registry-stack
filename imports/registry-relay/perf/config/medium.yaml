# SPDX-License-Identifier: Apache-2.0
# Perf config: medium profile (100k rows). Standard developer run.
# Source: perf/fixtures/generated/clinic_capacity_100k.parquet

server:
  bind: 127.0.0.1:18080

catalog:
  title: Clinic Capacity Perf Gateway (medium)
  base_url: http://127.0.0.1:18080
  publisher: Perf Test Harness

auth:
  mode: api_key
  api_keys:
    - id: perf_rows
      hash_env: PERF_ROWS_KEY_HASH
      scopes:
        - clinic_capacity:rows

    - id: perf_metadata
      hash_env: PERF_METADATA_KEY_HASH
      scopes:
        - clinic_capacity:metadata

    - id: perf_aggregate
      hash_env: PERF_AGGREGATE_KEY_HASH
      scopes:
        - clinic_capacity:aggregate

    - id: perf_no_scope
      hash_env: PERF_NO_SCOPE_KEY_HASH
      scopes:

    - id: perf_claim_verification
      hash_env: PERF_CLAIM_VERIFICATION_KEY_HASH
      scopes:
        - clinic_capacity:claim_verification

claim_verification:
  binding_key_id: perf-clinic-capacity-v1
  # Env value format: hex:<64 lowercase hex chars>
  # generate_perf_keys.py emits CLAIM_VERIFICATION_BINDING_KEY.
  binding_key_env: CLAIM_VERIFICATION_BINDING_KEY

# Provenance signer for the claim-verification JWT receipt path.
# The k6 scenario claim_verification.js negotiates
# application/vnd.registry-relay.claim-verification+jwt, so the perf run
# exercises Ed25519 receipt issuance on every request.
#
# JWK is generated by perf/scripts/generate_perf_keys.py and injected via
# REGISTRY_RELAY_PROVENANCE_JWK. The kid in the JWK
# (perf-claim-verification-v1) must match the fragment in
# verification_method_id below.
#
# schema_base_url / context_base_url are required by the config schema but
# are NOT used by the claim-verification receipt path (they apply to the
# full Verifiable Credential routes).
provenance:
  enabled: true
  accepted_media_types:
    - application/vnd.registry-relay.claim-verification+jwt
  schema_base_url: http://127.0.0.1:18080/schemas
  context_base_url: http://127.0.0.1:18080/contexts
  claim_validity:
    verify_result: 5m
    aggregate_result: 1h
    entity_record: 24h
  issuer:
    mode: gateway
    did: did:web:127.0.0.1%3A18080
    verification_method_id: did:web:127.0.0.1%3A18080#perf-claim-verification-v1
    signer:
      kind: software
      jwk_env: REGISTRY_RELAY_PROVENANCE_JWK
      signing_algorithm: EdDSA

datasets:
  - id: clinic_capacity
    title: Clinic Capacity
    description: Synthetic facility records for perf testing
    owner: Perf Test Harness
    sensitivity: public
    access_rights: public
    update_frequency: as_needed

    defaults:
      refresh:
        mode: manual

    tables:
      - id: facility_table
        source:
          type: file
          path: perf/fixtures/generated/clinic_capacity_100k.parquet
          format:
            parquet: {}
        primary_key: id
        schema:
          strict: true
          fields:
            - name: id
              type: string
              nullable: false
            - name: region_code
              type: string
              nullable: true
            - name: capacity
              type: integer
              nullable: true
            - name: occupancy
              type: integer
              nullable: true
            - name: last_updated
              type: string
              nullable: true
            - name: operating_since
              type: string
              nullable: true
            - name: category
              type: string
              nullable: true

    entities:
      - name: facility
        title: Facility
        description: A healthcare facility (clinic, hospital, or pharmacy)
        table: facility_table
        fields:
          - name: id
            from: id
          - name: region_code
            from: region_code
          - name: capacity
            from: capacity
          - name: occupancy
            from: occupancy
          - name: last_updated
            from: last_updated
          - name: operating_since
            from: operating_since
          - name: category
            from: category
        access:
          metadata_scope:           clinic_capacity:metadata
          aggregate_scope:          clinic_capacity:aggregate
          read_scope:               clinic_capacity:rows
          verify_scope:             clinic_capacity:verify
          claim_verification_scope: clinic_capacity:claim_verification
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: region_code
              ops: [eq, in]
            - field: category
              ops: [eq, in]
          allowed_expansions: []
        aggregates:
          - id: by_region
            description: Facility count and total capacity by region
            group_by:
              - region_code
            measures:
              - name: facility_count
                function: count
                column: id
              - name: total_capacity
                function: sum
                column: capacity
            disclosure_control:
              min_group_size: 1
        claim_verification:
          rulesets:
            # Drives the match and mismatch decision paths.
            # candidate_lookup on id (unique primary key) returns at most one candidate.
            # Match: submit id + correct category.
            # Mismatch: submit id + wrong category (candidate found, match_fields fail).
            facility-identity-v1:
              mode: normalized_exact
              required_claims: [id, category]
              candidate_lookup: [id]
              match_fields:
                id: id
                category: category
              allow_subject_id_targeting: false
              diagnostics: false
              expose_ambiguous: false
              scope: clinic_capacity:claim_verification

            # Drives the ambiguous decision path.
            # candidate_lookup on region_code (20 distinct values, ~5000 rows each in 100k)
            # returns many candidates. Matching on category still leaves many matches,
            # so the decision is ambiguous. expose_ambiguous: true is required here so
            # the endpoint reports "ambiguous" rather than collapsing to "mismatch".
            facility-region-v1:
              mode: normalized_exact
              required_claims: [region_code, category]
              candidate_lookup: [region_code]
              match_fields:
                region_code: region_code
                category: category
              allow_subject_id_targeting: false
              diagnostics: false
              expose_ambiguous: true
              scope: clinic_capacity:claim_verification

audit:
  sink: file
  format: jsonl
  path: target/perf/audit.jsonl
