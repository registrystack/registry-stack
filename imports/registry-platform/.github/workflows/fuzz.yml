name: fuzz

on:
  pull_request:
    paths:
      - "crates/registry-platform-authcommon/**"
      - "crates/registry-platform-crypto/**"
      - "crates/registry-platform-oid4vci/**"
      - "crates/registry-platform-sdjwt/**"
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
      - "Cargo.toml"
      - "Cargo.lock"
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_FUZZ_TOOLCHAIN: nightly
  RUSTUP_TOOLCHAIN: nightly
  CARGO_FUZZ_VERSION: "0.13.2"

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - authcommon_parsers
          - oid4vci_request_and_proof
          - sdjwt_holder_proof
          - sdjwt_issuance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_FUZZ_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-fuzz@${{ env.CARGO_FUZZ_VERSION }}
      - name: Smoke fuzz target
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          mkdir -p "fuzz/artifacts/${{ matrix.target }}"
          cargo fuzz run "${{ matrix.target }}" -- \
            -max_total_time=60 \
            -rss_limit_mb=1024 \
            -artifact_prefix="fuzz/artifacts/${{ matrix.target }}/"

  nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - authcommon_parsers
          - oid4vci_request_and_proof
          - sdjwt_holder_proof
          - sdjwt_issuance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_FUZZ_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-fuzz@${{ env.CARGO_FUZZ_VERSION }}
      - uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Run fuzz target
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          mkdir -p "fuzz/artifacts/${{ matrix.target }}"
          cargo fuzz run "${{ matrix.target }}" -- \
            -max_total_time=900 \
            -rss_limit_mb=2048 \
            -artifact_prefix="fuzz/artifacts/${{ matrix.target }}/"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: failure()
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
      - uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        if: always()
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
