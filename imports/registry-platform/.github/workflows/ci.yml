name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.95.0"
  CARGO_LLVM_COV_VERSION: "0.8.7"
  CARGO_DENY_VERSION: "0.19.7"
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace --all-targets --all-features
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-llvm-cov@${{ env.CARGO_LLVM_COV_VERSION }}
      - run: cargo llvm-cov --workspace --all-features --fail-under-lines 80

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: ./scripts/check-hygiene-alignment.sh . .
      - run: ./scripts/audit-configs.sh --base .. --format paths >/tmp/config-inventory.txt

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install Gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -sSfL \
            -o "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_LINUX_X64_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP/bin" gitleaks
          chmod +x "$RUNNER_TEMP/bin/gitleaks"
      - name: Scan tracked files for secrets
        env:
          GITLEAKS_CONFIG_TOML: |
            [extend]
            useDefault = true

            [[allowlists]]
            description = "Ignore generated Rust build output."
            paths = ["(^|/)target/"]

            [[allowlists]]
            description = "Allow published tough test signing keys vendored as fixtures."
            paths = [
              "^crates/registry-platform-config/tests/fixtures/tough-data/snakeoil\\.pem$",
              "^crates/registry-platform-config/tests/fixtures/tough-data/snakeoil_2\\.pem$",
            ]
        run: |
          "$RUNNER_TEMP/bin/gitleaks" dir --no-banner --redact --verbose --timeout 120 .

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-deny@${{ env.CARGO_DENY_VERSION }}
      - run: cargo deny check
