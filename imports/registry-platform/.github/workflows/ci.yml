name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo build --workspace --all-targets --all-features
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-targets --all-features

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --all-features --fail-under-lines 80

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: ./scripts/check-hygiene-alignment.sh . .
      - run: ./scripts/audit-configs.sh --base .. --format paths >/tmp/config-inventory.txt

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Gitleaks
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan tracked files for secrets
        env:
          GITLEAKS_CONFIG_TOML: |
            [extend]
            useDefault = true

            [[allowlists]]
            description = "Ignore generated Rust build output."
            paths = ["(^|/)target/"]
        run: |
          "$RUNNER_TEMP/bin/gitleaks" dir --no-banner --redact --verbose --timeout 120 .

  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.7
      - run: cargo deny check
