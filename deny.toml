[graph]
all-features = true
no-default-features = false
targets = []

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Advisory ignores must include a scoped rationale and a review trigger.
ignore = [
    # RUSTSEC-2023-0089: the all-features graph reaches `atomic-polyfill`
    # through Crosswalk -> phonenumber -> postcard -> heapless 0.7. Phonenumber
    # uses postcard at build time and runtime, but heapless selects
    # `atomic-polyfill` only for AVR, riscv32i/riscv32imc, thumbv6m, and
    # xtensa-esp32s2, not Registry Stack's supported service targets. Review
    # when the chain removes it, before supporting an affected embedded target,
    # or before making CEL mapping part of a hardened default runtime.
    "RUSTSEC-2023-0089",
    # RUSTSEC-2024-0436: `paste` is an unmaintained build-time procedural macro
    # pulled in by Relay's DataFusion and Parquet graph. It does not remain in
    # the runtime binary as request-facing parser code. Review when DataFusion
    # or Arrow/Parquet removes `paste` from the resolved graph, or before
    # upgrading those major versions.
    "RUSTSEC-2024-0436",
]

[licenses]
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    # MIT-0 removes MIT's attribution condition. It is used by `borrow-or-share`,
    # a transitive dependency of the language server's URI implementation.
    "MIT-0",
    # MPL-2.0 is weak, file-level copyleft: its obligations attach only to the
    # MPL-licensed files themselves, not to code that merely depends on them.
    # Allowed workspace-wide; the motivating dependency is `smartstring`,
    # pulled in transitively by the `rhai` script runtime.
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true
registries = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
allow-workspace = false
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/PublicSchema/crosswalk",
]
