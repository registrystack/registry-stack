config:
  default: true
  MD013: false
  MD024:
    siblings_only: true
  # MD037 misreads MDX expression comments ({/* ... */}) as emphasis markers.
  # Evidence-gap TODOs use this MDX form per docs/style-guide.md.
  MD037: false
  MD029:
    style: "ordered"
  MD060:
    style: "padded"
  MD033:
    allowed_elements:
      - img
      - a
      - figure
      - title
      - desc
      - dl
      - dt
      - dd
      - ProjectMap
      - OpenApiSourcesTable
      - ContractsTable
      - StandardsTable
      - SpecRegister
      - LegendList
      - HomeLanding
      - QuickstartMeta
      - ProjectStarterSequence
      - ProjectWorkspaceJourneys
      - Steps
globs:
  - "**/*.{md,mdx}"
ignores:
  - "node_modules/**"
  - "dist/**"
  - "src/data/generated/**"
  - ".research/**"
  - ".repo-docs-cache/**"
  - "docs/**"
  # Pulled product docs are build artifacts; they are linted in their home repo.
  - "src/content/docs/products/**"
