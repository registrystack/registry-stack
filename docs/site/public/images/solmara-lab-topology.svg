<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 408" role="img"
     font-family="'Public Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     text-rendering="geometricPrecision">
  <title>Solmara Lab compose topology</title>
  <desc>The 16 Solmara Lab services in four groups. Six authority Relay instances (cra-civil-relay on host port 4311, nia-population-relay 4312, sro-social-relay 4313, programme-mis-relay 4314, sipf-pensions-relay 4315, nagdi-agriculture-relay 4316) provide evidence reads to four Notary instances (child-benefit-notary 4321, which this tutorial calls directly; pension-notary 4322; nagdi-notary 4323; citizen-notary 4324). The citizen portal on 4300 is wired to the citizen Notary; the Visitor's Center runs on 4301. A support strip holds static-metadata on 4331, scenario-runner, Postgres on 54329, and Redis on 63799. All 16 services start from one just up; host ports shown are the compose defaults.</desc>

  <text x="16" y="22" fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">SOLMARA LAB — COMPOSE TOPOLOGY · 16 SERVICES</text>
  <rect x="16" y="30" width="32" height="2" fill="#000091"/>

  <g fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">
    <text x="16" y="64">AUTHORITY RELAYS (6)</text>
    <text x="314" y="64">NOTARIES (4)</text>
    <text x="554" y="64">EXPERIENCE</text>
  </g>
  <g fill="#000091">
    <rect x="16" y="72" width="24" height="2"/>
    <rect x="314" y="72" width="24" height="2"/>
    <rect x="554" y="72" width="24" height="2"/>
  </g>

  <!-- Authority Relays -->
  <rect x="16" y="84" width="212" height="178" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <g stroke="#e5e5e5" stroke-width="1">
    <line x1="16" y1="118" x2="228" y2="118"/>
    <line x1="16" y1="146" x2="228" y2="146"/>
    <line x1="16" y1="174" x2="228" y2="174"/>
    <line x1="16" y1="202" x2="228" y2="202"/>
    <line x1="16" y1="230" x2="228" y2="230"/>
  </g>
  <g fill="#161616" font-size="10.5"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="28" y="106">cra-civil-relay</text>
    <text x="28" y="134">nia-population-relay</text>
    <text x="28" y="162">sro-social-relay</text>
    <text x="28" y="190">programme-mis-relay</text>
    <text x="28" y="218">sipf-pensions-relay</text>
    <text x="28" y="246">nagdi-agriculture-relay</text>
  </g>
  <g fill="#6a6a6a" font-size="10.5" text-anchor="end"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="216" y="106">:4311</text>
    <text x="216" y="134">:4312</text>
    <text x="216" y="162">:4313</text>
    <text x="216" y="190">:4314</text>
    <text x="216" y="218">:4315</text>
    <text x="216" y="246">:4316</text>
  </g>

  <!-- Relays to Notaries -->
  <text x="270" y="138" fill="#3a3a3a" font-size="11" text-anchor="middle">evidence</text>
  <text x="270" y="164" fill="#3a3a3a" font-size="11" text-anchor="middle">reads</text>
  <g stroke="#000091" stroke-width="1" fill="none">
    <line x1="232" y1="150" x2="308" y2="150"/>
    <polyline points="302,146 308,150 302,154"/>
  </g>

  <!-- Notaries -->
  <rect x="314" y="84" width="192" height="140" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <rect x="314" y="84" width="4" height="50" fill="#000091"/>
  <g stroke="#e5e5e5" stroke-width="1">
    <line x1="314" y1="134" x2="506" y2="134"/>
    <line x1="314" y1="166" x2="506" y2="166"/>
    <line x1="314" y1="194" x2="506" y2="194"/>
  </g>
  <text x="328" y="106" fill="#000091" font-size="10.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">child-benefit-notary</text>
  <text x="328" y="124" fill="#000091" font-size="10.5">you call this one directly</text>
  <g fill="#161616" font-size="10.5"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="328" y="152">pension-notary</text>
    <text x="328" y="180">nagdi-notary</text>
    <text x="328" y="208">citizen-notary</text>
  </g>
  <g fill="#6a6a6a" font-size="10.5" text-anchor="end"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="494" y="106">:4321</text>
    <text x="494" y="152">:4322</text>
    <text x="494" y="180">:4323</text>
    <text x="494" y="208">:4324</text>
  </g>

  <!-- Experience -->
  <rect x="554" y="84" width="150" height="98" fill="#ffffff" stroke="#161616" stroke-width="1"/>
  <line x1="554" y1="132" x2="704" y2="132" stroke="#e5e5e5" stroke-width="1"/>
  <g fill="#161616" font-size="10.5"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="566" y="106">portal</text>
    <text x="566" y="150">home</text>
  </g>
  <g fill="#6a6a6a" font-size="10.5" text-anchor="end"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="692" y="106">:4300</text>
    <text x="692" y="150">:4301</text>
  </g>
  <g fill="#3a3a3a" font-size="11">
    <text x="566" y="122">Citizen portal</text>
    <text x="566" y="166">Visitor's Center</text>
  </g>

  <!-- Portal to citizen Notary -->
  <g stroke="#000091" stroke-width="1" fill="none">
    <polyline points="554,102 530,102 530,208 512,208"/>
    <polyline points="518,204 512,208 518,212"/>
  </g>

  <!-- Support strip -->
  <text x="16" y="292" fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">SUPPORT</text>
  <rect x="16" y="300" width="24" height="2" fill="#000091"/>
  <rect x="16" y="312" width="688" height="52" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <g fill="#161616" font-size="10.5"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="32" y="332">static-metadata</text>
    <text x="200" y="332">scenario-runner</text>
    <text x="392" y="332">postgres</text>
    <text x="540" y="332">redis</text>
  </g>
  <g fill="#6a6a6a" font-size="10.5"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="134" y="332">:4331</text>
    <text x="448" y="332">:54329</text>
    <text x="578" y="332">:63799</text>
  </g>
  <g fill="#3a3a3a" font-size="11">
    <text x="32" y="350">metadata bundle</text>
    <text x="200" y="350">backs the portal's guided demos</text>
  </g>

  <text x="16" y="392" fill="#6a6a6a" font-size="12">All 16 services start from one</text>
  <text x="196" y="392" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">just up</text>
  <text x="243" y="392" fill="#6a6a6a" font-size="12">; host ports shown are the compose defaults.</text>
</svg>
