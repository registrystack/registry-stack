<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img"
     font-family="'Public Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     text-rendering="geometricPrecision">
  <title>Standards claim levels</title>
  <desc>Six claim levels used by the Registry Docs standards register, from the strongest (implements) to the weakest (compares_against). Stronger levels make a more specific claim about how a standard is used.</desc>

  <text x="16" y="22" fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">CLAIM LEVELS — STRONGEST TO WEAKEST</text>
  <rect x="16" y="30" width="32" height="2" fill="#000091"/>

  <text x="16" y="76" fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.06em">STRONG</text>
  <line x1="56" y1="82" x2="56" y2="248" stroke="#000091" stroke-width="2"/>
  <text x="16" y="262" fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.06em">WEAK</text>

  <g font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace"
     fill="#000091" font-size="13" font-weight="600">
    <text x="72" y="92">implements</text>
    <text x="72" y="124">emits</text>
    <text x="72" y="156">maps_to</text>
    <text x="72" y="188">aligns_with</text>
    <text x="72" y="220">inspired_by</text>
    <text x="72" y="252">compares_against</text>
  </g>

  <g fill="#3a3a3a" font-size="13">
    <text x="224" y="92">Implements a normative requirement or API shape from the standard.</text>
    <text x="224" y="124">Produces artifacts shaped like the standard (JSON-LD, SHACL, OpenAPI).</text>
    <text x="224" y="156">Maps local concepts or fields to the standard.</text>
    <text x="224" y="188">Follows the model or intent without claiming formal conformance.</text>
    <text x="224" y="220">Standard influenced design but no compatibility is claimed.</text>
    <text x="224" y="252">Standard discussed to explain boundaries or alternatives.</text>
  </g>

  <g stroke="#e5e5e5" stroke-width="1">
    <line x1="72" y1="104" x2="720" y2="104"/>
    <line x1="72" y1="136" x2="720" y2="136"/>
    <line x1="72" y1="168" x2="720" y2="168"/>
    <line x1="72" y1="200" x2="720" y2="200"/>
    <line x1="72" y1="232" x2="720" y2="232"/>
  </g>
</svg>
