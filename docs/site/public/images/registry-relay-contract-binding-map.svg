<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img"
     font-family="'Public Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     text-rendering="geometricPrecision">
  <title>Registry Relay contract binding map</title>
  <desc>Registry Relay binds a portable metadata manifest and deployment runtime config together. Startup validation checks that the public contract and private bindings agree. The running service then exposes metadata, entity reads, and audit while source details remain private.</desc>

  <g fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">
    <text x="24" y="32">TWO INPUTS</text>
    <text x="288" y="32">STARTUP CHECK</text>
    <text x="528" y="32">RUNNING SERVICE</text>
  </g>
  <g fill="#000091">
    <rect x="24" y="40" width="32" height="2"/>
    <rect x="288" y="40" width="32" height="2"/>
    <rect x="528" y="40" width="32" height="2"/>
  </g>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="48" y="82" width="176" height="132"/>
    <rect x="48" y="230" width="176" height="132"/>
  </g>
  <text x="68" y="114" fill="#161616" font-size="14" font-weight="700">Portable manifest</text>
  <text x="68" y="134" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">metadata.yaml</text>
  <text x="68" y="158" fill="#3a3a3a" font-size="12.5">Datasets, entities,</text>
  <text x="68" y="176" fill="#3a3a3a" font-size="12.5">fields, policies, and</text>
  <text x="68" y="194" fill="#3a3a3a" font-size="12.5">evidence offerings.</text>
  <text x="68" y="262" fill="#161616" font-size="14" font-weight="700">Runtime binding</text>
  <text x="68" y="282" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">config.yaml</text>
  <text x="68" y="306" fill="#3a3a3a" font-size="12.5">Sources, scopes,</text>
  <text x="68" y="324" fill="#3a3a3a" font-size="12.5">filters, aggregates,</text>
  <text x="68" y="342" fill="#3a3a3a" font-size="12.5">and refresh behavior.</text>

  <polygon points="336,96 424,168 424,264 336,336 248,264 248,168"
           fill="#ffffff" stroke="#000091" stroke-width="1.4"/>
  <text x="300" y="192" fill="#161616" font-size="15" font-weight="700">Validate</text>
  <text x="298" y="214" fill="#161616" font-size="15" font-weight="700">and bind</text>
  <text x="286" y="242" fill="#3a3a3a" font-size="12.5">Logical names</text>
  <text x="286" y="260" fill="#3a3a3a" font-size="12.5">must match live</text>
  <text x="286" y="278" fill="#3a3a3a" font-size="12.5">source bindings.</text>

  <rect x="512" y="86" width="160" height="250" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="536" y="120" fill="#161616" font-size="15" font-weight="700">Registry Relay</text>
  <text x="536" y="140" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">runtime service</text>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="536" y="166" width="112" height="36"/>
    <rect x="536" y="218" width="112" height="36"/>
    <rect x="536" y="270" width="112" height="36"/>
  </g>
  <g fill="#161616" font-size="12.5" font-weight="700">
    <text x="550" y="189">Metadata</text>
    <text x="550" y="241">Entity reads</text>
    <text x="550" y="293">Audit</text>
  </g>

  <g stroke="#000091" stroke-width="1.2" fill="none">
    <path d="M224 134 C254 134 264 158 286 178"/>
    <polyline points="278,177 286,178 282,171"/>
    <path d="M224 282 C258 282 264 262 286 254"/>
    <polyline points="280,249 286,254 278,257"/>
    <path d="M424 216 C462 216 478 210 512 210"/>
    <polyline points="506,206 512,210 506,214"/>
  </g>

  <text x="224" y="382" fill="#6a6a6a" font-size="12.5">
    Runtime source details stay outside the portable public contract.
  </text>

  <line x1="24" y1="402" x2="696" y2="402" stroke="#e5e5e5" stroke-width="1"/>
</svg>
