<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" role="img"
     font-family="'Public Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
     text-rendering="geometricPrecision">
  <title>Registry Relay C4 container view</title>
  <desc>C4-style container diagram for Registry Relay. The service boundary contains API routes, auth and scope enforcement, entity resolution, metadata publication, source adapters, and audit writing. External callers, private sources, and audit sinks sit outside the service boundary.</desc>

  <g fill="#6a6a6a" font-size="11" font-weight="700" letter-spacing="0.08em">
    <text x="24" y="34">C4 LEVEL 2</text>
    <text x="118" y="34">CONTAINER VIEW</text>
  </g>
  <rect x="24" y="42" width="32" height="2" fill="#000091"/>

  <rect x="168" y="72" width="424" height="336" fill="#ffffff" stroke="#000091" stroke-width="1.6"/>
  <text x="192" y="104" fill="#161616" font-size="15" font-weight="700">Registry Relay service boundary</text>
  <text x="192" y="124" fill="#6a6a6a" font-size="11.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">[Software system]</text>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="204" y="152" width="144" height="60"/>
    <rect x="412" y="152" width="144" height="60"/>
    <rect x="204" y="248" width="144" height="60"/>
    <rect x="412" y="248" width="144" height="60"/>
    <rect x="308" y="332" width="144" height="52"/>
  </g>
  <g fill="#161616" font-size="12.5" font-weight="700">
    <text x="224" y="178">API routes</text>
    <text x="224" y="196">entity, metadata</text>
    <text x="432" y="178">Auth and scopes</text>
    <text x="432" y="196">per caller</text>
    <text x="224" y="274">Entity resolver</text>
    <text x="224" y="292">public shape</text>
    <text x="432" y="274">Source adapters</text>
    <text x="432" y="292">files and DB</text>
    <text x="328" y="364">Audit writer</text>
  </g>
  <g fill="#6a6a6a" font-size="11.5"
     font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">
    <text x="224" y="166">[Container]</text>
    <text x="432" y="166">[Container]</text>
    <text x="224" y="262">[Container]</text>
    <text x="432" y="262">[Container]</text>
    <text x="328" y="352">[Container]</text>
  </g>

  <g fill="#ffffff" stroke="#e5e5e5" stroke-width="1">
    <rect x="32" y="168" width="104" height="72"/>
    <rect x="624" y="168" width="104" height="72"/>
    <rect x="624" y="300" width="104" height="72"/>
  </g>
  <text x="52" y="198" fill="#161616" font-size="12.5" font-weight="700">Caller</text>
  <text x="52" y="216" fill="#3a3a3a" font-size="11.5">API client</text>
  <text x="644" y="198" fill="#161616" font-size="12.5" font-weight="700">Sources</text>
  <text x="644" y="216" fill="#3a3a3a" font-size="11.5">private data</text>
  <text x="644" y="330" fill="#161616" font-size="12.5" font-weight="700">Audit sink</text>
  <text x="644" y="348" fill="#3a3a3a" font-size="11.5">jsonl/syslog</text>

  <g stroke="#000091" stroke-width="1.2" fill="none">
    <path d="M136 204 C158 204 178 188 204 182"/>
    <polyline points="196,180 204,182 198,187"/>
    <path d="M348 182 C372 182 388 182 412 182"/>
    <polyline points="406,178 412,182 406,186"/>
    <path d="M276 212 C276 228 276 236 276 248"/>
    <polyline points="272,242 276,248 280,242"/>
    <path d="M348 278 C372 278 388 278 412 278"/>
    <polyline points="406,274 412,278 406,282"/>
    <path d="M556 278 C586 266 594 212 624 204"/>
    <polyline points="616,203 624,204 618,198"/>
    <path d="M348 308 C356 318 366 324 380 332"/>
    <polyline points="372,331 380,332 376,325"/>
    <path d="M452 358 C512 374 582 346 624 336"/>
    <polyline points="616,334 624,336 618,341"/>
  </g>

  <line x1="24" y1="458" x2="736" y2="458" stroke="#e5e5e5" stroke-width="1"/>
</svg>
