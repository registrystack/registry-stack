# context lives here too), and the Scalar UI bundle the `/docs` viewer
# loads. The test suite re-hashes each file and asserts equality, so any
# unreviewed edit fails CI before reaching production. The Wave 3 hash
# space is `decisions/wave-3-data-provenance.md` section §10.

