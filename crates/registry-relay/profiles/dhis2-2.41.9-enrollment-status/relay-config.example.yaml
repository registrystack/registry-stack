# SPDX-License-Identifier: Apache-2.0
# Local bootstrap example for the maintained DHIS2 2.41.9 consultation profile.
# Production and evidence-grade deployments must deliver this configuration and
# its artifacts through the signed configuration-bundle path.

server:
  bind: "127.0.0.1:8080"

catalog:
  title: "DHIS2 consultation Relay"
  base_url: "https://relay.example.gov"
  publisher: "Example Ministry"

auth:
  mode: oidc
  oidc:
    issuer: "https://identity.example.gov"
    audiences: ["relay-consultation"]
    jwks_url: "https://identity.example.gov/.well-known/jwks.json"
    allowed_clients: ["registry-notary"]

audit:
  sink: stdout
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

consultation:
  authorized_workload:
    audience: relay-consultation
    client_claim_selector: azp
    client_value: registry-notary
    principal_id: registry-notary
  state_plane:
    database_url_env: REGISTRY_RELAY_CONSULTATION_DATABASE_URL
    chain_key_epoch_id: relay-consultation-chain-1
    serving_fence_lock_key: 7221091441
    audit_pseudonym_keyring_lock_key: 7221091442
  artifacts:
    public_contracts:
      - path: public-contract.json
        hash: sha256:09d7286fdd36bb936f074454aa50fd06aa4dcbca62b45ad9d8357b082bdaa036
        sha256: sha256:1b6b86447d173e36b5fcc30fc66b1b0fbd2e7fd6a1e709c9dbb85fc9d2f092ce
    integration_packs:
      - path: integration-pack.json
        hash: sha256:3ebf1e17fba13e4071101a162ad53311e1a7404bea8e2624ec8621aa9d0ac997
        sha256: sha256:e8aac496fd789342359bdd8c67319e46c12b9e14498db056587bc6af9c9e312c
    private_bindings:
      - path: private-binding.example.json
        hash: sha256:2195fdb4b47ef523b3c23b45329d6cfaca9d32a2e6c5b2de6fbb520c5fbcb3ca
        sha256: sha256:d23145466a6967018d8050fd2bc742a18406ecb1a8df0b2624963aa1700d8008
    evidence:
      - class: conformance
        path: evidence/conformance.json
        sha256: sha256:a6731a8e3e873d6d8637731b5ff800b10b4bbe13ed773d01e21c3bd43beba7d0
      - class: negative_security
        path: evidence/negative-security.json
        sha256: sha256:c80935c99ea506b1ccbb15ed86bbf90e491992e201ecb5c3a570104cf3abde2b
      - class: minimization
        path: evidence/minimization.json
        sha256: sha256:99e85f99bbb9f61b7e477c6446c2f604eec723f46cc7921d5f21fa7ef13da339
  audit_pseudonym_materials:
    - key_id: epoch-1
      source:
        provider: environment
        name: REGISTRY_RELAY_AUDIT_PSEUDONYM_EPOCH_1
  source_credentials:
    - type: basic
      ref: dhis2-basic-reader
      generation: 1
      username_env: DHIS2_USERNAME
      password_env: DHIS2_PASSWORD

datasets: []

deployment:
  profile: local
