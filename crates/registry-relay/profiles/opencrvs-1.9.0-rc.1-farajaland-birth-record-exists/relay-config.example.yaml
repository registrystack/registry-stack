# SPDX-License-Identifier: Apache-2.0
# Local bootstrap example for the maintained OpenCRVS existence profile.
# Production deployments must deliver configuration and artifacts through the
# signed configuration-bundle path.

server:
  bind: "127.0.0.1:8080"

catalog:
  title: "OpenCRVS consultation Relay"
  base_url: "https://relay.example.gov"
  publisher: "Example Ministry"

auth:
  mode: oidc
  oidc:
    issuer: "https://identity.example.gov"
    audiences: ["relay-consultation"]
    jwks_url: "https://identity.example.gov/.well-known/jwks.json"
    allowed_clients: ["registry-notary"]

audit:
  sink: stdout
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

consultation:
  notary_workload:
    audience: relay-consultation
    client_claim_selector: azp
    client_value: registry-notary
    principal_id: registry-notary
  state_plane:
    database_url_env: REGISTRY_RELAY_CONSULTATION_DATABASE_URL
    chain_key_epoch_id: relay-consultation-chain-1
    serving_fence_lock_key: 7221091541
    audit_pseudonym_keyring_lock_key: 7221091542
  artifacts:
    public_contracts:
      - path: public-contract.json
        hash: sha256:4153c6c95c0454c6278a239ed096715f08547666b03e5d8b7003f32d6c29e4a6
        sha256: sha256:6687b09fa9dbcbd52e93f2cf841590288e0985f03a2ffa7d1ccdbed0674b53da
    integration_packs:
      - path: integration-pack.json
        hash: sha256:2217affdb8ea79a7197926800ee5f3eb5a003e9ad3acaaa6dc54c00e2ac06b58
        sha256: sha256:2be5ae6276dfa10392c133323a060149d3f346d563742fc2df10424e7ce5c42c
    private_bindings:
      - path: private-binding.example.json
        hash: sha256:635e4e1626998ae43226980da87a94c70450203149bfb6477a545f8017d9336d
        sha256: sha256:18c8c76025aa6eb93ec7953ccd16bcf4d9c36d4402c21d200894385326111082
    evidence:
      - class: conformance
        path: evidence/conformance.json
        sha256: sha256:ab29301c94e97486a744f3f8ce75e5f2b9f13d0f7fbe23cc727e1909414de867
      - class: negative_security
        path: evidence/negative-security.json
        sha256: sha256:256e603484895b805f4904db6effcf75b143a89a60730351a1d25ec2e98177e7
      - class: minimization
        path: evidence/minimization.json
        sha256: sha256:8b9aad532d816ae12dc3abd1b94027edd00a31169d19a2cbef3902e8873106ef
  audit_pseudonym_materials:
    - key_id: epoch-1
      source:
        provider: environment
        name: REGISTRY_RELAY_AUDIT_PSEUDONYM_EPOCH_1
  source_credentials:
    - type: oauth_client_credentials
      ref: opencrvs-oauth-client
      generation: 1
      client_id_env: OPENCRVS_DCI_CLIENT_ID
      client_secret_env: OPENCRVS_DCI_CLIENT_SECRET

datasets: []

deployment:
  profile: local
