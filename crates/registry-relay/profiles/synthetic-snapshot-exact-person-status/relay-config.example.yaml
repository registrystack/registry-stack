# SPDX-License-Identifier: Apache-2.0
# Local operator example for the Registry Stack synthetic SnapshotExact journey.
# Production and evidence-grade deployments must deliver this configuration and
# its artifacts through the signed configuration-bundle path.

server:
  bind: "127.0.0.1:8080"
  cache_dir: "./cache"
  request_timeout: 30s

catalog:
  title: "Synthetic SnapshotExact Relay"
  base_url: "https://relay.example.gov"
  publisher: "Example Ministry"

auth:
  mode: oidc
  oidc:
    issuer: "https://identity.example.gov"
    audiences: ["relay-consultation"]
    jwks_url: "https://identity.example.gov/.well-known/jwks.json"
    allowed_clients: ["registry-notary"]

audit:
  sink: stdout
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

consultation:
  authorized_workload:
    audience: relay-consultation
    client_claim_selector: azp
    client_value: registry-notary
    principal_id: registry-notary
  state_plane:
    database_url_env: REGISTRY_RELAY_CONSULTATION_DATABASE_URL
    chain_key_epoch_id: relay-consultation-chain-1
    serving_fence_lock_key: 7221091451
    audit_pseudonym_keyring_lock_key: 7221091452
  artifacts:
    public_contracts:
      - path: public-contract.json
        hash: sha256:108759925d30fa99a77e99b9ef9c37c45291acae0431f43d6a2d81f5d2ca72a2
        sha256: sha256:01705a93c7f3a5972037b23386566512ec4965eef79ef0d30f405b9cd1a2ff96
    integration_packs:
      - path: integration-pack.json
        hash: sha256:c332a961e43cb1f758fd2341924f142a544b62bf569f22f475be8cae011692ee
        sha256: sha256:5193efbaf2dfe64d77e9c8800d1bf96b92f8f5d7e3dc5f8e0567fe9e16181bb8
    private_bindings:
      - path: private-binding.example.json
        hash: sha256:4cbb1f3408a744d86dd4f681b9e3284bc394f6e0d939d8da12cf7769d13d0cb5
        sha256: sha256:6d756d58c8bbb307ebb658092bd1da740f2864bca301495a9aaa49f2ebb43bdd
    evidence:
      - class: conformance
        path: evidence/conformance.json
        sha256: sha256:d0d5489d19bca6215f3c1c61ab608b615eeae88459050f7729d64be2972eef0e
      - class: negative_security
        path: evidence/negative-security.json
        sha256: sha256:f51614b43181e0ac545e66fa7770be8b6154b54891a187958c51cf58a5bf0c43
      - class: minimization
        path: evidence/minimization.json
        sha256: sha256:ca0a8670021a40e4f07fe276f894c270d1a48f1997f034118490e29966e5129a
  audit_pseudonym_materials:
    - key_id: epoch-1
      source:
        provider: environment
        name: REGISTRY_RELAY_AUDIT_PSEUDONYM_EPOCH_1
  source_credentials: []

datasets:
  - id: synthetic_snapshot
    title: Synthetic SnapshotExact registry
    description: Synthetic person status records for the maintained SnapshotExact journey
    owner: Example Ministry
    sensitivity: personal
    access_rights: restricted
    update_frequency: as_needed
    tables:
      - id: people
        materialization: snapshot
        source:
          type: file
          path: ./fixtures/people.csv
          format:
            csv:
              header_row: 1
        refresh:
          mode: manual
        schema:
          strict: true
          fields:
            - name: subject_key
              type: string
              nullable: false
              sensitive: true
            - name: registration_status_text
              type: string
              nullable: false
            - name: observed_at_text
              type: string
              nullable: false
            - name: revision_text
              type: string
              nullable: false
    entities: []

deployment:
  profile: local
