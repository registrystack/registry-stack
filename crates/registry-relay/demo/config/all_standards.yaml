              ops: [eq, in]
            - field: school_id
              ops: [eq, in]
            - field: school_year
              ops: [eq, in]
            - field: grade_level
              ops: [eq, in]
            - field: status
              ops: [eq, in]
            - field: enrolled_on
              ops: [gte, lte, between]
          allowed_expansions: [student, school]
      - name: support_need
        title: Support Need
        description: A support need assessment for a student
        table: support_needs_table
        fields:
          - name: id
            from: support_need_id
          - name: student_id
            from: student_id
          - name: support_type
            from: support_type
          - name: eligibility_status
            from: eligibility_status
          - name: assessment_date
            from: assessment_date
          - name: active
            from: active
        relationships:
          - name: student
            kind: belongs_to
            target: student
            foreign_key: student_id
        access:
