# SPDX-License-Identifier: Apache-2.0
# Combined config for the full local demo:
#   cargo run --features ogcapi-features,spdci-api-standards,standards-cel-mapping -- --config demo/config/all_standards.yaml
#
# Loads the five core datasets plus the optional SP DCI registry gateway demo so
# one local server can expose both the OGC API Features surface and DCI sync APIs.
# The audit sink is a file (demo/var/audit.jsonl) rather than stdout so the
# scholarship and emergency flows' multi-persona audit trail is durable and
# inspectable after the fact (spec line 740).

server:
  bind: 0.0.0.0:4242
metadata:
  source:
    path: all_standards.metadata.yaml

catalog:
  title: Government Demo Registry Relay (All Standards Demo)
  base_url: http://127.0.0.1:4242
  publisher: Government Data Reuse Cell (Demo)
vocabularies:
  spdci: https://schema.spdci.org/


auth:
  mode: api_key
  api_keys:
    - id: catalog_viewer
      fingerprint:
        provider: env
        name: CATALOG_VIEWER_HASH
        commitment: sha256:8e1a97e93d31a6c8e57a2e47fede65dc52655e4c40c4ddb3836395a6c12ef17f
      scopes:
        - benefits_casework:metadata
        - clinic_capacity:metadata
        - public_works_projects:metadata
        - education_registry:metadata
        - subject_registry:metadata
        - disability_registry:metadata
        - civil_registry:metadata
        - social_registry:metadata
        - farmer_registry:metadata
    - id: planning_analyst
      fingerprint:
        provider: env
        name: PLANNING_ANALYST_HASH
        commitment: sha256:2ff911bb5cf147eafc2024bb123df859f731d087e02e7da96a2b4c49687b5320
      scopes:
        - benefits_casework:metadata
        - benefits_casework:aggregate
        - clinic_capacity:metadata
        - clinic_capacity:aggregate
        - public_works_projects:metadata
        - public_works_projects:aggregate
        - education_registry:metadata
        - education_registry:aggregate
        - subject_registry:metadata
        - subject_registry:aggregate
        - disability_registry:metadata
        - civil_registry:metadata
        - social_registry:metadata
        - farmer_registry:metadata
    # casework_system: rows on personal datasets (benefits, education) plus
    # non-personal operational datasets (clinic, public works) where cross-demo
    # follow-ups need them. Explicitly NOT subject_registry:rows.
    - id: casework_system
      fingerprint:
        provider: env
        name: CASEWORK_SYSTEM_HASH
        commitment: sha256:31eaa0644ee0593bf88482417b113d4e4f01b07848d5b2a628d97a01be899779
      scopes:
        - benefits_casework:metadata
        - benefits_casework:rows
        - benefits_casework:aggregate
        - clinic_capacity:metadata
        - clinic_capacity:rows
        - clinic_capacity:aggregate
        - public_works_projects:metadata
        - public_works_projects:rows
        - public_works_projects:aggregate
        - education_registry:metadata
        - education_registry:rows
        - education_registry:aggregate
        - subject_registry:metadata
        - disability_registry:metadata
        - disability_registry:rows
        - civil_registry:metadata
        - civil_registry:rows
        - social_registry:metadata
        - social_registry:rows
        - farmer_registry:metadata
        - farmer_registry:rows
    - id: verification_service
      fingerprint:
        provider: env
        name: VERIFICATION_SERVICE_HASH
        commitment: sha256:a0bd21e279907c6fada5bb839a461a3e3014617dbb49c2e9a03e87e7f1f3344b
      scopes:
        - benefits_casework:evidence_verification
        - clinic_capacity:evidence_verification
        - public_works_projects:evidence_verification
        - education_registry:evidence_verification
        - subject_registry:evidence_verification
        - disability_registry:evidence_verification
        - civil_registry:evidence_verification
        - social_registry:evidence_verification
        - farmer_registry:evidence_verification
    # linkage_service: the only persona with subject_registry:rows.
    # No row scopes on benefits or education; resolves aliases via the registry only.
    - id: linkage_service
      fingerprint:
        provider: env
        name: LINKAGE_SERVICE_HASH
        commitment: sha256:4e8a0c5713797fb8c03b4e710e3367185fdc383f9e33d9d1ab27dd19df29e4e2
      scopes:
        - subject_registry:metadata
        - subject_registry:rows
        - subject_registry:aggregate
    - id: operations_admin
      fingerprint:
        provider: env
        name: OPERATIONS_ADMIN_HASH
        commitment: sha256:379ad2d16e275e6fc7de478764353606569f30507c6e73647dc28045d79b2f17
      scopes:
        - registry_relay:admin
        - registry_relay:ops_read
        - benefits_casework:metadata
        - clinic_capacity:metadata
        - public_works_projects:metadata
        - education_registry:metadata
        - subject_registry:metadata
        - disability_registry:metadata
        - civil_registry:metadata
        - social_registry:metadata
        - farmer_registry:metadata



standards:
  spdci:
    disability_registry:
      dataset: disability_registry
      entity: disabled_person
      query_key: personal_details.member_identifier
      query_field: member_identifier
      disabled_status_field: disability_status
      disabled_positive_values: [approved]
    registries:
      dr:
        dataset: disability_registry
        entity: disabled_person
        registry_type: ns:org:RegistryType:DR
        record_type: spdci-extensions-dci:DisabledPerson
        identifiers:
          DISABILITY_ID: member_identifier
          MEMBER_ID: member_identifier
          UIN: member_identifier
          NIN: member_identifier
          DRN: member_identifier
          NATIONAL_ID: member_identifier
          NID: member_identifier
        expression_fields:
          personal_details.member_identifier: member_identifier
          disability_status: disability_status
          disability_details.impairment_type: impairment_type
          home_district: home_district
        response_mapping_path: demo/mappings/spdci/dr-disabled-person.yaml
        response_schema_path: demo/schemas/spdci/dr-disabled-person.schema.json
      sr:
        dataset: social_registry
        entity: social_group
        registry_type: ns:org:RegistryType:Social
        record_type: SRPerson
        identifiers:
          GROUP_ID: group_id
          HOUSEHOLD_ID: group_id
          UIN: head_national_id
          NIN: head_national_id
        expression_fields:
          group_identifier.identifier_value: group_id
          group_type: group_type
          place.address: district
          poverty_score: poverty_score
        response_mapping_path: demo/mappings/spdci/sr-social-group.yaml
        response_schema_path: demo/schemas/spdci/sr-social-group.schema.json
      crvs:
        dataset: civil_registry
        entity: civil_person
        registry_type: ns:org:RegistryType:Civil
        record_type: spdci-extensions-dci:Person
        identifiers:
          PERSON_ID: id
          BIRTH_REG_NO: id
          NATIONAL_ID: national_id
          UIN: national_id
          NIN: national_id
        expression_fields:
          sample_field: id
          identifier.identifier_value: national_id
          sex: sex
          birth_date: birth_date
          registration_date: registration_date
          address.locality: district
        response_mapping_path: demo/mappings/spdci/crvs-person.yaml
        response_schema_path: demo/schemas/spdci/crvs-person.schema.json
      fr:
        dataset: farmer_registry
        entity: farmer
        registry_type: ns:org:RegistryType:FR
        record_type: spdci-extensions-dci:Farmer
        identifiers:
          FARMER_ID: id
          MEMBER_ID: id
          UIN: national_id
          NIN: national_id
        expression_fields:
          famer_personal_details.member_identifier.identifier_value: id
          farmer_personal_details.member_identifier.identifier_value: id
          family_details.group_identifier.identifier_value: family_id
          farm_details.farm_type: farm_type
          farm_details.place.name: farm_place_name
        response_mapping_path: demo/mappings/spdci/fr-farmer.yaml
        response_schema_path: demo/schemas/spdci/fr-farmer.schema.json


audit:
  sink: file
  path: demo/var/audit.jsonl
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET
  rotate:
    max_size_mb: 50
    max_files: 5

datasets:
  - id: benefits_casework
    title: Benefits Casework
    description: >-
      Household, person, benefit case, and payment data for social protection programme administration. Used for eligibility checks, grievance follow-up, reconciliation, and planning aggregates.
    owner: Ministry of Social Affairs
    sensitivity: personal
    access_rights: restricted
    update_frequency: monthly
    defaults:
      refresh:
        mode: manual
    tables:
      - id: households_table
        source:
          type: file
          path: demo/data/benefits_casework.xlsx
          format:
            xlsx:
              sheet: Households
        primary_key: household_id
        schema:
          strict: true
          fields:
            - name: household_id
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: municipality
              type: string
              nullable: false
            - name: household_size
              type: number
              nullable: false
            - name: poverty_band
              type: string
              nullable: false
            - name: enrollment_status
              type: string
              nullable: false
            - name: enrolled_on
              type: date
              nullable: false
            # address_line and case_notes are present in the workbook but
            # not projected into any public entity field.
            - name: address_line
              type: string
              nullable: true
              sensitive: true
            - name: case_notes
              type: string
              nullable: true
              sensitive: true
      - id: persons_table
        source:
          type: file
          path: demo/data/benefits_casework.xlsx
          format:
            xlsx:
              sheet: Persons
        primary_key: person_id
        schema:
          strict: true
          fields:
            - name: person_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: age_band
              type: string
              nullable: false
            - name: sex
              type: string
              nullable: false
            - name: disability_status
              type: string
              nullable: false
            - name: benefit_role
              type: string
              nullable: false
            - name: eligibility_status
              type: string
              nullable: false
            - name: full_name
              type: string
              nullable: true
              sensitive: true
            - name: national_id
              type: string
              nullable: true
              sensitive: true
            - name: phone
              type: string
              nullable: true
              sensitive: true
      - id: cases_table
        source:
          type: file
          path: demo/data/benefits_casework.xlsx
          format:
            xlsx:
              sheet: Cases
        primary_key: case_id
        schema:
          strict: true
          fields:
            - name: case_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: case_type
              type: string
              nullable: false
            - name: case_status
              type: string
              nullable: false
            - name: opened_on
              type: date
              nullable: false
            - name: closed_on
              type: date
              nullable: true
            - name: priority
              type: string
              nullable: false
            - name: caseworker_notes
              type: string
              nullable: true
              sensitive: true
      - id: payments_table
        source:
          type: file
          path: demo/data/benefits_casework.xlsx
          format:
            xlsx:
              sheet: Payments
        primary_key: payment_id
        schema:
          strict: true
          fields:
            - name: payment_id
              type: string
              nullable: false
            - name: household_id
              type: string
              nullable: false
            - name: cycle
              type: string
              nullable: false
            - name: payment_status
              type: string
              nullable: false
            - name: amount
              type: number
              nullable: false
              unit: USD
            - name: paid_on
              type: date
              nullable: true
            - name: payment_channel
              type: string
              nullable: false
            - name: bank_account_hint
              type: string
              nullable: true
              sensitive: true
    entities:
      - name: household
        title: Household
        description: A household enrolled in the benefits programme
        table: households_table
        fields:
          - name: id
            from: household_id
          - name: district
            from: district
          - name: municipality
            from: municipality
          - name: household_size
            from: household_size
          - name: poverty_band
            from: poverty_band
          - name: enrollment_status
            from: enrollment_status
          - name: enrolled_on
            from: enrolled_on
        relationships:
          - name: members
            kind: has_many
            target: person
            foreign_key: household_id
          - name: cases
            kind: has_many
            target: case
            foreign_key: household_id
          - name: payments
            kind: has_many
            target: payment
            foreign_key: household_id
        access:
          metadata_scope: benefits_casework:metadata
          aggregate_scope: benefits_casework:aggregate
          read_scope: benefits_casework:rows
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: municipality
              ops: [eq, in]
            - field: poverty_band
              ops: [eq, in]
            - field: enrollment_status
              ops: [eq, in]
            - field: enrolled_on
              ops: [gte, lte, between]
          allowed_expansions: [members, cases, payments]
        aggregates:
          - id: by_poverty_band
            description: Count of households by district and poverty band
            group_by:
              - district
              - poverty_band
            measures:
              - name: household_count
                function: count
                column: id
            # personal data; person and case counts use omit, payment measures use mask
            disclosure_control:
              min_group_size: 5
              suppression: omit
      - name: person
        title: Person
        description: An individual member of a benefit household
        table: persons_table
        fields:
          - name: id
            from: person_id
          - name: household_id
            from: household_id
          - name: age_band
            from: age_band
          - name: sex
            from: sex
          - name: disability_status
            from: disability_status
          - name: benefit_role
            from: benefit_role
          - name: eligibility_status
            from: eligibility_status
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
        access:
          metadata_scope: benefits_casework:metadata
          aggregate_scope: benefits_casework:aggregate
          read_scope: benefits_casework:rows
        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          required_filters:
            - id
            - household_id
            - eligibility_status
          required_filter_bindings:
            - field: id
              source: principal_id
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: age_band
              ops: [eq, in]
            - field: sex
              ops: [eq, in]
            - field: disability_status
              ops: [eq, in]
            - field: eligibility_status
              ops: [eq, in]
          allowed_expansions: [household]
        aggregates:
          - id: by_district_age_band
            description: Count of persons by household district and age band
            joins:
              - relationship: household
            group_by:
              - household.district
              - age_band
            measures:
              - name: person_count
                function: count
                column: id
            # personal data; person and case counts use omit, payment measures use mask
            disclosure_control:
              min_group_size: 5
              suppression: omit
      - name: case
        title: Benefit Case
        description: An appeal, recertification, or grievance case for a household
        table: cases_table
        fields:
          - name: id
            from: case_id
          - name: household_id
            from: household_id
          - name: case_type
            from: case_type
          - name: case_status
            from: case_status
          - name: opened_on
            from: opened_on
          - name: closed_on
            from: closed_on
          - name: priority
            from: priority
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
        access:
          metadata_scope: benefits_casework:metadata
          aggregate_scope: benefits_casework:aggregate
          read_scope: benefits_casework:rows
        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: case_type
              ops: [eq, in]
            - field: case_status
              ops: [eq, in]
            - field: opened_on
              ops: [gte, lte, between]
            - field: priority
              ops: [eq, in]
          allowed_expansions: [household]
        aggregates:
          - id: by_status_priority
            description: Count of cases by status and priority
            group_by:
              - case_status
              - priority
            measures:
              - name: case_count
                function: count
                column: id
            # personal data; person and case counts use omit, payment measures use mask
            disclosure_control:
              min_group_size: 5
              suppression: omit
      - name: payment
        title: Benefit Payment
        description: A payment disbursed to a household in a given cycle
        table: payments_table
        fields:
          - name: id
            from: payment_id
          - name: household_id
            from: household_id
          - name: cycle
            from: cycle
          - name: payment_status
            from: payment_status
          - name: amount
            from: amount
          - name: paid_on
            from: paid_on
          - name: payment_channel
            from: payment_channel
        relationships:
          - name: household
            kind: belongs_to
            target: household
            foreign_key: household_id
        access:
          metadata_scope: benefits_casework:metadata
          aggregate_scope: benefits_casework:aggregate
          read_scope: benefits_casework:rows
        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: household_id
              ops: [eq, in]
            - field: cycle
              ops: [eq, in]
            - field: payment_status
              ops: [eq, in]
            - field: paid_on
              ops: [gte, lte, between]
          allowed_expansions: [household]
        aggregates:
          - id: by_district_cycle
            description: Sum and average payment amount by household district and cycle
            joins:
              - relationship: household
            group_by:
              - household.district
              - cycle
            measures:
              - name: total_amount
                function: sum
                column: amount
              - name: average_amount
                function: avg
                column: amount
            # personal data; person and case counts use omit, payment measures use mask
            disclosure_control:
              min_group_size: 5
              suppression: mask
  - id: clinic_capacity
    title: Clinic Capacity
    description: >-
      Operational data about health facilities, monthly service capacity, and medicine stock events. Used by emergency planners and supply teams. No patient-level data.
    owner: Ministry of Health
    sensitivity: confidential
    access_rights: restricted
    update_frequency: weekly
    defaults:
      refresh:
        mode: manual
    tables:
      - id: facilities_table
        source:
          type: file
          path: demo/data/clinic_capacity.xlsx
          format:
            xlsx:
              sheet: Facilities
        primary_key: facility_id
        schema:
          strict: true
          fields:
            - name: facility_id
              type: string
              nullable: false
            - name: facility_name
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: facility_type
              type: string
              nullable: false
            - name: ownership
              type: string
              nullable: false
            - name: service_level
              type: string
              nullable: false
            - name: latitude_band
              type: string
              nullable: false
            - name: longitude_band
              type: string
              nullable: false
            # generalized public map points used by OGC; exact coordinates stay hidden
            - name: map_latitude
              type: number
              nullable: false
            - name: map_longitude
              type: number
              nullable: false
            # exact coordinates are operationally sensitive; not projected publicly
            - name: exact_latitude
              type: number
              nullable: true
              sensitive: true
            - name: exact_longitude
              type: number
              nullable: true
              sensitive: true
      - id: service_capacity_table
        source:
          type: file
          path: demo/data/clinic_capacity.xlsx
          format:
            xlsx:
              sheet: ServiceCapacity
        primary_key: capacity_id
        schema:
          strict: true
          fields:
            - name: capacity_id
              type: string
              nullable: false
            - name: facility_id
              type: string
              nullable: false
            - name: service_type
              type: string
              nullable: false
            - name: month
              type: string
              nullable: false
            - name: beds_available
              type: number
              nullable: false
            - name: staff_on_roster
              type: number
              nullable: false
            - name: open_days
              type: number
              nullable: false
            - name: internal_roster_notes
              type: string
              nullable: true
              sensitive: true
      - id: stock_events_table
        source:
          type: file
          path: demo/data/clinic_capacity.xlsx
          format:
            xlsx:
              sheet: StockEvents
        primary_key: stock_event_id
        schema:
          strict: true
          fields:
            - name: stock_event_id
              type: string
              nullable: false
            - name: facility_id
              type: string
              nullable: false
            - name: medicine_code
              type: string
              nullable: false
            - name: event_month
              type: string
              nullable: false
            - name: stock_status
              type: string
              nullable: false
            - name: days_stocked_out
              type: number
              nullable: false
            - name: supplier_comment
              type: string
              nullable: true
              sensitive: true
    entities:
      - name: facility
        title: Health Facility
        description: A health facility in the network
        table: facilities_table
        fields:
          - name: id
            from: facility_id
          - name: facility_name
            from: facility_name
          - name: district
            from: district
          - name: facility_type
            from: facility_type
          - name: ownership
            from: ownership
          - name: service_level
            from: service_level
          - name: latitude_band
            from: latitude_band
          - name: longitude_band
            from: longitude_band
          - name: map_latitude
            from: map_latitude
          - name: map_longitude
            from: map_longitude
        relationships:
          - name: service_capacity
            kind: has_many
            target: service_capacity
            foreign_key: facility_id
          - name: stock_events
            kind: has_many
            target: stock_event
            foreign_key: facility_id
        access:
          metadata_scope: clinic_capacity:metadata
          aggregate_scope: clinic_capacity:aggregate
          read_scope: clinic_capacity:rows
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: facility_type
              ops: [eq, in]
            - field: ownership
              ops: [eq, in]
            - field: service_level
              ops: [eq, in]
          allowed_expansions: [service_capacity, stock_events]
        spatial:
          collection_id: facilities
          title: Health facility map
          description: Generalized public map points for clinic-capacity facilities
          geometry:
            kind: point
            longitude_field: map_longitude
            latitude_field: map_latitude
            crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
          max_bbox_degrees: 5
        aggregates:
          - id: by_district_type
            description: Count of facilities by district and facility type
            group_by:
              - district
              - facility_type
            measures:
              - name: facility_count
                function: count
                column: id
            # operational, no person-level records; counts and capacity sums use omit
            disclosure_control:
              min_group_size: 3
              suppression: omit
      - name: service_capacity
        title: Service Capacity Record
        description: Monthly capacity figures for a service at a facility
        table: service_capacity_table
        fields:
          - name: id
            from: capacity_id
          - name: facility_id
            from: facility_id
          - name: service_type
            from: service_type
          - name: month
            from: month
          - name: beds_available
            from: beds_available
          - name: staff_on_roster
            from: staff_on_roster
          - name: open_days
            from: open_days
        relationships:
          - name: facility
            kind: belongs_to
            target: facility
            foreign_key: facility_id
        access:
          metadata_scope: clinic_capacity:metadata
          aggregate_scope: clinic_capacity:aggregate
          read_scope: clinic_capacity:rows
        api:
          default_limit: 100
          max_limit: 1000
          allowed_filters:
            - field: id
