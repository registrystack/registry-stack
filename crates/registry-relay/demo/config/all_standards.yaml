          - name: enrolled_on
            from: enrolled_on
          - name: exited_on
            from: exited_on
        relationships:
          - name: student
            kind: belongs_to
            target: student
            foreign_key: student_id
          - name: school
            kind: belongs_to
            target: school
            foreign_key: school_id
        access:
          metadata_scope: education_registry:metadata
          aggregate_scope: education_registry:aggregate
          read_scope: education_registry:rows
        api:
          default_limit: 100
          max_limit: 1000
          require_purpose_header: true
          allowed_filters:
