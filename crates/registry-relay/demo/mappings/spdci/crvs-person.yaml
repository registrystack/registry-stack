version: "0.1"
name: registry_relay_spdci_crvs_person
source_system: registry-relay.civil_person
target_model: spdci.crvs.Person

records:
  record:
    emit: "present(source.id)"
    fields:
      "@id": "source.id"
      "@type": '"CRVS_Person"'
      identifier: '[{"identifier_type": "UIN", "identifier_value": source.national_id}]'
      name: '{"given_name": source.given_name, "surname": source.surname}'
      sex: "source.sex"
      birth_date: "source.birth_date"
      birth_place: '{"name": source.birth_place}'
      address: '{"address_line1": source.address_line, "locality": source.district}'
      phone_number: "[source.phone]"
      email: "[source.email]"
      registration_date: "source.registration_date"
      last_updated: "source.last_updated"
