# Generated by registryctl.
services:
  registry-notary:
    image: {{notary_image}}
    user: "${REGISTRY_STACK_RUNTIME_UID:-65532}:${REGISTRY_STACK_RUNTIME_GID:-65532}"
    env_file:
      - ./secrets/local.env
    ports:
      - "4255:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./notary:/etc/registry-notary:ro
      - ./state/notary/config-state:/var/lib/registry-notary/config-state
      - ./state/notary/audit:/var/log/registry-notary
    command:
      - --config
      - /etc/registry-notary/config.yaml
{{source_network_service}}

  registry-notary-redis:
    image: {{notary_redis_image}}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - registry-notary-redis-data:/data
{{source_networks}}

volumes:
  registry-notary-redis-data:
