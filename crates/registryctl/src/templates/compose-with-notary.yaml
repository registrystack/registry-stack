# Generated by registryctl.
services:
  registry-relay:
    image: ghcr.io/registrystack/registry-relay@sha256:da9332ef30ba252d54ba275eb2a9be443a65e95ef78c493b9b0ce30cbc391e71
    env_file:
      - ./secrets/local.env
    ports:
      - "4242:8080"
    volumes:
      - ./relay:/etc/registry-relay:ro
      - ./data:/var/lib/registry-relay/data:ro
      - ./state/relay/cache:/var/lib/registry-relay/cache
      - ./state/relay/config-state:/var/lib/registry-relay/config-state
      - ./state/relay/audit:/var/log/registry-relay

  registry-notary:
    image: ghcr.io/registrystack/registry-notary@sha256:338d3ac7ddbea55f6e76014b9c23e4ff4e7206c2c40e356452288de06a745ff3
    env_file:
      - ./secrets/local.env
    ports:
      - "4255:8080"
    volumes:
      - ./notary:/etc/registry-notary:ro
      - ./state/notary/config-state:/var/lib/registry-notary/config-state
      - ./state/notary/audit:/var/log/registry-notary
    command:
      - --config
      - /etc/registry-notary/config.yaml

  registry-notary-redis:
    image: {{notary_redis_image}}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - registry-notary-redis-data:/data

volumes:
  registry-notary-redis-data:
