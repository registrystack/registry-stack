version: 1
starter:
  id: http
  release: 0.12.0
  content_digest: sha256:144f56e2f56c5c4d5e197347b11c074b75fa63ce39ec76da275ab4d1ae87e7f7

registry:
  id: fictional-citizen-registry

integrations:
  person-record:
    file: integrations/person-record/integration.yaml

services:
  person-verification:
    kind: evidence
    version: 1
    purpose: public-service-person-verification
    legal_basis: public-service-delivery
    consent: not_required
    access:
      scopes: ["evidence:person:read"]
    consultations:
      person_record:
        integration: person-record
        input:
          person_id: request.target.identifiers.registry_person_id
    claims:
      person-record-exists:
        cel: person_record.matched
        disclosure: predicate
      person-active:
        output: person_record.active
        disclosure: value
    credential_profiles:
      person-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/person-status/v1
        validity: 10m
        claims: [person-record-exists, person-active]
