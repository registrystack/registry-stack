version: 1
id: person-record
revision: 1

source:
  product: replace-with-source-product
  versions:
    unverified: [replace-with-source-version]
  auth: { type: static_bearer }

input:
  person_id:
    role: selector
    type: string
    maxLength: 64

capability:
  http:
    request:
      method: GET
      path: /people/{input.person_id}
      query:
        fields: active
    response:
      no_match: [404]
      ambiguous: [409]

outputs:
  active:
    type: boolean
    x-registry-source: /active

not_applicable:
  subject_mismatch:
    rationale: The selected response projection contains no identifier that can be compared with the requested person identifier.
    request_fixture: active-person
