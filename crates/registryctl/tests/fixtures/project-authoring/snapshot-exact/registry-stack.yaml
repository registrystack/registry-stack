version: 1
starter:
  id: snapshot
  release: 0.12.0
  content_digest: sha256:4506d558c7360e043f830ddd726d303cd3c4e37911af5f7da3e99f0710ba9b4e
registry: { id: fictional-population-registry }
integrations:
  person-snapshot: { file: integrations/person-snapshot/integration.yaml }
entities:
  people: { file: entities/people.yaml }
services:
  benefits-eligibility:
    kind: evidence
    version: 1
    purpose: benefits-eligibility
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:population:read"] }
    consultations:
      person:
        integration: person-snapshot
        input: { person_id: request.target.identifiers.population_person_id }
    claims:
      population-record-exists: { cel: person.matched, disclosure: predicate }
      population-registration-status: { output: person.registration_status, disclosure: value }
      residency-confirmed: { output: person.residency_confirmed, disclosure: predicate }
    credential_profiles:
      population-evidence:
        format: dc+sd-jwt
        type: https://credentials.invalid/population-evidence/v1
        validity: 10m
        claims: [population-record-exists, population-registration-status, residency-confirmed]
  emergency-assistance:
    kind: evidence
    version: 1
    purpose: emergency-assistance
    legal_basis: vital-interests
    consent: not_required
    access: { scopes: ["evidence:population:emergency"] }
    consultations:
      person:
        integration: person-snapshot
        input: { person_id: request.target.identifiers.population_person_id }
    claims:
      emergency-record-exists: { cel: person.matched, disclosure: predicate }
      emergency-status: { output: person.registration_status, disclosure: redacted }
    credential_profiles:
      emergency-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/emergency-status/v1
        validity: 5m
        claims: [emergency-record-exists, emergency-status]
