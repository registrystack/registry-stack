version: 1
id: people
title: Population records
description: Governed fictional population records shared with evidence consultation.
owner: Fictional Population Registry
sensitivity: personal
access_rights: restricted
update_frequency: daily
primary_key: person_id
fields:
  person_id: { type: string }
  registration_status: { type: string, nullable: true }
  eligible: { type: boolean, nullable: true }
  guardian_id: { type: string, nullable: true }
api:
  scopes:
    metadata: people:metadata
    rows: people:rows
    aggregate: people:aggregate
    evidence_verification: people:evidence_verification
  purposes: [case-management]
  pagination: { default_limit: 50, max_limit: 100 }
  filters:
    person_id: [eq, in]
    registration_status: [eq, in]
    eligible: [eq]
  required_principal_filters: [person_id]
  relationships:
    guardian:
      kind: belongs_to
      target: people
      foreign_key: guardian_id
  aggregates:
    by_registration_status:
      description: Count people by registration status.
      group_by: [registration_status]
      measures:
        - { name: person_count, function: count, column: person_id }
      disclosure_control: { min_group_size: 5, suppression: omit }
  standards: { ogc_features: false, sp_dci: false }
