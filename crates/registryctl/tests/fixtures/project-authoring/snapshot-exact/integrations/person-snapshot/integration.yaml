version: 1
id: population-person-snapshot
source:
  product: population-snapshot
  versions: { tested: [fixture-snapshot-v1] }
input:
  person_id:
    type: string
    bytes: 12
    pattern: "^PER-[0-9]{8}$"
    canonicalization: identity
capability:
  snapshot:
    entity: people
    cardinality: probe_two
    freshness: 86400s
    materialization:
      max_source_records: 1000000
      max_source_bytes: 268435456
outputs:
  exists: { type: presence, from: snapshot.presence }
  registration_status: { type: string, nullable: true, max_bytes: 32, from: snapshot.record.registration_status }
  eligible: { type: boolean, nullable: true, from: snapshot.record.eligible }
bounds:
  calls: 0
  source_bytes: 4096
  request_bytes: 1024
  deadline: 5s
  concurrency: 4
fixtures: fixtures/
