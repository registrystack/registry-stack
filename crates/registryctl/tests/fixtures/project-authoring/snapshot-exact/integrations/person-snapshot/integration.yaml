version: 1
id: population-person-snapshot
revision: 1
input:
  person_id:
    role: selector
    type: string
    maxLength: 12
    pattern: "^PER-[0-9]{8}$"
capability:
  snapshot:
    entity: people
    exact:
      person_id: { input: person_id }
    freshness: 24h
outputs: [registration_status, eligible]
not_applicable:
  ambiguity:
    rationale: The exact snapshot selector is the entity primary key, whose materialized unique-key constraint permits at most one record.
    request_fixture: snapshot-match
  subject_mismatch:
    rationale: The selected snapshot output projection omits the primary key, so it contains no identifier comparable with the requested person identifier.
    request_fixture: snapshot-match
