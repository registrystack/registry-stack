version: 1
registry: { id: fictional-social-registry }
integrations:
  individual: { file: integrations/individual/integration.yaml }
services:
  social-registry-verification:
    kind: evidence
    version: 1
    purpose: social-programme-verification
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:social-registry:read"] }
    consultations:
      individual:
        integration: individual
        input:
          individual_id: request.target.identifiers.openspp_individual_id
    claims:
      social-registry-record-exists: { evidence: registry_backed, output: individual.exists, disclosure: predicate }
      social-registry-active: { evidence: registry_backed, output: individual.active, disclosure: predicate }
      programme-code: { evidence: registry_backed, output: individual.programme_code, disclosure: value }
      household-reference: { evidence: registry_backed, output: individual.household_reference, disclosure: redacted }
    credentials:
      social-registry-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/social-registry-status/v1
        validity: 10m
        claims: [social-registry-record-exists, social-registry-active, programme-code]
