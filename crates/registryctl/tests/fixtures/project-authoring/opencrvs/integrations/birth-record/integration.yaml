version: 1
id: fictional-dci-birth-record
revision: 1

source:
  product: opencrvs
  versions: { unverified: [farajaland-fixture-v1] }
  auth:
    type: oauth2_client_credentials
    request: json
    response_profile: oauth2_bearer
  allow:
    - method: POST
      path: /dci/v1/birth/search
      semantics: read_only
  response: { format: json, max_bytes: 256KiB }
  protocol:
    signed_dci:
      profile: dci-search-v1
      path: /dci/v1/birth/search
      jwks_profile: rsa-signing-jwks-v1
      sender: fictional-notary
      receiver: fictional-civil-registry
      registry_type: civil-registry
      record_type: birth
      locale: en
      selectors:
        uin:
          field: identifier_value
          response_pointer: /identifier/0/identifier_value

input:
  uin:
    role: selector
    type: string
    maxLength: 16
    pattern: "^[0-9]{10}$"

capability:
  script:
    file: adapter.rhai

outputs:
  date_of_birth: { type: [string, "null"], format: date, maxLength: 10 }
  sex: { type: [string, "null"], maxLength: 16 }
  child_given_name: { type: [string, "null"], maxLength: 80 }
  child_family_name: { type: [string, "null"], maxLength: 80 }
  place_of_birth: { type: [string, "null"], maxLength: 120 }

limits: { calls: 1, source_bytes: 512KiB, request_bytes: 32KiB, deadline: 20s }
