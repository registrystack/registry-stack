version: 1
integrations:
  birth-record:
    source:
      origin: https://civil-registry.invalid
      credential:
        client_id: { secret: CIVIL_REGISTRY_CLIENT_ID }
        client_secret: { secret: CIVIL_REGISTRY_CLIENT_SECRET }
        generation: 1
      oauth:
        origin: https://identity.civil-registry.invalid
        path: /oauth/token
        generation: 1
      jwks:
        origin: https://trust.civil-registry.invalid
        path: /.well-known/jwks.json
        generation: 1
issuance:
  issuer: did:web:civil-notary.invalid
  signing_kid: project-issuer-key
  signing_key: { secret: REGISTRY_NOTARY_ISSUER_JWK }
  generation: 1
callers:
  birth-verifier:
    api_key_fingerprint: { secret: BIRTH_VERIFIER_TOKEN_HASH }
    scopes: ["evidence:birth:read"]
relay:
  origin: https://civil-relay.internal.invalid
  issuer: https://workload-issuer.internal.invalid
  jwks_url: https://workload-issuer.internal.invalid/.well-known/jwks.json
  audience: registry-relay
  allowed_clients: [civil-registry-relay-client]

notary_relay:
  base_url: http://127.0.0.1:8080
  workload_client_id: civil-registry-notary
  token_file: /run/secrets/relay-workload-token

deployment:
  profile: local
  relay: { service: civil-registry-relay }
  notary: { service: civil-registry-notary }
