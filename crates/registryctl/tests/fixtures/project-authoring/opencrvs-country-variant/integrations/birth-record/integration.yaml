version: 1
id: fictional-provincial-dci-birth-record
revision: 1

source:
  product: opencrvs-provincial-configuration
  versions: { unverified: [provincial-fixture-v2] }
  auth:
    type: oauth2_client_credentials
    request: json
    response_profile: oauth2_bearer
  allow:
    - method: POST
      path: /exchange/v2/records/search
      semantics: read_only
  response: { format: json, max_bytes: 256KiB }
  protocol:
    signed_dci:
      profile: dci-search-v1
      path: /exchange/v2/records/search
      jwks_profile: rsa-signing-jwks-v1
      sender: provincial-notary
      receiver: provincial-civil-registry
      registry_type: provincial-civil-registry
      record_type: vital-birth
      locale: fr
      selectors:
        registration_number:
          field: identifier_value
          response_pointer: /identifier/0/identifier_value

input:
  registration_number:
    role: selector
    type: string
    maxLength: 20
    pattern: "^BR-[A-Z]{2}-[0-9]{7}$"

capability:
  script:
    file: adapter.rhai

outputs:
  date_of_birth: { type: [string, "null"], format: date, maxLength: 10 }
  sex: { type: [string, "null"], maxLength: 16 }
  child_given_name: { type: [string, "null"], maxLength: 80 }
  child_family_name: { type: [string, "null"], maxLength: 80 }
  place_of_birth: { type: [string, "null"], maxLength: 120 }

limits: { calls: 1, source_bytes: 512KiB, request_bytes: 32KiB, deadline: 20s }
