name: ambiguous-coverage
classification: synthetic
input: { birthdate: 2018-05-12, family: Example, given: Ada }
interactions:
  - expect:
      method: GET
      path: /fhir/Patient
      query: { _count: 2, birthdate: 2018-05-12, family: Example, given: Ada }
    respond:
      status: 200
      body:
        resourceType: Bundle
        type: searchset
        total: 1
        entry:
          - search: { mode: match }
            resource:
              resourceType: Patient
              id: patient-1
              birthDate: 2018-05-12
              name: [{ family: Example, given: [Ada] }]
  - expect:
      method: GET
      path: /fhir/Coverage
      query: { _count: 2, beneficiary: Patient/patient-1 }
    respond:
      status: 200
      body:
        resourceType: Bundle
        type: searchset
        total: 2
        entry:
          - { search: { mode: match }, resource: { resourceType: Coverage, status: active } }
          - { search: { mode: match }, resource: { resourceType: Coverage, status: cancelled } }
expect: { outcome: ambiguous, outputs: {}, claims: {} }
