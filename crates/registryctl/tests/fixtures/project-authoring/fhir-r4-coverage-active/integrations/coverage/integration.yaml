version: 1
id: fhir-r4-coverage-active
revision: 1

source:
  product: project-fhir-server
  versions: { unverified: [r4-fixture-v1] }
  auth: { type: static_bearer }
  allow:
    - { method: GET, path: /fhir/Patient }
    - { method: GET, path: /fhir/Coverage }
    - { method: GET, path: /fhir/Organization/* }
  response: { format: json, max_bytes: 128KiB }

input:
  birthdate:
    role: selector
    type: string
    format: date
    maxLength: 10
  family: { role: selector, type: string, maxLength: 80 }
  given: { role: selector, type: string, maxLength: 80 }

capability:
  script:
    file: adapter.rhai

outputs:
  coverage_status: { type: [string, "null"], maxLength: 16 }
  insurer_name: { type: [string, "null"], maxLength: 120 }

limits: { calls: 4, source_bytes: 512KiB, request_bytes: 8KiB, deadline: 12s }
