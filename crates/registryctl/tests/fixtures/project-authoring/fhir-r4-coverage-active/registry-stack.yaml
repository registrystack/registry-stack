version: 1
starter:
  id: fhir-r4
  release: 0.12.1
  content_digest: sha256:d8a3bc7e704c893ca9c094e3d144f4229299125561d55806218292c1c552d84d
registry: { id: fictional-fhir-registry }
integrations:
  coverage: { file: integrations/coverage/integration.yaml }
services:
  coverage-verification:
    kind: evidence
    version: 1
    purpose: coverage-verification
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:coverage:read"] }
    consultations:
      coverage:
        integration: coverage
        input:
          birthdate: request.target.identifiers.birthdate
          family: request.target.identifiers.family
          given: request.target.identifiers.given
    claims:
      patient-record-exists: { cel: "coverage.matched", disclosure: predicate }
      coverage-active:
        cel: >-
          coverage.coverage_status != null
            ? coverage.matched && coverage.coverage_status == "active"
            : false
        disclosure: predicate
      insurer-name: { output: coverage.insurer_name, disclosure: value }
    credential_profiles:
      coverage-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/coverage-status/v1
        validity: 5m
        claims: [patient-record-exists, coverage-active, insurer-name]
