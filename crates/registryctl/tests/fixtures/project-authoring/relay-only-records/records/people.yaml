version: 1
id: people
title: Fictional people records
primary_key: person_id
fields:
  person_id: { type: string }
  status: { type: string, nullable: true }
api:
  scopes: { metadata: people:metadata, rows: people:rows, aggregate: people:aggregate, evidence_verification: people:evidence_verification }
  purposes: [case-management]
  pagination: { default_limit: 50, max_limit: 100 }
  filters: { person_id: [eq] }
  required_principal_filters: [person_id]
  standards: { ogc_features: false, sp_dci: false }
