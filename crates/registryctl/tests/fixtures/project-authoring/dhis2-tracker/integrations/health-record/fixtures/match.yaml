name: complete-child-health-evidence
classification: synthetic
input: { tracked_entity: A0000000001, include_inactive: true }
interactions:
  - expect:
      method: GET
      path: /api/tracker/trackedEntities/A0000000001
      query:
        fields: trackedEntity,enrollments[program,status,events[programStage,status]]
        includeDeleted: true
    respond:
      status: 200
      body:
        trackedEntity: A0000000001
        enrollments:
          - program: DEMO_CHILD_PROGRAM_UID
            status: ACTIVE
            events:
              - { programStage: DEMO_BCG_BIRTH_STAGE_UID, status: COMPLETED }
              - { programStage: DEMO_OPV_BIRTH_STAGE_UID, status: COMPLETED }
              - { programStage: DEMO_MEASLES_STAGE_UID, status: COMPLETED }
        ignored_upstream_field: safe-extra-field
expect:
  outcome: match
  outputs:
    programme_enrollment_active: true
    bcg_birth_dose_recorded: true
    opv_birth_dose_recorded: true
    measles_dose_recorded: true
  claims:
    programme-enrollment-active: true
    bcg-birth-dose-recorded: true
    opv-birth-dose-recorded: true
    measles-dose-recorded: true
