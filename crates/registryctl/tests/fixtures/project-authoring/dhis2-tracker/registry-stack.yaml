version: 1
starter:
  id: dhis2-tracker
  release: 0.12.0
  content_digest: sha256:61f0b547a5189c93295df8045895321d5496e3bbc950e592f375d026fe84017d
registry: { id: fictional-health-registry }
integrations:
  health-record: { file: integrations/health-record/integration.yaml }
services:
  child-health-evidence:
    kind: evidence
    version: 1
    purpose: child-health-evidence-verification
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:health:read"] }
    consultations:
      health:
        integration: health-record
        input:
          tracked_entity: request.target.identifiers.dhis2_tracked_entity
          include_inactive: request.target.attributes.include_inactive
    claims:
      programme-enrollment-active: { output: health.programme_enrollment_active, disclosure: predicate }
      bcg-birth-dose-recorded: { output: health.bcg_birth_dose_recorded, disclosure: predicate }
      opv-birth-dose-recorded: { output: health.opv_birth_dose_recorded, disclosure: predicate }
      measles-dose-recorded: { output: health.measles_dose_recorded, disclosure: predicate }
    credential_profiles:
      child-health-evidence:
        format: dc+sd-jwt
        type: https://credentials.invalid/child-health-evidence/v1
        validity: 10m
        claims: [programme-enrollment-active, bcg-birth-dose-recorded, opv-birth-dose-recorded, measles-dose-recorded]
