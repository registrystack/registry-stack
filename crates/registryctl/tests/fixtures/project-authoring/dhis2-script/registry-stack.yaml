version: 1
registry: { id: fictional-health-registry }
integrations:
  health-record: { file: integrations/health-record/integration.yaml }
services:
  health-verification:
    kind: evidence
    version: 1
    purpose: programme-enrollment-verification
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:health:read"] }
    variables:
      as_of_date: { from: request.variables.as_of_date, type: date }
    consultations:
      health:
        integration: health-record
        input:
          tracked_entity: request.target.identifiers.dhis2_tracked_entity
          include_inactive: request.target.attributes.include_inactive
    claims:
      tracked-entity-first-name: { output: health.first_name, disclosure: value }
      tracked-entity-last-name: { output: health.last_name, disclosure: value }
      child-program-active: { output: health.child_program_active, disclosure: predicate }
      child-age-band:
        cel: >-
          health.matched && health.date_of_birth != null
            ? (date.age_on(health.date_of_birth, as_of_date) < 5
                ? "0-4"
                : (date.age_on(health.date_of_birth, as_of_date) < 18 ? "5-17" : "18+"))
            : null
        disclosure: value
      programme-code: { output: health.programme_code, disclosure: value }
      reconciliation-reference: { output: health.reconciliation_reference, disclosure: redacted }
      maternal-postnatal-care-active: { output: health.maternal_postnatal_active, disclosure: predicate }
      child-health-visit-recorded: { output: health.child_health_visit_recorded, disclosure: predicate }
      tb-program-active: { output: health.tb_program_active, disclosure: predicate }
      bcg-birth-dose-recorded: { output: health.bcg_birth_dose_recorded, disclosure: predicate }
      opv-birth-dose-recorded: { output: health.opv_birth_dose_recorded, disclosure: predicate }
      measles-dose-recorded: { output: health.measles_dose_recorded, disclosure: predicate }
    credential_profiles:
      health-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/health-status/v1
        validity: 10m
        claims: [maternal-postnatal-care-active, child-health-visit-recorded, tb-program-active]
      child-program:
        format: dc+sd-jwt
        type: https://credentials.invalid/child-program/v1
        validity: 10m
        claims: [tracked-entity-first-name, tracked-entity-last-name, child-program-active, child-age-band]
      programme-participation:
        format: dc+sd-jwt
        type: https://credentials.invalid/programme-participation/v1
        validity: 10m
        claims: [programme-code, reconciliation-reference, child-program-active]
      child-health-evidence:
        format: dc+sd-jwt
        type: https://credentials.invalid/child-health-evidence/v1
        validity: 10m
        claims: [child-program-active, bcg-birth-dose-recorded, opv-birth-dose-recorded, measles-dose-recorded]
