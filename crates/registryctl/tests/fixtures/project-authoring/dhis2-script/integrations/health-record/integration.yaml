version: 1
id: fictional-dhis2-health-record
revision: 1

source:
  product: dhis2
  versions: { unverified: [2.41.9] }
  auth: { type: basic }
  allow:
    - method: GET
      path: /api/tracker/trackedEntities/*
  response: { format: json, max_bytes: 64KiB }

input:
  tracked_entity:
    role: selector
    type: string
    maxLength: 64
    pattern: "^[A-Za-z][A-Za-z0-9]{10}$"
  include_inactive:
    role: parameter
    type: boolean

capability:
  script:
    file: adapter.rhai

outputs:
  first_name: { type: [string, "null"], maxLength: 80 }
  last_name: { type: [string, "null"], maxLength: 80 }
  date_of_birth: { type: [string, "null"], format: date, maxLength: 10 }
  child_program_active: { type: [boolean, "null"] }
  programme_code: { type: [string, "null"], maxLength: 32 }
  reconciliation_reference: { type: [string, "null"], maxLength: 64 }
  maternal_postnatal_active: { type: [boolean, "null"] }
  child_health_visit_recorded: { type: [boolean, "null"] }
  tb_program_active: { type: [boolean, "null"] }
  bcg_birth_dose_recorded: { type: [boolean, "null"] }
  opv_birth_dose_recorded: { type: [boolean, "null"] }
  measles_dose_recorded: { type: [boolean, "null"] }

not_applicable:
  ambiguity:
    rationale: The tracked-entity identifier is resolved by the exact singleton trackedEntities resource endpoint, so a collection cannot be returned.
    request_fixture: complete-child-health-evidence

limits: { calls: 1, source_bytes: 64KiB, request_bytes: 4KiB, deadline: 8s }
