version: 1
id: fictional-household-eligibility
revision: 1

source:
  product: aurora-household-service
  versions:
    unverified: [fixture-contract-v2]
  auth: { type: basic }

input:
  household_reference:
    role: selector
    type: string
    maxLength: 18
    pattern: "^HH-[A-Z0-9]{8}$"

capability:
  http:
    request:
      method: GET
      path: /households/{input.household_reference}
      query:
        fields: approved,category
    response:
      no_match: [404]
      ambiguous: [409]

outputs:
  approved:
    type: [boolean, "null"]
    x-registry-source: /approved
  category:
    type: [string, "null"]
    maxLength: 20
    x-registry-source: /category
