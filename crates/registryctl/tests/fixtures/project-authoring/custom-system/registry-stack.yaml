version: 1

registry:
  id: fictional-household-authority

integrations:
  eligibility:
    file: integrations/eligibility/integration.yaml

services:
  household-eligibility:
    kind: evidence
    version: 1
    purpose: household-support-screening
    legal_basis: public-service-delivery
    consent: not_required
    access:
      scopes: ["evidence:household:read"]
    consultations:
      household:
        integration: eligibility
        input:
          household_reference: request.target.identifiers.household_reference
    claims:
      household-record-exists:
        cel: household.matched
        disclosure: predicate
      household-category:
        output: household.category
        disclosure: value
      source-household-approval-decision:
        cel: >-
          household.matched && household.approved != null ? household.approved : null
        disclosure: predicate
    credential_profiles:
      household-eligibility:
        format: dc+sd-jwt
        type: https://credentials.invalid/household-eligibility/v1
        validity: 5m
        claims: [household-record-exists, household-category, source-household-approval-decision]
