version: 1
integrations:
  health-record:
    source:
      origin: https://health-registry.invalid
      credential:
        username: { secret: HEALTH_REGISTRY_USERNAME }
        password: { secret: HEALTH_REGISTRY_PASSWORD }
        generation: 1
issuance:
  issuer: did:web:health-notary.invalid
  signing_kid: project-issuer-key
  signing_key: { secret: REGISTRY_NOTARY_ISSUER_JWK }
  generation: 1
callers:
  programme-verifier:
    api_key_fingerprint: { secret: PROGRAMME_VERIFIER_TOKEN_HASH }
    scopes: ["evidence:health:read"]
relay:
  origin: https://health-relay.internal.invalid
  issuer: https://workload-issuer.internal.invalid
  jwks_url: https://workload-issuer.internal.invalid/.well-known/jwks.json
  audience: registry-relay
  allowed_clients: [health-relay-client]

notary_relay:
  workload_client_id: health-registry-notary
  token_file: /run/secrets/relay-workload-token

deployment:
  profile: local
  relay: { service: health-registry-relay }
  notary: { service: health-registry-notary }
