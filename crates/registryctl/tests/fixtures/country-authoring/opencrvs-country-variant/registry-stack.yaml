version: 1
registry: { id: fictional-provincial-civil-registry }
integrations:
  birth-record: { file: integrations/birth-record/integration.yaml }
services:
  provincial-birth-verification:
    kind: evidence
    version: 1
    purpose: provincial-birth-attribute-verification
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:provincial-birth:read"] }
    variables:
      as_of_date: { from: request.variables.as_of_date, type: date }
    consultations:
      birth:
        integration: birth-record
        input:
          registration_number: request.target.identifiers.birth_registration_number
    claims:
      birth-record-exists: { fact: birth.exists, disclosure: predicate }
      date-of-birth: { fact: birth.date_of_birth, disclosure: value }
      sex: { fact: birth.sex, disclosure: value }
      child-given-name: { fact: birth.child_given_name, disclosure: value }
      child-family-name: { fact: birth.child_family_name, disclosure: value }
      child-birth-date: { fact: birth.date_of_birth, disclosure: value }
      child-place-of-birth: { fact: birth.place_of_birth, disclosure: value }
      age-band:
        cel: >-
          birth.exists && birth.date_of_birth != null
            ? (date.age_on(birth.date_of_birth, as_of_date) < 5
                ? "0-4"
                : (date.age_on(birth.date_of_birth, as_of_date) < 18 ? "5-17" : "18+"))
            : null
        disclosure: value
    credentials:
      birth-summary:
        format: dc+sd-jwt
        type: https://credentials.invalid/provincial-birth-summary/v1
        validity: 10m
        claims: [birth-record-exists, date-of-birth, sex, age-band]
      birth-attributes:
        format: dc+sd-jwt
        type: https://credentials.invalid/provincial-birth-attributes/v1
        validity: 10m
        claims: [child-given-name, child-family-name, child-birth-date, child-place-of-birth]
