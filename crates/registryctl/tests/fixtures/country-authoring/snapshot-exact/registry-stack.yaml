version: 1
registry: { id: fictional-population-registry }
integrations:
  person-snapshot: { file: integrations/person-snapshot/integration.yaml }
services:
  people-records:
    kind: records_api
    definition: records/people.yaml
    entity: people
  benefits-eligibility:
    kind: evidence
    version: 1
    purpose: benefits-eligibility
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:population:read"] }
    consultations:
      person:
        integration: person-snapshot
        input: { person_id: request.target.identifiers.population_person_id }
    claims:
      population-record-exists: { fact: person.exists, disclosure: predicate }
      benefits-status: { fact: person.registration_status, disclosure: value }
      benefits-eligible: { fact: person.eligible, disclosure: predicate }
    credentials:
      benefits-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/benefits-status/v1
        validity: 10m
        claims: [population-record-exists, benefits-status, benefits-eligible]
  emergency-assistance:
    kind: evidence
    version: 1
    purpose: emergency-assistance
    legal_basis: vital-interests
    consent: not_required
    access: { scopes: ["evidence:population:emergency"] }
    consultations:
      person:
        integration: person-snapshot
        input: { person_id: request.target.identifiers.population_person_id }
    claims:
      emergency-record-exists: { fact: person.exists, disclosure: predicate }
      emergency-status: { fact: person.registration_status, disclosure: redacted }
    credentials:
      emergency-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/emergency-status/v1
        validity: 5m
        claims: [emergency-record-exists, emergency-status]
