version: 1
integrations:
  person-snapshot:
    source_version: fixture-snapshot-v1
entities:
  people:
    provider:
      type: csv
      path: /var/lib/registry/population.csv
      header_row: 1
    columns:
      person_id: subject_key
      registration_status: status_code
      eligible: benefit_eligible
      guardian_id: guardian_key
    source_revision: population-export-v1
    generation: 2026-07-12
issuance:
  issuer: did:web:population-notary.invalid
  signing_kid: country-issuer-key
  signing_key: { secret: REGISTRY_NOTARY_ISSUER_JWK }
  generation: 1
callers:
  benefits-service:
    api_key_fingerprint: { secret: BENEFITS_SERVICE_TOKEN_HASH }
    scopes: ["evidence:population:read"]
  emergency-service:
    api_key_fingerprint: { secret: EMERGENCY_SERVICE_TOKEN_HASH }
    scopes: ["evidence:population:emergency"]
relay_trust:
  origin: https://population-relay.internal.invalid
  issuer: https://workload-issuer.internal.invalid
  jwks_url: https://workload-issuer.internal.invalid/.well-known/jwks.json
  audience: registry-relay
  notary_client_id: population-notary
  notary_token_file: /run/secrets/relay-workload-token
deployment:
  profile: local
  relay: { service: population-relay }
  notary: { service: population-notary }
