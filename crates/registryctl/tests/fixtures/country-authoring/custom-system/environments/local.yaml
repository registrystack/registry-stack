version: 1
integrations:
  eligibility:
    source_version: fixture-contract-v2
    data_destination: { origin: https://household-authority.invalid }
    credential:
      type: basic
      username: { secret: HOUSEHOLD_USERNAME }
      password: { secret: HOUSEHOLD_PASSWORD }
      generation: 1
issuance:
  issuer: did:web:household-notary.invalid
  signing_kid: country-issuer-key
  signing_key: { secret: REGISTRY_NOTARY_ISSUER_JWK }
  generation: 1
callers:
  benefits-service:
    api_key_fingerprint: { secret: BENEFITS_CLIENT_TOKEN_HASH }
    scopes: ["evidence:household:read"]
relay_trust:
  origin: https://household-relay.internal.invalid
  issuer: https://workload-issuer.internal.invalid
  jwks_url: https://workload-issuer.internal.invalid/.well-known/jwks.json
  audience: registry-relay
  notary_client_id: household-notary
  notary_token_file: /run/secrets/relay-workload-token
deployment:
  profile: local
  relay: { service: household-relay }
  notary: { service: household-notary }
