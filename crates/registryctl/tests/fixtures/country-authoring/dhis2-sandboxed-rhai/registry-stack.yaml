version: 1
registry: { id: fictional-health-registry }
integrations:
  health-record: { file: integrations/health-record/integration.yaml }
services:
  health-verification:
    kind: evidence
    version: 1
    purpose: programme-enrollment-verification
    legal_basis: public-service-delivery
    consent: not_required
    access: { scopes: ["evidence:health:read"] }
    variables:
      as_of_date: { from: request.variables.as_of_date, type: date }
    consultations:
      health:
        integration: health-record
        input:
          tracked_entity: request.target.identifiers.dhis2_tracked_entity
    claims:
      tracked-entity-first-name: { fact: health.first_name, disclosure: value }
      tracked-entity-last-name: { fact: health.last_name, disclosure: value }
      child-program-active:
        cel: >-
          health.child_program_active != null
            ? health.exists && health.child_program_active
            : false
        disclosure: predicate
      child-age-band:
        cel: >-
          health.exists && health.date_of_birth != null
            ? (date.age_on(health.date_of_birth, as_of_date) < 5
                ? "0-4"
                : (date.age_on(health.date_of_birth, as_of_date) < 18 ? "5-17" : "18+"))
            : null
        disclosure: value
      programme-code: { fact: health.programme_code, disclosure: value }
      reconciliation-reference: { fact: health.reconciliation_reference, disclosure: redacted }
      maternal-postnatal-care-active:
        cel: >-
          health.maternal_postnatal_active != null
            ? health.exists && health.maternal_postnatal_active
            : false
        disclosure: predicate
      child-health-visit-recorded:
        cel: >-
          health.child_health_visit_recorded != null
            ? health.exists && health.child_health_visit_recorded
            : false
        disclosure: predicate
      tb-program-active:
        cel: >-
          health.tb_program_active != null
            ? health.exists && health.tb_program_active
            : false
        disclosure: predicate
    credentials:
      health-status:
        format: dc+sd-jwt
        type: https://credentials.invalid/health-status/v1
        validity: 10m
        claims: [maternal-postnatal-care-active, child-health-visit-recorded, tb-program-active]
      child-program:
        format: dc+sd-jwt
        type: https://credentials.invalid/child-program/v1
        validity: 10m
        claims: [tracked-entity-first-name, tracked-entity-last-name, child-program-active, child-age-band]
      programme-participation:
        format: dc+sd-jwt
        type: https://credentials.invalid/programme-participation/v1
        validity: 10m
        claims: [programme-code, reconciliation-reference, child-program-active]
