    aggregates:
      - id: voucher_opportunities_by_district_crop_risk_input
        title: Voucher Opportunities by District, Crop, Risk, and Input
        description: Aggregate planning count and area for voucher market sizing with rare-cell suppression.
        source_entity: market_sizing_cell
        default_group_by:
          - district_code
          - crop
          - risk_band
          - input_type
        dimensions:
          - id: district_code
            label: District code
            field: district_code
          - id: district
            label: District
            field: district
          - id: crop
            label: Crop
            field: crop
          - id: risk_band
            label: Climate risk band
            field: risk_band
          - id: input_type
            label: Input type
            field: input_type
          - id: season
            label: Season
            field: season
        indicators:
          - id: eligible_opportunity_count
            label: Eligible voucher opportunities
            function: sum
            column: eligible_opportunity_count
            unit_measure: opportunities
          - id: estimated_area_ha
            label: Estimated area
            function: sum
            column: estimated_area_ha
            unit_measure: hectare
            decimals: 2
          - id: market_sizing_cell_count
            label: Market sizing cells
            function: count
            column: id
            unit_measure: cells
        allowed_filters:
          - field: district_code
            ops: [eq, in]
          - field: crop
            ops: [eq, in]
          - field: risk_band
            ops: [eq, in]
          - field: input_type
            ops: [eq, in]
          - field: season
            ops: [eq, in]
        access:
          metadata_scope: agri_registry:metadata
          aggregate_scope: agri_registry:aggregate
