# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/agri-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/agri-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: agri-registry-relay.metadata.yaml
    digest: sha256:05012875b1241ad60b546d5e0ec59c388173399a83174325e38587737a69b082

catalog:
  title: NAgDI Agricultural Registry Relay (Decentralized Demo)
  base_url: http://agri-registry-relay:8080
  publisher: National Agricultural Data Infrastructure Governance Body (Demo)
  participant_id: did:web:agri-relay.lab.registrystack.org

vocabularies:
  demo: https://metadata.lab.registrystack.org/vocab/
  nagdi: https://metadata.lab.registrystack.org/vocab/nagdi/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: AGRI_METADATA_CLIENT_HASH
        commitment: sha256:e13220645d2d8668b5458169e1d99fb33248f74df3ee35467131e217fc95a847
      scopes:
        - agri_registry:metadata
    - id: agri_evidence_source
      fingerprint:
        provider: env
        name: AGRI_EVIDENCE_SOURCE_HASH
        commitment: sha256:1fadee6f9ff45b9b738bc6fca7864697651ee05824682343aba54203c09a459b
      scopes:
        - agri_registry:metadata
        - agri_registry:rows
        - agri_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: AGRI_EVIDENCE_ONLY_HASH
        commitment: sha256:e090219b33fc108ab2ced40a13b8612e16ea11a741c98b29361c02259d6ce7a0
      scopes:
        - agri_registry:metadata
        - agri_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: AGRI_ROW_READER_HASH
        commitment: sha256:4fabdd761a56a3d5de141c53e6c82b614a4f2a24618befbaeab48391f1944d0e
      scopes:
        - agri_registry:metadata
        - agri_registry:rows
    - id: aggregate_reader
      fingerprint:
        provider: env
        name: AGRI_AGGREGATE_READER_HASH
        commitment: sha256:c41016812ab0690ce03132b7e64bbb0a318fb94221c6f1b4a8f857577e6fd6a9
      scopes:
        - agri_registry:metadata
        - agri_registry:aggregate

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

