            type: string
            required: true
          - name: national_id
            type: string
            required: false
          - name: given_name
            type: string
            required: true
          - name: family_name
            type: string
            required: true
          - name: district
            type: string
            required: true
          - name: district_code
            type: string
            required: true
          - name: registration_status
            type: string
            required: true
          - name: smallholder_status
            type: string
            required: true
          - name: producer_type
            type: string
            required: true
          - name: data_quality_status
            type: string
            required: true
          - name: last_verified_on
            type: date
            required: true
      - name: data_use_authorization
