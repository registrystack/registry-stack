# SPDX-License-Identifier: Apache-2.0

schema_version: registry-manifest/v1
catalog:
  id: nagdi-agricultural-registries
  base_url: https://agri-relay.lab.registrystack.org
  title: NAgDI Agricultural Registry Relay (Decentralized Demo)
  publisher:
    name: National Agricultural Data Infrastructure Governance Body (Demo)
  standards:
    dcat: '3.0'
    shacl: '1.1'
    json_schema: 2020-12
  application_profiles:
    - id: bregdcat-ap
      version: '3.0'
federation:
  node_id: did:web:agri-relay.lab.registrystack.org
  issuer: https://agri-relay.lab.registrystack.org
  jwks_uri: https://agri-relay.lab.registrystack.org/.well-known/jwks.json
  federation_api: https://agri-relay.lab.registrystack.org/federation
  supported_protocol_versions:
    - registry-notary-federation/v0.1
evaluation_profiles:
  - id: eligible-for-input-voucher-v1
    ruleset: eligible-for-input-voucher-v1
    claim_id: eligible_for_input_voucher
    subject_id_type: id
    max_source_observed_age_seconds: 86400
  - id: eligible-for-livestock-movement-v1
    ruleset: eligible-for-livestock-movement-v1
    claim_id: eligible_for_livestock_movement
    subject_id_type: id
    max_source_observed_age_seconds: 86400
requirements:
  - id: farmer_registration_requirement
    iri: https://metadata.lab.registrystack.org/requirements/nagdi/farmer-registration
    title: Farmer registration requirement
    description: Requirement to confirm the applicant is an active registered farmer.
  - id: climate_smart_input_voucher_requirement
    iri: https://metadata.lab.registrystack.org/requirements/nagdi/climate-smart-input-voucher
    title: Climate-smart input voucher eligibility requirement
    description: Requirement to confirm crop, parcel, climate-risk, entitlement, authorization, and redemption exclusion facts for input support review.
  - id: livestock_movement_permit_requirement
    iri: https://metadata.lab.registrystack.org/requirements/nagdi/livestock-movement-permit
    title: Livestock movement permit review requirement
    description: Requirement to confirm livestock holder, herd, vaccination, quarantine, and open-permit controls for movement permit review.
  - id: agricultural_market_sizing_requirement
    iri: https://metadata.lab.registrystack.org/requirements/nagdi/agricultural-market-sizing
    title: Agricultural market sizing aggregate requirement
    description: Requirement to provide suppressed district-level planning aggregates without raw farmer row export.
  - id: livestock_herd_planning_requirement
    iri: https://metadata.lab.registrystack.org/requirements/nagdi/livestock-herd-planning
    title: Livestock herd planning aggregate requirement
    description: Requirement to provide suppressed herd-count planning aggregates without raw livestock holder, herd, or animal row export.
evidence_types:
  - id: farmer_registration_evidence
    iri: https://metadata.lab.registrystack.org/evidence-types/nagdi/farmer-registration
    title: Farmer registration evidence
    description: Evidence that a farmer registry row is active and current enough for program review.
    proves:
      - farmer_registration_requirement
  - id: climate_smart_input_voucher_evidence
    iri: https://metadata.lab.registrystack.org/evidence-types/nagdi/climate-smart-input-voucher
    title: Climate-smart input voucher eligibility evidence
    description: Composed evidence for seasonal climate-smart input voucher review.
    proves:
      - climate_smart_input_voucher_requirement
  - id: livestock_movement_permit_evidence
    iri: https://metadata.lab.registrystack.org/evidence-types/nagdi/livestock-movement-permit
    title: Livestock movement permit review evidence
    description: Composed evidence for herd-level livestock movement permit review.
    proves:
      - livestock_movement_permit_requirement
  - id: agricultural_market_sizing_evidence
    iri: https://metadata.lab.registrystack.org/evidence-types/nagdi/agricultural-market-sizing
    title: Agricultural market sizing evidence
    description: Suppressed aggregate evidence for planning and market sizing without individual row disclosure.
    proves:
      - agricultural_market_sizing_requirement
  - id: livestock_herd_planning_evidence
    iri: https://metadata.lab.registrystack.org/evidence-types/nagdi/livestock-herd-planning
    title: Livestock herd planning evidence
    description: Suppressed aggregate evidence for animal-health planning without livestock holder, herd, or animal row disclosure.
    proves:
      - livestock_herd_planning_requirement
datasets:
  - id: agri_registry
    title: NAgDI Agricultural Registries
    description: XLSX-backed farmer, holding, program, market, livestock, and reference-data registers for purpose-bound agricultural evidence.
    owner: National Agricultural Data Infrastructure Governance Body
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    evidence_offerings:
      - id: climate_smart_input_voucher_evidence_service
        iri: https://metadata.lab.registrystack.org/evidence-offerings/nagdi/climate-smart-input-voucher
        title: Climate-smart input voucher evidence service
        description: Registry Notary endpoint that evaluates farmer registration, data-use authorization, parcel, crop, climate-risk, entitlement, redemption exclusion, and review controls.
        evidence_type: climate_smart_input_voucher_evidence
        issuing_authority:
          id: nagdi_agriculture_governance_body
          iri: did:web:agri-relay.lab.registrystack.org
          name: National Agricultural Data Infrastructure Governance Body
          country: ZZ
        jurisdiction:
          country: ZZ
        level_of_assurance: substantial
        entity: voucher_eligibility_snapshot
        lookup_keys:
          - id
        access:
          kind: registry-notary
          conforms_to: registry-notary-federation/v0.1
          endpoint_url: https://agriculture-notary.lab.registrystack.org
          discovery_url: https://agriculture-notary.lab.registrystack.org/.well-known/evidence-service
          ruleset: eligible-for-input-voucher-v1
        policy:
          purpose:
            - https://metadata.lab.registrystack.org/purpose/nagdi/climate-smart-input-support
      - id: livestock_movement_permit_evidence_service
        iri: https://metadata.lab.registrystack.org/evidence-offerings/nagdi/livestock-movement-permit
        title: Livestock movement permit evidence service
        description: Registry Notary endpoint that evaluates herd registration, vaccination, quarantine, and conflicting permit controls.
        evidence_type: livestock_movement_permit_evidence
        issuing_authority:
          id: animal_health_authority
          iri: did:web:animal-health.demo.example.gov
          name: Animal Health Authority
          country: ZZ
        jurisdiction:
          country: ZZ
        level_of_assurance: substantial
        entity: livestock_movement_snapshot
        lookup_keys:
          - farmer_id
          - herd_id
        access:
          kind: registry-notary
          conforms_to: registry-notary-federation/v0.1
          endpoint_url: https://agriculture-notary.lab.registrystack.org
          discovery_url: https://agriculture-notary.lab.registrystack.org/.well-known/evidence-service
          ruleset: eligible-for-livestock-movement-v1
        policy:
          purpose:
            - https://metadata.lab.registrystack.org/purpose/nagdi/livestock-movement-permit-review
    entities:
      - name: farmer
        title: Farmer
        description: Registered farmer projection with personal fields minimized for row and evidence workflows.
        identifiers:
