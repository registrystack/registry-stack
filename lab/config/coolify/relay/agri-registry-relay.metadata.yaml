          - name: subject_type
            type: string
            required: true
          - name: purpose_code
            type: string
            required: true
          - name: lawful_basis_code
            type: string
            required: true
          - name: disclosure_mode
            type: string
            required: true
          - name: authorization_status
            type: string
            required: true
          - name: valid_from
            type: date
            required: true
          - name: valid_until
            type: date
            required: false
      - name: farmer_identifier
        title: Farmer Identifier
        description: Identifier rows linked to farmer Persons for PublicSchema-shaped projection.
        identifiers:
          - name: id
            kind: primary
        fields:
          - name: id
            type: string
            required: true
          - name: farmer_id
            type: string
            required: true
