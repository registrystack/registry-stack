# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  admin_listener:
    mode: dedicated
    bind: 0.0.0.0:8081

auth:
  mode: api_key
  api_keys:
    - id: social_protection_evidence_client
      fingerprint:
        provider: env
        name: SOCIAL_EVIDENCE_CLIENT_TOKEN_HASH
      scopes:
        - social_protection_registry:evidence_verification
      authorization_details:
        type: registry-notary/evidence-authorization/v1
        schema_version: v1
        legal_basis_ref: demo:child-support-eligibility
        consent_ref: demo:child-support-consent
        jurisdiction: ZZ
        assurance_level: substantial
  bearer_tokens:
    - id: social_protection_evidence_client
      fingerprint:
        provider: env
        name: SOCIAL_EVIDENCE_CLIENT_BEARER_HASH
      scopes:
        - social_protection_registry:evidence_verification
      authorization_details:
        type: registry-notary/evidence-authorization/v1
        schema_version: v1
        legal_basis_ref: demo:child-support-eligibility
        consent_ref: demo:child-support-consent
        jurisdiction: ZZ
        assurance_level: substantial

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

config_trust:
  antirollback_state_path: /var/lib/registry-notary/config-state/social-protection-notary-config-antirollback.json
  local_approval_state_path: /var/lib/registry-notary/config-state/social-protection-notary-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

federation:
  enabled: true
  node_id: did:web:social-notary.lab.registrystack.org
  issuer: https://social-notary.lab.registrystack.org
  jwks_uri: https://social-notary.lab.registrystack.org/federation/jwks.json
  federation_api: https://social-notary.lab.registrystack.org/federation/v1
  supported_protocol_versions:
    - registry-notary-federation/v0.1
  signing:
    signing_key: social-federation-response
  pairwise_subject_hash:
    secret_env: SOCIAL_FEDERATION_PAIRWISE_SUBJECT_HASH_SECRET
  response_shaping:
    minimum_denial_latency_ms: 250
  peers:
    - node_id: did:web:benefits.demo.example.gov
      issuer: https://benefits.demo.example.gov
      jwks_uri: https://metadata.lab.registrystack.org/federation/default-benefits-jwks.json
      allowed_protocol_versions:
        - registry-notary-federation/v0.1
      allowed_purposes:
        - https://demo.example.gov/purpose/decentralized-evidence-demo
      allowed_profiles:
        - beneficiary_active_predicate
        - household_eligibility_band_value
      source_scopes:
        - social_protection_registry:evidence_verification
  evaluation_profiles:
    - id: beneficiary_active_predicate
      ruleset: beneficiary-active-v1
      claim_id: beneficiary-active
      subject_id_type: national_id
      disclosure: predicate
      max_source_observed_age_seconds: 86400
      legal_basis_ref: demo:child-support-eligibility
      consent_ref: demo:child-support-consent
      jurisdiction: ZZ
      assurance_level: substantial
    - id: household_eligibility_band_value
      ruleset: household-eligibility-band-v1
      claim_id: household-eligibility-band
      subject_id_type: national_id
      disclosure: value
      max_source_observed_age_seconds: 86400
      legal_basis_ref: demo:child-support-eligibility
      consent_ref: demo:child-support-consent
      jurisdiction: ZZ
      assurance_level: substantial

evidence:
  enabled: true
  service_id: social-protection-notary
  api_base_url: https://social-notary.lab.registrystack.org
  inline_batch_limit: 20
  source_connections:
    social_protection:
      base_url: http://social-protection-registry-relay:8080
      allow_insecure_private_network: true
      token_env: SOCIAL_EVIDENCE_SOURCE_RAW
  ecosystem_bindings:
    combined-support-eligibility/v1:
      profile: registry-notary/source-policy/v1
      policy_id: lab.combined-support-eligibility.governed-evidence.v1
      policy_hash: sha256:77a93c25e2d8b3c734176a8646628af65dd2a50396f2710e2fc26c5847259e5c
  signing_keys:
    social-protection-evidence-demo:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:social-notary.lab.registrystack.org#social-protection-evidence-key-1
      status: active
    social-federation-response:
      provider: local_jwk_env
      private_jwk_env: SOCIAL_FEDERATION_RESPONSE_JWK
      alg: EdDSA
      kid: did:web:social-notary.lab.registrystack.org#federation-response-1
      status: active
  credential_profiles:
    enrollment_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:social-notary.lab.registrystack.org
      signing_key: social-protection-evidence-demo
      vct: https://social-notary.lab.registrystack.org/credentials/social-protection-attestation/v1
      validity_seconds: 600
      allowed_claims:
        - program-enrollment-status
        - household-eligibility-band
        - beneficiary-active
        - household-composition
        - caregiver-link
        - disability-determination
        - functioning-assessment
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - value
          - predicate
  claims:
    - id: program-enrollment-status
      title: Program Enrollment Attestation
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        enrollment:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: program_enrollment
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: target.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            enrollment_status:
              field: enrollment_status
              type: string
              required: true
      rule:
        type: extract
        source: enrollment
        field: enrollment_status
      disclosure:
        default: value
        allowed:
          - value
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - enrollment_sd_jwt
    - id: household-eligibility-band
      title: Welfare Classification Attestation
      version: 2026-05
      subject_type: person
      value:
        type: string
      source_bindings:
        household:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: household
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: target.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            eligibility_band:
              field: eligibility_band
              type: string
              required: true
      rule:
        type: extract
        source: household
        field: eligibility_band
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - enrollment_sd_jwt
    - id: beneficiary-active
      title: Program Enrollment Active Attestation
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      depends_on:
        - program-enrollment-status
      rule:
        type: cel
        expression: "claims.program_enrollment_status.value == 'active'"
        bindings:
          claims:
            program_enrollment_status:
              claim: program-enrollment-status
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 10
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: household_support_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/household-support
      credential_profiles:
        - enrollment_sd_jwt
    - id: household-composition
      title: Household Composition Attestation
      version: 2026-06
      subject_type: person
      value:
        type: integer
      source_bindings:
        household:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: household
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: target.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            household_size:
              field: household_size
              type: integer
              required: true
      rule:
        type: extract
        source: household
        field: household_size
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: household_composition_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/household-composition
      credential_profiles:
        - enrollment_sd_jwt
    - id: caregiver-link
      title: Parent Or Guardian Link Attestation
      version: 2026-06
      subject_type: person
      value:
        type: boolean
      source_bindings:
        child_household:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: household
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: target.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            id:
              field: id
              type: string
              required: true
        caregiver:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: person
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: requester.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            household_id:
              field: household_id
              type: string
              required: true
            relationship:
              field: relationship
              type: string
              required: true
            alive:
              field: alive
              type: boolean
              required: true
      rule:
        type: cel
        expression: "source.child_household.id == source.caregiver.household_id && source.caregiver.relationship == 'caregiver' && source.caregiver.alive"
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: caregiver_link_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/caregiver-link
      credential_profiles:
        - enrollment_sd_jwt
    - id: disability-determination
      title: Disability Determination Attestation
      version: 2026-06
      subject_type: person
      value:
        type: string
      source_bindings:
        determination:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: disability_determination
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: target.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            support_category:
              field: support_category
              type: string
              required: true
      rule:
        type: extract
        source: determination
        field: support_category
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: disability_determination_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/disability-determination
      credential_profiles:
        - enrollment_sd_jwt
    - id: functioning-assessment
      title: Functioning Assessment Attestation
      version: 2026-06
      subject_type: person
      value:
        type: boolean
      source_bindings:
        assessment:
          connector: registry_data_api
          connection: social_protection
          required_scope: social_protection_registry:evidence_verification
          dataset: social_protection_registry
          entity: functioning_profile
          matching:
            allowed_purposes:
              - https://demo.example.gov/purpose/decentralized-evidence-demo
            context_constraints:
              legal_basis:
                required: true
              consent:
                required: true
              assurance:
                allowed:
                  - substantial
            ecosystem_binding:
              id: combined-support-eligibility/v1
          lookup:
            input: target.identifiers.national_id
            field: national_id
            op: eq
            cardinality: one
          fields:
            disability_identifier_met:
              field: disability_identifier_met
              type: boolean
              required: true
      rule:
        type: extract
        source: assessment
        field: disability_identifier_met
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: functioning_assessment_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/functioning-assessment
      credential_profiles:
        - enrollment_sd_jwt
