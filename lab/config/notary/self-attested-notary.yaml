deployment:
  profile: local

instance:
  environment: local
  id: self-attested-notary

server:
  bind: 0.0.0.0:8080
  request_timeout: 30s

auth:
  mode: api_key
  api_keys:
    - id: application-service
      fingerprint:
        provider: env
        name: SELF_ATTESTED_EVIDENCE_CLIENT_TOKEN_HASH
      scopes: [evidence:declaration:read]

audit:
  sink: stdout
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

evidence:
  enabled: true
  service_id: self-attested-notary
  api_base_url: http://self-attested-notary:8080
  allowed_purposes: [application-processing]
  max_credential_validity_seconds: 600
  signing_keys:
    project-issuer:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:self-attested-notary.demo.invalid#project-issuer-key
      status: active
  credential_profiles:
    applicant-declaration:
      format: application/dc+sd-jwt
      issuer: did:web:self-attested-notary.demo.invalid
      signing_key: project-issuer
      vct: https://credentials.demo.invalid/applicant-declaration/v1
      validity_seconds: 600
      allowed_claims: [applicant-declaration]
      disclosure:
        allowed: [value, predicate, redacted]
  claims:
    - id: applicant-declaration
      title: Applicant declaration
      version: "1"
      subject_type: person
      evidence_mode:
        type: self_attested
      value:
        type: boolean
        nullable: false
      purpose: application-processing
      required_scopes: [evidence:declaration:read]
      rule:
        type: cel
        expression: "true"
        bindings: {}
      disclosure:
        default: predicate
        allowed: [predicate, redacted]
        downgrade: deny
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles: [applicant-declaration]
