# SPDX-License-Identifier: Apache-2.0
#
# Built-in http_json sidecar manifest for DHIS2 tracker health lookups.
# Replaces the former OpenFn-engine dhis2-health sidecar.
#
# The source maps the DHIS2 tracker response to the same output fields the
# retired OpenFn job produced:
#   tracked_entity, org_unit, first_name, last_name,
#   child_program_code, child_program_status, child_program_active,
#   child_age_band, reconciliation_ref,
#   maternal_pnc_status, maternal_pnc_active,
#   child_health_visit_recorded, child_health_visit_count,
#   tb_program_status, tb_program_active
#
# DHIS2 query shape (MUST be confirmed by the live smoke in CI):
#   The OpenFn job fetched a single tracked entity via
#   GET /api/tracker/trackedEntities/{id}, whose JSON root *is* the entity.
#   http_json uses LITERAL paths, so the id cannot go in the path. Instead this
#   manifest queries the tracker COLLECTION endpoint
#   GET /api/tracker/trackedEntities?trackedEntities={id}&orgUnitMode=ALL&fields=...
#   whose response root key is `trackedEntities` (an array). The CEL therefore
#   selects element [0] and reproduces the JS output for that single entity.
#
# CEL notes:
#  - No local variables: repeated sub-expressions are inlined (valid CEL).
#  - Collection macros filter/map/exists and size() are required (added to
#    crosswalk-core by the registry-notary CEL engine work). No `.flatten()`.
#  - String methods startsWith()/substring() are assumed available; the live
#    smoke must confirm they resolve (see the trackedEntities query below).
#
# Programme IDs  (match the retired JS job constants):
#   CHILD_PROGRAM        = "IpHINAT79UW"
#   MATERNAL_PNC_PROGRAM = "uy2gU8kT1jF"
#   TB_PROGRAM           = "ur1Edk5Oe2n"
# Stage IDs:
#   CHILD_BIRTH_STAGE    = "A03MvHHogjR"
#   BABY_POSTNATAL_STAGE = "ZzYYXq4fJie"
# Attribute IDs:
#   FIRST_NAME_ATTR = "w75KJ2mc4zz"
#   LAST_NAME_ATTR  = "zDhUuAYrxNC"

server:
  bind: "0.0.0.0:8080"

auth:
  bearer_tokens:
    - id: dhis2_health_notary
      hash_env: OPENFN_SIDECAR_TOKEN_HASH

limits:
  max_workers: 4
  worker_timeout_ms: 15000
  max_worker_memory_mb: 512
  max_output_bytes: 1048576
  max_request_bytes: 16384
  max_query_parameter_bytes: 2048
  liveness_window_ms: 30000
  retry_after_seconds: 1
  max_batch_items: 10
  batch_timeout_ms: 30000

sources:
  dhis2_health:
    engine: http_json
    dataset: dhis2_tracker
    entity: person
    credential_env: OPENFN_DHIS2_DEMO_CREDENTIAL_JSON
    credential_public_fields:
      - baseUrl
    allowed_base_urls:
      - https://play.im.dhis2.org/stable-2-43-0-1
    http_json:
      method: GET
      base_url:
        cel: credential_public.baseUrl
      path: "/api/tracker/trackedEntities"
      query:
        # Strip the 'dhis2:tracked-entity:' reconciliation prefix the caller may
        # carry, matching the OpenFn job's lookupValue.startsWith(...) handling.
        # If startsWith()/substring() turn out to be unavailable in CEL, drop
        # this guard and require the caller to pass the bare tracked-entity UID.
        trackedEntities:
          cel: >-
            lookup.value.startsWith('dhis2:tracked-entity:')
              ? lookup.value.substring(size('dhis2:tracked-entity:'))
              : lookup.value
        orgUnitMode:
          cel: '"ALL"'
        fields:
          cel: >-
            "trackedEntity,orgUnit,attributes[attribute,value],enrollments[enrollment,program,status,enrolledAt,events[event,programStage,status,occurredAt,scheduledAt]]"
      auth:
        type: basic
        username:
          secret: username
        password:
          secret: password
      response:
        # Reproduce the dhis2-health-lookup.js output for the single matched
        # tracked entity. body.trackedEntities[0] is the first (and only) element
        # of the tracker collection response. If the entity is not found the
        # array is empty and we return an empty record list (RDA not-found).
        #
        # child_health_visit_count is computed from the events of the FIRST
        # child-program enrollment: DHIS2 allows at most one enrollment per
        # program per tracked entity, and the JS enrollment() helper itself uses
        # .find (first match). CEL's macro set has no fold/sum, so a true
        # cross-enrollment sum is not expressible; the single-enrollment form
        # matches the OpenFn output for every real play-instance entity.
        records:
          cel: >-
            size(body.trackedEntities) == 0 ? [] : [
              {
                "tracked_entity": body.trackedEntities[0].trackedEntity,
                "org_unit": body.trackedEntities[0].orgUnit,
                "first_name": size(body.trackedEntities[0].attributes.filter(a, a.attribute == 'w75KJ2mc4zz')) == 0
                  ? null
                  : body.trackedEntities[0].attributes.filter(a, a.attribute == 'w75KJ2mc4zz')[0].value,
                "last_name": size(body.trackedEntities[0].attributes.filter(a, a.attribute == 'zDhUuAYrxNC')) == 0
                  ? null
                  : body.trackedEntities[0].attributes.filter(a, a.attribute == 'zDhUuAYrxNC')[0].value,
                "child_program_code": "DHIS2_CHILD_PROGRAM",
                "child_program_status": size(body.trackedEntities[0].enrollments.filter(e, e.program == 'IpHINAT79UW')) == 0
                  ? null
                  : body.trackedEntities[0].enrollments.filter(e, e.program == 'IpHINAT79UW')[0].status,
                "child_program_active": body.trackedEntities[0].enrollments.exists(e, e.program == 'IpHINAT79UW' && e.status == 'ACTIVE'),
                "child_age_band": body.trackedEntities[0].enrollments.exists(e, e.program == 'IpHINAT79UW') ? '5_to_17' : 'unknown',
                "reconciliation_ref": 'dhis2:tracked-entity:' + body.trackedEntities[0].trackedEntity,
                "maternal_pnc_status": size(body.trackedEntities[0].enrollments.filter(e, e.program == 'uy2gU8kT1jF')) == 0
                  ? null
                  : body.trackedEntities[0].enrollments.filter(e, e.program == 'uy2gU8kT1jF')[0].status,
                "maternal_pnc_active": body.trackedEntities[0].enrollments.exists(e, e.program == 'uy2gU8kT1jF' && e.status == 'ACTIVE'),
                "child_health_visit_recorded": body.trackedEntities[0].enrollments.exists(e,
                  e.program == 'IpHINAT79UW' && e.events.exists(ev,
                    ev.status == 'COMPLETED' && (ev.programStage == 'A03MvHHogjR' || ev.programStage == 'ZzYYXq4fJie'))),
                "child_health_visit_count": size(body.trackedEntities[0].enrollments.filter(e, e.program == 'IpHINAT79UW')) == 0
                  ? 0
                  : size(body.trackedEntities[0].enrollments.filter(e, e.program == 'IpHINAT79UW')[0].events),
                "tb_program_status": size(body.trackedEntities[0].enrollments.filter(e, e.program == 'ur1Edk5Oe2n')) == 0
                  ? null
                  : body.trackedEntities[0].enrollments.filter(e, e.program == 'ur1Edk5Oe2n')[0].status,
                "tb_program_active": body.trackedEntities[0].enrollments.exists(e, e.program == 'ur1Edk5Oe2n' && e.status == 'ACTIVE')
              }
            ]
    smoke_lookup:
      field: tracked_entity
      value: PQfMcpmXeFE
      fields:
        - tracked_entity
        - child_program_active
        - child_age_band
        - child_program_code
        - reconciliation_ref
        - tb_program_active
      purpose: startup-readiness-smoke
