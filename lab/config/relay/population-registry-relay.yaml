# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  admin_bind: 0.0.0.0:8081
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/population-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/population-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: population-registry-relay.metadata.yaml
    digest: sha256:77c6b2e07a6b2c9513da8d91c21c807d7da336b1a578053414a794fd55d9bf89

catalog:
  title: Population Registry Relay (Decentralized Demo)
  base_url: http://population-registry-relay:8080
  publisher: Population Registry Authority (Demo)
  participant_id: did:web:population-registry.demo.example.gov

vocabularies:
  demo: https://demo.example.gov/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: POPULATION_METADATA_CLIENT_HASH
      scopes:
        - population_registry:metadata
    - id: esignet_identity_release
      fingerprint:
        provider: env
        name: POPULATION_ESIGNET_IDENTITY_RELEASE_HASH
      scopes:
        - population_registry:metadata
        - population_registry:identity_release

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: population_registry
    title: Population Registry
    description: Current person/account projection derived from civil registration event data.
    owner: Population Registry Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: daily
    defaults:
      refresh:
        mode: manual
    tables:
      - id: population_persons_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/population/population-persons.csv
          format:
            csv:
              header_row: 1
        primary_key: person_id
        schema:
          strict: true
          fields:
            - name: person_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: given_name
              type: string
              nullable: false
              sensitive: true
            - name: family_name
              type: string
              nullable: false
              sensitive: true
            - name: birth_date
              type: date
              nullable: false
            - name: gender
              type: string
              nullable: false
            - name: district
              type: string
              nullable: false
            - name: identity_status
              type: string
              nullable: false
            - name: alive
              type: boolean
              nullable: false
    entities:
      - name: person
        title: Population Registry Person
        description: Current person/account projection for identity verification.
        table: population_persons_table
        concept_uri: demo:Person
        fields:
          - name: id
            from: person_id
          - name: national_id
          - name: given_name
          - name: family_name
          - name: birth_date
          - name: gender
          - name: district
          - name: identity_status
          - name: alive
        access:
          metadata_scope: population_registry:metadata
          aggregate_scope: population_registry:aggregate
          read_scope: population_registry:rows
          evidence_verification_scope: population_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: identity_status
              ops: [eq]
            - field: alive
              ops: [eq]
        attribute_release_profiles:
          - id: esignet-civil-userinfo
            version: v1
            title: eSignet civil UserInfo
            description: Minimized civil identity claims for the relay-backed eSignet authenticator.
            purpose: https://demo.example.gov/purpose/esignet-identity-verification
            release_scope: population_registry:identity_release
            subject:
              input: individual_id
              source_field: national_id
              id_type: national_id
              cardinality: one
            release_conditions:
              expression:
                cel: "source.alive == true && source.identity_status == 'active'"
              denied_code: subject_inactive
            claims:
              - name: individual_id
                source_field: national_id
                required: true
                sensitivity: direct_identifier
                shareable: false
              - name: name
                expression:
                  cel: "source.given_name + ' ' + source.family_name"
                required: true
                sensitivity: personal
              - name: given_name
                source_field: given_name
                required: true
                sensitivity: personal
              - name: family_name
                source_field: family_name
                required: true
                sensitivity: personal
              - name: birthdate
                source_field: birth_date
                required: true
                sensitivity: personal
                format: date
              - name: gender
                source_field: gender
                required: false
                sensitivity: personal
