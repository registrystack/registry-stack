              sheet: DistrictGeometries
              header_row: 1
        primary_key: district
        schema:
          strict: true
          fields:
            - name: district
              type: string
              nullable: false
            - name: geometry
              type: string
              nullable: false
    aggregates:
      - id: households_by_eligibility_band
        title: Households by eligibility band
        description: Household count by eligibility band and district.
        source_entity: household
        default_group_by:
          - eligibility_band
        dimensions:
          - id: eligibility_band
            label: Eligibility band
            field: eligibility_band
          - id: district
            label: District
            field: district
        indicators:
          - id: household_count
            label: Households
            function: count
            column: id
            unit_measure: households
          - id: average_poverty_score
            label: Average poverty score
            function: avg
            column: poverty_score
            unit_measure: score
            decimals: 1
        allowed_filters:
          - field: eligibility_band
            ops: [eq, in]
          - field: district
            ops: [eq, in]
          - field: poverty_score
            ops: [gte, lte, between]
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          aggregate_only_execution: true
        disclosure_control:
          min_cell_size: 2
          suppression: null
          report_suppressed_rows: true
        spatial:
          mode: admin_area
          collection_id: social_protection_households_by_district
          dimension: district
          geometry_entity: district_geometry
          geometry_id_field: id
          geometry_field: geometry
          max_geometry_vertices: 100
    entities:
      - name: household
        title: Household
        description: Household enrolled or assessed for support.
        table: households_table
        concept_uri: demo:Household
        fields:
          - name: id
            from: household_id
          - name: national_id
          - name: district
          - name: poverty_score
          - name: eligibility_band
          - name: household_size
          - name: active_members
          - name: deceased_member_count
          - name: observed_at
        relationships:
          - name: members
            kind: has_many
            target: person
            foreign_key: household_id
          - name: enrollments
            kind: has_many
            target: program_enrollment
            foreign_key: household_id
        access:
          metadata_scope: social_protection_registry:metadata
          aggregate_scope: social_protection_registry:aggregate
          read_scope: social_protection_registry:rows
          evidence_verification_scope: social_protection_registry:evidence_verification
        api:
          default_limit: 25
          max_limit: 100
          require_purpose_header: true
          allowed_filters:
            - field: id
              ops: [eq, in]
            - field: national_id
              ops: [eq, in]
            - field: district
              ops: [eq, in]
            - field: eligibility_band
              ops: [eq, in]
            - field: poverty_score
              ops: [eq, gte, lte]
      - name: district_geometry
        title: District Geometry
        description: Administrative district geometries for spatial aggregate demonstrations.
        table: district_geometries_table
        concept_uri: demo:DistrictGeometry
        fields:
