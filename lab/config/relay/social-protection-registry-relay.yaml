# SPDX-License-Identifier: Apache-2.0

server:
  bind: 0.0.0.0:8080
  openapi_requires_auth: false
  cache_dir: /var/lib/registry-relay/cache

config_trust:
  antirollback_state_path: /var/lib/registry-relay/cache/social-protection-registry-relay-config-antirollback.json
  local_approval_state_path: /var/lib/registry-relay/cache/social-protection-registry-relay-config-local-approvals.json
  break_glass_rate_limit:
    max_accepted: 1
    window_seconds: 3600

metadata:
  source:
    path: social-protection-registry-relay.metadata.yaml
    digest: sha256:843bc82520c8b084cc2512634b035d5a3093a94f9fbad642b3334ca3c31ebdb5
  ecosystem_binding:
    id: combined-support-eligibility/v1
    version: v1

catalog:
  title: Social Protection Registry Relay (Decentralized Demo)
  base_url: http://social-protection-registry-relay:8080
  publisher: Social Protection Authority (Demo)
  participant_id: did:web:social-protection.demo.example.gov

vocabularies:
  demo: https://demo.example.gov/vocab/

auth:
  mode: api_key
  api_keys:
    - id: metadata_client
      fingerprint:
        provider: env
        name: SOCIAL_METADATA_CLIENT_HASH
      scopes:
        - social_protection_registry:metadata
    - id: evidence_source
      fingerprint:
        provider: env
        name: SOCIAL_EVIDENCE_SOURCE_HASH
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:rows
        - social_protection_registry:evidence_verification
    - id: evidence_only
      fingerprint:
        provider: env
        name: SOCIAL_EVIDENCE_ONLY_HASH
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:evidence_verification
    - id: row_reader
      fingerprint:
        provider: env
        name: SOCIAL_ROW_READER_HASH
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:rows
    - id: aggregate_reader
      fingerprint:
        provider: env
        name: SOCIAL_AGGREGATE_READER_HASH
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:aggregate
    - id: shared_evidence_source
      fingerprint:
        provider: env
        name: SHARED_SOCIAL_EVIDENCE_SOURCE_HASH
      scopes:
        - social_protection_registry:metadata
        - social_protection_registry:rows
        - social_protection_registry:evidence_verification

audit:
  sink: stdout
  format: jsonl
  hash_secret_env: REGISTRY_RELAY_AUDIT_HASH_SECRET

datasets:
  - id: social_protection_registry
    title: Social Protection Registry
    description: Synthetic households, persons, and enrollments for decentralized evidence demo flows.
    owner: Social Protection Authority
    sensitivity: personal
    access_rights: restricted
    update_frequency: weekly
    conforms_to:
      - demo:SocialProtectionRegistry
    defaults:
      refresh:
        mode: manual
    tables:
      - id: households_table
        materialization: snapshot
        source:
          type: file
          path: /demo/data/social-protection/social-protection.xlsx
          format:
            xlsx:
              sheet: Households
              header_row: 1
        primary_key: household_id
        schema:
          strict: true
          fields:
            - name: household_id
              type: string
              nullable: false
            - name: national_id
              type: string
              nullable: false
              sensitive: true
            - name: district
              type: string
              nullable: false
            - name: poverty_score
              type: number
              nullable: false
            - name: eligibility_band
              type: string
              nullable: false
            - name: household_size
