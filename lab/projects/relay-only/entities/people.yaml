version: 1
id: people
revision: 1
primary_key: person_id
schema:
  type: object
  additionalProperties: false
  required: [person_id, status]
  properties:
    person_id: { type: string, maxLength: 64 }
    status: { type: [string, "null"], maxLength: 32 }
materialization:
  max_records: 1000000
  max_bytes: 256MiB
  refresh: manual
  retain_generations: 2
