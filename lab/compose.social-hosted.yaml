name: registry-lab-social

# Per-track Coolify app for the Relay-only social-protection demo.

x-hosted-domains:
  social-protection-registry-relay: social-relay.lab.registrystack.org

x-coolify-required-env:
  - REGISTRY_RELAY_AUDIT_HASH_SECRET
  - SHARED_SOCIAL_EVIDENCE_SOURCE_HASH
  - SOCIAL_AGGREGATE_READER_HASH
  - SOCIAL_EVIDENCE_SOURCE_HASH
  - SOCIAL_EVIDENCE_ONLY_HASH
  - SOCIAL_METADATA_CLIENT_HASH
  - SOCIAL_ROW_READER_HASH

x-relay-common: &relay-common
  image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:da9332ef30ba252d54ba275eb2a9be443a65e95ef78c493b9b0ce30cbc391e71}
  environment:
    RUST_LOG: ${RUST_LOG:-info}
    CONFIG_REPO_REF: ${CONFIG_REPO_REF:?set CONFIG_REPO_REF to the deployed registry-lab git ref}
  restart: unless-stopped
  expose: ["8080"]
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  config-loader:
    image: ${CONFIG_LOADER_IMAGE:-alpine:3.20}
    restart: "no"
    environment:
      CONFIG_REPO_URL: ${CONFIG_REPO_URL:-https://github.com/jeremi/registry-lab}
      CONFIG_REPO_REF: ${CONFIG_REPO_REF:?set CONFIG_REPO_REF to the deployed registry-lab git ref}
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        apk add --no-cache git >/dev/null
        rm -rf /tmp/repo
        git init /tmp/repo
        git -C /tmp/repo remote add origin "$$CONFIG_REPO_URL"
        git -C /tmp/repo fetch --depth 1 origin "$$CONFIG_REPO_REF"
        git -C /tmp/repo -c advice.detachedHead=false checkout FETCH_HEAD
        for d in relay data; do
          mkdir -p "/out/$$d"
          find "/out/$$d" -mindepth 1 -delete 2>/dev/null || true
        done
        cp -a /tmp/repo/config/coolify/relay/social-protection-registry-relay.yaml /out/relay/
        cp -a /tmp/repo/config/coolify/relay/social-protection-registry-relay.metadata.yaml /out/relay/
        cp -a /tmp/repo/data/social-protection /out/data/
        mkdir -p /out/social-cache
        chown -R 65532:65532 /out/social-cache
    volumes:
      - cfg-relay:/out/relay
      - cfg-data:/out/data
      - social-protection-registry-cache:/out/social-cache

  social-protection-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/social-protection-registry-relay.yaml"]
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-relay:/etc/registry-relay:ro
      - cfg-data:/demo/data:ro
      - social-protection-registry-cache:/var/lib/registry-relay/cache

volumes:
  social-protection-registry-cache:
  cfg-relay:
  cfg-data:
