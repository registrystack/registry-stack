name: registry-lab

# Social-protection Relay runs in the per-track lab-social Coolify app. It is
# intentionally absent here because the monolith's rendered Compose exceeded
# the Linux MAX_ARG_STRLEN limit in Coolify v4.1.1.
x-hosted-domains:
  citizen-portal: portal.lab.registrystack.org
  self-attested-notary: self-attested-notary.lab.registrystack.org
  civil-registry-relay: civil-relay.lab.registrystack.org
  health-registry-relay: health-relay.lab.registrystack.org
  static-metadata-publisher: metadata.lab.registrystack.org
  zitadel: zitadel.lab.registrystack.org

x-coolify-required-env:
  - AGRI_AGGREGATE_READER_RAW
  - AGRI_EVIDENCE_ONLY_RAW
  - AGRI_METADATA_CLIENT_RAW
  - AGRI_ROW_READER_RAW
  - CIVIL_EVIDENCE_ONLY_HASH
  - CIVIL_EVIDENCE_ONLY_RAW
  - CIVIL_EVIDENCE_SOURCE_HASH
  - CIVIL_EVIDENCE_SOURCE_RAW
  - CIVIL_ESIGNET_IDENTITY_RELEASE_HASH
  - CIVIL_ESIGNET_IDENTITY_RELEASE_RAW
  - CIVIL_METADATA_CLIENT_HASH
  - CIVIL_METADATA_CLIENT_RAW
  - CIVIL_ROW_READER_HASH
  - CIVIL_ROW_READER_RAW
  - HEALTH_EVIDENCE_ONLY_HASH
  - HEALTH_EVIDENCE_ONLY_RAW
  - HEALTH_EVIDENCE_SOURCE_HASH
  - HEALTH_METADATA_CLIENT_HASH
  - HEALTH_METADATA_CLIENT_RAW
  - HEALTH_ROW_READER_HASH
  - HEALTH_ROW_READER_RAW
  - REGISTRY_NOTARY_AUDIT_HASH_SECRET
  - REGISTRY_NOTARY_ISSUER_JWK
  - REGISTRY_RELAY_AUDIT_HASH_SECRET
  - SHARED_CIVIL_EVIDENCE_SOURCE_HASH
  - SHARED_CIVIL_EVIDENCE_SOURCE_RAW
  - SHARED_HEALTH_EVIDENCE_SOURCE_HASH
  - SHARED_HEALTH_EVIDENCE_SOURCE_RAW
  - SHARED_SOCIAL_EVIDENCE_SOURCE_HASH
  - SHARED_SOCIAL_EVIDENCE_SOURCE_RAW
  - SOCIAL_AGGREGATE_READER_HASH
  - SOCIAL_AGGREGATE_READER_RAW
  - SOCIAL_EVIDENCE_ONLY_HASH
  - SOCIAL_EVIDENCE_ONLY_RAW
  - SOCIAL_EVIDENCE_SOURCE_HASH
  - SOCIAL_EVIDENCE_SOURCE_RAW
  - SOCIAL_METADATA_CLIENT_HASH
  - SOCIAL_METADATA_CLIENT_RAW
  - SOCIAL_ROW_READER_HASH
  - SOCIAL_ROW_READER_RAW
  - SELF_ATTESTED_EVIDENCE_CLIENT_TOKEN
  - SELF_ATTESTED_EVIDENCE_CLIENT_TOKEN_HASH

x-relay-common: &relay-common
  image: ${REGISTRY_RELAY_IMAGE:-ghcr.io/registrystack/registry-relay@sha256:da9332ef30ba252d54ba275eb2a9be443a65e95ef78c493b9b0ce30cbc391e71}
  environment: &relay-env
    RUST_LOG: ${RUST_LOG:-info}
    # Relay config and workbook fixtures are copied by config-loader into named
    # volumes. Carrying the deployed ref in the service environment makes
    # docker compose recreate relays when that mounted config/data changes.
    CONFIG_REPO_REF: ${CONFIG_REPO_REF:?set CONFIG_REPO_REF to the deployed registry-lab git ref}
  restart: unless-stopped
  expose:
    - "8080"
  healthcheck:
    test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

x-notary-common: &notary-common
  image: ${REGISTRY_NOTARY_IMAGE:-ghcr.io/registrystack/registry-notary@sha256:303a059085be02caed17b4166115c6d69ef6d8c703b3c08f9254b380e73d923e}
  environment: &notary-env
    RUST_LOG: ${RUST_LOG:-info}
    REGISTRY_NOTARY_REPLAY_REDIS_URL: ${REGISTRY_NOTARY_REPLAY_REDIS_URL:-redis://redis:6379/0}
  restart: unless-stopped
  expose:
    - "8080"
  healthcheck:
    # The notary image ships only the binary + sh (no curl/wget for an HTTP
    # /healthz probe), and this build has no `healthcheck` subcommand, so use
    # `--version` as a process-liveness check.
    test: ["CMD", "registry-notary", "--version"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  # Coolify does not seed compose bind mounts from the git repo: relative
  # bind mounts are rewritten to empty persistent dirs. This one-shot init
  # clones the public repo and populates named config volumes that every
  # service mounts at its expected path. Re-runs on each deploy (overwrites).
  config-loader:
    image: ${CONFIG_LOADER_IMAGE:-alpine:3.20}
    restart: "no"
    environment:
      CONFIG_REPO_URL: ${CONFIG_REPO_URL:-https://github.com/jeremi/registry-lab}
      CONFIG_REPO_REF: ${CONFIG_REPO_REF:?set CONFIG_REPO_REF to the deployed registry-lab git ref}
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        apk add --no-cache git >/dev/null
        rm -rf /tmp/repo
        git init /tmp/repo
        git -C /tmp/repo remote add origin "$$CONFIG_REPO_URL"
        git -C /tmp/repo fetch --depth 1 origin "$$CONFIG_REPO_REF"
        git -C /tmp/repo -c advice.detachedHead=false checkout FETCH_HEAD
        for d in relay notary data pginit; do
          mkdir -p "/out/$$d"
          find "/out/$$d" -mindepth 1 -delete 2>/dev/null || true
        done
        cp -a /tmp/repo/config/coolify/relay/. /out/relay/
        cp -a /tmp/repo/config/notary/self-attested-notary.yaml /out/notary/
        cp -a /tmp/repo/data/. /out/data/
        cp -a /tmp/repo/config/postgres/init.sql /out/pginit/
        for d in civil-cache health-cache; do
          mkdir -p "/out/$$d"
          chown -R 65532:65532 "/out/$$d"
        done
        echo "config-loader: populated config volumes from $$CONFIG_REPO_REF"
    volumes:
      - cfg-relay:/out/relay
      - cfg-notary:/out/notary
      - cfg-data:/out/data
      - cfg-pginit:/out/pginit
      - civil-registry-cache:/out/civil-cache
      - health-registry-cache:/out/health-cache

  postgres:
    image: ${REGISTRY_LAB_POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: ${REGISTRY_LAB_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${REGISTRY_LAB_POSTGRES_PASSWORD:-replace-in-coolify}
      POSTGRES_DB: ${REGISTRY_LAB_POSTGRES_DB:-registry_lab}
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - pgdata:/var/lib/postgresql/data
      - cfg-pginit:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: ${REGISTRY_LAB_REDIS_IMAGE:-redis:7.4-alpine}
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  zitadel-seed-init:
    image: ${REGISTRY_LAB_ALPINE_IMAGE:-alpine:3.20}
    restart: "no"
    command: ["chown", "-R", "1000:1000", "/seed"]
    volumes:
      - zitadel-seed:/seed

  zitadel:
    image: ${REGISTRY_LAB_ZITADEL_IMAGE:-ghcr.io/zitadel/zitadel:v2.66.4}
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY:-}
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: ${REGISTRY_LAB_POSTGRES_USER:-postgres}
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${REGISTRY_LAB_POSTGRES_PASSWORD:-replace-in-coolify}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${REGISTRY_LAB_POSTGRES_USER:-postgres}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${REGISTRY_LAB_POSTGRES_PASSWORD:-replace-in-coolify}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: zitadel.lab.registrystack.org
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-bootstrap-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bootstrap Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2099-12-31T23:59:59Z"
      ZITADEL_FIRSTINSTANCE_PATPATH: /seed/zitadel-pat
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-seed-init:
        condition: service_completed_successfully
    volumes:
      - zitadel-seed:/seed
    expose:
      - "8080"
    labels:
      traefik.http.services.zitadel.loadbalancer.server.scheme: h2c
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  civil-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/civil-registry-relay.yaml"]
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-relay:/etc/registry-relay:ro
      - cfg-data:/demo/data:ro
      - civil-registry-cache:/var/lib/registry-relay/cache

  health-registry-relay:
    <<: *relay-common
    command: ["--config", "/etc/registry-relay/health-registry-relay.yaml"]
    depends_on:
      config-loader:
        condition: service_completed_successfully
    volumes:
      - cfg-relay:/etc/registry-relay:ro
      - cfg-data:/demo/data:ro
      - health-registry-cache:/var/lib/registry-relay/cache

  static-metadata-publisher:
    image: registry-lab-static-metadata:hosted
    build:
      context: .
      dockerfile: Dockerfile.static-metadata
      args:
        REGISTRY_MANIFEST_REF: 52da5e913d8652e98ce8e443102c5d23b1a0974f
        REGISTRY_PLATFORM_REF: 88d1a798043673dac30d809d87badb083c6e1a26
        REGISTRY_RELAY_REF: cfb1b735c6a2b3a50f5204e49660a859ceabb87d
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/.well-known/registry-manifest.json\", timeout=2).read()'"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  citizen-portal:
    image: ${REGISTRY_LAB_CITIZEN_PORTAL_IMAGE:-ghcr.io/jeremi/registry-lab-citizen-portal@sha256:d54b87aea30a69d1e3a83dd883d91b24b89f24f407517b7ce673bc87ab133731}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      ORIGIN: https://portal.lab.registrystack.org
      PORT: "3000"
      HOST: 0.0.0.0
      PORTAL_PROVIDER: mock
      PORTAL_SECURE_COOKIES: "true"
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      PORT_HEADER: x-forwarded-port
    healthcheck:
      test:
        - CMD-SHELL
        - "node -e 'fetch(\"http://127.0.0.1:3000/\").then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));'"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  self-attested-notary:
    <<: *notary-common
    command: ["--config", "/etc/registry-notary/self-attested-notary.yaml"]
    environment:
      <<: *notary-env
      SELF_ATTESTED_EVIDENCE_CLIENT_TOKEN_HASH: ${SELF_ATTESTED_EVIDENCE_CLIENT_TOKEN_HASH:-}
      REGISTRY_NOTARY_AUDIT_HASH_SECRET: ${REGISTRY_NOTARY_AUDIT_HASH_SECRET:-}
      REGISTRY_NOTARY_ISSUER_JWK: ${REGISTRY_NOTARY_ISSUER_JWK:-}
    volumes:
      - cfg-notary:/etc/registry-notary:ro
      - notary-config-state:/var/lib/registry-notary/config-state
    depends_on:
      config-loader:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redis-data:
  zitadel-seed:
  civil-registry-cache:
  health-registry-cache:
  cfg-relay:
  cfg-notary:
  cfg-data:
  cfg-pginit:
  notary-config-state:
