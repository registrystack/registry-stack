name: registry-lab

services:
  lab2-config-state-init:
    image: alpine:3.20
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -eu
        cp /state-init/civil-registry-relay-config-antirollback.json /relay-cache/civil-registry-relay-config-antirollback.json
        cp /state-init/civil-registry-relay-config-local-approvals.json /relay-cache/civil-registry-relay-config-local-approvals.json
        cp /state-init/civil-notary-config-antirollback.json /notary-state/civil-notary-config-antirollback.json
        cp /state-init/civil-notary-config-local-approvals.json /notary-state/civil-notary-config-local-approvals.json
        for bundle in \
          relay-noop \
          relay-public-metadata \
          relay-threshold-minus-one \
          relay-threshold-exact \
          relay-spoofed-metadata \
          relay-alternate-root \
          relay-break-glass \
          relay-break-glass-second \
          relay-break-glass-client-rate-limit
        do
          mkdir -p "/relay-cache/tuf-$${bundle}"
        done
        for bundle in \
          notary-noop \
          notary-signing-key-rotation \
          notary-rollback \
          notary-threshold-minus-one \
          notary-break-glass \
          notary-break-glass-second
        do
          mkdir -p "/notary-state/tuf-$${bundle}"
        done
        chmod 666 /relay-cache/civil-registry-relay-config-antirollback.json /relay-cache/civil-registry-relay-config-local-approvals.json /notary-state/civil-notary-config-antirollback.json /notary-state/civil-notary-config-local-approvals.json
        chown -R 65532:65532 /relay-cache
        chown -R nobody:nogroup /notary-state
    volumes:
      - ./output/lab2/state-init:/state-init:ro
      - lab2-civil-registry-cache:/relay-cache
      - lab2-notary-config-state:/notary-state

  lab2-redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  lab2-civil-registry-relay:
    image: registry-relay:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-relay
      additional_contexts:
        registry_relay_src: ${REGISTRY_RELAY_SOURCE_DIR:-../crates/registry-relay}
        registry_platform_src: ${REGISTRY_RELAY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-..}}
        registry_manifest_src: ${REGISTRY_MANIFEST_REPO:-..}
        crosswalk_src: ${CROSSWALK_SOURCE_DIR:-${CEL_MAPPING_SOURCE_DIR:-./vendor/crosswalk}}
      args:
        REGISTRY_RELAY_FEATURES: ${REGISTRY_RELAY_FEATURES:-spdci-api-standards,standards-cel-mapping,ogcapi-edr}
    command: ["--config", "/etc/registry-relay/civil-registry-relay.yaml"]
    env_file:
      - .env
    environment:
      RUST_LOG: info
    ports:
      - "4411:8080"
      - "4419:8081"
    volumes:
      - ./output/lab2/runtime-config:/etc/registry-relay:ro
      - ./output/lab2/tuf-repo:/lab2/tuf-repo:ro
      - lab2-civil-registry-cache:/var/lib/registry-relay/cache
      - ./data/civil:/demo/data/civil:ro
    depends_on:
      lab2-config-state-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/registry-relay", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  lab2-civil-notary:
    image: registry-notary:demo
    build:
      context: .
      dockerfile: Dockerfile.registry-notary
      additional_contexts:
        notary_src: ${REGISTRY_NOTARY_SOURCE_DIR:-..}
        registry_platform_src: ${REGISTRY_NOTARY_PLATFORM_SOURCE_DIR:-${REGISTRY_PLATFORM_SOURCE_DIR:-..}}
        crosswalk_src: ${CROSSWALK_SOURCE_DIR:-${CEL_MAPPING_SOURCE_DIR:-./vendor/crosswalk}}
    command: ["--config", "/etc/registry-notary/civil-notary.yaml"]
    env_file:
      - .env
    environment:
      RUST_LOG: info
      REGISTRY_NOTARY_REDIS_URL: redis://lab2-redis:6379/
      REGISTRY_PLATFORM_REDIS_TEST_URL: redis://lab2-redis:6379/
    ports:
      - "4421:8080"
      - "4422:8082"
    volumes:
      - ./output/lab2/runtime-config/civil-notary.yaml:/etc/registry-notary/civil-notary.yaml:ro
      - ./output/lab2/tuf-repo:/lab2/tuf-repo:ro
      - lab2-notary-config-state:/var/lib/registry-notary/config-state
    depends_on:
      lab2-config-state-init:
        condition: service_completed_successfully
      lab2-civil-registry-relay:
        condition: service_started
      lab2-redis:
        condition: service_healthy

volumes:
  lab2-civil-registry-cache:
  lab2-notary-config-state:
