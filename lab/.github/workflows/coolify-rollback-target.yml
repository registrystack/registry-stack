name: coolify-rollback-target

on:
  workflow_dispatch:
    inputs:
      rollback_targets_jsonl:
        description: "JSONL from a hosted-lab rollback-targets artifact"
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Apply rollback targets and deploy
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_API_BASE_URL: ${{ vars.COOLIFY_API_BASE_URL }}
          COOLIFY_REGISTRY_LAB_APP_UUID: ${{ vars.COOLIFY_REGISTRY_LAB_APP_UUID }}
          COOLIFY_HOSTED_ESIGNET_APP_UUID: ${{ vars.COOLIFY_HOSTED_ESIGNET_APP_UUID }}
          COOLIFY_HOSTED_WALT_APP_UUID: ${{ vars.COOLIFY_HOSTED_WALT_APP_UUID }}
          COOLIFY_HOSTED_SOCIAL_APP_UUID: ${{ vars.COOLIFY_HOSTED_SOCIAL_APP_UUID }}
          COOLIFY_HOSTED_AGRI_APP_UUID: ${{ vars.COOLIFY_HOSTED_AGRI_APP_UUID }}
          ROLLBACK_TARGETS_JSONL: ${{ inputs.rollback_targets_jsonl }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          api_base = os.environ["COOLIFY_API_BASE_URL"].rstrip("/")
          token = os.environ["COOLIFY_API_TOKEN"]
          app_uuids = {
              "monolith": os.environ["COOLIFY_REGISTRY_LAB_APP_UUID"],
              "esignet": os.environ["COOLIFY_HOSTED_ESIGNET_APP_UUID"],
              "walt": os.environ["COOLIFY_HOSTED_WALT_APP_UUID"],
              "social": os.environ["COOLIFY_HOSTED_SOCIAL_APP_UUID"],
              "agri": os.environ["COOLIFY_HOSTED_AGRI_APP_UUID"],
          }

          def request_json(method, path, body=None):
              data = None
              headers = {
                  "Accept": "application/json",
                  "Authorization": f"Bearer {token}",
              }
              if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              request = urllib.request.Request(f"{api_base}{path}", data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      raw = response.read()
              except urllib.error.HTTPError as exc:
                  error_body = exc.read().decode("utf-8", errors="replace")[:500]
                  raise SystemExit(f"Coolify API returned HTTP {exc.code} for {path}: {error_body}") from exc
              if not raw:
                  return {}
              return json.loads(raw.decode("utf-8"))

          rows = []
          for line in os.environ["ROLLBACK_TARGETS_JSONL"].splitlines():
              line = line.strip()
              if line:
                  rows.append(json.loads(line))
          if not rows:
              raise SystemExit("rollback_targets_jsonl was empty")

          deployments = []
          for row in rows:
              label = row.get("app")
              if label not in app_uuids:
                  raise SystemExit(f"unexpected app label in rollback target: {label!r}")
              targets = row.get("targets")
              if not isinstance(targets, dict) or not targets:
                  raise SystemExit(f"{label}: rollback target has no env targets")
              app_uuid = app_uuids[label]
              for key, value in sorted(targets.items()):
                  if key != "CONFIG_REPO_REF" and not key.endswith("_IMAGE"):
                      raise SystemExit(f"{label}: refusing to patch non-allowlisted env key {key!r}")
                  request_json(
                      "PATCH",
                      f"/applications/{urllib.parse.quote(app_uuid, safe='')}/envs",
                      {"key": key, "value": value, "is_preview": False},
                  )
                  print(f"patched app={label} key={key}")
              response = request_json(
                  "GET",
                  f"/deploy?uuid={urllib.parse.quote(app_uuid, safe='')}&force=true",
              )
              deployment_uuid = response["deployments"][0]["deployment_uuid"]
              deployments.append((label, deployment_uuid))
              print(f"triggered app={label} deployment_uuid={deployment_uuid}")

          for label, deployment_uuid in deployments:
              deadline = time.monotonic() + 1200
              while True:
                  response = request_json("GET", f"/deployments/{urllib.parse.quote(deployment_uuid, safe='')}")
                  status = (response.get("status") or response.get("deployment", {}).get("status") or "").lower()
                  print(f"status app={label} deployment_uuid={deployment_uuid} status={status}")
                  if status == "finished":
                      break
                  if status in {"failed", "cancelled", "canceled", "error"}:
                      raise SystemExit(f"Coolify deployment failed for {label}: {status}")
                  if time.monotonic() >= deadline:
                      raise SystemExit(f"Timed out waiting for Coolify deployment {deployment_uuid}")
                  time.sleep(15)
          PY

      - name: Probe hosted routes
        run: |
          set -euo pipefail
          routes=(
            "lab|https://lab.registrystack.org/healthz|30"
            "portal|https://portal.lab.registrystack.org/|30"
            "social|https://social-relay.lab.registrystack.org/healthz|18"
            "agri|https://agri-relay.lab.registrystack.org/healthz|18"
          )
          for entry in "${routes[@]}"; do
            IFS='|' read -r label url attempts <<<"$entry"
            ok=0
            for attempt in $(seq 1 "$attempts"); do
              code="$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$url" || true)"
              case "$code" in
                2*|3*|4*)
                  echo "route ok app=${label} url=${url} http=${code} (attempt ${attempt}/${attempts})"
                  ok=1
                  break
                  ;;
              esac
              echo "route pending app=${label} url=${url} http=${code:-000} (attempt ${attempt}/${attempts})"
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "::error::${label}: ${url} did not return a healthy HTTP status after ${attempts} attempts."
              exit 1
            fi
          done
