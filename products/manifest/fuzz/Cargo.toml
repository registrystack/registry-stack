[package]
name = "registry-manifest-fuzz"
version = "0.0.0"
edition = "2021"
publish = false

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
libfuzzer-sys = "0.4"
registry-manifest-core = { path = "../../../crates/registry-manifest-core" }
serde_json = "1"
serde_yaml_ng = "0.10"

[[bin]]
name = "metadata_manifest_yaml"
path = "fuzz_targets/metadata_manifest_yaml.rs"
test = false
doc = false
bench = false

[[bin]]
name = "rendered_artifact_json"
path = "fuzz_targets/rendered_artifact_json.rs"
test = false
doc = false
bench = false
