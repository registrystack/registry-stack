# SPDX-License-Identifier: Apache-2.0
# Perf config for registry-notary, small profile (1k stub subjects).
#
# Notary sees exactly one record per request, so the "profile" really
# controls how the harness fans out subject ids across the stub's record
# pool; notary itself is invariant. Both small.yaml and medium.yaml differ
# only in service_id label and audit log path so concurrent runs do not
# collide.

deployment:
  profile: local

server:
  bind: 127.0.0.1:14255

auth:
  mode: api_key
  api_keys:
    - id: perf_verification_service
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_API_KEY_HASH
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification
    - id: perf_no_scope
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_NO_SCOPE_TOKEN_HASH
      scopes: []
  bearer_tokens:
    - id: perf_verification_service
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_BEARER_TOKEN_HASH
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification

audit:
  sink: file
  path: target/perf/registry-notary-audit-small.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

evidence:
  enabled: true
  service_id: perf.registry-notary.small
  api_base_url: http://127.0.0.1:14255
  inline_batch_limit: 100
  allowed_purposes:
    - perf
  source_connections:
    crvs:
      base_url: http://127.0.0.1:14256
      allow_insecure_localhost: true
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          birth_date: /birth_date
    farmer_registry:
      base_url: http://127.0.0.1:14256
      allow_insecure_localhost: true
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
      dci:
        search_path: /dci/fr/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          farmed_land_size_hectares: /farmed_land_size_hectares
  signing_keys:
    perf-issuer:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:perf.registry-notary.example#perf-key-1
      status: active
  credential_profiles:
    smallholder_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:perf.registry-notary.example
      signing_key: perf-issuer
      vct: https://perf.registry-notary.example/credentials/smallholder-farmer/v1
      validity_seconds: 600
      allowed_claims:
        - farmer-under-4ha
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        crvs:
          connector: dci
          connection: crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: crvs
        field: birth_date
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 100
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
    - id: farmed-land-size
      title: Farmed land size
      version: 2026-05
      subject_type: person
      value:
        type: number
        unit: hectare
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        farmer:
          connector: dci
          connection: farmer_registry
          required_scope: farmer_registry:evidence_verification
          dataset: farmer_registry
          entity: farmer
          lookup:
            input: target.identifiers.national_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            farmed_land_size_hectares:
              field: farmed_land_size_hectares
              type: number
              unit: hectare
              required: true
      rule:
        type: extract
        source: farmer
        field: farmed_land_size_hectares
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 100
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
    - id: farmer-under-4ha
      title: Farmer under four hectares
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      depends_on:
        - farmed-land-size
      rule:
        type: cel
        expression: "claims.farmed_land_size.value < 4.0"
        bindings:
          claims:
            farmed_land_size:
              claim: farmed-land-size
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 100
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
      credential_profiles:
        - smallholder_sd_jwt
