# SPDX-License-Identifier: Apache-2.0
# Standalone Registry Notary process for the split Registry Notary demo.
# It computes evidence by calling the separate registry-relay process declared
# in registry-relay/demo/config/evidence_registries.yaml.

server:
  bind: 127.0.0.1:4255

auth:
  mode: api_key
  api_keys:
    - id: verification_service
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_API_KEY_HASH
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification
  bearer_tokens:
    - id: verification_bearer
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_BEARER_TOKEN_HASH
      scopes:
        - civil_registry:evidence_verification
        - farmer_registry:evidence_verification

audit:
  sink: file
  path: demo/var/registry-notary-audit.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

evidence:
  enabled: true
  service_id: demo.registry-notary
  api_base_url: http://127.0.0.1:4255
  inline_batch_limit: 20
  source_connections:
    crvs:
      base_url: http://127.0.0.1:4256
      allow_insecure_localhost: true
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
      dci:
        search_path: /dci/crvs/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          birth_date: /birth_date
    farmer_registry:
      base_url: http://127.0.0.1:4256
      allow_insecure_localhost: true
      token_env: EVIDENCE_SOURCE_REGISTRY_RELAY_TOKEN
      dci:
        search_path: /dci/fr/registry/sync/search
        query_type: idtype-value
        records_path: /message/search_response/0/data/reg_records
        field_paths:
          farmed_land_size_hectares: /farmed_land_size_hectares
  signing_keys:
    registry-notary-demo:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:agriculture.demo.example.gov#registry-notary-demo-key-1
      status: active
  credential_profiles:
    smallholder_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:agriculture.demo.example.gov
      signing_key: registry-notary-demo
      vct: https://demo.example.gov/credentials/smallholder-farmer/v1
      validity_seconds: 600
      allowed_claims:
        - farmer-under-4ha
      holder_binding:
        mode: did
        proof_of_possession: required
        allowed_did_methods:
          - did:jwk
      disclosure:
        allowed:
          - predicate
  claims:
    - id: date-of-birth
      title: Date of birth
      version: 2026-05
      subject_type: person
      value:
        type: date
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        crvs:
          connector: dci
          connection: crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: civil_person
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            birth_date:
              field: birth_date
              type: date
              required: true
      rule:
        type: extract
        source: crvs
        field: birth_date
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
    - id: farmed-land-size
      title: Farmed land size
      version: 2026-05
      subject_type: person
      value:
        type: number
        unit: hectare
      inputs:
        - name: subject_id
          type: string
      source_bindings:
        farmer:
          connector: dci
          connection: farmer_registry
          required_scope: farmer_registry:evidence_verification
          dataset: farmer_registry
          entity: farmer
          lookup:
            input: subject_id
            field: NATIONAL_ID
            op: eq
            cardinality: one
          fields:
            farmed_land_size_hectares:
              field: farmed_land_size_hectares
              type: number
              unit: hectare
              required: true
      rule:
        type: extract
        source: farmer
        field: farmed_land_size_hectares
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
    - id: farmer-under-4ha
      title: Farmer under four hectares
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      inputs:
        - name: subject_id
          type: string
      depends_on:
        - farmed-land-size
      rule:
        type: cel
        expression: "claims.farmed_land_size.value < 4.0"
        bindings:
          claims:
            farmed_land_size:
              claim: farmed-land-size
      operations:
        evaluate:
          enabled: true
        batch_evaluate:
          enabled: true
          max_subjects: 10
      disclosure:
        default: predicate
        allowed:
          - predicate
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - 'application/ld+json; profile="cccev"'
        - application/dc+sd-jwt
      credential_profiles:
        - smallholder_sd_jwt
      cccev:
        requirement_type: InformationRequirement
        evidence_type: smallholder_farmer_evidence
        evidence_type_iri: https://demo.example.gov/evidence-types/smallholder-farmer
      oots:
        enabled: false
        requirement: https://demo.example.gov/requirements/smallholder-under-4ha
