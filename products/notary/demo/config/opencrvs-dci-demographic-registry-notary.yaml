# SPDX-License-Identifier: Apache-2.0
# Registry Notary config for testing OpenCRVS DCI lookup by child first name,
# last name, and date of birth instead of UIN.
# Provide OpenCRVS OAuth client credentials through env vars. Client secrets
# and live access tokens must stay out of this file.

server:
  bind: 127.0.0.1:4255

auth:
  mode: api_key
  api_keys:
    - id: local_tester
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_API_KEY_HASH
        commitment: sha256:ce551aedcccd9709da728accc6f777e53ebfd18b30a32445d49d5d89ec3df733
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: file
  path: demo/var/opencrvs-dci-demographic-registry-notary-audit.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

evidence:
  enabled: true
  service_id: opencrvs-demographic.registry-notary
  api_base_url: http://127.0.0.1:4255
  signing_keys:
    registry-notary-demo:
      provider: local_jwk_env
      private_jwk_env: REGISTRY_NOTARY_ISSUER_JWK
      alg: EdDSA
      kid: did:web:localhost#registry-notary-demo
      status: active
  credential_profiles:
    opencrvs_demographic_sd_jwt:
      format: application/dc+sd-jwt
      issuer: did:web:localhost
      signing_key: registry-notary-demo
      vct: https://demo.example.gov/credentials/opencrvs-birth-record/v1
      validity_seconds: 600
      allowed_claims:
        - opencrvs-birth-record-exists-by-demographics
      holder_binding:
        mode: none
      disclosure:
        allowed:
          - value
  source_connections:
    opencrvs_crvs_demographic:
      base_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev
      source_auth:
        type: oauth2_client_credentials
        token_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev/oauth2/client/token
        client_id_env: DCI_CLIENT_ID
        client_secret_env: DCI_CLIENT_SECRET
        request_format: json
      bulk_mode: none
      dci:
        search_path: /registry/sync/search
        sender_id: registry-notary
        query_type: expression
        registry_type: ns:org:RegistryType:Civil
        registry_event_type: birth
        records_path: /message/search_response/0/data/reg_records
  claims:
    - id: opencrvs-birth-record-exists-by-demographics
      title: OpenCRVS birth record exists by demographics
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      credential_profiles:
        - opencrvs_demographic_sd_jwt
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs_demographic
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.attributes.given_name
            field: given_name
            op: eq
            cardinality: one
          query_fields:
            - input: target.attributes.given_name
              field: given_name
              op: eq
            - input: target.attributes.family_name
              field: surname
              op: eq
            - input: target.attributes.birthdate
              field: birth_date
              op: eq
          matching:
            target_type: Person
            method: configured_demographic_lookup
            sufficient_target_inputs:
              - - target.attributes.given_name
                - target.attributes.family_name
                - target.attributes.birthdate
            allowed_target_inputs:
              - target.attributes.given_name
              - target.attributes.family_name
              - target.attributes.birthdate
      rule:
        type: exists
        source: birth_record
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
        - application/dc+sd-jwt
