# SPDX-License-Identifier: Apache-2.0
# Registry Notary config for testing the OpenCRVS DCI CRVS API.
# Provide OpenCRVS OAuth client credentials through env vars. Client secrets
# and live access tokens must stay out of this file.

server:
  bind: 127.0.0.1:4255

auth:
  mode: api_key
  api_keys:
    - id: local_tester
      fingerprint:
        provider: env
        name: REGISTRY_NOTARY_API_KEY_HASH
      scopes:
        - civil_registry:evidence_verification

audit:
  sink: file
  path: demo/var/opencrvs-dci-registry-notary-audit.jsonl
  hash_secret_env: REGISTRY_NOTARY_AUDIT_HASH_SECRET

evidence:
  enabled: true
  service_id: opencrvs.registry-notary
  api_base_url: http://127.0.0.1:4255
  source_connections:
    opencrvs_crvs:
      base_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev
      source_auth:
        type: oauth2_client_credentials
        token_url: https://dci-crvs-api.farajaland-integration.opencrvs.dev/oauth2/client/token
        client_id_env: DCI_CLIENT_ID
        client_secret_env: DCI_CLIENT_SECRET
        request_format: json
      bulk_mode: none
      dci:
        search_path: /registry/sync/search
        sender_id: registry-notary
        query_type: idtype-value
        registry_type: ns:org:RegistryType:Civil
        registry_event_type: birth
        records_path: /message/search_response/0/data/reg_records
  claims:
    - id: opencrvs-birth-record-exists
      title: OpenCRVS birth record exists
      version: 2026-05
      subject_type: person
      value:
        type: boolean
      source_bindings:
        birth_record:
          connector: dci
          connection: opencrvs_crvs
          required_scope: civil_registry:evidence_verification
          dataset: civil_registry
          entity: birth_registration
          lookup:
            input: target.identifiers.UIN
            field: UIN
            op: eq
            cardinality: one
      rule:
        type: exists
        source: birth_record
      disclosure:
        default: value
        allowed:
          - value
          - redacted
      formats:
        - application/vnd.registry-notary.claim-result+json
