name: Notary PostgreSQL conformance

on:
  pull_request:
    branches:
      - main
      - release/1.0
    paths:
      - .github/workflows/notary-postgres-conformance.yml
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml
      - crates/registry-notary/**
      - crates/registry-notary-core/**
      - crates/registry-notary-server/**
      - crates/registry-notary-worker-harness/**
      - crates/registry-platform-audit/**
      - crates/registry-platform-authcommon/**
      - crates/registry-platform-cache/**
      - crates/registry-platform-crypto/**
      - crates/registry-platform-ops/**
      - crates/registry-platform-replay/**
      - products/notary/scripts/postgresql-conformance.sh
  push:
    branches:
      - main
    paths:
      - .github/workflows/notary-postgres-conformance.yml
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml
      - crates/registry-notary/**
      - crates/registry-notary-core/**
      - crates/registry-notary-server/**
      - crates/registry-notary-worker-harness/**
      - crates/registry-platform-audit/**
      - crates/registry-platform-authcommon/**
      - crates/registry-platform-cache/**
      - crates/registry-platform-crypto/**
      - crates/registry-platform-ops/**
      - crates/registry-platform-replay/**
      - products/notary/scripts/postgresql-conformance.sh
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: target/notary-postgres-conformance

jobs:
  state-plane:
    name: Notary state plane (PostgreSQL ${{ matrix.postgresql }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - postgresql: "16"
          - postgresql: "17"
          - postgresql: "18"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: notary-postgresql-${{ matrix.postgresql }}

      - name: Build Registry Notary with CEL support
        run: cargo build --locked -p registry-notary --features registry-notary-cel

      - name: Precompile PostgreSQL conformance tests before service startup
        run: cargo test --locked -p registry-notary-server --lib --no-run

      - name: Run Notary PostgreSQL conformance
        env:
          NOTARY_BIN: target/notary-postgres-conformance/debug/registry-notary
        run: |
          set -euo pipefail
          diagnostics="${RUNNER_TEMP}/notary-postgresql-${{ matrix.postgresql }}-docker-events.log"
          docker events --format '{{json .}}' >"${diagnostics}" &
          events_pid=$!
          trap 'kill "${events_pid}" 2>/dev/null || true; wait "${events_pid}" 2>/dev/null || true' EXIT
          products/notary/scripts/postgresql-conformance.sh "${{ matrix.postgresql }}"

      - name: Report PostgreSQL Docker diagnostics
        if: failure()
        run: |
          set -euo pipefail
          diagnostics="${RUNNER_TEMP}/notary-postgresql-${{ matrix.postgresql }}-docker-events.log"
          if [[ -s "${diagnostics}" ]]; then
            sed -n '1,400p' "${diagnostics}"
          else
            echo "No Docker events were captured."
          fi
          docker ps --all --no-trunc
          docker version
