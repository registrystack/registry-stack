name: RegistryStack Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: registrystack
  RELEASE_BUILDER_IMAGE: rust:1.95-trixie@sha256:f49565f188ee00bc2a18dd418183f2c5f23ef7d6e691890517ed341a598f67c3
  SYFT_VERSION: v1.45.1
  SYFT_LINUX_AMD64_SHA256: 20c84195e24927f50a3b2269946be51f4c4abc9d2f145fee7388b4199149f716
  GRYPE_VERSION: v0.114.0
  GRYPE_LINUX_AMD64_SHA256: edda0968d8827daab01d32b3cd7de192ae0915005e7bbfcfef9e68e79bc43343
  SLSA_VERIFIER_VERSION: v2.7.1
  SLSA_VERIFIER_LINUX_AMD64_SHA256: 946dbec729094195e88ef78e1734324a27869f03e2c6bd2f61cbc06bd5350339

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      tag_target: ${{ steps.release.outputs.tag_target }}
      manifest: ${{ steps.release.outputs.manifest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            if [[ "${GITHUB_REF}" != "refs/tags/${tag}" ]]; then
              echo "Manual release dispatch must run from refs/tags/${tag}, got ${GITHUB_REF}" >&2
              exit 1
            fi
            git fetch --force --tags origin "refs/tags/${tag}:refs/tags/${tag}"
            git checkout --detach "${tag}"
          fi
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v0.8.0, got ${tag}" >&2
            exit 1
          fi
          git fetch --force origin "refs/heads/main:refs/remotes/origin/main"
          tag_target="$(git rev-parse --verify "refs/tags/${tag}^{}")"
          if [[ "$(git rev-parse HEAD)" != "${tag_target}" ]]; then
            git checkout --detach "${tag_target}"
          fi
          version="${tag#v}"
          manifest="$(
            python3 - "${version}" <<'PY'
          import glob
          import sys
          import yaml

          version = sys.argv[1]
          matches = []
          for path in sorted(glob.glob("release/manifests/registry-stack-*.yaml")):
              with open(path, encoding="utf-8") as handle:
                  manifest = yaml.safe_load(handle)
              if str(manifest.get("stack", {}).get("version", "")) == version:
                  matches.append(path)
          if len(matches) != 1:
              print(f"expected exactly one release manifest for {version}, found {matches}", file=sys.stderr)
              sys.exit(1)
          print(matches[0])
          PY
          )"
          manifest_version="$(python3 -c 'import sys, yaml; print(yaml.safe_load(open(sys.argv[1], encoding="utf-8"))["stack"]["version"])' "${manifest}")"
          if [[ "${manifest_version}" != "${version}" ]]; then
            echo "Manifest version ${manifest_version} does not match tag ${tag}" >&2
            exit 1
          fi
          {
            echo "tag=${tag}"
            echo "version=${version}"
            echo "tag_target=${tag_target}"
            echo "manifest=${manifest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up evidence checker runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.12.0

      - name: Verify documentation evidence links
        working-directory: docs/site
        run: >-
          npm run check:evidence-links --
          --source-ref "${{ steps.release.outputs.tag_target }}"

      - name: Verify lock-bearing release version
        run: |
          release/scripts/registry-release verify-registryctl-image-lock-release-version \
            --version "${{ steps.release.outputs.version }}"

      - name: Validate release manifest
        run: release/scripts/registry-release validate "${{ steps.release.outputs.manifest }}"

      - name: Validate release source lineage
        run: release/scripts/registry-release validate-source "${{ steps.release.outputs.manifest }}" --tag "${{ steps.release.outputs.tag }}" --default-branch origin/main

      - name: Audit import map
        run: release/scripts/registry-release audit release/manifests/import-map-2026-06-24.yaml

      - name: Cargo metadata
        run: cargo metadata --locked --format-version 1 >/tmp/registry-stack-cargo-metadata.json

      - name: Release source model
        run: REGISTRY_RELEASE_SOURCE_MODE=monorepo release/scripts/check-release-source-model.sh

      - name: Verify Debian 13 image contract
        run: release/scripts/check-debian13-images.py

  binaries:
    name: Build release binaries
    needs: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Assert verified source checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(git rev-parse HEAD)" != "${{ needs.verify.outputs.tag_target }}" ]]; then
            echo "Checkout does not match verified tag target" >&2
            exit 1
          fi

      - name: Fingerprint release builder
        id: release-builder
        shell: bash
        run: |
          set -euo pipefail
          fingerprint="$(printf '%s' "${RELEASE_BUILDER_IMAGE}" | sha256sum | awk '{print $1}')"
          printf 'fingerprint=%s\n' "${fingerprint}" >> "${GITHUB_OUTPUT}"
          printf 'cache_key=%s\n' \
            "registry-stack-release-cargo-${{ runner.os }}-${fingerprint}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}" \
            >> "${GITHUB_OUTPUT}"

      - name: Restore Cargo release cache
        id: cargo-cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        with:
          path: |
            .cargo-home/registry
            .cargo-home/git
            target
          key: ${{ steps.release-builder.outputs.cache_key }}
          restore-keys: |
            registry-stack-release-cargo-${{ runner.os }}-${{ steps.release-builder.outputs.fingerprint }}-

      - name: Record binary build start
        id: binary-build-start
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          printf 'epoch=%s\n' "$(date -u +%s)" >> "${GITHUB_OUTPUT}"
          printf 'timestamp=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${GITHUB_OUTPUT}"

      - name: Build binaries
        id: build-binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cargo-home target dist/bin dist/image-bin
          docker run --rm \
            --platform linux/amd64 \
            --user "$(id -u):$(id -g)" \
            --volume "${PWD}:/workspace" \
            --workdir /workspace \
            --env CARGO_HOME=/workspace/.cargo-home \
            --env CARGO_TARGET_DIR=/workspace/target \
            --env CARGO_TERM_COLOR="${CARGO_TERM_COLOR}" \
            --env HOME=/workspace \
            "${RELEASE_BUILDER_IMAGE}" \
            bash -c 'set -euo pipefail
              cargo build --release --locked \
                -p registryctl \
                -p registry-manifest-cli \
                -p registry-relay \
                -p registry-notary \
                --features registry-notary/registry-notary-cel
              cp target/release/registry-notary dist/image-bin/registry-notary
              cargo build --release --locked \
                -p registry-notary \
                --features registry-notary/registry-notary-cel,registry-notary/pkcs11
              cp target/release/registry-notary dist/image-bin/registry-notary-pkcs11
              cargo build --release --locked \
                -p registry-notary-server \
                --bin registry-notary-cel-worker \
                --features registry-notary-server/registry-notary-cel
              cp target/release/registry-notary-cel-worker dist/image-bin/registry-notary-cel-worker'
          cp target/release/registryctl "dist/bin/registryctl-${{ needs.verify.outputs.tag }}-linux-amd64"
          cp target/release/registry-manifest "dist/bin/registry-manifest-${{ needs.verify.outputs.tag }}-linux-amd64"
          cp target/release/registry-relay "dist/bin/registry-relay-${{ needs.verify.outputs.tag }}-linux-amd64"
          cp target/release/registry-relay-rhai-worker "dist/bin/registry-relay-rhai-worker-${{ needs.verify.outputs.tag }}-linux-amd64"
          cp dist/image-bin/registry-notary "dist/bin/registry-notary-${{ needs.verify.outputs.tag }}-linux-amd64"
          cp dist/image-bin/registry-notary-cel-worker "dist/bin/registry-notary-cel-worker-${{ needs.verify.outputs.tag }}-linux-amd64"
          mv dist/image-bin/registry-notary-pkcs11 dist/image-bin/registry-notary
          cp target/release/registry-relay dist/image-bin/registry-relay
          cp target/release/registry-relay-rhai-worker dist/image-bin/registry-relay-rhai-worker
          printf '%s\n' "${RELEASE_BUILDER_IMAGE}" > dist/image-bin/RELEASE_BUILDER_IMAGE
          chmod 0755 dist/bin/* dist/image-bin/registry-notary dist/image-bin/registry-notary-cel-worker dist/image-bin/registry-relay dist/image-bin/registry-relay-rhai-worker
          (cd dist/bin && sha256sum -- * > SHA256SUMS)
          (cd dist/image-bin && sha256sum -- * > SHA256SUMS)

      - name: Record binary build telemetry
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release-telemetry
          completed_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          completed_epoch="$(date -u +%s)"
          duration_seconds="$((completed_epoch - ${{ steps.binary-build-start.outputs.epoch }}))"
          jq -n \
            --arg tag "${{ needs.verify.outputs.tag }}" \
            --arg tag_target "${{ needs.verify.outputs.tag_target }}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg builder_image "${RELEASE_BUILDER_IMAGE}" \
            --arg builder_fingerprint "${{ steps.release-builder.outputs.fingerprint }}" \
            --arg cache_key "${{ steps.release-builder.outputs.cache_key }}" \
            --arg cache_result "${{ steps.cargo-cache.outputs.cache-hit }}" \
            --arg outcome "${{ steps.build-binaries.outcome }}" \
            --arg started_at "${{ steps.binary-build-start.outputs.timestamp }}" \
            --arg completed_at "${completed_at}" \
            --argjson duration_seconds "${duration_seconds}" \
            '{
              schema_version: "registry-stack.release-binary-telemetry.v1",
              run: {id: $run_id, attempt: $run_attempt},
              release: {tag: $tag, tag_target: $tag_target},
              builder: {image: $builder_image, fingerprint: $builder_fingerprint},
              cargo_cache: {
                primary_key: $cache_key,
                exact_key_hit: ($cache_result == "true"),
                action_output: (if $cache_result == "" then "not-reported" else $cache_result end)
              },
              binary_build: {
                outcome: $outcome,
                started_at: $started_at,
                completed_at: $completed_at,
                duration_seconds: $duration_seconds
              }
            }' > dist/release-telemetry/binaries.json
          {
            echo "### Release binary build telemetry"
            echo
            echo "- Duration: ${duration_seconds} seconds"
            echo "- Cargo exact-key cache hit: ${{ steps.cargo-cache.outputs.cache-hit || 'not-reported' }}"
            echo "- Build outcome: ${{ steps.build-binaries.outcome }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload binary build telemetry
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-release-binary-telemetry
          path: dist/release-telemetry/binaries.json
          if-no-files-found: error

      - name: Verify built registryctl binary version
        run: |
          release/scripts/registry-release verify-registryctl-binary-version \
            "dist/bin/registryctl-${{ needs.verify.outputs.tag }}-linux-amd64" \
            --version "${{ needs.verify.outputs.version }}"

      - name: Upload binary artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-binaries
          path: dist/bin/*
          if-no-files-found: error

      - name: Upload image binary artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-image-binaries
          path: dist/image-bin/*
          if-no-files-found: error

  registryctl-extra-binaries:
    name: Build registryctl ${{ matrix.asset }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            asset: macos-arm64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Assert verified source checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(git rev-parse HEAD)" != "${{ needs.verify.outputs.tag_target }}" ]]; then
            echo "Checkout does not match verified tag target" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install 1.95.0 --profile minimal --target "${{ matrix.target }}"

      - name: Build registryctl
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/bin
          cargo build --release --locked -p registryctl --target "${{ matrix.target }}"
          binary="dist/bin/registryctl-${{ needs.verify.outputs.tag }}-${{ matrix.asset }}"
          cp "target/${{ matrix.target }}/release/registryctl" "${binary}"
          chmod 0755 "${binary}"

      - name: Upload registryctl binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-registryctl-${{ matrix.asset }}
          path: dist/bin/registryctl-${{ needs.verify.outputs.tag }}-${{ matrix.asset }}
          if-no-files-found: error

  images:
    name: Build and publish images
    needs:
      - verify
      - binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Assert verified source checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$(git rev-parse HEAD)" != "${{ needs.verify.outputs.tag_target }}" ]]; then
            echo "Checkout does not match verified tag target" >&2
            exit 1
          fi

      - name: Download image binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: registry-stack-image-binaries
          path: dist/image-bin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Syft and Grype
        shell: bash
        run: |
          set -euo pipefail
          : "${SYFT_VERSION:?}"
          : "${SYFT_LINUX_AMD64_SHA256:?}"
          : "${GRYPE_VERSION:?}"
          : "${GRYPE_LINUX_AMD64_SHA256:?}"
          mkdir -p "${HOME}/.local/bin" /tmp/registry-stack-tools
          syft_version="${SYFT_VERSION#v}"
          grype_version="${GRYPE_VERSION#v}"
          curl -sSfL \
            "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${syft_version}_linux_amd64.tar.gz" \
            -o /tmp/registry-stack-tools/syft.tar.gz
          echo "${SYFT_LINUX_AMD64_SHA256}  /tmp/registry-stack-tools/syft.tar.gz" | sha256sum -c -
          tar -xzf /tmp/registry-stack-tools/syft.tar.gz -C "${HOME}/.local/bin" syft
          curl -sSfL \
            "https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}/grype_${grype_version}_linux_amd64.tar.gz" \
            -o /tmp/registry-stack-tools/grype.tar.gz
          echo "${GRYPE_LINUX_AMD64_SHA256}  /tmp/registry-stack-tools/grype.tar.gz" | sha256sum -c -
          tar -xzf /tmp/registry-stack-tools/grype.tar.gz -C "${HOME}/.local/bin" grype
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Build, push, and scan images
        shell: bash
        run: |
          set -euo pipefail
          chmod 0755 dist/image-bin/registry-notary dist/image-bin/registry-notary-cel-worker dist/image-bin/registry-relay dist/image-bin/registry-relay-rhai-worker
          (cd dist/image-bin && sha256sum --check SHA256SUMS)
          mkdir -p dist/images dist/sbom dist/grype
          cp dist/image-bin/SHA256SUMS dist/images/image-binaries.SHA256SUMS
          cp dist/image-bin/RELEASE_BUILDER_IMAGE dist/images/release-builder-image.txt
          build_image() {
            local name="$1"
            local dockerfile="$2"
            local image="${REGISTRY}/${IMAGE_NAMESPACE}/${name}:${{ needs.verify.outputs.tag }}"
            local metadata="dist/images/${name}.metadata.json"
            docker buildx build \
              --platform linux/amd64 \
              --file "${dockerfile}" \
              --tag "${image}" \
              --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --label "org.opencontainers.image.revision=${{ needs.verify.outputs.tag_target }}" \
              --label "org.opencontainers.image.version=${{ needs.verify.outputs.version }}" \
              --metadata-file "${metadata}" \
              --cache-from "type=gha,scope=registry-stack-${name}" \
              --cache-to "type=gha,mode=max,scope=registry-stack-${name}" \
              --push \
              .
            local digest
            digest="$(jq -r '."containerimage.digest"' "${metadata}")"
            local digest_ref="${REGISTRY}/${IMAGE_NAMESPACE}/${name}@${digest}"
            printf '%s\n' "${digest_ref}" | tee "dist/images/${name}.digest"
            python3 release/scripts/check-release-image-oci-labels.py \
              "${digest_ref}" \
              --source "https://github.com/${GITHUB_REPOSITORY}" \
              --revision "${{ needs.verify.outputs.tag_target }}" \
              --version "${{ needs.verify.outputs.version }}"
            syft "${digest_ref}" -o "spdx-json=dist/sbom/${name}.spdx.json"
            release/scripts/registry-release bind-spdx-subject \
              "dist/sbom/${name}.spdx.json" \
              --image-name "${name}" \
              --digest-ref "${digest_ref}"
            grype "${digest_ref}" -o json > "dist/grype/${name}.grype.json"
          }
          build_image registry-notary release/docker/Dockerfile.registry-notary
          build_image registry-relay release/docker/Dockerfile.registry-relay

      - name: Generate image binary SBOMs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/image-binary-sbom
          while IFS= read -r -d '' binary; do
            asset="$(basename "${binary}")"
            case "${asset}" in
              SHA256SUMS|RELEASE_BUILDER_IMAGE)
                continue
                ;;
            esac
            sbom="dist/image-binary-sbom/image-input-${asset}.spdx.json"
            syft "file:${binary}" -o "spdx-json=${sbom}"
            digest="$(sha256sum "${binary}" | awk '{print $1}')"
            release/scripts/registry-release bind-spdx-file-subject \
              "${sbom}" \
              --file-name "${asset}" \
              --sha256 "${digest}"
          done < <(find dist/image-bin -maxdepth 1 -type f -print0 | sort -z)

      - name: Enforce release image scan policy
        shell: bash
        run: |
          set -euo pipefail
          status=0
          python3 products/notary/scripts/check_advisory_baselines.py \
            grype dist/grype/registry-notary.grype.json \
            --subject registry-notary-image || status=1
          python3 crates/registry-relay/scripts/check_advisory_baselines.py \
            grype dist/grype/registry-relay.grype.json \
            --subject registry-relay-image || status=1
          exit "${status}"

      - name: Upload image evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-image-evidence
          path: |
            dist/images/*
            dist/sbom/*
            dist/image-binary-sbom/*
            dist/grype/*
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    needs:
      - verify
      - binaries
      - registryctl-extra-binaries
      - images
    runs-on: ubuntu-24.04
    outputs:
      provenance_subjects: ${{ steps.provenance-subjects.outputs.base64_subjects }}
    permissions:
      contents: write
      id-token: write # keyless cosign signing via OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Assert verified source checkout
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if [[ "$(git rev-parse HEAD)" != "${{ needs.verify.outputs.tag_target }}" ]]; then
            echo "Checkout does not match verified tag target" >&2
            exit 1
          fi

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: registry-stack-binaries
          path: dist/bin

      - name: Download macOS arm64 registryctl binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: registry-stack-registryctl-macos-arm64
          path: dist/bin

      - name: Download Linux arm64 registryctl binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: registry-stack-registryctl-linux-arm64
          path: dist/bin

      - name: Verify registryctl binary version
        run: |
          chmod 0755 "dist/bin/registryctl-${{ needs.verify.outputs.tag }}-linux-amd64"
          release/scripts/registry-release verify-registryctl-binary-version \
            "dist/bin/registryctl-${{ needs.verify.outputs.tag }}-linux-amd64" \
            --version "${{ needs.verify.outputs.version }}"

      - name: Download image evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: registry-stack-image-evidence
          path: dist/image-evidence

      - name: Render registryctl release image lock
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' -t relay_digests < <(find dist/image-evidence -type f -name registry-relay.digest -print0)
          mapfile -d '' -t notary_digests < <(find dist/image-evidence -type f -name registry-notary.digest -print0)
          if [[ "${#relay_digests[@]}" -ne 1 || "${#notary_digests[@]}" -ne 1 ]]; then
            echo "Expected exactly one Relay and one Notary digest evidence file" >&2
            exit 1
          fi
          release/scripts/registry-release render-registryctl-image-lock \
            "${{ needs.verify.outputs.manifest }}" \
            --relay-digest "${relay_digests[0]}" \
            --notary-digest "${notary_digests[0]}" \
            --tag-target "${{ needs.verify.outputs.tag_target }}" \
            --output "dist/bin/registryctl-${{ needs.verify.outputs.tag }}-image-lock.json"

      - name: Refresh release file checksums
        shell: bash
        run: |
          set -euo pipefail
          # The hermetic builder's SHA256SUMS covers only the linux/amd64 binaries.
          # Regenerate over the full dist/bin set so cross-platform binaries and
          # the registryctl image lock are covered by the capsule and installer.
          (cd dist/bin && rm -f SHA256SUMS && sha256sum -- * > SHA256SUMS)

      - name: Install Syft
        shell: bash
        run: |
          set -euo pipefail
          : "${SYFT_VERSION:?}"
          : "${SYFT_LINUX_AMD64_SHA256:?}"
          mkdir -p "${HOME}/.local/bin" /tmp/registry-stack-tools
          syft_version="${SYFT_VERSION#v}"
          curl -sSfL \
            "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${syft_version}_linux_amd64.tar.gz" \
            -o /tmp/registry-stack-tools/syft.tar.gz
          echo "${SYFT_LINUX_AMD64_SHA256}  /tmp/registry-stack-tools/syft.tar.gz" | sha256sum -c -
          tar -xzf /tmp/registry-stack-tools/syft.tar.gz -C "${HOME}/.local/bin" syft
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Generate release file SBOMs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/binary-sbom
          while IFS= read -r -d '' release_file; do
            asset="$(basename "${release_file}")"
            sbom="dist/binary-sbom/${asset}.spdx.json"
            syft "file:${release_file}" -o "spdx-json=${sbom}"
            digest="$(sha256sum "${release_file}" | awk '{print $1}')"
            release/scripts/registry-release bind-spdx-file-subject \
              "${sbom}" \
              --file-name "${asset}" \
              --sha256 "${digest}"
          done < <(find dist/bin -maxdepth 1 -type f ! -name SHA256SUMS -print0 | sort -z)

      - name: Render release capsule
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release-capsule
          release/scripts/registry-release render-capsule \
            "${{ needs.verify.outputs.manifest }}" \
            --tag "${{ needs.verify.outputs.tag }}" \
            --version "${{ needs.verify.outputs.version }}" \
            --binary-dir dist/bin \
            --binary-sbom-dir dist/binary-sbom \
            --image-evidence-dir dist/image-evidence \
            --output-json "dist/release-capsule/registry-stack-${{ needs.verify.outputs.tag }}-release-capsule.json" \
            --output-markdown "dist/release-capsule/registry-stack-${{ needs.verify.outputs.tag }}-release-capsule.md" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --default-branch-protection unverified \
            --repo . \
            --default-branch origin/main \
            --require-registryctl-image-lock

      - name: Generate provenance subjects
        id: provenance-subjects
        shell: bash
        run: |
          set -euo pipefail
          subjects="$(mktemp)"
          while IFS= read -r -d '' file; do
            digest="$(sha256sum "${file}" | awk '{print $1}')"
            printf '%s  %s\n' "${digest}" "$(basename "${file}")" >> "${subjects}"
          done < <(find dist/bin dist/binary-sbom dist/image-evidence dist/release-capsule -type f -print0 | sort -z)
          if [[ ! -s "${subjects}" ]]; then
            echo "No release artifacts found for provenance" >&2
            exit 1
          fi
          echo "base64_subjects=$(base64 -w0 "${subjects}")" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign release artifacts (keyless)
        shell: bash
        run: |
          set -euo pipefail
          # Capture the asset list BEFORE signing so signatures are never re-signed.
          # Writing .sig/.pem into the same dist/ dirs keeps the downstream
          # "Reconcile release assets" guard satisfied (expected == actual).
          mapfile -d '' -t files < <(find dist/bin dist/binary-sbom dist/image-evidence dist/release-capsule -type f -print0 | sort -z)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No artifacts to sign" >&2
            exit 1
          fi
          for f in "${files[@]}"; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done
          echo "Signed ${#files[@]} release artifacts with keyless cosign (.sig + .pem)."

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          notes="release/notes/${tag}.md"
          mapfile -d '' -t assets < <(find dist/bin dist/binary-sbom dist/image-evidence dist/release-capsule -type f -print0 | sort -z)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" \
              --title "RegistryStack ${tag}" \
              --notes-file "${notes}" \
              --prerelease \
              "${assets[@]}"
          fi

      - name: Reconcile release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          tmp="$(mktemp -d)"
          find dist/bin dist/binary-sbom dist/image-evidence dist/release-capsule -type f -print0 \
            | xargs -0 -n1 basename \
            | sort > "${tmp}/expected-assets"
          provenance_asset="registry-stack-${tag}-release-provenance.intoto.jsonl"
          evidence_asset="registry-stack-${tag}-release-evidence.json"
          closeout_asset="registry-stack-${tag}-release-closeout.md"
          evidence_provenance="registry-stack-${tag}-release-evidence-provenance.intoto.jsonl"
          gh release view "${tag}" --json assets --jq '.assets[].name' \
            | awk \
                -v provenance_asset="${provenance_asset}" \
                -v evidence_asset="${evidence_asset}" \
                -v closeout_asset="${closeout_asset}" \
                -v evidence_provenance="${evidence_provenance}" \
                '$0 != provenance_asset &&
                 $0 != evidence_asset && $0 != evidence_asset ".sig" && $0 != evidence_asset ".pem" &&
                 $0 != closeout_asset && $0 != closeout_asset ".sig" && $0 != closeout_asset ".pem" &&
                 $0 != evidence_provenance { print }' \
            | sort > "${tmp}/actual-assets"
          if ! diff -u "${tmp}/expected-assets" "${tmp}/actual-assets"; then
            echo "GitHub Release assets differ from generated assets" >&2
            exit 1
          fi
          while IFS= read -r asset; do
            local_path="$(find dist/bin dist/binary-sbom dist/image-evidence dist/release-capsule -type f -name "${asset}" -print -quit)"
            gh release download "${tag}" --pattern "${asset}" --dir "${tmp}/downloaded" --clobber
            expected="$(sha256sum "${local_path}" | awk '{print $1}')"
            actual="$(sha256sum "${tmp}/downloaded/${asset}" | awk '{print $1}')"
            if [[ "${expected}" != "${actual}" ]]; then
              echo "GitHub Release asset ${asset} sha256 mismatch" >&2
              exit 1
            fi
          done < "${tmp}/expected-assets"

  release-provenance:
    name: Generate release provenance
    needs:
      - verify
      - github-release
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      actions: read # read workflow metadata for SLSA provenance
      id-token: write # sign provenance with GitHub OIDC
      contents: write # upload provenance to the GitHub Release
    # The SLSA generator must be referenced by a release tag so it can resolve
    # the matching builder binary and builder identity.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.github-release.outputs.provenance_subjects }}
      upload-assets: true
      upload-tag-name: ${{ needs.verify.outputs.tag }}
      provenance-name: registry-stack-${{ needs.verify.outputs.tag }}-release-provenance.intoto.jsonl

  verify-release-provenance:
    name: Verify release provenance asset
    needs:
      - verify
      - release-provenance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check provenance release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          asset="registry-stack-${tag}-release-provenance.intoto.jsonl"
          for _ in {1..6}; do
            if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' \
              | grep -Fx "${asset}" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "GitHub Release asset ${asset} was not found" >&2
          exit 1

  verify-published-release:
    name: Verify published release as a consumer
    needs:
      - verify
      - release-provenance
      - verify-release-provenance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Assert clean verifier checkout
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force origin \
            "refs/heads/main:refs/remotes/origin/main" \
            "refs/tags/${{ needs.verify.outputs.tag }}:refs/tags/${{ needs.verify.outputs.tag }}"
          test "$(git rev-parse HEAD)" = "${{ needs.verify.outputs.tag_target }}"
          test -z "$(git status --short)"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install pinned SLSA verifier
        shell: bash
        run: |
          set -euo pipefail
          : "${SLSA_VERIFIER_VERSION:?}"
          : "${SLSA_VERIFIER_LINUX_AMD64_SHA256:?}"
          tool_dir="${RUNNER_TEMP}/registry-stack-verifier-tools"
          mkdir -p "${tool_dir}"
          curl -sSfL \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/${SLSA_VERIFIER_VERSION}/slsa-verifier-linux-amd64" \
            -o "${tool_dir}/slsa-verifier"
          echo "${SLSA_VERIFIER_LINUX_AMD64_SHA256}  ${tool_dir}/slsa-verifier" | sha256sum -c -
          chmod 0755 "${tool_dir}/slsa-verifier"
          echo "${tool_dir}" >> "${GITHUB_PATH}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Verify exact public release contract
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release-verification
          release/scripts/registry-release verify-published \
            "${{ needs.verify.outputs.manifest }}" \
            --repo-root . \
            --output-json "dist/release-verification/registry-stack-${{ needs.verify.outputs.tag }}-post-publication-verification.json"

      - name: Upload normalized verification result
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-post-publication-verification
          path: dist/release-verification/*.json
          if-no-files-found: error

  release-evidence:
    name: Publish release evidence bundle
    needs:
      - verify
      - verify-published-release
    runs-on: ubuntu-24.04
    outputs:
      provenance_subjects: ${{ steps.provenance-subjects.outputs.base64_subjects }}
    permissions:
      contents: write
      id-token: write # keyless cosign signing via OIDC
    steps:
      - name: Checkout immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Download normalized verification result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: registry-stack-post-publication-verification
          path: dist/release-verification

      - name: Download exact pre-evidence release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets
          PYTHONPATH=release/scripts python3 - "${{ needs.verify.outputs.manifest }}" > "${RUNNER_TEMP}/pre-evidence-assets" <<'PY'
          import sys
          from pathlib import Path
          from verify_published_release import expected_asset_contract, load_release_identity

          identity = load_release_identity(Path(sys.argv[1]))
          for name in expected_asset_contract(identity).all_assets:
              print(name)
          PY
          while IFS= read -r asset; do
            gh release download "${{ needs.verify.outputs.tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${asset}" \
              --dir dist/release-assets \
              --clobber
          done < "${RUNNER_TEMP}/pre-evidence-assets"
          test "$(find dist/release-assets -maxdepth 1 -type f | wc -l)" -eq 106

      - name: Collect and render public release evidence
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          mkdir -p dist/release-evidence
          release/scripts/registry-release collect-evidence-bundle \
            --manifest "${{ needs.verify.outputs.manifest }}" \
            --capsule "dist/release-assets/registry-stack-${tag}-release-capsule.json" \
            --verification-result "dist/release-verification/registry-stack-${tag}-post-publication-verification.json" \
            --asset-dir dist/release-assets \
            --output-json "dist/release-evidence/registry-stack-${tag}-release-evidence.json"
          release/scripts/registry-release render-release-closeout \
            --bundle "dist/release-evidence/registry-stack-${tag}-release-evidence.json" \
            --output-markdown "dist/release-evidence/registry-stack-${tag}-release-closeout.md"

      - name: Generate evidence provenance subjects
        id: provenance-subjects
        shell: bash
        run: |
          set -euo pipefail
          subjects="$(mktemp)"
          while IFS= read -r -d '' file; do
            printf '%s  %s\n' \
              "$(sha256sum "${file}" | awk '{print $1}')" \
              "$(basename "${file}")" >> "${subjects}"
          done < <(find dist/release-evidence -maxdepth 1 -type f -print0 | sort -z)
          test "$(wc -l < "${subjects}")" -eq 2
          echo "base64_subjects=$(base64 -w0 "${subjects}")" >> "${GITHUB_OUTPUT}"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign public release evidence
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' -t files < <(find dist/release-evidence -maxdepth 1 -type f -print0 | sort -z)
          test "${#files[@]}" -eq 2
          for file in "${files[@]}"; do
            cosign sign-blob --yes \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem" \
              "${file}"
          done

      - name: Upload public release evidence
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' -t assets < <(find dist/release-evidence -maxdepth 1 -type f -print0 | sort -z)
          test "${#assets[@]}" -eq 6
          gh release upload "${{ needs.verify.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "${assets[@]}"

  release-evidence-provenance:
    name: Generate release evidence provenance
    needs:
      - verify
      - release-evidence
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      actions: read # read workflow metadata for SLSA provenance
      id-token: write # sign provenance with GitHub OIDC
      contents: write # upload provenance to the GitHub Release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release-evidence.outputs.provenance_subjects }}
      upload-assets: true
      upload-tag-name: ${{ needs.verify.outputs.tag }}
      provenance-name: registry-stack-${{ needs.verify.outputs.tag }}-release-evidence-provenance.intoto.jsonl

  verify-release-evidence:
    name: Verify published release evidence
    needs:
      - verify
      - release-evidence-provenance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout immutable release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ needs.verify.outputs.tag_target }}
          fetch-depth: 0
          submodules: false

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install pinned SLSA verifier
        shell: bash
        run: |
          set -euo pipefail
          tool_dir="${RUNNER_TEMP}/registry-stack-verifier-tools"
          mkdir -p "${tool_dir}"
          curl -sSfL \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/${SLSA_VERIFIER_VERSION}/slsa-verifier-linux-amd64" \
            -o "${tool_dir}/slsa-verifier"
          echo "${SLSA_VERIFIER_LINUX_AMD64_SHA256}  ${tool_dir}/slsa-verifier" | sha256sum -c -
          chmod 0755 "${tool_dir}/slsa-verifier"
          echo "${tool_dir}" >> "${GITHUB_PATH}"

      - name: Verify exact final evidence assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.verify.outputs.tag }}"
          evidence="registry-stack-${tag}-release-evidence.json"
          closeout="registry-stack-${tag}-release-closeout.md"
          provenance="registry-stack-${tag}-release-evidence-provenance.intoto.jsonl"
          mkdir -p dist/release-evidence
          PYTHONPATH=release/scripts python3 - "${{ needs.verify.outputs.manifest }}" > "${RUNNER_TEMP}/expected-final-assets" <<'PY'
          import sys
          from pathlib import Path
          from verify_published_release import (
              expected_asset_contract,
              expected_finalization_assets,
              load_release_identity,
          )

          identity = load_release_identity(Path(sys.argv[1]))
          names = set(expected_asset_contract(identity).all_assets)
          names.update(expected_finalization_assets(identity))
          for name in sorted(names):
              print(name)
          PY
          gh release view "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq '.assets[].name' \
            | sort > "${RUNNER_TEMP}/actual-final-assets"
          diff -u "${RUNNER_TEMP}/expected-final-assets" "${RUNNER_TEMP}/actual-final-assets"
          for asset in \
            "${evidence}" "${evidence}.sig" "${evidence}.pem" \
            "${closeout}" "${closeout}.sig" "${closeout}.pem" \
            "${provenance}"; do
            gh release download "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${asset}" \
              --dir dist/release-evidence \
              --clobber
          done
          test "$(find dist/release-evidence -maxdepth 1 -type f | wc -l)" -eq 7
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@refs/tags/${tag}"
          for payload in "${evidence}" "${closeout}"; do
            cosign verify-blob "dist/release-evidence/${payload}" \
              --signature "dist/release-evidence/${payload}.sig" \
              --certificate "dist/release-evidence/${payload}.pem" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity "${identity}"
            slsa-verifier verify-artifact "dist/release-evidence/${payload}" \
              --provenance-path "dist/release-evidence/${provenance}" \
              --source-uri "github.com/${GITHUB_REPOSITORY}" \
              --source-tag "${tag}"
          done
          PYTHONPATH=release/scripts python3 - "dist/release-evidence" "${evidence}" "${closeout}" "${provenance}" <<'PY'
          import sys
          from pathlib import Path
          from verify_published_release import AssetContract, verify_provenance_subjects

          verify_provenance_subjects(
              Path(sys.argv[1]),
              AssetContract((sys.argv[2], sys.argv[3]), (), (), sys.argv[4]),
          )
          PY

  release-telemetry:
    name: Record release workflow telemetry
    needs:
      - verify
      - binaries
      - registryctl-extra-binaries
      - images
      - github-release
      - release-provenance
      - verify-release-provenance
      - verify-published-release
      - release-evidence
      - release-evidence-provenance
      - verify-release-evidence
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
    steps:
      - name: Collect workflow duration and runner occupancy
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release-telemetry
          run_json="$(mktemp)"
          jobs_json="$(mktemp)"
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" > "${run_json}"
          gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100" > "${jobs_json}"
          collected_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n \
            --slurpfile run "${run_json}" \
            --slurpfile job_page "${jobs_json}" \
            --arg collected_at "${collected_at}" \
            '
              ($run[0]) as $workflow |
              ($job_page[0].jobs) as $jobs |
              ($collected_at | fromdateiso8601) as $collected_epoch |
              ([
                $jobs[] |
                select(.started_at != null and .completed_at != null) |
                ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601))
              ] | add // 0) as $runner_seconds |
              {
                schema_version: "registry-stack.release-workflow-telemetry.v1",
                workflow: {
                  id: ($workflow.id | tostring),
                  run_attempt: ($workflow.run_attempt | tostring),
                  event: $workflow.event,
                  head_sha: $workflow.head_sha,
                  created_at: $workflow.created_at,
                  collected_at: $collected_at,
                  elapsed_to_collector_seconds:
                    ($collected_epoch - ($workflow.created_at | fromdateiso8601))
                },
                jobs: [
                  $jobs[] | {
                    id: (.id | tostring),
                    name,
                    conclusion,
                    started_at,
                    completed_at,
                    duration_seconds:
                      (if .started_at != null and .completed_at != null
                       then ((.completed_at | fromdateiso8601) - (.started_at | fromdateiso8601))
                       else null
                       end)
                  }
                ],
                completed_job_count: ([$jobs[] | select(.completed_at != null)] | length),
                incomplete_job_count: ([$jobs[] | select(.completed_at == null)] | length),
                completed_runner_seconds: $runner_seconds,
                completed_runner_minutes: ($runner_seconds / 60),
                warnings:
                  (if any($jobs[]; .completed_at == null)
                   then ["The collector job and any still-running jobs are excluded from completed runner occupancy."]
                   else []
                   end)
              }
            ' > dist/release-telemetry/workflow.json
          jq -r '
            "### Release workflow telemetry\n\n" +
            "- Elapsed to collector: \(.workflow.elapsed_to_collector_seconds) seconds\n" +
            "- Completed runner occupancy: \(.completed_runner_minutes) minutes\n" +
            "- Completed jobs: \(.completed_job_count)"
          ' dist/release-telemetry/workflow.json >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload workflow telemetry
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: registry-stack-release-workflow-telemetry
          path: dist/release-telemetry/workflow.json
          if-no-files-found: error
