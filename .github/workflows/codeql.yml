name: CodeQL

# Static analysis (SAST) for the interpreted languages in the monorepo.
# Rust is covered separately by the per-crate semgrep configs; CodeQL has no
# stable Rust analyzer yet. Adding this satisfies the OpenSSF Scorecard SAST
# check and surfaces real issues in the docs site, node bindings, and Python
# sidecars.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release/1.0]
  schedule:
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          category: "/language:${{ matrix.language }}"
