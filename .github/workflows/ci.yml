name: RegistryStack CI

on:
  pull_request:
    branches:
      - main
      - release/1.0
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('run-{0}', github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_FUZZ_VERSION: "0.13.2"
  CARGO_LLVM_COV_VERSION: "0.8.7"
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  OASDIFF_VERSION: "1.23.0"
  OASDIFF_LINUX_X64_SHA256: "972b10535c3db4366b9dc3ebc11ca021279af3095267c3cffdca854a3a3c4f89"

jobs:
  changes:
    name: Changed paths
    runs-on: ubuntu-24.04
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      platform: ${{ steps.filter.outputs.platform }}
      platform_hygiene: ${{ steps.filter.outputs.platform_hygiene }}
      release_tool: ${{ steps.filter.outputs.release_tool }}
      release_source_proof: ${{ steps.filter.outputs.release_source_proof }}
      docs: ${{ steps.filter.outputs.docs }}
      editors: ${{ steps.filter.outputs.editors }}
      registryctl_tutorial: ${{ steps.filter.outputs.registryctl_tutorial }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Classify changed paths
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          rust=false
          platform=false
          platform_hygiene=false
          release_tool=false
          release_source_proof=false
          docs=false
          editors=false
          registryctl_tutorial=false
          all=false

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${GITHUB_SHA}"
            if [[ "${base}" =~ ^0+$ ]]; then
              base="$(git rev-parse "${head}^" 2>/dev/null || true)"
            fi
          fi

          mark_all() {
            rust=true
            platform=true
            platform_hygiene=true
            release_tool=true
            release_source_proof=true
            docs=true
            editors=true
            registryctl_tutorial=true
          }

          changed_files="${RUNNER_TEMP}/registry-stack-changed-files"
          if [[ -z "${base}" ]] ||
             ! git cat-file -e "${base}^{commit}" 2>/dev/null ||
             ! git cat-file -e "${head}^{commit}" 2>/dev/null; then
            all=true
          else
            git diff --name-only -z "${base}" "${head}" > "${changed_files}"
          fi

          if [[ "${all}" == "true" ]]; then
            mark_all
          else
            while IFS= read -r -d '' path; do
              case "${path}" in
                .github/workflows/ci.yml)
                  mark_all
                  ;;
                .github/workflows/release.yml)
                  release_tool=true
                  release_source_proof=true
                  ;;
                .github/workflows/*)
                  mark_all
                  ;;
              esac
              case "${path}" in
                Cargo.toml|Cargo.lock|deny.toml|rust-toolchain*|crates/*|products/*)
                  rust=true
                  ;;
                docs/site/src/data/relay-support.yaml|docs/site/src/data/generated/relay-support.json)
                  rust=true
                  ;;
              esac
              case "${path}" in
                Cargo.toml|Cargo.lock|clippy.toml|deny.toml|rustfmt.toml|rust-toolchain*|crates/registry-config-report/*|crates/registry-platform-*|products/platform/Cargo.toml|products/platform/fuzz/*|products/platform/rust-toolchain.toml)
                  platform=true
                  ;;
              esac
              case "${path}" in
                clippy.toml|deny.toml|rustfmt.toml|crates/registry-relay/clippy.toml|crates/registry-relay/deny.toml|crates/registry-relay/rustfmt.toml|crates/registry-relay/config/*|crates/registry-relay/demo/config/*|crates/registry-relay/perf/config/*|crates/registry-relay/profiles/*|crates/registry-relay/tests/fixtures/config/*|products/platform/clippy.toml|products/platform/deny.toml|products/platform/rustfmt.toml|products/platform/scripts/*|products/platform/templates/*)
                  platform_hygiene=true
                  ;;
              esac
              case "${path}" in
                release/*)
                  release_tool=true
                  ;;
                docs/site/src/content/docs/reference/errors.mdx)
                  release_tool=true
                  ;;
              esac
              case "${path}" in
                Cargo.toml|Cargo.lock|release/scripts/check-release-source-model.sh|release/scripts/test_check_release_source_model.py|release/manifests/*)
                  release_source_proof=true
                  ;;
              esac
              case "${path}" in
                docs/site/*|crates/registry-relay/docs/*|crates/registry-relay/openapi/*|products/notary/docs/*|products/notary/openapi/*|products/manifest/docs/*)
                  docs=true
                  ;;
              esac
              case "${path}" in
                editors/*)
                  editors=true
                  ;;
              esac
              case "${path}" in
                Cargo.toml|Cargo.lock|rust-toolchain*|LICENSE|docs/site/package.json|docs/site/package-lock.json|docs/site/scripts/check-registryctl-tutorials.sh|docs/site/scripts/registryctl-tutorial.*|docs/site/src/content/docs/tutorials/publish-spreadsheet-secured-registry-api.mdx|docs/site/src/content/docs/tutorials/verify-claim-registry-api.mdx|crates/registry-config-report/*|crates/registry-manifest-*/*|crates/registry-notary/*|crates/registry-notary-*/*|crates/registry-platform-*/*|crates/registry-relay/*|crates/registryctl/*|products/notary/*|release/docker/Dockerfile.registry-notary|release/docker/Dockerfile.registry-relay)
                  registryctl_tutorial=true
                  ;;
              esac
            done < "${changed_files}"
          fi

          {
            echo "rust=${rust}"
            echo "platform=${platform}"
            echo "platform_hygiene=${platform_hygiene}"
            echo "release_tool=${release_tool}"
            echo "release_source_proof=${release_source_proof}"
            echo "docs=${docs}"
            echo "editors=${editors}"
            echo "registryctl_tutorial=${registryctl_tutorial}"
          } >> "${GITHUB_OUTPUT}"

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Install pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          curl --fail --silent --show-error --location \
            --output "${RUNNER_TEMP}/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${RUNNER_TEMP}/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/gitleaks.tar.gz" -C "${RUNNER_TEMP}/bin" gitleaks
          chmod +x "${RUNNER_TEMP}/bin/gitleaks"

      - name: Scan tracked source for secrets
        run: >-
          "${RUNNER_TEMP}/bin/gitleaks" dir
          --config .gitleaks.toml
          --no-banner
          --redact
          --timeout 120
          .

  platform-quality:
    name: Platform all-features
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: false

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: platform-all-features

      - name: Build platform crates with all features
        run: cargo build --locked -p registry-config-report -p 'registry-platform-*' --all-targets --all-features

      - name: Lint platform crates with all features
        run: cargo clippy --locked -p registry-config-report -p 'registry-platform-*' --all-targets --all-features -- -D warnings

      - name: Test platform crates with all features
        run: cargo test --locked -p registry-config-report -p 'registry-platform-*' --all-targets --all-features

  platform-coverage:
    name: Platform line coverage
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: false

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: platform-coverage

      - name: Install pinned coverage tool
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-llvm-cov@${{ env.CARGO_LLVM_COV_VERSION }}

      - name: Enforce platform line coverage
        run: >-
          cargo llvm-cov --locked
          -p registry-config-report
          -p 'registry-platform-*'
          --all-features
          --fail-under-lines 80

  platform-hygiene:
    name: Platform hygiene and config inventory
    needs: changes
    if: needs.changes.outputs.platform_hygiene == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: false

      - name: Check shared Rust hygiene files
        run: products/platform/scripts/check-hygiene-alignment.sh

      - name: Audit monorepo config roots
        run: >-
          products/platform/scripts/audit-configs.sh
          --check
          --format paths
          > "${RUNNER_TEMP}/registry-config-inventory.txt"

  platform-fuzz:
    name: Platform fuzz smoke (${{ matrix.target }})
    needs: changes
    if: needs.changes.outputs.platform == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target:
          - authcommon_parsers
          - oid4vci_request_and_proof
          - sdjwt_holder_proof
          - sdjwt_issuance
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          submodules: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: platform-fuzz-${{ matrix.target }}

      - name: Install pinned cargo-fuzz
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-fuzz@${{ env.CARGO_FUZZ_VERSION }}

      - name: Smoke fuzz target
        working-directory: products/platform
        run: |
          set -euo pipefail
          mkdir -p "fuzz/artifacts/${{ matrix.target }}"
          cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu "${{ matrix.target }}" -- \
            -max_total_time=60 \
            -rss_limit_mb=1024 \
            -artifact_prefix="fuzz/artifacts/${{ matrix.target }}/" \
            -print_final_stats=1

      - name: Upload fuzz failures
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: platform-fuzz-${{ matrix.target }}
          path: products/platform/fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore

  rust:
    name: Rust workspace
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-24.04
    env:
      # Keep the full workspace gate below the hosted runner disk limit.
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-targets: false

      - name: Install cargo-deny and just
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09 # v2.81.3
        with:
          tool: cargo-deny@0.19.8,just@1.51.0

      - name: Install pinned oasdiff
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          curl --fail --silent --show-error --location \
            --output "${RUNNER_TEMP}/oasdiff.tar.gz" \
            "https://github.com/oasdiff/oasdiff/releases/download/v${OASDIFF_VERSION}/oasdiff_${OASDIFF_VERSION}_linux_amd64.tar.gz"
          echo "${OASDIFF_LINUX_X64_SHA256}  ${RUNNER_TEMP}/oasdiff.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/oasdiff.tar.gz" -C "${RUNNER_TEMP}/bin" oasdiff
          chmod +x "${RUNNER_TEMP}/bin/oasdiff"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Cargo metadata
        run: cargo metadata --locked --format-version 1 >/tmp/registry-stack-cargo-metadata.json

      - name: Validate Manifest profiles
        working-directory: products/manifest
        run: cargo run --locked -p registry-manifest-cli -- validate-profiles profiles

      - name: Gate inventory
        run: python3 release/scripts/check-gates-inventory.py

      - name: Test gate inventory
        run: python3 -m unittest release/scripts/test_check_gates_inventory.py

      - name: Test stable surface compatibility checker
        run: python3 -m unittest release/scripts/test_check_stable_surface_compatibility.py

      - name: Stable surface compatibility
        env:
          STABLE_SURFACE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python3 release/scripts/check-stable-surface-compatibility.py

      - name: Format
        run: cargo fmt --check

      - name: Workspace check
        run: cargo check --locked --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Reclaim build space before tests
        run: cargo clean

      - name: Workspace tests
        run: cargo test --locked --workspace

      - name: Relay all-features tests
        run: cargo test --locked -p registry-relay --all-features

      - name: Cargo deny
        run: cargo deny check

      - name: Notary OpenAPI baseline
        working-directory: products/notary
        run: just openapi-check

      - name: Notary OpenAPI contract
        working-directory: products/notary
        env:
          OPENAPI_CONTRACT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: just openapi-contract

      - name: Notary exposure check
        working-directory: products/notary
        run: just exposure-check

      - name: Relay OpenAPI contract
        working-directory: crates/registry-relay
        env:
          OPENAPI_CONTRACT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: just openapi-contract

      - name: Relay exposure check
        working-directory: crates/registry-relay
        run: just exposure-check

      - name: Notary PostgreSQL 16, 17, and 18 conformance
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked -p registry-notary --features registry-notary-cel
          for postgresql_major in 16 17 18; do
            products/notary/scripts/postgresql-conformance.sh "${postgresql_major}"
          done

  project-authoring-determinism:
    name: Project authoring portability and determinism (${{ matrix.arch }})
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64-linux
            expected_uname: x86_64
          - runner: macos-14
            arch: aarch64-macos
            expected_uname: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Assert native architecture
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -m)" = "${{ matrix.expected_uname }}"

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: project-authoring-${{ matrix.arch }}

      - name: Verify cross-machine project inputs
        run: >-
          cargo test --locked -p registryctl --test project_authoring
          check_and_build_produce_deterministic_product_inputs -- --exact

      - name: Verify offline Script authoring and compilation
        env:
          CARGO_NET_OFFLINE: "true"
        run: >-
          cargo test --locked -p registryctl --test project_authoring
          project_authoring_rhai_commands_are_portable_offline -- --exact

  release-tool:
    name: Release tooling
    needs: changes
    if: needs.changes.outputs.release_tool == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Test release helper
        run: python3 -m unittest release/scripts/test_registry_release.py

      - name: Test release planning commands
        run: python3 -m unittest release/scripts/test_registry_release_plans.py

      - name: Test release image OCI label checker
        run: python3 -m unittest release/scripts/test_check_release_image_oci_labels.py

      - name: Test release image layout comparator
        run: python3 -m unittest release/scripts/test_compare_release_image_layouts.py

      - name: Test release Relay feature checker
        run: python3 -m unittest release/scripts/test_check_release_relay_features.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
        with:
          version: v0.33.0
          driver-opts: image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Smoke release image OCI labels
        run: release/scripts/smoke-release-image-oci-labels.sh

      - name: Test OpenID conformance runner
        run: python3 -m unittest release/scripts/test_openid_conformance_runner.py

      - name: Test external integration evidence runner
        run: python3 -m unittest release/scripts/test_integration_e2_runner.py

      - name: Validate external integration evidence packet
        run: python3 release/scripts/integration-e2-runner.py validate

      - name: Test Relay OIDC smoke
        run: python3 -m unittest release/scripts/test_relay_oidc_smoke.py

      - name: Validate Relay OIDC smoke assets
        run: python3 release/scripts/relay-oidc-smoke.py validate

      - name: Gate inventory
        run: python3 release/scripts/check-gates-inventory.py

      - name: Test gate inventory
        run: python3 -m unittest release/scripts/test_check_gates_inventory.py

      - name: Test stable surface compatibility checker
        run: python3 -m unittest release/scripts/test_check_stable_surface_compatibility.py

      - name: Test Relay OpenAPI stability filter
        run: python3 -m unittest release/scripts/test_filter_relay_openapi_stability.py

      - name: Test upgrade exercise validator
        run: python3 -m unittest release/scripts/test_validate_upgrade_exercise.py

      - name: Validate upgrade exercise template
        run: >-
          python3 release/scripts/validate-upgrade-exercise.py --template
          release/exercises/upgrade-exercise-v1.template.json

      - name: Stable surface compatibility
        env:
          STABLE_SURFACE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python3 release/scripts/check-stable-surface-compatibility.py

      - name: Validate release manifest
        shell: bash
        run: |
          set -euo pipefail
          for manifest in release/manifests/registry-stack-*.yaml; do
            release/scripts/registry-release validate "${manifest}"
          done

      - name: Validate release docsets
        run: release/scripts/registry-release validate-docsets

      - name: Audit import map
        run: release/scripts/registry-release audit release/manifests/import-map-2026-06-24.yaml

  release-source-proof:
    name: Release source proof
    needs: changes
    if: needs.changes.outputs.release_source_proof == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Check monorepo source model
        run: REGISTRY_RELEASE_SOURCE_MODE=monorepo release/scripts/check-release-source-model.sh

      - name: Test source model checker
        run: python3 -m unittest release/scripts/test_check_release_source_model.py

  registryctl-tutorials:
    name: registryctl tutorials from source
    needs: changes
    if: needs.changes.outputs.registryctl_tutorial == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Assert amd64 runner
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "x86_64" ]]

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Test registryctl tutorial helpers
        working-directory: docs/site
        run: npm run test:tutorial:registryctl

      - name: Check tutorial command counts
        working-directory: docs/site
        run: npm run check:tutorial:dry-run

      - name: Cache source-under-test Cargo build
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8
        with:
          path: |
            target/registryctl-tutorial-cargo-home
            target/registryctl-tutorial-linux-amd64
          key: registryctl-tutorial-${{ runner.os }}-rust-1.95.0-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            registryctl-tutorial-${{ runner.os }}-rust-1.95.0-

      - name: Execute registryctl tutorials from source
        working-directory: docs/site
        run: npm run check:tutorial:registryctl

  docs:
    name: Docs
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: docs/site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs/site
        run: npm ci

      - name: Test docs scripts
        working-directory: docs/site
        run: npm test

      - name: Check docs build
        working-directory: docs/site
        run: npm run check

  editor-extensions:
    name: Editor extensions
    needs: changes
    if: needs.changes.outputs.editors == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Test editor installer
        run: bash editors/tests/install_test.sh

      - name: Package and test VS Code integration
        working-directory: editors/vscode
        run: |
          npm ci
          npm run package:dev
          cargo build --locked -p registry-language-server
          xvfb-run -a npm test
          cmp ../../LICENSE LICENSE

      - name: Install Zed extension target
        run: rustup target add wasm32-wasip2

      - name: Check Zed extension
        run: |
          cargo check --locked --target wasm32-wasip2 --manifest-path editors/zed/Cargo.toml
          cmp LICENSE editors/zed/LICENSE
