name: Nightly Security

on:
  schedule:
    - cron: "41 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_FUZZ_VERSION: "0.13.2"
  CARGO_TERM_COLOR: always

jobs:
  changes:
    name: Changed security surfaces
    runs-on: ubuntu-24.04
    outputs:
      run: ${{ steps.classify.outputs.run }}
      head_sha: ${{ steps.classify.outputs.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: false

      - name: Restore last successful nightly state
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nightly-security-state
          key: nightly-security-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            nightly-security-state-

      - name: Classify changed paths
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          head_sha="$(git rev-parse HEAD)"
          run=false

          changed_files="${RUNNER_TEMP}/registry-stack-nightly-security-files"
          : > "${changed_files}"

          is_relevant_path() {
            local path="$1"
            case "${path}" in
              .github/workflows/*|.github/dependabot.yml)
                return 0
                ;;
              Cargo.toml|Cargo.lock|deny.toml|rust-toolchain*)
                return 0
                ;;
              crates/registry-relay/*|crates/registry-notary*/*)
                return 0
                ;;
              crates/registry-platform-authcommon/*|crates/registry-platform-crypto/*)
                return 0
                ;;
              crates/registry-platform-cache/*|crates/registry-platform-oid4vci/*|crates/registry-platform-replay/*|crates/registry-platform-sdjwt/*)
                return 0
                ;;
              crates/registry-manifest-core/*|crates/registry-manifest-cli/*)
                return 0
                ;;
              products/notary/*|products/platform/*|products/manifest/*|release/docker/*)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            run=true
          elif [[ ! -f .nightly-security-state/last-success-sha ]]; then
            run=true
          else
            base_sha="$(tr -d '[:space:]' < .nightly-security-state/last-success-sha)"
            if [[ -z "${base_sha}" ]] ||
               ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              run=true
            elif [[ "${base_sha}" != "${head_sha}" ]]; then
              git diff --name-only -z "${base_sha}" "${head_sha}" > "${changed_files}"
              while IFS= read -r -d '' path; do
                if is_relevant_path "${path}"; then
                  run=true
                  break
                fi
              done < "${changed_files}"
            fi
          fi

          {
            echo "run=${run}"
            echo "head_sha=${head_sha}"
          } >> "${GITHUB_OUTPUT}"

  assurance:
    name: Security assurance manifests
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          submodules: false

      - name: Test assurance ratchets
        run: |
          python3 -m unittest \
            crates/registry-relay/tests/security_assurance_check_test.py \
            crates/registry-relay/tests/advisory_baseline_check_test.py \
            products/notary/tests/security_assurance_check_test.py \
            products/notary/tests/advisory_baseline_check_test.py

      - name: Relay exposure and container checks
        working-directory: crates/registry-relay
        run: |
          python3 scripts/check_security_assurance.py manifest
          python3 scripts/check_security_assurance.py dockerfile-secrets
          python3 scripts/check_security_assurance.py openapi-strategy

      - name: Notary container and OpenAPI checks
        working-directory: products/notary
        run: |
          python3 scripts/check_security_assurance.py manifest
          python3 scripts/check_security_assurance.py dockerfile-secrets
          python3 scripts/check_security_assurance.py openapi-baseline

      - name: Release image Dockerfile checks
        run: |
          python3 - <<'PY'
          import re
          import sys
          from pathlib import Path

          secret_copy_re = re.compile(
              r"\b(?:COPY|ADD)\b(?=.*(?:\.env|\.pem|\.key|\.p12|jwk|secret|credential))|\"d\"\s*:",
              re.IGNORECASE,
          )
          paths = sorted(Path("release/docker").glob("Dockerfile.registry-*"))
          if not paths:
              print("security assurance check failed: no release Dockerfiles found", file=sys.stderr)
              sys.exit(1)
          for path in paths:
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  if secret_copy_re.search(line):
                      print(
                          f"security assurance check failed: {path}:{lineno} may copy secret or private JWK material",
                          file=sys.stderr,
                      )
                      sys.exit(1)
          PY

  notary-fuzz:
    name: Notary fuzz smoke
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          submodules: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-fuzz@${{ env.CARGO_FUZZ_VERSION }}

      - name: Run notary fuzz smoke
        working-directory: products/notary
        run: |
          set -euo pipefail
          for target in \
            core_request_bodies \
            rhai_source_adapter \
            sidecar_config_manifest
          do
            mkdir -p "fuzz/artifacts/${target}"
            cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu "${target}" -- \
              -max_total_time=60 \
              -rss_limit_mb=1024 \
              -artifact_prefix="fuzz/artifacts/${target}/" \
              -print_final_stats=1
          done

      - name: Upload notary fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-notary-fuzz-artifacts
          path: products/notary/fuzz/artifacts
          if-no-files-found: ignore

  platform-fuzz:
    name: Platform fuzz smoke
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          submodules: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-fuzz@${{ env.CARGO_FUZZ_VERSION }}

      - name: Run parser and credential fuzz smoke
        working-directory: products/platform
        run: |
          set -euo pipefail
          for target in \
            authcommon_parsers \
            oid4vci_request_and_proof \
            sdjwt_holder_proof \
            sdjwt_issuance
          do
            mkdir -p "fuzz/artifacts/${target}"
            cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu "${target}" -- \
              -max_total_time=60 \
              -rss_limit_mb=1024 \
              -artifact_prefix="fuzz/artifacts/${target}/" \
              -print_final_stats=1
          done

      - name: Upload platform fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-platform-fuzz-artifacts
          path: products/platform/fuzz/artifacts
          if-no-files-found: ignore

  manifest-fuzz:
    name: Manifest fuzz smoke
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          submodules: false

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-fuzz@${{ env.CARGO_FUZZ_VERSION }}

      - name: Run manifest fuzz smoke
        working-directory: products/manifest
        run: |
          set -euo pipefail
          for target in \
            metadata_manifest_yaml \
            rendered_artifact_json
          do
            mkdir -p "fuzz/artifacts/${target}"
            cargo +nightly fuzz run --fuzz-dir fuzz --target x86_64-unknown-linux-gnu "${target}" -- \
              -max_total_time=60 \
              -rss_limit_mb=1024 \
              -artifact_prefix="fuzz/artifacts/${target}/" \
              -print_final_stats=1
          done

      - name: Upload manifest fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-manifest-fuzz-artifacts
          path: products/manifest/fuzz/artifacts
          if-no-files-found: ignore

  save-state:
    name: Save successful nightly state
    needs:
      - changes
      - assurance
      - notary-fuzz
      - platform-fuzz
      - manifest-fuzz
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Write successful head
        run: |
          mkdir -p .nightly-security-state
          printf '%s\n' "${{ needs.changes.outputs.head_sha }}" > .nightly-security-state/last-success-sha

      - name: Save last successful nightly state
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nightly-security-state
          key: nightly-security-state-${{ github.run_id }}-${{ github.run_attempt }}
