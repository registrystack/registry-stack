version: 2
updates:
  # Rust workspace at the repository root.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Docs site dependencies.
  - package-ecosystem: npm
    directory: "/docs/site"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # The conformance helper lock is a pip-compile requirements file. Its direct
  # input remains byte-bound to the reviewed upstream suite requirements.
  - package-ecosystem: pip
    directory: "/release/conformance/openid"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      conformance-python:
        patterns:
          - "*"

  # Pinned GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Docker base images, pinned by digest. Without this the pinned digests would
  # silently rot; dependabot keeps them current while preserving the pin.
  - package-ecosystem: docker
    directories:
      - "/release/docker"
      - "/release/conformance/openid"
      - "/crates/registry-relay"
      - "/products/notary"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docker-images:
        patterns:
          - "*"

  # Docker Compose image pins use a distinct Dependabot ecosystem from
  # Dockerfiles. Both override filenames match Dependabot's Compose matcher.
  - package-ecosystem: docker-compose
    directory: "/release/conformance/openid"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docker-compose-images:
        patterns:
          - "*"
